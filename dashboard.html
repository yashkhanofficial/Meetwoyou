<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; }
        
        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        
        .notification-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
        .profile-info-list { text-align: left; padding: 15px; font-size: 14px; color: #ccc; }
        .profile-info-list div { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <div id="noti-dot" class="notification-dot"></div>
    </div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;">Add Photo</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:10px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>

        <div id="my-profile-info" class="profile-info-list"></div>

        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>

        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <input type="text" id="edit-edu" placeholder="Education">
            <input type="text" id="edit-work" placeholder="Work">
            <input type="date" id="edit-dob" placeholder="Date of Birth">
            <input type="text" id="edit-web" placeholder="Website URL">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <i class="fas fa-share-alt" id="user-share-btn"></i>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { me = user; init(); } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyProfile();
        loadFeed();
        loadAllUsers();
        loadMyPosts();
        listenNotifications();
    }

    // --- Profile Picture Update via Cloudinary/Base64 ---
    window.updateProfilePic = (input) => {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64Img = e.target.result;
            Swal.fire({title: 'Updating Picture...', didOpen: () => Swal.showLoading()});
            
            // Update Firestore & Auth
            await updateDoc(doc(db, "users", me.uid), { photoURL: base64Img });
            await updateProfile(me, { photoURL: base64Img });
            
            document.getElementById('p-img').src = base64Img;
            Swal.fire("Success!", "Profile picture updated.", "success");
        };
        reader.readAsDataURL(file);
    };

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            if(!d) return;
            document.getElementById('p-name').innerHTML = (d.displayName || "User") + vB;
            document.getElementById('p-img').src = d.photoURL || "https://via.placeholder.com/90";
            document.getElementById('p-bio').innerText = d.bio || "Available";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
            
            // Fill edit fields
            document.getElementById('edit-name').value = d.displayName || "";
            document.getElementById('edit-bio').value = d.bio || "";

            document.getElementById('my-profile-info').innerHTML = `
                ${d.work ? `<div><i class="fas fa-briefcase"></i> Works at ${d.work}</div>` : ''}
                ${d.edu ? `<div><i class="fas fa-graduation-cap"></i> Studied at ${d.edu}</div>` : ''}
                ${d.dob ? `<div><i class="fas fa-birthday-cake"></i> Born on ${d.dob}</div>` : ''}
                ${d.web ? `<div><i class="fas fa-link"></i> <a href="${d.web}" style="color:var(--primary);">${d.web}</a></div>` : ''}
            `;
        });
    }

    window.saveProfile = async () => {
        const newName = document.getElementById('edit-name').value;
        await updateDoc(doc(db, "users", me.uid), {
            displayName: newName,
            bio: document.getElementById('edit-bio').value,
            edu: document.getElementById('edit-edu').value,
            work: document.getElementById('edit-work').value,
            dob: document.getElementById('edit-dob').value,
            web: document.getElementById('edit-web').value
        });
        await updateProfile(me, { displayName: newName });
        Swal.fire("Profile Updated!"); toggleEdit();
    };

    // --- Post Logic ---
    window.previewImg = (i) => {
        const r = new FileReader();
        r.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${selectedImgBase64}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        r.readAsDataURL(i.files[0]);
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return;
        
        Swal.fire({title: 'Sharing...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        
        const uSnap = await getDoc(doc(db, "users", me.uid));
        const userData = uSnap.data();

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: selectedImgBase64,
            authorName: userData.displayName, authorImg: userData.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });

        document.getElementById('post-text').value = "";
        selectedImgBase64 = null;
        document.getElementById('img-preview-box').innerHTML = "";
        Swal.fire("Shared!", "", "success");
    };

    function loadFeed() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                renderPost(docSnap.data(), docSnap.id, area);
            });
        });
    }

    function renderPost(p, id, target) {
        const isLiked = p.likes?.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="viewUser('${p.uid}')">
                <img src="${p.authorImg || 'https://via.placeholder.com/35'}" style="width:35px; height:35px; border-radius:50%;">
                <b>${p.authorName}${vB}</b>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-v" style="margin-left:auto; padding: 5px;" onclick="event.stopPropagation(); postMenu('${id}', '${p.text}')"></i>` : ''}
            </div>
            ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${id}', ${isLiked})">` : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                <i class="far fa-comment" onclick="addComment('${id}', '${p.uid}')"></i>
                <i class="far fa-paper-plane" onclick="sharePost('${id}')"></i>
            </div>
            <div style="padding:0 15px; font-size:14px;">
                <b>${p.likes?.length || 0} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
            </div>
        `;
        target.appendChild(div);
    }

    // --- Global Actions ---
    window.toggleLike = async (postId, alreadyLiked) => {
        const ref = doc(db, "posts", postId);
        await updateDoc(ref, { likes: alreadyLiked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
    };

    window.addComment = async (postId, targetUid) => {
        const { value: text } = await Swal.fire({ title: 'Add Comment', input: 'text', background: '#121212', color: '#fff' });
        if(text) {
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ user: me.displayName, text: text })
            });
            sendNotification(targetUid, 'commented on your post');
        }
    };

    window.viewSinglePost = async (id) => {
        const snap = await getDoc(doc(db, "posts", id));
        const p = snap.data();
        const isLiked = p.likes?.includes(me.uid);
        
        Swal.fire({
            background: '#000', color: '#fff',
            width: '95%',
            html: `
                <div style="text-align:left;">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.authorImg}" style="width:30px; border-radius:50%;"> <b>${p.authorName}</b>
                    </div>
                    ${p.img ? `<img src="${p.img}" style="width:100%; border-radius:8px;">` : ''}
                    <p>${p.text}</p>
                    <hr style="border:0.1px solid #222">
                    <div style="display:flex; gap:20px; font-size:18px;">
                        <i class="fas fa-heart" style="color:${isLiked?'red':'gray'}"></i> ${p.likes?.length} likes
                    </div>
                </div>
            `
        });
    };

    window.loadMyPosts = () => {
        const q = query(collection(db, "posts"), where("uid", "==", me.uid));
        onSnapshot(q, (snap) => {
            document.getElementById('count-posts').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const item = document.createElement('div');
                item.className = "grid-item";
                item.onclick = () => viewSinglePost(d.id);
                item.innerHTML = p.img ? `<img src="${p.img}">`: `<div style="padding:10px; font-size:10px; color:gray;">${p.text}</div>`;
                grid.appendChild(item);
            });
        });
    };

    // Other missing helper functions from your script
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(id === 'profile') loadMyPosts();
    };

    window.toggleEdit = () => { const e = document.getElementById('edit-form'); e.style.display = e.style.display==='none'?'block':'none'; };
    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    const h = `<div class="post-user" onclick="viewUser('${d.id}')">
                        <img src="${u.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName || 'User'}${vB}</b>
                    </div>`;
                    list.innerHTML += h;
                    chatList.innerHTML += h.replace("viewUser", "openChatDirect");
                }
            });
        });
    };

    window.openChatDirect = (uid) => {
        getDoc(doc(db, "users", uid)).then(s => openChat(uid, s.data().displayName, s.data().photoURL));
    };

    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + vB;
        document.getElementById('chat-h-img').src = img || "https://via.placeholder.com/35";
        document.getElementById('chat-screen').style.display = 'flex';
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };

    window.sharePost = (id) => {
        const url = window.location.origin + "?post=" + id;
        navigator.clipboard.writeText(url);
        Swal.fire("Link Copied!");
    };

    window.shareMyProfile = () => {
        const url = window.location.origin + "?user=" + me.uid;
        navigator.clipboard.writeText(url);
        Swal.fire("Profile Link Copied!");
    };

    async function sendNotification(to, type) {
        if(to === me.uid) return;
        await addDoc(collection(db, "notifications"), {
            to, fromName: me.displayName, type, timestamp: serverTimestamp(), read: false
        });
    }

    function listenNotifications() {
        const q = query(collection(db, "notifications"), where("to", "==", me.uid), where("read", "==", false));
        onSnapshot(q, (snap) => {
            document.getElementById('noti-dot').style.display = snap.size > 0 ? 'block' : 'none';
        });
    }

    window.showNotifications = () => {
        const q = query(collection(db, "notifications"), where("to", "==", me.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            let list = "";
            snap.forEach(d => {
                list += `<div style="padding:10px; border-bottom:1px solid #333; text-align:left;"><b>${d.data().fromName}</b> ${d.data().type}</div>`;
                updateDoc(doc(db, "notifications", d.id), { read: true });
            });
            Swal.fire({ title: 'Notifications', html: list || "No new alerts", background: '#121212', color: '#fff' });
        });
    };

    window.postMenu = async (id, oldText) => {
        const { value: action } = await Swal.fire({
            title: 'Post Options',
            showDenyButton: true, confirmButtonText: 'Edit', denyButtonText: 'Delete', background: '#121212', color: '#fff'
        });
        if(action) {
            const { value: newText } = await Swal.fire({ input: 'textarea', inputValue: oldText });
            if(newText) await updateDoc(doc(db, "posts", id), { text: newText });
        } else if (Swal.DismissReason.deny) {
            if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id));
        }
    };
</script>
</body>
</html>
