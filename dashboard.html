<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou | Next-Gen Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #8e44ad; 
            --primary-light: #a55eea;
            --bg: #050505; 
            --card: #18191a; 
            --inner-card: #242526;
            --text: #e4e6eb; 
            --gray: #b0b3b8; 
            --accent: #2d88ff; 
            --danger: #f35a6b;
        }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }

        /* --- Global UI --- */
        .v-badge { color: var(--accent); font-size: 0.85em; margin-left: 3px; }
        .btn-action { background: var(--inner-card); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary:hover { background: var(--primary-light); }
        
        /* --- Profile Page Styling --- */
        .profile-container { max-width: 800px; margin: auto; position: relative; }
        .cover-photo { width: 100%; height: 220px; background: #333; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; object-fit: cover; position: relative; }
        .profile-header-main { text-align: center; margin-top: -60px; padding: 0 15px; }
        .p-avatar-wrap { position: relative; display: inline-block; }
        .p-avatar { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--bg); object-fit: cover; background: var(--card); }
        
        .stat-bar { display: flex; justify-content: center; gap: 30px; margin: 15px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 10px 0; }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-item b { display: block; font-size: 1.2em; }
        .stat-item span { color: var(--gray); font-size: 0.9em; }

        .info-box { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px 0; }
        .info-line { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 14px; }
        .info-line i { color: var(--gray); width: 20px; text-align: center; }

        /* --- Story & Feed --- */
        .story-wrapper { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .story-card { min-width: 110px; height: 180px; border-radius: 12px; background-size: cover; position: relative; cursor: pointer; border: 1px solid #333; overflow: hidden; }
        .story-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
        .story-user-img { position: absolute; top: 8px; left: 8px; width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .post-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .post-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .post-meta { display: flex; gap: 10px; align-items: center; }
        
        /* --- Navigation --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 22px; cursor: pointer; position: relative; }
        .nav-item.active { color: var(--primary); }
        .badge-count { position: absolute; top: -5px; right: -8px; background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; }

        /* --- Sections --- */
        .section { display: none; max-width: 650px; margin: auto; padding: 15px; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Chat List --- */
        .chat-user { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 10px; transition: 0.3s; cursor: pointer; }
        .chat-user:hover { background: var(--inner-card); }
        .online-dot { width: 12px; height: 12px; background: #31a24c; border-radius: 50%; border: 2px solid var(--card); position: absolute; bottom: 2px; right: 2px; }
    </style>
</head>
<body>

<div style="background: var(--card); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999;">
    <h2 style="color: var(--primary); margin: 0; letter-spacing: 1px;">Meetwoyou</h2>
    <div style="display: flex; gap: 15px; align-items: center;">
        <i class="fas fa-search" onclick="showSec('friends')" style="cursor:pointer;"></i>
        <i class="fas fa-bell" onclick="showNotifications()" style="cursor:pointer; position: relative;">
            <span id="notif-dot" class="badge-count" style="display:none;">!</span>
        </i>
        <img id="header-avatar" class="p-avatar" style="width:32px; height:32px;" onclick="showSec('profile')">
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-wrapper" id="story-area">
        <div class="story-card" style="background: #222;" onclick="uploadStory()">
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                <i class="fas fa-plus-circle" style="font-size: 30px; color: var(--primary);"></i>
                <small style="margin-top:10px;">Add Story</small>
            </div>
        </div>
    </div>
    
    <div class="post-card">
        <div style="display:flex; gap:10px;">
            <img class="header-avatar p-avatar" style="width:40px; height:40px;">
            <textarea id="post-input" placeholder="What's on your mind?" style="flex:1; background:var(--inner-card); border:none; color:white; padding:12px; border-radius:20px; resize:none; outline:none;"></textarea>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:10px; border-top:1px solid #333; padding-top:10px;">
            <label for="post-img-file" style="cursor:pointer; color:var(--gray);"><i class="fas fa-image" style="color:#45bd62;"></i> Photo</label>
            <input type="file" id="post-img-file" accept="image/*" style="display:none;">
            <button class="btn-primary" onclick="createPost()" style="padding:5px 20px;">Post</button>
        </div>
    </div>

    <div id="news-feed"></div>
</div>

<div id="profile-sec" class="section">
    <div class="profile-container">
        <img id="p-cover" src="https://via.placeholder.com/800x220" class="cover-photo">
        <div class="profile-header-main">
            <div class="p-avatar-wrap">
                <img id="p-main-img" src="" class="p-avatar">
                <label for="p-img-upload" style="position:absolute; bottom:10px; right:5px; background:var(--inner-card); padding:8px; border-radius:50%; cursor:pointer;"><i class="fas fa-camera"></i></label>
                <input type="file" id="p-img-upload" style="display:none" onchange="updateProfileMedia('photo')">
            </div>
            <h2 style="margin: 10px 0 2px 0;"> <span id="p-name">Loading...</span> <i class="fas fa-check-circle v-badge"></i></h2>
            <p id="p-username" style="color:var(--gray); margin:0;">@username</p>
            <p id="p-bio" style="margin:10px 0; font-style:italic; color:var(--text);"></p>
            
            <div id="profile-actions-area" style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
                </div>
        </div>

        <div class="stat-bar">
            <div class="stat-item"><b>0</b><span>Posts</span></div>
            <div class="stat-item" onclick="viewFollowers()"> <b id="count-followers">0</b><span>Followers</span></div>
            <div class="stat-item" onclick="viewFollowing()"> <b id="count-following">0</b><span>Following</span></div>
        </div>

        <div class="info-box">
            <div class="info-line"><i class="fas fa-graduation-cap"></i> <span>Studied at <b id="p-edu">...</b></span></div>
            <div class="info-line"><i class="fas fa-home"></i> <span>Lives in <b id="p-loc">...</b></span></div>
            <div class="info-line"><i class="fas fa-globe"></i> <a id="p-web" href="#" style="color:var(--accent); text-decoration:none;">Website</a></div>
            <div style="display:flex; gap:15px; margin-top:15px; justify-content:center; font-size:20px;">
                <i class="fab fa-facebook" id="link-fb"></i>
                <i class="fab fa-instagram" id="link-ig"></i>
                <i class="fab fa-github" id="link-gh"></i>
            </div>
        </div>

        <div id="personal-feed"></div>
    </div>
</div>

<div id="friends-sec" class="section">
    <div style="background:var(--card); padding:15px; border-radius:12px;">
        <input type="text" id="user-query" placeholder="Find people by name or username..." oninput="searchUsers()" style="width:100%; background:var(--inner-card); border:1px solid #333; color:white; padding:12px; border-radius:10px;">
    </div>
    <div id="search-results" style="margin-top:20px;"></div>
</div>

<div id="notif-sec" class="section">
    <h3 style="border-left:4px solid var(--primary); padding-left:10px;">Notifications</h3>
    <div id="notif-list"></div>
</div>

<div class="nav-bar">
    <i class="fas fa-home nav-item active" onclick="showSec('home', this)"></i>
    <i class="fas fa-users nav-item" onclick="showSec('friends', this)"></i>
    <i class="fas fa-comment-alt nav-item" onclick="showSec('messages', this)"></i>
    <i class="fas fa-user-circle nav-item" onclick="showSec('profile', this)"></i>
</div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, updateDoc, increment, deleteDoc, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase Config (Using your project details)
    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    let currentUID = null;
    let viewingProfileUID = null;

    onAuthStateChanged(auth, (user) => {
        if(user) {
            currentUID = user.uid;
            // Handle Profile Deep Linking (meetwoyou.com/#profileID)
            const hash = window.location.hash.substring(1);
            if(hash) loadUserProfile(hash);
            else loadUserProfile(currentUID);

            initApp();
        } else {
            window.location.href = "login.html";
        }
    });

    async function initApp() {
        listenToPosts();
        listenToNotifications();
        listenToStories();
    }

    // --- Profile System ---
    window.loadUserProfile = async (uid) => {
        viewingProfileUID = uid;
        const snap = await getDoc(doc(db, "users", uid));
        if(!snap.exists()) return;
        const u = snap.data();

        // Map Data to UI
        document.getElementById('p-name').innerText = u.displayName || "User";
        document.getElementById('p-username').innerText = `@${u.username || 'user'}`;
        document.getElementById('p-bio').innerText = u.bio || "";
        document.getElementById('p-main-img').src = u.photoURL || "https://via.placeholder.com/130";
        document.getElementById('p-cover').src = u.coverURL || "https://via.placeholder.com/800x220";
        document.getElementById('p-edu').innerText = u.education || "N/A";
        document.getElementById('p-loc').innerText = u.location || "N/A";
        
        // Relationship Stats
        document.getElementById('count-followers').innerText = (u.followers || []).length;
        document.getElementById('count-following').innerText = (u.following || []).length;

        // Action Buttons
        const actionArea = document.getElementById('profile-actions-area');
        actionArea.innerHTML = "";
        
        if(uid === currentUID) {
            actionArea.innerHTML = `<button class="btn-action" onclick="editProfilePopup()"><i class="fas fa-edit"></i> Edit Profile</button>
                                    <button class="btn-action" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
        } else {
            const isFollowing = (u.followers || []).includes(currentUID);
            actionArea.innerHTML = `
                <button class="btn-primary" onclick="toggleFollow('${uid}', ${isFollowing})">
                    ${isFollowing ? 'Following' : 'Follow'}
                </button>
                <button class="btn-action" onclick="openChat('${uid}')">Message</button>
            `;
        }

        loadUserPosts(uid);
        showSec('profile');
    };

    window.toggleFollow = async (targetUID, isFollowing) => {
        const myRef = doc(db, "users", currentUID);
        const targetRef = doc(db, "users", targetUID);

        if(isFollowing) {
            await updateDoc(myRef, { following: arrayRemove(targetUID) });
            await updateDoc(targetRef, { followers: arrayRemove(currentUID) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(targetUID) });
            await updateDoc(targetRef, { followers: arrayUnion(currentUID) });
            // Send Notification
            sendNotification(targetUID, "started following you");
        }
        loadUserProfile(targetUID);
    };

    // --- News Feed & Posts ---
    function listenToPosts() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('news-feed');
            area.innerHTML = "";
            snap.forEach(doc => area.appendChild(renderPost(doc.data(), doc.id)));
        });
    }

    function renderPost(p, pid) {
        const card = document.createElement('div');
        card.className = "post-card";
        const isOwner = p.uid === currentUID;
        
        card.innerHTML = `
            <div class="post-top">
                <div class="post-meta" onclick="loadUserProfile('${p.uid}')" style="cursor:pointer;">
                    <img src="${p.userImg}" class="p-avatar" style="width:40px; height:40px;">
                    <div>
                        <b>${p.userName}</b> <i class="fas fa-check-circle v-badge"></i><br>
                        <small style="color:var(--gray)">${p.timestamp?.toDate().toLocaleDateString() || 'Just now'}</small>
                    </div>
                </div>
                ${isOwner ? `<i class="fas fa-ellipsis-h" onclick="showPostMenu('${pid}', \`${p.text}\`)"></i>` : ''}
            </div>
            <p style="margin:15px 0; white-space:pre-wrap;">${p.text}</p>
            ${p.img ? `<img src="${p.img}" style="width:100%; border-radius:10px; border:1px solid #333;">` : ''}
            <div style="display:flex; gap:20px; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <div class="action-btn" onclick="likePost('${pid}')"><i class="fas fa-heart"></i> ${p.likes || 0}</div>
                <div class="action-btn"><i class="fas fa-comment"></i> Comment</div>
                <div class="action-btn" onclick="shareProfile('${p.uid}')"><i class="fas fa-share"></i> Share</div>
            </div>
        `;
        return card;
    }

    // --- Story System (24h Auto-Expire) ---
    async function uploadStory() {
        const { value: file } = await Swal.fire({ title: 'Select Story Image', input: 'file', inputAttributes: { 'accept': 'image/*', 'aria-label': 'Upload story' } });
        if(!file) return;

        Swal.showLoading();
        const imgUrl = await uploadToCloudinary(file);
        await addDoc(collection(db, "stories"), {
            uid: currentUID,
            userName: auth.currentUser.displayName,
            userImg: auth.currentUser.photoURL,
            img: imgUrl,
            timestamp: serverTimestamp(),
            expiresAt: Date.now() + (24 * 60 * 60 * 1000) // 24 Hours
        });
        Swal.fire('Success', 'Story uploaded!', 'success');
    }

    function listenToStories() {
        const now = Date.now();
        onSnapshot(query(collection(db, "stories"), where("expiresAt", ">", now)), (snap) => {
            const area = document.getElementById('story-area');
            // Keep the "Add Story" button, remove others
            while (area.childNodes.length > 1) { area.removeChild(area.lastChild); }
            
            snap.forEach(doc => {
                const s = doc.data();
                const div = document.createElement('div');
                div.className = "story-card";
                div.style.backgroundImage = `url(${s.img})`;
                div.innerHTML = `
                    <div class="story-overlay"></div>
                    <img src="${s.userImg}" class="story-user-img">
                    <small style="position:absolute; bottom:5px; left:5px; font-weight:bold;">${s.userName}</small>
                `;
                div.onclick = () => viewStory(s);
                area.appendChild(div);
            });
        });
    }

    // --- Helpers ---
    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    };

    window.shareProfile = (uid) => {
        const link = `${window.location.origin}${window.location.pathname}#${uid}`;
        navigator.clipboard.writeText(link);
        Swal.fire('Link Copied', 'Profile link copied to clipboard!', 'info');
    };

</script>
</body>
</html>
