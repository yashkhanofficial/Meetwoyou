<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Profile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #8b5cf6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-panel p-8 rounded-[2.5rem] w-full max-w-lg shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold italic text-purple-400">Meetwoyou</h1>
            <p class="text-gray-400 text-sm">Personalize your professional profile</p>
        </div>

        <div class="flex flex-col items-center space-y-6">
            <div class="relative group">
                <div id="user-avatar" class="w-32 h-32 rounded-full border-4 border-purple-500/30 overflow-hidden bg-gray-800 flex items-center justify-center">
                    <span id="avatar-placeholder" class="text-4xl">👤</span>
                </div>
                <label for="photo-upload" class="absolute bottom-0 right-0 bg-purple-600 p-2.5 rounded-full cursor-pointer hover:bg-purple-700 transition shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </label>
                <input type="file" id="photo-upload" class="hidden" accept="image/*">
            </div>

            <div class="w-full space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Full Name</label>
                    <input type="text" id="user-name-input" class="input-field w-full px-5 py-3.5 rounded-2xl mt-1" placeholder="Enter your name">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Email (Read Only)</label>
                    <input type="email" id="user-email-display" class="input-field w-full px-5 py-3.5 rounded-2xl mt-1 opacity-50 cursor-not-allowed" readonly>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Bio / Status</label>
                    <textarea id="user-bio" class="input-field w-full px-5 py-3.5 rounded-2xl mt-1 h-24 resize-none" placeholder="Cybersecurity Student | Web Developer..."></textarea>
                </div>
            </div>

            <div class="w-full grid grid-cols-2 gap-4 pt-4">
                <button id="save-profile" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-2xl transition shadow-lg active:scale-95">Save Changes</button>
                <button id="sign-out" class="bg-white/5 hover:bg-red-500/20 text-red-400 font-bold py-4 rounded-2xl border border-white/10 transition">Sign Out</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Load User Data
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name-input').value = user.displayName || "";
                document.getElementById('user-email-display').value = user.email;
                if (user.photoURL) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
                }
            } else {
                window.location.href = "index.html"; // Redirect to login if not logged in
            }
        });

        // Update Profile
        document.getElementById('save-profile').onclick = async () => {
            const newName = document.getElementById('user-name-input').value;
            try {
                await updateProfile(auth.currentUser, { displayName: newName });
                alert("Profile Updated Successfully!");
            } catch (error) {
                alert(error.message);
            }
        };

        // Sign Out
        document.getElementById('sign-out').onclick = () => {
            signOut(auth).then(() => window.location.href = "index.html");
        };
    </script>
</body>
</html>
