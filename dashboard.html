<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* MODERN POST UPLOAD UI */
        .post-upload-box { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 20px; 
            margin: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }
        #post-text { 
            border: none; 
            resize: none; 
            min-height: 50px; 
            margin-bottom: 10px; 
            font-size: 16px; 
            background: transparent; 
            color: white;
            width: 100%;
            overflow: hidden;
        }
        #post-text:focus { outline: none; }
        .upload-actions { display: flex; align-items: center; gap: 12px; padding-top: 12px; border-top: 1px solid #262626; }
        .action-icon-btn { 
            background: var(--glass); 
            color: #fff; 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .action-icon-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }
        .btn-premium { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-weight: 700; 
            cursor: pointer; 
            flex: 1; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 149, 246, 0.3);
        }
        .btn-premium:active { transform: scale(0.95); opacity: 0.8; }
        #img-preview-box { position: relative; margin-top: 10px; border-radius: 12px; overflow: hidden; display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* CHAT UI IMPROVEMENTS */
        .chat-bubble { 
            padding: 12px 16px; 
            border-radius: 20px; 
            margin: 4px 0; 
            max-width: 80%; 
            font-size: 14.5px; 
            word-wrap: break-word; 
            position: relative;
            transition: 0.2s;
            cursor: pointer;
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .chat-bubble:active { opacity: 0.7; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(0,149,246,0.2); }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 9px; opacity: 0.6; display: block; margin-top: 4px; text-align: right; }
        .last-msg-preview { font-size: 12px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        
        /* SEARCH HIGHLIGHT */
        .highlight { background: rgba(0, 149, 246, 0.3); color: var(--primary); font-weight: bold; border-radius: 2px; }

        /* Existing Styles */
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; cursor: pointer; display: flex; justify-content: center; background: #000; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        .like-animation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .like-animation.active { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        #chat-screen, #user-profile-view, #post-detail-view, #story-viewer { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .post-time { font-size: 10px; color: var(--gray); padding: 0 15px; }
        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #121212; }
        .story-container { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        .story-ring.watched { border-color: #262626; }
        .upload-progress-container { width: 100%; background: #262626; border-radius: 5px; height: 5px; margin: 10px 0; display: none; }
        .upload-progress-bar { height: 100%; width: 0%; background: var(--primary); border-radius: 5px; transition: width 0.3s; }
        .preview-remove { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; z-index: 5; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring watched">
            <div style="position: absolute; bottom: 18px; right: 2px; background: var(--primary); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid #000;"><i class="fas fa-plus"></i></div>
            <div style="font-size: 11px; margin-top: 4px;">Your Story</div>
            <input type="file" id="story-file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display: flex; gap: 12px;"></div>
    </div>

    <div class="post-upload-box">
        <textarea id="post-text" placeholder="What's on your mind?" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <div id="img-preview-box"></div>
        <div class="upload-progress-container" id="up-prog-cont">
            <div class="upload-progress-bar" id="up-prog-bar"></div>
        </div>
        <div class="upload-actions">
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewImg(this)">
            <button class="action-icon-btn" onclick="document.getElementById('post-file').click()" title="Add Media">
                <i class="fas fa-camera" style="color: #0095f6;"></i>
            </button>
            <button id="share-post-btn" class="btn-premium" onclick="uploadPost()">Share Post</button>
        </div>
    </div>
    
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..." oninput="filterUsers(this.value)"></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px; margin:0;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:5px;"></p>
        <div id="p-details-box" style="text-align: left; padding: 10px 20px; font-size: 14px; color: #ccc;"></div>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()" style="cursor:pointer;"></i>
        <span id="view-user-name-title">Profile</span>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-h-img" src="" onclick="openProfileFromChat()" style="width:35px; height:35px; border-radius:50%; cursor:pointer; object-fit:cover;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold; cursor:pointer;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            init(); 
            setTimeout(() => document.getElementById('app-loader').style.display = 'none', 1200);
        } else { window.location.href = "index.html"; }
    });

    function init() { 
        loadMyProfile(); 
        loadFeed(); 
        loadAllUsers(); 
        loadMyPosts(); 
    }

    function timeOnly(timestamp) {
        if(!timestamp) return "";
        const date = timestamp.toDate();
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // SEARCH HIGHLIGHT FEATURE
    window.filterUsers = (val) => {
        const queryVal = val.toLowerCase();
        const items = document.querySelectorAll('.user-list-item');
        items.forEach(item => {
            const nameEl = item.querySelector('.u-name-txt');
            const originalName = nameEl.getAttribute('data-original');
            if (originalName.toLowerCase().includes(queryVal)) {
                item.style.display = 'flex';
                if(queryVal !== "") {
                    const regex = new RegExp(`(${queryVal})`, 'gi');
                    nameEl.innerHTML = originalName.replace(regex, `<span class="highlight">$1</span>`);
                } else {
                    nameEl.innerHTML = originalName;
                }
            } else {
                item.style.display = 'none';
            }
        });
    };

    // MESSAGE SYSTEM UPGRADE
    async function loadAllUsers() {
        // Chat List with Last Message & De-duplication
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "desc")), async (mSnap) => {
            const chatList = document.getElementById('chat-list');
            chatList.innerHTML = "";
            let interactedUids = new Map();

            mSnap.forEach(mDoc => {
                const m = mDoc.data();
                const otherUid = m.sender === me.uid ? m.receiver : m.sender;
                if(!interactedUids.has(otherUid)) {
                    interactedUids.set(otherUid, m.text);
                }
            });

            for(let [uid, lastMsg] of interactedUids) {
                const uSnap = await getDoc(doc(db, "users", uid));
                if(uSnap.exists()){
                    const u = uSnap.data();
                    const div = document.createElement('div');
                    div.className = "post-user";
                    div.onclick = () => openChat(uid, u.displayName, u.photoURL);
                    div.innerHTML = `
                        <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                        <div style="flex:1">
                            <b>${u.displayName}${u.isVerified?vB:''}</b>
                            <div class="last-msg-preview">${lastMsg}</div>
                        </div>
                    `;
                    chatList.appendChild(div);
                }
            }
        });

        // User Search List
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                if(d.id !== me.uid) {
                    const u = d.data();
                    list.innerHTML += `<div class="user-list-item">
                        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="viewUser('${d.id}')">
                            <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                            <div><b class="u-name-txt" data-original="${u.displayName}">${u.displayName}${u.isVerified?vB:''}</b></div>
                        </div>
                    </div>`;
                }
            });
        });
    }

    window.openChat = async (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const mid = d.id;
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const bubble = document.createElement('div');
                    bubble.className = `chat-bubble ${m.sender === me.uid?'sent':'recv'}`;
                    bubble.innerHTML = `${m.text} <span class="msg-time">${timeOnly(m.timestamp)}</span>`;
                    bubble.onclick = () => messageOptions(mid, m.text, m.sender === me.uid);
                    box.appendChild(bubble);
                }
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });
    };

    window.openProfileFromChat = () => {
        if(activeChatID) viewUser(activeChatID);
    };

    async function messageOptions(mid, text, isMine) {
        const actions = isMine ? ['Edit', 'Delete for Me', 'Delete for Everyone'] : ['Delete for Me'];
        const { value: selection } = await Swal.fire({
            title: 'Message Options',
            input: 'select',
            inputOptions: actions.reduce((obj, val) => ({...obj, [val]: val}), {}),
            showCancelButton: true,
            background: '#121212', color: '#fff'
        });

        if(selection === 'Edit') {
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: text, background: '#121212', color: '#fff' });
            if(newText) await updateDoc(doc(db, "messages", mid), { text: newText });
        } else if(selection === 'Delete for Everyone') {
            await deleteDoc(doc(db, "messages", mid));
        } else if(selection === 'Delete for Me') {
            // Local UI removal logic or specific flag can be added here
            Swal.fire({ text: 'Deleted for you', timer: 1000, showConfirmButton: false, background: '#121212' });
        }
    }

    // MODERN UPLOAD LOGIC
    window.uploadPost = async () => {
        const btn = document.getElementById('share-post-btn');
        const txt = document.getElementById('post-text').value;
        const fileInput = document.getElementById('post-file');
        if(!txt.trim() && !fileInput.files[0]) return;

        btn.disabled = true;
        btn.style.transform = "scale(0.95)";
        btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Posting...`;

        try {
            let mediaUrl = null;
            if(fileInput.files[0]) mediaUrl = await uploadToCloudinary(fileInput.files[0]);
            
            await addDoc(collection(db, "posts"), {
                uid: me.uid, text: txt, img: mediaUrl,
                authorName: me.displayName, authorImg: me.photoURL,
                timestamp: serverTimestamp(), likes: [], comments: []
            });
            
            document.getElementById('post-text').value = "";
            document.getElementById('img-preview-box').style.display = "none";
            Swal.fire({ icon: 'success', title: 'Shared!', timer: 1500, showConfirmButton: false, background: '#121212', color: '#fff' });
        } catch (e) {
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.style.transform = "scale(1)";
            btn.innerHTML = `Share Post`;
        }
    };

    // Placeholder functions to keep structure
    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou');
        const resp = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        return data.secure_url;
    }

    window.previewImg = (i) => {
        const file = i.files[0];
        if(!file) return;
        const previewBox = document.getElementById('img-preview-box');
        previewBox.style.display = "block";
        const r = new FileReader(); 
        r.onload = (e) => {
            previewBox.innerHTML = `<button class="preview-remove" onclick="this.parentElement.style.display='none'"><i class="fas fa-times"></i></button>
                                   <img src="${e.target.result}" style="width:100%; border-radius:12px;">`;
        }; 
        r.readAsDataURL(file);
    };

    // Required remaining core functions (Mappings)
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.viewUser = async (uid) => {
        document.getElementById('user-profile-view').style.display = 'flex';
        const snap = await getDoc(doc(db, "users", uid));
        const d = snap.data();
        document.getElementById('view-user-name-title').innerText = d.displayName;
        document.getElementById('user-profile-content').innerHTML = `<div style="text-align:center; padding:20px;">
            <img src="${d.photoURL}" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
            <h3>${d.displayName}</h3><p>${d.bio || ''}</p>
        </div>`;
    };
    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.userLogout = () => signOut(auth);
