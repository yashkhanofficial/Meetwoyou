<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .glass-header { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .sidebar { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px 18px;
            border-radius: 12px; transition: 0.3s; color: #94a3b8; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { 
            background: linear-gradient(45deg, #7c3aed, #4f46e5); 
            color: white; box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        #main-content { 
            height: calc(100vh - 75px); 
            overflow-y: auto; scrollbar-width: none;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { 
                background: rgba(15, 23, 42, 0.98); 
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
            #main-content { height: calc(100vh - 145px); }
        }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside class="hidden md:flex sidebar w-64 flex-col p-6 space-y-6">
        <h1 class="text-2xl font-black italic text-purple-500 px-2">Meetwoyou</h1>
        <nav class="flex-1 space-y-2">
            <div onclick="loadPage('newsfeed', this)" class="nav-link active"><i class="fas fa-home"></i> Home</div>
            <div onclick="loadPage('friends', this)" class="nav-link"><i class="fas fa-users"></i> Connections</div>
            <div onclick="loadPage('messages', this)" class="nav-link"><i class="fas fa-comment"></i> Messages</div>
            <div onclick="loadPage('profile', this)" class="nav-link"><i class="fas fa-user"></i> Profile</div>
            <div onclick="loadPage('settings', this)" class="nav-link"><i class="fas fa-cog"></i> Settings</div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col w-full relative">
        <header class="glass-header h-[75px] flex items-center justify-between px-6 z-50">
            <h1 class="md:hidden text-xl font-black italic text-purple-500">M.</h1>
            <h2 id="page-title" class="text-lg font-bold">HOME FEED</h2>
            
            <div class="flex items-center gap-4">
                <i class="fas fa-bell text-gray-400 cursor-pointer" onclick="loadPage('notifications')"></i>
                <div class="flex items-center gap-2 cursor-pointer" onclick="loadPage('profile')">
                    <div class="hidden sm:block text-right">
                        <p id="user-display-name" class="text-xs font-bold text-white">Loading...</p>
                    </div>
                    <img id="user-profile-pic" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border-2 border-purple-500 object-cover">
                </div>
            </div>
        </header>

        <div id="main-content" class="p-4 overflow-x-hidden">
            <div id="loader" class="flex flex-col items-center justify-center h-full text-gray-500">
                <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-sm font-medium">Syncing Nexus...</p>
            </div>
        </div>

        <nav class="md:hidden mobile-nav fixed bottom-0 w-full h-16 flex items-center justify-around z-50">
            <i onclick="loadPage('newsfeed', this)" class="fas fa-home text-purple-500 text-xl cursor-pointer"></i>
            <i onclick="loadPage('friends', this)" class="fas fa-users text-gray-500 text-xl cursor-pointer"></i>
            <i onclick="loadPage('messages', this)" class="fas fa-comment text-gray-500 text-xl cursor-pointer"></i>
            <i onclick="loadPage('profile', this)" class="fas fa-user text-gray-500 text-xl cursor-pointer"></i>
            <i onclick="loadPage('settings', this)" class="fas fa-cog text-gray-500 text-xl cursor-pointer"></i>
        </nav>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ইউজার ডাটা রিয়েল-টাইম আপডেট
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // ড্যাশবোর্ডে বেসিক ডাটা সেট করা
                const displayName = user.displayName || "Agent";
                const photoURL = user.photoURL || "https://via.placeholder.com/40";
                
                document.getElementById('user-display-name').innerText = displayName;
                document.getElementById('user-profile-pic').src = photoURL;

                // Firestore থেকে কাস্টম ডাটা চেক করা (যদি ইউজারনেম থাকে)
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        if (userData.fullName) document.getElementById('user-display-name').innerText = userData.fullName;
                    }
                } catch (e) { console.error("Error fetching user data:", e); }

                loadPage('newsfeed');
            } else {
                window.location.href = "index.html";
            }
        });

        window.loadPage = async (pageName, element = null) => {
            const contentArea = document.getElementById('main-content');
            document.getElementById('page-title').innerText = pageName.toUpperCase();
            
            // UI Color Change Logic
            if(element) {
                // Sidebar active state
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                if(element.classList.contains('nav-link')) element.classList.add('active');

                // Mobile icons color
                document.querySelectorAll('.mobile-nav i').forEach(el => {
                    el.classList.remove('text-purple-500');
                    el.classList.add('text-gray-500');
                });
                element.classList.add('text-purple-500');
                element.classList.remove('text-gray-500');
            }

            try {
                const response = await fetch(`${pageName}.html`);
                if(!response.ok) throw new Error();
                const html = await response.text();
                contentArea.innerHTML = html;

                // বিশেষ কন্ডিশন: প্রোফাইল পেজ লোড হলে Firestore থেকে ডাটা রিফ্রেশ করা
                if(pageName === 'profile') {
                    const profileScript = document.createElement('script');
                    profileScript.type = 'module';
                    profileScript.innerHTML = `
                        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
                        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
                        const auth = getAuth();
                        const db = getFirestore();
                        const user = auth.currentUser;
                        if(user) {
                            const userDoc = await getDoc(doc(db, "users", user.uid));
                            if(userDoc.exists()) {
                                const data = userDoc.data();
                                if(document.getElementById('p-name')) document.getElementById('p-name').innerText = data.fullName || user.displayName;
                                if(document.getElementById('p-username')) document.getElementById('p-username').innerText = data.username || "user_" + user.uid.slice(0,5);
                                if(document.getElementById('p-image')) document.getElementById('p-image').src = data.profilePicUrl || user.photoURL || "https://via.placeholder.com/150";
                            }
                        }
                    `;
                    document.body.appendChild(profileScript);
                }
            } catch (err) {
                contentArea.innerHTML = `<div class="p-10 text-center"><i class="fas fa-exclamation-triangle text-3xl mb-4 text-purple-500"></i><br>Module <b>${pageName}.html</b> needs encryption.</div>`;
            }
        };
    </script>
</body>
</html>
