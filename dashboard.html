<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Advanced Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; --chat-bg: #242526; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Custom Loader */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Header */
        .app-header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .app-header h2 { color: var(--primary); font-style: italic; margin: 0; }

        /* Chat Window (WhatsApp Style) */
        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; flex-direction: column; }
        .chat-header { background: var(--card); padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; }
        .call-icons { margin-left: auto; display: flex; gap: 20px; font-size: 18px; color: var(--primary); }
        
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .msg { margin-bottom: 10px; max-width: 70%; padding: 10px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.sent { background: var(--primary); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg.received { background: var(--chat-bg); align-self: flex-start; border-bottom-left-radius: 2px; }

        .chat-input-area { background: var(--card); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .chat-input-area input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .attachment-btn { color: var(--gray); font-size: 20px; cursor: pointer; }

        /* Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); text-align: center; font-size: 20px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 10px; margin-top: 3px; }

        /* Profile Modal */
        #profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2500; padding-top: 50px; }
        .modal-content { max-width: 400px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay">
    <img src="https://res.cloudinary.com/dpgawb5sl/image/upload/v1743134700/Meetwoyou_loader.jpg" class="loader-img">
    <p style="margin-top:20px; color:var(--primary); font-weight:bold;">Initializing Meetwoyou...</p>
</div>

<div class="app-header">
    <h2>Meetwoyou</h2>
    <div onclick="openChat()"><i class="fas fa-comment-dots" style="font-size: 24px; color: var(--primary);"></i></div>
</div>

<div id="feed" style="padding: 20px; text-align: center;">
    <h3>Newsfeed</h3>
    <p style="color:var(--gray)">Stories and Posts will appear here...</p>
</div>

<div class="nav-bar">
    <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="alert('Search feature coming soon!')"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item" onclick="openChat()"><i class="fas fa-envelope"></i><span>Messages</span></div>
    <div class="nav-item" onclick="openProfile()"><i class="fas fa-user-circle"></i><span>Profile</span></div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img src="https://via.placeholder.com/40" id="chat-user-img">
        <b id="chat-user-name">Friend Name</b>
        <div class="call-icons">
            <i class="fas fa-phone-alt" onclick="alert('Starting Audio Call...')"></i>
            <i class="fas fa-video" onclick="alert('Starting Video Call...')"></i>
        </div>
    </div>
    <div class="messages-area" id="msg-box">
        <div class="msg received">Hello! How can I help you?</div>
        <div class="msg sent">I need some help with my cyber project.</div>
    </div>
    <div class="chat-input-area">
        <label for="file-input" class="attachment-btn"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
        <input type="text" id="chat-msg" placeholder="Type a message...">
        <i class="fas fa-paper-plane" style="color:var(--primary); font-size:22px;" id="send-btn"></i>
    </div>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h3>Secure Identity</h3>
        <div style="position:relative; width: 100px; height: 100px; margin: auto;">
            <img id="edit-img" src="https://via.placeholder.com/100" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
            <label for="upload" style="position:absolute; bottom:0; right:0; background:var(--primary); padding:5px; border-radius:50%; cursor:pointer;"><i class="fas fa-camera"></i></label>
            <input type="file" id="upload" style="display:none">
        </div>
        <input type="text" id="name-input" placeholder="Full Name">
        <textarea id="bio-input" placeholder="Bio"></textarea>
        <input type="text" id="edu-input" placeholder="Education">
        <input type="number" id="age-input" placeholder="Age">
        <button id="save-profile" style="background:var(--primary); color:white; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; margin-top:10px;">Save Profile</button>
        <button onclick="document.getElementById('profile-modal').style.display='none'" style="background:none; border:none; color:var(--gray); margin-top:10px;">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('name-input').value = user.displayName || "";
                document.getElementById('bio-input').value = data.bio || "";
                document.getElementById('edit-img').src = user.photoURL || "https://via.placeholder.com/100";
            }
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        } else {
            window.location.href = "index.html";
        }
    });

    // Profile Handlers
    window.openProfile = () => document.getElementById('profile-modal').style.display = 'block';
    
    // Chat Handlers
    window.openChat = () => document.getElementById('chat-window').style.display = 'flex';
    window.closeChat = () => document.getElementById('chat-window').style.display = 'none';

    // Send Message Logic
    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('chat-msg').value;
        if(!text) return;
        
        // Add message to UI (Sent)
        const msgDiv = document.createElement('div');
        msgDiv.className = "msg sent";
        msgDiv.innerText = text;
        document.getElementById('msg-box').appendChild(msgDiv);
        document.getElementById('chat-msg').value = "";
        
        // Firebase database upload logic for chat can be added here
    };

    // File Upload Handler (Photo/Video)
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(file) alert("File selected: " + file.name + "\nSending files feature is ready!");
    };
</script>

</body>
</html>
