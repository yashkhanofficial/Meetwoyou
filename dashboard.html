<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Modern Post Composer */
        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-input-area { padding: 0 15px; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; }
        .preview-container { position: relative; margin: 10px 15px; border-radius: 12px; overflow: hidden; display: none; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 12px; display: block; }
        .remove-preview { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 5; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .action-btns { display: flex; gap: 20px; }
        .action-icon { font-size: 20px; color: var(--primary); cursor: pointer; transition: transform 0.2s; }
        .action-icon:active { transform: scale(0.9); }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .share-btn-modern:disabled { opacity: 0.5; }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; cursor: pointer; display: flex; justify-content: center; background: #000; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        
        .like-animation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .like-animation.active { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        /* Messaging Enhancements */
        #chat-screen, #user-profile-view, #post-detail-view, #story-viewer { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        #chat-box { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap: 4px; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; position: relative; max-width: 75%; font-size: 14px; word-wrap: break-word; cursor: pointer; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-img { max-width: 200px; border-radius: 12px; margin-bottom: 5px; }
        .msg-time { font-size: 9px; color: #ccc; margin-top: 4px; display: block; text-align: right; }
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; cursor: pointer; transition: background 0.2s; position: relative; }
        .chat-item:active { background: #1a1a1a; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-last-msg { font-size: 13px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--gray); }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        
        .story-container { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-circle { flex-shrink: 0; width: 64px; text-align: center; cursor: pointer; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        .story-ring.watched { border-color: #262626; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring watched">
            <div class="add-story-btn"><i class="fas fa-plus" style="position:absolute; bottom:20px; right:5px; background:var(--primary); border-radius:50%; padding:3px; font-size:10px; border:2px solid #000;"></i></div>
            <div class="story-name" style="font-size:11px;">Your Story</div>
            <input type="file" id="story-file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display: flex; gap: 12px;"></div>
    </div>

    <div class="composer-card">
        <div class="composer-header">
            <img id="composer-user-img" src="https://via.placeholder.com/40" class="composer-avatar">
            <b id="composer-user-name">Loading...</b>
        </div>
        <div class="composer-input-area">
            <textarea id="post-text" class="composer-textarea" placeholder="What's happening?"></textarea>
        </div>
        <div id="preview-box" class="preview-container">
            <button class="remove-preview" onclick="clearPreview()"><i class="fas fa-times"></i></button>
            <div id="media-render"></div>
        </div>
        <div class="composer-actions">
            <div class="action-btns">
                <i class="far fa-image action-icon" onclick="document.getElementById('post-file').click()"></i>
                <i class="fas fa-video action-icon" onclick="document.getElementById('post-file').click()"></i>
            </div>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button id="share-post-btn" class="share-btn-modern" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray);"></p>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <button class="btn-main" onclick="toggleEdit()">Edit Profile</button>
        <div id="edit-form" style="display:none; margin-top:15px;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <span id="view-user-name-title">Profile</span>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; justify-content: space-between;">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
            <div>
                <b id="chat-h-name"></b><br>
                <small id="chat-status" style="color:var(--gray); font-size:10px;">Active now</small>
            </div>
        </div>
        <div style="display:flex; gap:18px; color:var(--primary); font-size:18px;">
            <i class="fas fa-phone" onclick="callAlert('audio')"></i>
            <i class="fas fa-video" onclick="callAlert('video')"></i>
        </div>
    </div>
    <div id="chat-box"></div>
    <div style="padding:10px; display:flex; align-items:center; gap:10px; background:#121212; border-top:1px solid #262626;">
        <i class="fas fa-plus-circle" style="color:var(--gray); font-size:20px;" onclick="document.getElementById('chat-file').click()"></i>
        <i class="fas fa-microphone" style="color:var(--gray); font-size:20px;" onclick="callAlert('voice')"></i>
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border-radius:20px; flex:1;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
        <input type="file" id="chat-file" style="display:none" onchange="sendMediaMsg(this)">
    </div>
</div>

<div id="story-viewer" onclick="closeStory()">
    <div id="s-media-container" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let pressTimer;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            init(); 
            setTimeout(() => document.getElementById('app-loader').style.display = 'none', 1000);
        } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyProfile(); loadFeed(); loadAllUsers(); loadChatList();
    }

    // --- Messaging System ---
    function loadChatList() {
        // Query to get conversations where user is involved, ordered by timestamp
        const q = query(collection(db, "conversations"), where("participants", "array-contains", me.uid), orderBy("lastTimestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(async (d) => {
                const conv = d.data();
                const otherUid = conv.participants.find(id => id !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherUid));
                const u = uSnap.data();
                
                const item = document.createElement('div');
                item.className = "chat-item";
                item.innerHTML = `
                    <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                    <div class="chat-info">
                        <b>${u.displayName} ${u.isVerified?'<i class="fas fa-check-circle v-badge"></i>':''}</b>
                        <div class="chat-last-msg">${conv.lastMsg || "Media attachment"}</div>
                    </div>
                    <div class="chat-time">${timeAgo(conv.lastTimestamp)}</div>
                `;

                // Long Press to Delete Conversation
                item.onmousedown = () => pressTimer = setTimeout(() => deleteChat(d.id), 2000);
                item.onmouseup = () => clearTimeout(pressTimer);
                item.ontouchstart = () => pressTimer = setTimeout(() => deleteChat(d.id), 2000);
                item.ontouchend = () => clearTimeout(pressTimer);
                
                item.onclick = () => openChat(otherUid, u.displayName, u.photoURL);
                list.appendChild(item);
            });
        });
    }

    async function openChat(uid, name, img) {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        const chatID = [me.uid, uid].sort().join("_");
        const q = query(collection(db, "messages"), where("chatID", "==", chatID), orderBy("timestamp", "asc"));
        
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `chat-bubble ${m.sender === me.uid ? 'sent' : 'recv'}`;
                
                let content = m.text ? `<div>${m.text}</div>` : '';
                if(m.media) content += m.type === 'video' ? `<video src="${m.media}" class="chat-img" controls></video>` : `<img src="${m.media}" class="chat-img">`;
                
                div.innerHTML = `${content}<small class="msg-time">${timeAgo(m.timestamp)}</small>`;
                
                // Long Press on Message for Options
                div.onmousedown = () => pressTimer = setTimeout(() => msgOptions(d.id, m), 1000);
                div.onmouseup = () => clearTimeout(pressTimer);
                div.ontouchstart = () => pressTimer = setTimeout(() => msgOptions(d.id, m), 1000);
                div.ontouchend = () => clearTimeout(pressTimer);

                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        
        const chatID = [me.uid, activeChatID].sort().join("_");
        const msg = { chatID, sender: me.uid, text, timestamp: serverTimestamp() };
        
        await addDoc(collection(db, "messages"), msg);
        await setDoc(doc(db, "conversations", chatID), {
            participants: [me.uid, activeChatID],
            lastMsg: text,
            lastTimestamp: serverTimestamp()
        }, { merge: true });
        
        input.value = "";
    }

    async function sendMediaMsg(input) {
        const file = input.files[0];
        if(!file) return;
        Swal.showLoading();
        const url = await uploadToCloudinary(file);
        const chatID = [me.uid, activeChatID].sort().join("_");
        const type = file.type.startsWith('video') ? 'video' : 'image';
        
        await addDoc(collection(db, "messages"), { chatID, sender: me.uid, media: url, type, timestamp: serverTimestamp() });
        await setDoc(doc(db, "conversations", chatID), {
            participants: [me.uid, activeChatID],
            lastMsg: `Sent a ${type}`,
            lastTimestamp: serverTimestamp()
        }, { merge: true });
        Swal.close();
    }

    async function msgOptions(id, m) {
        const btns = m.sender === me.uid ? {
            confirmButtonText: 'Edit',
            denyButtonText: 'Delete for Everyone',
            showCancelButton: true,
            cancelButtonText: 'Delete for Me'
        } : {
            confirmButtonText: 'Like',
            showCancelButton: true,
            cancelButtonText: 'Delete for Me'
        };

        const { value: action, isDenied, isDismissed } = await Swal.fire({
            title: 'Message Options',
            background: '#121212', color: '#fff',
            ...btns
        });

        if(action) {
            if(m.sender === me.uid) {
                const { value: newText } = await Swal.fire({ input: 'text', inputValue: m.text, title: 'Edit Message' });
                if(newText) await updateDoc(doc(db, "messages", id), { text: newText });
            } else {
                Swal.fire({ icon: 'success', title: 'Liked message', timer: 800 });
            }
        } else if (isDenied) {
            await deleteDoc(doc(db, "messages", id));
        } else if (isDismissed && Swal.DismissReason.cancel) {
            document.querySelector(`[data-id="${id}"]`)?.remove();
        }
    }

    async function deleteChat(convId) {
        const res = await Swal.fire({ title: 'Delete Conversation?', icon: 'warning', showCancelButton: true, background: '#121212', color: '#fff' });
        if(res.isConfirmed) await deleteDoc(doc(db, "conversations", convId));
    }

    // --- Common Functions ---
    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou');
        const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
        const data = await res.json();
        return data.secure_url;
    }

    function timeAgo(t) {
        if(!t) return "now";
        const sec = Math.floor((new Date() - t.toDate()) / 1000);
        if(sec < 60) return "just now";
        if(sec < 3600) return Math.floor(sec/60) + "m";
        if(sec < 86400) return Math.floor(sec/3600) + "h";
        return t.toDate().toLocaleDateString();
    }

    window.callAlert = (type) => Swal.fire({ title: `Starting ${type} call...`, timer: 2000, background: '#121212', color: '#fff', showConfirmButton: false });
    window.showSec = (id) => { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id + '-sec').classList.add('active'); };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);
    window.sendMsg = sendMsg;
    window.sendMediaMsg = sendMediaMsg;
    window.openChat = openChat;

    // Remaining basic UI functions (loadMyProfile, loadFeed, etc. from original code)
    async function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('composer-user-img').src = d.photoURL;
            document.getElementById('composer-user-name').innerText = d.displayName;
            document.getElementById('my-story-img').src = d.photoURL;
        });
    }

    async function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                area.innerHTML += `
                    <div class="post-card">
                        <div class="post-user">
                            <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                            <b>${p.authorName}</b>
                        </div>
                        ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                        ${p.video ? `<video src="${p.video}" class="post-img" controls></video>` : ''}
                        <div style="padding:10px 15px;">${p.text}</div>
                    </div>
                `;
            });
        });
    }

    async function loadAllUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(d => {
                if(d.id !== me.uid) {
                    const u = d.data();
                    list.innerHTML += `<div class="post-user" onclick="openChat('${d.id}', '${u.displayName}', '${u.photoURL}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}</b>
                    </div>`;
                }
            });
        });
    }

    window.previewMedia = (i) => {
        const file = i.files[0];
        const box = document.getElementById('preview-box');
        box.style.display = 'block';
        const render = document.getElementById('media-render');
        const r = new FileReader(); r.onload = (e) => {
            render.innerHTML = file.type.startsWith('video') ? `<video src="${e.target.result}" autoplay muted></video>` : `<img src="${e.target.result}">`;
        }; r.readAsDataURL(file);
    };

    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;
        Swal.showLoading();
        let url = file ? await uploadToCloudinary(file) : null;
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text, authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), img: file && !file.type.startsWith('video') ? url : null,
            video: file && file.type.startsWith('video') ? url : null
        });
        document.getElementById('post-text').value = "";
        document.getElementById('preview-box').style.display = 'none';
        Swal.close();
    };

</script>
</body>
</html>
