<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Professional Social OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1e1e1e; }
        
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }

        /* Professional Loader */
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-spinner { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-font { font-family: 'Grand Hotel', cursive; font-size: 24px; margin: 0; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Post Styling */
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 12px; }
        .post-user img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .post-img { width: 100%; max-height: 550px; object-fit: cover; background: #050505; }
        
        /* Chat UI */
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; cursor: pointer; transition: 0.2s; }
        .chat-item:active { background: #1a1a1a; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Input Styles */
        .input-group { background: var(--card); padding: 15px; border-radius: 12px; margin: 10px; border: 1px solid #262626; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; resize: none; font-size: 15px; outline: none; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav i { font-size: 22px; cursor: pointer; color: #8e8e8e; transition: 0.3s; }
        .nav i.active-nav { color: #fff; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:active { opacity: 0.7; }
        
        /* Profile Grid */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-spinner"></div>
    <p style="margin-top:15px; color:var(--gray); font-size:14px;">Meetwoyou is loading...</p>
</div>

<div class="header">
    <i class="fas fa-sign-out-alt" onclick="userLogout()" style="color:var(--danger); font-size:18px;"></i>
    <h2 class="logo-font">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-heart" style="font-size:20px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="input-group">
        <textarea id="post-text" placeholder="What's on your mind?" rows="2"></textarea>
        <div id="img-preview-box"></div>
        <div style="display:flex; justify-content: space-between; align-items:center; margin-top:10px;">
            <label for="post-file" style="cursor:pointer; color:var(--primary); font-size:14px; font-weight:600;">
                <i class="fas fa-image"></i> Add Media
            </label>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button onclick="uploadPost()" style="background:var(--primary); color:white; border:none; padding:6px 20px; border-radius:20px; font-weight:bold;">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search creators..." style="width:100%; padding:12px; background:var(--input-bg); border:none; border-radius:10px; color:#fff;"></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 20px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid #262626; padding:3px;">
        <h3 id="p-name" style="margin: 10px 0 5px 0;"></h3>
        <p id="p-bio" style="color:var(--gray); font-size:14px; margin-bottom:15px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;">
            <div><b id="count-posts">0</b><br><small style="color:var(--gray)">Posts</small></div>
            <div><b id="count-followers">0</b><br><small style="color:var(--gray)">Followers</small></div>
            <div><b id="count-following">0</b><br><small style="color:var(--gray)">Following</small></div>
        </div>
        <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-chevron-left" onclick="closeChat()" style="font-size:20px;"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; background:#000;"></div>
    <div style="padding:15px; display:flex; gap:10px; background:#121212; align-items:center;">
        <input type="text" id="chat-input" placeholder="Message..." style="flex:1; background:#262626; border:none; padding:12px; border-radius:25px; color:#fff; outline:none;">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--primary); font-size:20px; cursor:pointer;"></i>
    </div>
</div>

<nav class="nav">
    <i class="fas fa-home active-nav" onclick="showSec('home', this)"></i>
    <i class="fas fa-search" onclick="showSec('discover', this)"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg', this)"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile', this)"></i>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;

    // --- Utility: Get V-Badge if Verified ---
    function getV(isVerified) {
        return isVerified ? ` <i class="fas fa-check-circle v-badge"></i>` : '';
    }

    // --- Image Compression (Quality maintain but Size reduced) ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const max_w = 1080; 
                    const scale = max_w / img.width;
                    canvas.width = max_w;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7); // 0.7 quality for high-clear view
                };
            };
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    displayName: user.displayName || "User",
                    photoURL: user.photoURL || "https://via.placeholder.com/150",
                    isVerified: false, // Default false, Admin will enable
                    followers: [], following: [], uid: user.uid, lastSeen: serverTimestamp()
                });
            }
            initApp();
        } else { window.location.href = "login.html"; }
    });

    function initApp() {
        loadFeed();
        loadMyProfile();
        loadDiscover();
        loadChatList();
        setTimeout(() => document.getElementById('app-loader').style.display = 'none', 1000);
    }

    // --- Load Feed with V-Badge Check ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), async (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            for (const d of snap.docs) {
                const p = d.data();
                const uSnap = await getDoc(doc(db, "users", p.uid));
                const isVerified = uSnap.exists() ? uSnap.data().isVerified : false;
                
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div class="post-user">
                        <img src="${p.authorImg}">
                        <div>
                            <div style="font-weight:bold; font-size:14px;">${p.authorName}${getV(isVerified)}</div>
                            <div style="font-size:11px; color:gray;">${p.timestamp ? "Just now" : ""}</div>
                        </div>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div style="padding:12px 15px;">
                        <div style="display:flex; gap:18px; font-size:22px; margin-bottom:8px;">
                            <i class="far fa-heart"></i><i class="far fa-comment"></i><i class="far fa-paper-plane"></i>
                        </div>
                        <div style="font-size:14px;"><b>${p.likes?.length || 0} likes</b></div>
                        <div style="font-size:14px; margin-top:4px;"><b>${p.authorName}</b> ${p.text}</div>
                    </div>
                `;
                area.appendChild(card);
            }
        });
    }

    // --- Discover with Follow Option & Follower Count ---
    function loadDiscover() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(d => {
                if(d.id === me.uid) return;
                const u = d.data();
                const isFollowing = u.followers?.includes(me.uid);
                const item = document.createElement('div');
                item.className = "chat-item";
                item.innerHTML = `
                    <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1">
                        <div style="font-weight:600;">${u.displayName}${getV(u.isVerified)}</div>
                        <div style="font-size:12px; color:gray;">${u.followers?.length || 0} followers</div>
                    </div>
                    <button onclick="followUser('${d.id}', ${isFollowing})" style="background:${isFollowing?'#262626': 'var(--primary)'}; color:white; border:none; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold;">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                `;
                list.appendChild(item);
            });
        });
    }

    window.followUser = async (targetUid, isFollowing) => {
        const myRef = doc(db, "users", me.uid);
        const targetRef = doc(db, "users", targetUid);
        if(isFollowing) {
            await updateDoc(myRef, { following: arrayRemove(targetUid) });
            await updateDoc(targetRef, { followers: arrayRemove(me.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(targetUid) });
            await updateDoc(targetRef, { followers: arrayUnion(me.uid) });
        }
    }

    // --- Message Logic: Sorted by Last Message ---
    function loadChatList() {
        onSnapshot(query(collection(db, "chats"), where("users", "arrayContains", me.uid), orderBy("lastUpdate", "desc")), (snap) => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            snap.forEach(async d => {
                const data = d.data();
                const otherUid = data.users.find(u => u !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherUid));
                const u = uSnap.data();
                
                const div = document.createElement('div');
                div.className = "chat-item";
                div.onclick = () => openChat(otherUid, u.displayName, u.photoURL);
                div.innerHTML = `
                    <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%;">
                    <div>
                        <div style="font-weight:bold;">${u.displayName}${getV(u.isVerified)}</div>
                        <div style="font-size:13px; color:gray;">${data.lastMsg || 'Click to chat'}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    // --- Global Actions ---
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active-nav'));
        document.getElementById(id + '-sec').classList.add('active');
        el.classList.add('active-nav');
    };

    window.previewMedia = (input) => {
        const box = document.getElementById('img-preview-box');
        box.innerHTML = `<p style="font-size:12px; color:var(--primary);">Processing high quality media...</p>`;
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            box.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:8px; margin-top:10px;">`;
        };
        reader.readAsDataURL(file);
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;

        Swal.fire({ title: 'Optimizing...', didOpen: () => Swal.showLoading(), background: '#121212', color: '#fff' });

        let finalImg = null;
        if(file) {
            const compressedBlob = await compressImage(file);
            // Here you would normally upload to Cloudinary or Firebase Storage
            // For now, let's simulate the URL
            const reader = new FileReader();
            reader.readAsDataURL(compressedBlob);
            await new Promise(r => reader.onload = () => { finalImg = reader.result; r(); });
        }

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: finalImg,
            authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: []
        });

        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        Swal.close();
    };

    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        // Chat messages logic here...
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + getV(d.isVerified);
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "No bio yet";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
        });
    }

</script>
</body>
</html>
