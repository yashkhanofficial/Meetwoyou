<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Fully Restored</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; }

        /* UI Helpers */
        .avatar { object-fit: cover; border-radius: 50%; border: 2px solid #333; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; outline: none; box-sizing: border-box; }

        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Post Card */
        .post-card { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid #282828; }
        .action-btn { cursor: pointer; color: var(--gray); font-size: 14px; }

        /* Profile */
        .cover-container { width: 100%; height: 160px; background: linear-gradient(to bottom, #333, #1a1a1b); border-radius: 0 0 15px 15px; overflow: hidden; }
        .p-img-overlap { margin-top: -50px; text-align: center; }
        .stats-row { display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; margin-top: 15px; }
        
        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* Chat Window */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #333; color: white; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

<div class="header" style="background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
    <h2 style="color:var(--primary); margin:0;">Meetwoyou</h2>
    <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--gray); cursor:pointer;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="post-card">
        <textarea id="post-text" placeholder="Share your thoughts..."></textarea>
        <button class="btn-main" onclick="uploadPost()">Post Now</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="friends-sec" class="section">
    <h3>Find New Friends</h3>
    <div id="all-users-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3>Recent Chats</h3>
    <div id="chat-list-area"></div>
</div>

<div id="profile-sec" class="section">
    <div class="cover-container"><img id="p-cover" src="https://via.placeholder.com/800x200/333/fff" style="width:100%; height:100%; object-fit:cover;"></div>
    <div class="p-img-overlap">
        <img id="p-img" src="" class="avatar" style="width:100px; height:100px; border:4px solid var(--bg);">
        <h3 id="p-name" style="margin: 10px 0 5px 0;">User Name</h3>
        <p id="p-bio-view" style="color:var(--gray); font-size:14px; margin: 0;"></p>
        
        <div class="stats-row">
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>

        <button class="btn-main" style="background:#222; margin-top:10px;" onclick="toggleEdit()">
            <i class="fas fa-edit"></i> Edit Profile
        </button>
    </div>
    
    <div id="edit-form" style="display:none; padding:15px; background:#1a1a1b; margin-top:15px; border-radius:12px; border:1px solid #333;">
        <input type="text" id="edit-name" placeholder="Display Name">
        <textarea id="edit-bio" placeholder="Bio (What describes you?)"></textarea>
        <input type="text" id="edit-work" placeholder="Workplace">
        <input type="text" id="edit-country" placeholder="Your Country">
        <button class="btn-main" onclick="saveProfile()">Save Profile</button>
    </div>
    <div id="my-posts-area"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; background:var(--card); display:flex; align-items:center; gap:15px; border-bottom:1px solid #333;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <b id="chat-user-name">User</b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:15px; display:flex; gap:10px; background:var(--card); border-top:1px solid #333;">
        <input type="text" id="chat-input" placeholder="Aa" style="margin:0; border-radius:20px;">
        <button onclick="sendMsg()" style="background:var(--primary); border:none; color:white; padding:0 20px; border-radius:20px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <i class="fas fa-home nav-item active" onclick="showSec('home', this)"></i>
    <i class="fas fa-search nav-item" onclick="showSec('friends', this)"></i>
    <i class="fas fa-comment nav-item" onclick="showSec('msg', this)"></i>
    <i class="fas fa-user nav-item" onclick="showSec('profile', this)"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let myData = {};
    let activeChatUID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            me = user;
            await initializeUser(user);
            startListeners();
        } else {
            window.location.href = "index.html";
        }
    });

    async function initializeUser(user) {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);
        if(!snap.exists()) {
            await setDoc(ref, {
                displayName: user.displayName || "User",
                photoURL: user.photoURL || "https://via.placeholder.com/100",
                followers: [],
                following: [],
                bio: ""
            });
        }
    }

    function startListeners() {
        // My Data Listener
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            myData = snap.data();
            document.getElementById('p-name').innerText = myData.displayName;
            document.getElementById('p-img').src = myData.photoURL;
            document.getElementById('p-bio-view').innerText = myData.bio || "";
            document.getElementById('count-followers').innerText = myData.followers?.length || 0;
            document.getElementById('count-following').innerText = myData.following?.length || 0;
        });

        // Feed Listener
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `
                    <div class="post-header" onclick="viewUser('${p.uid}')" style="cursor:pointer">
                        <img src="${p.authorImg}" class="avatar" style="width:40px; height:40px;">
                        <div><b>${p.authorName}</b><br><small style="color:gray; font-size:10px">Just now</small></div>
                    </div>
                    <p style="margin: 10px 0;">${p.text}</p>
                    <div class="post-actions">
                        <div class="action-btn" onclick="Swal.fire('Coming Soon!')"><i class="far fa-heart"></i> Love</div>
                        <div class="action-btn" onclick="viewUser('${p.uid}')"><i class="far fa-user"></i> Profile</div>
                    </div>`;
                area.appendChild(div);
            });
        });

        // Users & Chat List Listener
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('all-users-list');
            const chatList = document.getElementById('chat-list-area');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                const uid = docSnap.id;
                if(uid !== me.uid) {
                    const userHTML = `<div class="post-card" style="display:flex; align-items:center; gap:12px; padding:10px;">
                        <img src="${u.photoURL}" class="avatar" style="width:45px; height:45px;">
                        <b style="flex:1">${u.displayName}</b>
                        <button onclick="viewUser('${uid}')" style="background:var(--primary); color:white; border:none; padding:6px 15px; border-radius:8px;">View</button>
                    </div>`;
                    list.innerHTML += userHTML;
                    chatList.innerHTML += `<div class="post-card" onclick="openChat('${uid}', '${u.displayName}')" style="cursor:pointer; display:flex; align-items:center; gap:12px;">
                        <img src="${u.photoURL}" class="avatar" style="width:40px; height:40px;">
                        <b>${u.displayName}</b>
                    </div>`;
                }
            });
        });
    }

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt.trim()) return;
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, authorName: myData.displayName, authorImg: myData.photoURL, timestamp: serverTimestamp()
        });
        document.getElementById('post-text').value = "";
        Swal.fire({ icon: 'success', title: 'Posted', showConfirmButton: false, timer: 1000 });
    };

    window.viewUser = async (uid) => {
        if(uid === me.uid) { showSec('profile'); return; }
        const snap = await getDoc(doc(db, "users", uid));
        const u = snap.data();
        const isFollowing = myData.following?.includes(uid);

        Swal.fire({
            title: u.displayName,
            html: `
                <img src="${u.photoURL}" class="avatar" style="width:90px; height:90px; border:3px solid var(--primary);">
                <p style="margin-top:10px;">${u.bio || 'No bio available'}</p>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="follow-btn" class="btn-main" style="flex:1; background:${isFollowing ? '#333' : 'var(--primary)'}">${isFollowing ? 'Unfollow' : 'Follow'}</button>
                    <button id="msg-btn" class="btn-main" style="flex:1; background:#444;">Message</button>
                </div>
            `,
            showConfirmButton: false,
            didOpen: () => {
                document.getElementById('follow-btn').onclick = async () => {
                    const myRef = doc(db, "users", me.uid);
                    const targetRef = doc(db, "users", uid);
                    if(isFollowing) {
                        await updateDoc(myRef, { following: arrayRemove(uid) });
                        await updateDoc(targetRef, { followers: arrayRemove(me.uid) });
                    } else {
                        await updateDoc(myRef, { following: arrayUnion(uid) });
                        await updateDoc(targetRef, { followers: arrayUnion(me.uid) });
                    }
                    Swal.close();
                };
                document.getElementById('msg-btn').onclick = () => {
                    Swal.close();
                    openChat(uid, u.displayName);
                };
            }
        });
    };

    window.openChat = (uid, name) => {
        activeChatUID = uid;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(docSnap => {
                const m = docSnap.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${m.sender === me.uid ? 'sent' : 'received'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            sender: me.uid, receiver: activeChatUID, text: inp.value, timestamp: serverTimestamp()
        });
        inp.value = "";
    };

    window.saveProfile = async () => {
        await updateDoc(doc(db, "users", me.uid), {
            displayName: document.getElementById('edit-name').value || myData.displayName,
            bio: document.getElementById('edit-bio').value || "",
            work: document.getElementById('edit-work').value || "",
            country: document.getElementById('edit-country').value || ""
        });
        toggleEdit();
        Swal.fire('Updated', '', 'success');
    };

    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.toggleEdit = () => {
        const f = document.getElementById('edit-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
        if(f.style.display === 'block'){
            document.getElementById('edit-name').value = myData.displayName;
            document.getElementById('edit-bio').value = myData.bio || "";
        }
    };
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
