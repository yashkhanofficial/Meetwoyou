<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Notification UI Styles */
        .notif-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; min-width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #121212; cursor: pointer; transition: background 0.2s; }
        .notif-item.unread { background: #1a1a1a; }
        .notif-item:active { background: #262626; }
        .notif-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .notif-content { flex: 1; font-size: 13px; }
        .notif-time { font-size: 10px; color: var(--gray); margin-top: 4px; }

        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-input-area { padding: 0 15px; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; }
        .preview-container { position: relative; margin: 10px 15px; border-radius: 12px; overflow: hidden; display: none; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 12px; display: block; }
        .remove-preview { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 5; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .action-btns { display: flex; gap: 20px; }
        .action-icon { font-size: 20px; color: var(--primary); cursor: pointer; transition: transform 0.2s; }
        .action-icon:active { transform: scale(0.9); }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .share-btn-modern:disabled { opacity: 0.5; }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; cursor: pointer; display: flex; justify-content: center; background: #000; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        
        .like-animation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .like-animation.active { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        #chat-screen, #notif-screen, #user-profile-view, #post-detail-view, #story-viewer, #settings-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 75%; font-size: 14px; position: relative; cursor: pointer; transition: background 0.2s; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .chat-status { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; text-align: right; display: block; }
        .online-dot { width: 10px; height: 10px; background: #4cd137; border-radius: 50%; border: 2px solid #000; }
        .unread-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; min-width: 15px; text-align: center; }
        .msg-nav-badge { position: absolute; top: -5px; right: -8px; background: var(--danger); font-size: 9px; padding: 2px 5px; border-radius: 10px; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; position: relative; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .post-time { font-size: 10px; color: var(--gray); padding: 0 15px; }
        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #121212; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;" onclick="openNotifications()">
        <i class="far fa-bell" style="font-size:22px; cursor:pointer;"></i>
        <span id="global-notif-badge" class="notif-badge" style="display:none;">0</span>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring watched">
            <div class="add-story-btn"><i class="fas fa-plus"></i></div>
            <div class="story-name">Your Story</div>
            <input type="file" id="story-file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display: flex; gap: 12px;"></div>
    </div>
    <div class="composer-card">
        <div class="composer-header">
            <img id="composer-user-img" src="https://via.placeholder.com/40" class="composer-avatar">
            <b id="composer-user-name">Loading...</b>
        </div>
        <div class="composer-input-area">
            <textarea id="post-text" class="composer-textarea" placeholder="What's happening?"></textarea>
        </div>
        <div id="preview-box" class="preview-container">
            <button class="remove-preview" onclick="clearPreview()"><i class="fas fa-times"></i></button>
            <div id="media-render"></div>
        </div>
        <div class="upload-progress-container" id="up-prog-cont">
            <div class="upload-progress-bar" id="up-prog-bar"></div>
        </div>
        <div class="composer-actions">
            <div class="action-btns">
                <i class="far fa-image action-icon" onclick="document.getElementById('post-file').click()"></i>
                <i class="fas fa-video action-icon" onclick="document.getElementById('post-file').click()"></i>
            </div>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button id="share-post-btn" class="share-btn-modern" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 10px 15px;">
        <div style="display: flex; justify-content: flex-end; padding-bottom: 10px;">
            <i class="fas fa-cog" style="font-size: 22px; cursor: pointer;" onclick="openSettings()"></i>
        </div>
        <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio"></p>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <button class="btn-main" onclick="toggleEdit()">Edit Profile</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="notif-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px; position:sticky; top:0; background:#000;">
        <i class="fas fa-arrow-left" onclick="closeNotifications()" style="cursor:pointer;"></i>
        <b>Notifications</b>
    </div>
    <div id="notif-list"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:12px; display:flex; align-items:center; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border-radius:25px;">
        <i class="far fa-paper-plane" onclick="sendMsg()" style="color:var(--primary); font-size:20px; cursor:pointer;"></i>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')">
        <span id="msg-nav-badge" class="msg-nav-badge" style="display:none;">0</span>
    </i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      databaseURL: "https://meetwoyou-436a2-default-rtdb.firebaseio.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4",
      measurementId: "G-LF9FLW7Y7E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const messaging = getMessaging(app);

    let me = null;
    let activeChatID = null;

    // --- NOTIFICATION CORE LOGIC ---

    async function requestNotifPermission() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, {
                    vapidKey: "BACoJ-l3z872JhrtTUZHEVPw5RA7OPieKjcDfKAgXM900xd6A69DMXZnO92Gj7HId6iByi7Pfd5tLD9eTjfwHKA"
                });
                if (token) {
                    await updateDoc(doc(db, "users", me.uid), { fcmToken: token });
                }
            }
        } catch (err) { console.log('FCM Error:', err); }
    }

    onMessage(messaging, (payload) => {
        Swal.fire({
            toast: true,
            position: 'top-end',
            title: payload.notification.title,
            text: payload.notification.body,
            showConfirmButton: false,
            timer: 3000,
            background: '#121212',
            color: '#fff'
        });
    });

    async function createNotification(targetUid, type, data = {}) {
        if (targetUid === me.uid) return;
        
        let message = "";
        switch(type) {
            case 'follow': message = `${me.displayName} started following you.`; break;
            case 'like': message = `${me.displayName} liked your post.`; break;
            case 'comment': message = `${me.displayName} commented: ${data.text}`; break;
            case 'message': message = `New message from ${me.displayName}.`; break;
            case 'new_post': message = `${me.displayName} uploaded a new post.`; break;
        }

        await addDoc(collection(db, "notifications"), {
            recipientId: targetUid,
            senderId: me.uid,
            senderName: me.displayName,
            senderImg: me.photoURL,
            type: type,
            message: message,
            timestamp: serverTimestamp(),
            isRead: false,
            linkId: data.linkId || null
        });
    }

    function loadNotifications() {
        const q = query(collection(db, "notifications"), where("recipientId", "==", me.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('notif-list');
            const badge = document.getElementById('global-notif-badge');
            let unreadCount = 0;
            list.innerHTML = "";

            snap.forEach(doc => {
                const n = doc.data();
                if(!n.isRead) unreadCount++;
                list.innerHTML += `
                    <div class="notif-item ${n.isRead?'':'unread'}" onclick="handleNotifClick('${doc.id}', '${n.type}', '${n.linkId}', '${n.senderId}', '${n.senderName}', '${n.senderImg}')">
                        <img src="${n.senderImg}" class="notif-avatar">
                        <div class="notif-content">
                            <b>${n.message}</b>
                            <div class="notif-time">${timeAgo(n.timestamp)}</div>
                        </div>
                    </div>`;
            });

            badge.innerText = unreadCount;
            badge.style.display = unreadCount > 0 ? 'flex' : 'none';
        });
    }

    window.handleNotifClick = async (id, type, linkId, senderId, senderName, senderImg) => {
        await updateDoc(doc(db, "notifications", id), { isRead: true });
        closeNotifications();
        if(type === 'message') openChat(senderId, senderName, senderImg);
        else if(linkId) viewSinglePost(linkId);
        else viewUser(senderId);
    };

    window.openNotifications = () => document.getElementById('notif-screen').style.display = 'flex';
    window.closeNotifications = () => document.getElementById('notif-screen').style.display = 'none';

    // --- INTEGRATING WITH EXISTING FUNCTIONS ---

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    displayName: user.displayName || "User",
                    photoURL: user.photoURL || "https://via.placeholder.com/90",
                    followers: [], following: [], uid: user.uid,
                    timestamp: serverTimestamp(), lastActive: serverTimestamp()
                });
                location.reload();
            }
            requestNotifPermission();
            loadNotifications();
            init(); 
            document.getElementById('app-loader').style.display = 'none';
        } else { window.location.href = "index.html"; }
    });

    // Modified Like
    async function toggleLike(id, liked) { 
        const postRef = doc(db, "posts", id);
        const postSnap = await getDoc(postRef);
        await updateDoc(postRef, { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) }); 
        if(!liked) createNotification(postSnap.data().uid, 'like', { linkId: id });
    }
    window.toggleLike = toggleLike;

    // Modified Follow
    window.toggleFollow = async (targetUid, isFollowing) => {
        const myRef = doc(db, "users", me.uid);
        const targetRef = doc(db, "users", targetUid);
        if (isFollowing) {
            await updateDoc(myRef, { following: arrayRemove(targetUid) });
            await updateDoc(targetRef, { followers: arrayRemove(me.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(targetUid) });
            await updateDoc(targetRef, { followers: arrayUnion(me.uid) });
            createNotification(targetUid, 'follow');
        }
    };

    // Modified Message
    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        const text = i.value.trim();
        if(!text || !activeChatID) return;
        i.value = "";
        await addDoc(collection(db, "messages"), { 
            sender: me.uid, receiver: activeChatID, text: text, seen: false, timestamp: serverTimestamp() 
        });
        createNotification(activeChatID, 'message');
    };

    // Modified Post
    window.uploadPost = async () => {
        // ... Existing validation and upload logic ...
        const docRef = await addDoc(collection(db, "posts"), {
            uid: me.uid, text: document.getElementById('post-text').value,
            authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        
        // Notify followers
        const mySnap = await getDoc(doc(db, "users", me.uid));
        const followers = mySnap.data().followers || [];
        followers.forEach(fId => createNotification(fId, 'new_post', { linkId: docRef.id }));
        
        document.getElementById('post-text').value = "";
        clearPreview();
    };

    // --- REST OF EXISTING SCRIPT (init, showSec, timeAgo, etc.) ---
    function init() { 
        loadMyProfile(); loadFeed(); loadAllUsers(); loadMyPosts(); loadStories();
    }
    function timeAgo(timestamp) {
        if(!timestamp) return "...";
        const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return timestamp.toDate().toLocaleDateString();
    }
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.userLogout = () => signOut(auth);
    window.closeChat = () => { document.getElementById('chat-screen').style.display = 'none'; activeChatID = null; };

    // Standard functionality stubs (placeholders for your existing logic)
    async function loadFeed() { /* Your existing feed code */ }
    async function loadAllUsers() { /* Your existing user list code */ }
    function loadMyProfile() { /* Your existing profile code */ }
    function loadMyPosts() { /* Your existing posts code */ }
</script>
</body>
</html>
