<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Nexus Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Glassmorphism Sidebar */
        .glass-sidebar { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
        }

        /* Active State Animation */
        .nav-link { position: relative; transition: all 0.3s ease; cursor: pointer; }
        .nav-link.active { color: #a78bfa; background: rgba(139, 92, 246, 0.1); border-radius: 12px; }
        .nav-link.active::before {
            content: ''; position: absolute; left: 0; width: 4px; height: 20px; 
            background: #8b5cf6; border-radius: 0 4px 4px 0;
        }

        /* Main Content Scroll */
        #main-content { 
            height: calc(100vh - 70px); 
            overflow-y: auto; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        #main-content::-webkit-scrollbar { display: none; }

        /* Notification Badge */
        .notif-badge {
            position: absolute; top: 12px; right: 12px;
            width: 8px; height: 8px; background: #ef4444;
            border-radius: 50%; box-shadow: 0 0 10px #ef4444;
        }

        /* Bottom Nav for Mobile */
        @media (max-width: 768px) {
            .mobile-nav { 
                background: rgba(15, 23, 42, 0.9); 
                backdrop-filter: blur(15px); 
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="hidden md:flex glass-sidebar w-64 flex-col p-6 space-y-8">
        <div class="px-2">
            <h1 class="text-3xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500 tracking-tighter">Meetwoyou</h1>
        </div>

        <nav class="flex-1 space-y-2">
            <div onclick="loadPage('newsfeed', this)" class="nav-link active flex items-center p-3 gap-4">
                <i class="fas fa-home text-lg"></i> <span class="font-medium">News Feed</span>
            </div>
            <div onclick="loadPage('friends', this)" class="nav-link flex items-center p-3 gap-4">
                <i class="fas fa-user-friends text-lg"></i> <span class="font-medium">Friends</span>
            </div>
            <div onclick="loadPage('messages', this)" class="nav-link flex items-center p-3 gap-4">
                <i class="fas fa-envelope text-lg"></i> <span class="font-medium">Messages</span>
            </div>
            <div onclick="loadPage('search', this)" class="nav-link flex items-center p-3 gap-4">
                <i class="fas fa-search text-lg"></i> <span class="font-medium">Search</span>
            </div>
            <div onclick="loadPage('profile', this)" class="nav-link flex items-center p-3 gap-4">
                <i class="fas fa-user-circle text-lg"></i> <span class="font-medium">Profile</span>
            </div>
            <div onclick="loadPage('settings', this)" class="nav-link flex items-center p-3 gap-4">
                <i class="fas fa-cog text-lg"></i> <span class="font-medium">Settings</span>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-[70px] flex items-center justify-between px-6 border-b border-white/5 bg-[#0b0f1a]/50 backdrop-blur-md sticky top-0 z-50">
            <h2 id="page-title" class="text-xl font-bold tracking-tight">News Feed</h2>
            
            <div class="flex items-center gap-5">
                <div class="relative cursor-pointer hover:opacity-80 transition" onclick="loadPage('notifications', this)">
                    <i class="fas fa-bell text-xl text-gray-400"></i>
                    <span class="notif-badge"></span>
                </div>

                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-sm font-bold leading-tight">User</p>
                        <p class="text-[10px] text-purple-400 font-semibold uppercase tracking-wider">Online</p>
                    </div>
                    <img id="user-profile-pic" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-xl border border-white/10 object-cover shadow-xl">
                </div>
            </div>
        </header>

        <div id="main-content" class="p-4 md:p-8">
            <div id="loader" class="flex items-center justify-center h-full">
                <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <nav class="md:hidden mobile-nav fixed bottom-0 w-full h-16 flex items-center justify-around px-2 z-50">
            <div onclick="loadPage('newsfeed', this)" class="text-gray-400 text-xl"><i class="fas fa-home"></i></div>
            <div onclick="loadPage('friends', this)" class="text-gray-400 text-xl"><i class="fas fa-user-friends"></i></div>
            <div onclick="loadPage('messages', this)" class="text-gray-400 text-xl"><i class="fas fa-comment-dots"></i></div>
            <div onclick="loadPage('search', this)" class="text-gray-400 text-xl"><i class="fas fa-search"></i></div>
            <div onclick="loadPage('settings', this)" class="text-gray-400 text-xl"><i class="fas fa-cog"></i></div>
        </nav>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.displayName || "Agent";
                document.getElementById('user-profile-pic').src = user.photoURL || "https://via.placeholder.com/40";
                loadPage('newsfeed');
            } else {
                window.location.href = "index.html";
            }
        });

        window.loadPage = async (pageName, element = null) => {
            const contentArea = document.getElementById('main-content');
            const titleArea = document.getElementById('page-title');
            
            if(element) {
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            titleArea.innerText = pageName.charAt(0).toUpperCase() + pageName.slice(1).replace('-', ' ');
            
            try {
                const response = await fetch(`${pageName}.html`);
                const html = await response.text();
                contentArea.innerHTML = html;
            } catch (err) {
                contentArea.innerHTML = `<div class="text-center text-red-400 mt-10">Interface for ${pageName}.html not found.</div>`;
            }
        };
    </script>
</body>
</html>
