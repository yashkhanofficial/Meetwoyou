<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Professional Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --gold: #ffd700; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 40px; height: 40px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .media-container { position: relative; width: 100%; min-height: 200px; background: #050505; display: flex; justify-content: center; align-items: center; }
        .post-img, .post-video { width: 100%; max-height: 550px; object-fit: contain; }
        
        .trending-comment { border: 1px solid var(--gold) !important; background: rgba(255, 215, 0, 0.05); box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 22px; cursor: pointer; color: #fff; transition: 0.2s; }
        .nav i:active { transform: scale(0.8); color: var(--primary); }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
</div>

<div class="header">
    <i class="fas fa-sign-out-alt" onclick="userLogout()" style="color:var(--danger); font-size:18px;"></i>
    <h2 style="margin:0; font-family: 'serif'; letter-spacing: 1px;">MEETWOYOU</h2>
    <i class="far fa-paper-plane" onclick="showSec('msg')" style="font-size:20px;"></i>
</div>

<div id="home-sec" class="section active">
    <div style="padding: 15px; border-bottom: 1px solid #262626;">
        <textarea id="post-text" placeholder="Write something amazing..."></textarea>
        <div id="img-preview-box" style="margin-bottom: 10px;"></div>
        <div style="display: flex; gap: 10px;">
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; flex:1; padding:10px; border-radius:8px; border:none;"><i class="fas fa-photo-video"></i> Media</button>
            <button class="btn-main" style="flex:2;" onclick="uploadPost()">Share</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search creators..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 25px 15px;">
        <img id="p-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid #262626; margin-bottom:10px;">
        <h3 id="p-name" style="margin:0;"></h3>
        <p id="p-bio" style="color:var(--gray); font-size:14px; margin:10px 0;"></p>
        <div style="display: flex; justify-content: center; gap: 25px; margin-bottom:15px;">
            <div><b id="count-posts">0</b><br><small style="color:var(--gray)">Posts</small></div>
            <div><b id="count-followers">0</b><br><small style="color:var(--gray)">Followers</small></div>
            <div><b id="count-following">0</b><br><small style="color:var(--gray)">Following</small></div>
        </div>
        <button class="btn-main" onclick="toggleEdit()" style="background:#262626; width:auto; padding:8px 30px;">Edit Profile</button>
        
        <div id="edit-form" style="display:none; margin-top:20px; border-top:1px solid #262626; padding-top:20px;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Update Now</button>
        </div>
    </div>
    <div id="my-posts-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-plus-square" onclick="showSec('home'); document.getElementById('post-text').focus();"></i>
    <i class="fas fa-heart" onclick="Swal.fire({title:'Notifications', text:'No new alerts', background:'#121212', color:'#fff'})"></i>
    <i class="fas fa-user" onclick="showSec('profile')"></i>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:15px; background:#121212; display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="color:var(--primary); background:none; border:none; font-weight:bold;">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { displayName: user.displayName, photoURL: user.photoURL, followers: [], following: [], uid: user.uid, timestamp: serverTimestamp() });
                location.reload();
            }
            init();
            document.getElementById('app-loader').style.display = 'none';
        } else { window.location.href = "index.html"; }
    });

    function init() { loadFeed(); loadAllUsers(); loadMyProfile(); loadMyPosts(); }

    // --- 1. Smart Image Compression (KB Control) ---
    async function smartCompress(file) {
        if (!file.type.startsWith('image/')) return file; // Video হলে সরাসরি যাবে
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const MAX = 1200;
                    if (width > MAX) { height *= MAX / width; width = MAX; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7); // Quality 0.7 makes it KB size but very clear
                };
            };
        });
    }

    // --- 2. Professional Upload (Photo & Video) ---
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;

        Swal.fire({title: 'Uploading...', didOpen: () => Swal.showLoading(), background: '#121212', color: '#fff'});
        
        let mediaUrl = null;
        let fileType = 'text';

        if(file) {
            const compressed = await smartCompress(file);
            mediaUrl = await uploadToCloudinary(compressed);
            fileType = file.type.startsWith('video') ? 'video' : 'image';
        }

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text, img: mediaUrl, type: fileType,
            authorName: me.displayName, authorImg: me.photoURL,
            likes: [], comments: [], timestamp: serverTimestamp()
        });

        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        Swal.fire({icon:'success', title:'Shared!', timer:1000, showConfirmButton:false});
    };

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou'); 
        const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/${file.type.startsWith('video')?'video':'image'}/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        return data.secure_url;
    }

    // --- 3. Smart Feed & Media Renderer ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const isLiked = p.likes?.includes(me.uid);
                
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div class="post-user">
                        <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                        <b>${p.authorName}</b>
                    </div>
                    <div class="media-container">
                        ${p.type === 'video' ? 
                            `<video src="${p.img}" class="post-video" controls loop></video>` : 
                            (p.img ? `<img src="${p.img}" class="post-img">` : `<div style="padding:40px; text-align:center;">${p.text}</div>`)}
                    </div>
                    <div style="padding:12px; display:flex; gap:15px; font-size:22px;">
                        <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                        <i class="far fa-comment" onclick="showComments('${id}')"></i>
                    </div>
                    <div style="padding:0 12px 10px; font-size:14px;">
                        <b>${p.likes.length} likes</b><br>
                        ${p.img ? `<span><b>${p.authorName}</b> ${p.text}</span>` : ''}
                    </div>
                `;
                area.appendChild(card);
            });
        });
    }

    window.toggleLike = async (id, liked) => {
        await updateDoc(doc(db, "posts", id), { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
    };

    // --- 4. Smart Comments with Highlighting ---
    window.showComments = async (postId) => {
        const snap = await getDoc(doc(db, "posts", postId));
        const comments = snap.data().comments || [];
        
        let html = '<div style="max-height:300px; overflow-y:auto; text-align:left; padding:10px;">';
        comments.forEach(c => {
            // Logic: ৩টির বেশি লাইক বা বড় কমেন্ট হলে হাইলাইট
            const isTrending = (c.likes?.length >= 3 || c.text.length > 50);
            html += `
                <div class="comment-item ${isTrending?'trending-comment':''}" style="padding:10px; border-radius:10px; margin-bottom:8px; border-bottom:1px solid #262626;">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="color:${isTrending?'var(--gold)':'#fff'}">${c.user} ${isTrending?'🔥':''}</b>
                    </div>
                    <p style="margin:4px 0; font-size:13px;">${c.text}</p>
                </div>`;
        });
        html += '</div>';

        const { value: text } = await Swal.fire({
            title: 'Comments', html, input: 'text', inputPlaceholder: 'Add a comment...',
            background: '#121212', color: '#fff', showCancelButton: true
        });

        if(text) {
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ user: me.displayName, text, timestamp: Date.now(), likes: [] })
            });
        }
    };

    // --- 5. Clean Chat System (No Duplicates) ---
    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(uDoc => {
                if(uDoc.id !== me.uid) {
                    const u = uDoc.data();
                    list.innerHTML += `
                        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px; border-bottom:1px solid #121212;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                <b>${u.displayName}</b>
                            </div>
                            <button onclick="openChat('${u.uid}', '${u.displayName}', '${u.photoURL}')" style="background:var(--primary); border:none; padding:6px 15px; border-radius:5px; color:#fff; font-size:12px;">Chat</button>
                        </div>`;
                }
            });
        });
    }

    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(mDoc => {
                const m = mDoc.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const isMe = m.sender === me.uid;
                    box.innerHTML += `<div style="align-self:${isMe?'flex-end':'flex-start'}; background:${isMe? 'var(--primary)':'#262626'}; padding:8px 15px; border-radius:15px; margin-bottom:5px; max-width:70%; font-size:14px;">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };

    // --- UI Helpers ---
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.previewMedia = (input) => {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const box = document.getElementById('img-preview-box');
            if(file.type.startsWith('video')) {
                box.innerHTML = `<video src="${e.target.result}" style="width:100%; border-radius:10px;" controls></video>`;
            } else {
                box.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
            }
        };
        reader.readAsDataURL(file);
    };
    window.loadMyProfile = () => {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "No bio yet.";
            document.getElementById('count-followers').innerText = d.followers.length;
            document.getElementById('count-following').innerText = d.following.length;
        });
    };
    window.loadMyPosts = () => {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snap.size;
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div style="aspect-ratio:1/1; background:#121212; overflow:hidden; border:0.5px solid #000;">
                    ${p.type === 'video' ? `<video src="${p.img}" style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${p.img}" style="width:100%; height:100%; object-fit:cover;">`}
                </div>`;
            });
        });
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);
    window.toggleEdit = () => {
        const form = document.getElementById('edit-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };
    window.saveProfile = async () => {
        const name = document.getElementById('edit-name').value;
        const bio = document.getElementById('edit-bio').value;
        await updateDoc(doc(db, "users", me.uid), { displayName: name || me.displayName, bio: bio || "" });
        toggleEdit();
        Swal.fire('Updated!', '', 'success');
    };

</script>
</body>
</html>
