<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; --bubble-sent: #0084ff; --bubble-recv: #262626; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Composer */
        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; padding: 0 15px; }
        .preview-container { position: relative; margin: 10px 15px; border-radius: 12px; overflow: hidden; display: none; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 12px; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* Posts */
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #000; }
        
        /* Dynamic Messaging Styles */
        .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; cursor: pointer; transition: background 0.2s; position: relative; user-select: none; }
        .chat-list-item:active { background: #1a1a1a; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-meta { display: flex; justify-content: space-between; align-items: center; }
        .last-msg { color: var(--gray); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: var(--primary); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .online-dot { width: 12px; height: 12px; background: #4cd137; border: 2px solid #000; border-radius: 50%; position: absolute; bottom: 12px; left: 45px; }

        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-header { padding: 10px 15px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 12px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 14px; position: relative; user-select: none; cursor: pointer; word-wrap: break-word; }
        .msg-sent { background: var(--bubble-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-recv { background: var(--bubble-recv); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-media { width: 100%; border-radius: 12px; margin-top: 5px; }
        .msg-time { font-size: 9px; opacity: 0.7; margin-top: 4px; display: block; text-align: right; }

        .chat-footer { padding: 10px; background: #121212; display: flex; align-items: center; gap: 10px; border-top: 1px solid #262626; }
        .chat-input-wrapper { flex: 1; background: #1c1c1c; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        .chat-input-wrapper input { background: transparent; border: none; color: #fff; padding: 8px 0; margin: 0; }
        .chat-footer i { font-size: 20px; color: var(--primary); cursor: pointer; }

        /* Stories & Profile */
        .story-container { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid #262626; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring">
            <input type="file" id="story-file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display: flex; gap: 12px;"></div>
    </div>
    <div class="composer-card">
        <textarea id="post-text" class="composer-textarea" placeholder="What's on your mind?"></textarea>
        <div id="preview-box" class="preview-container"><div id="media-render"></div></div>
        <div class="composer-actions">
            <i class="far fa-image" onclick="document.getElementById('post-file').click()" style="color:var(--primary); font-size:22px;"></i>
            <input type="file" id="post-file" style="display:none" onchange="previewMedia(this)">
            <button class="share-btn-modern" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">Chats</h3>
        <i class="fas fa-edit" style="color:var(--primary);"></i>
    </div>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; border:2px solid #262626;">
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray);"></p>
        <button class="btn-main" onclick="toggleEdit()">Edit Profile</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <div style="flex:1;">
            <b id="chat-h-name"></b><br>
            <small id="chat-h-status" style="color:var(--gray); font-size:10px;">Active now</small>
        </div>
        <i class="fas fa-phone-alt" style="margin-right:15px;"></i>
        <i class="fas fa-video"></i>
    </div>
    <div id="chat-box" class="chat-messages"></div>
    <div class="chat-footer">
        <i class="fas fa-camera" onclick="document.getElementById('chat-media-file').click()"></i>
        <div class="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="Message...">
            <i class="far fa-smile" style="padding:0 5px;"></i>
        </div>
        <i class="fas fa-microphone" id="voice-btn"></i>
        <i class="fas fa-paper-plane" onclick="sendMsg()"></i>
        <input type="file" id="chat-media-file" style="display:none" onchange="sendMediaMsg(this)">
    </div>
</div>

<div id="user-profile-view" style="position:fixed; inset:0; background:#000; z-index:2000; display:none; flex-direction:column; overflow-y:auto;">
    <div style="padding:15px; border-bottom:1px solid #262626;"><i class="fas fa-arrow-left" onclick="document.getElementById('user-profile-view').style.display='none'"></i></div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let pressTimer;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            init(); 
            document.getElementById('app-loader').style.display = 'none';
        } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyProfile();
        loadFeed();
        loadChatList();
        loadAllUsers();
    }

    // --- Dynamic Messaging Engine ---

    function loadChatList() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", me.uid), orderBy("lastTimestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(async (d) => {
                const chat = d.data();
                const otherUid = chat.participants.find(id => id !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherUid));
                const u = uSnap.data();
                
                const item = document.createElement('div');
                item.className = "chat-list-item";
                item.innerHTML = `
                    <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                    ${u.isOnline ? '<div class="online-dot"></div>' : ''}
                    <div class="chat-info">
                        <div class="chat-meta">
                            <b>${u.displayName}</b>
                            <small style="color:var(--gray)">${timeAgo(chat.lastTimestamp)}</small>
                        </div>
                        <div class="chat-meta">
                            <span class="last-msg">${chat.lastMsg || "Tap to chat"}</span>
                            ${chat.unreadCount?.[me.uid] ? `<span class="unread-badge">${chat.unreadCount[me.uid]}</span>` : ''}
                        </div>
                    </div>
                `;
                
                // Long Press to Delete Chat
                item.onmousedown = () => pressTimer = setTimeout(() => confirmDeleteChat(d.id), 1500);
                item.onmouseup = () => clearTimeout(pressTimer);
                item.onclick = () => openChat(otherUid, u.displayName, u.photoURL, d.id);
                list.appendChild(item);
            });
        });
    }

    async function openChat(uid, name, img, chatId) {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        // Reset Unread
        const cRef = doc(db, "chats", chatId || getChatId(me.uid, uid));
        const cSnap = await getDoc(cRef);
        if(cSnap.exists()) await updateDoc(cRef, { [`unreadCount.${me.uid}`]: 0 });

        const q = query(collection(db, "messages"), where("chatId", "==", getChatId(me.uid, uid)), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === me.uid;
                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-recv'}`;
                
                let content = m.text;
                if(m.type === 'image') content = `<img src="${m.url}" class="msg-media">`;
                if(m.type === 'video') content = `<video src="${m.url}" class="msg-media" controls></video>`;
                
                bubble.innerHTML = `${content} <span class="msg-time">${timeAgo(m.timestamp)}</span>`;
                
                // Long Press on Message for Options
                bubble.onmousedown = () => pressTimer = setTimeout(() => msgOptions(d.id, m), 1000);
                bubble.onmouseup = () => clearTimeout(pressTimer);
                
                box.appendChild(bubble);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        
        const chatId = getChatId(me.uid, activeChatID);
        const msgData = {
            chatId, sender: me.uid, text, timestamp: serverTimestamp(), type: 'text'
        };
        
        await addDoc(collection(db, "messages"), msgData);
        await setDoc(doc(db, "chats", chatId), {
            participants: [me.uid, activeChatID],
            lastMsg: text,
            lastTimestamp: serverTimestamp(),
            [`unreadCount.${activeChatID}`]: (await getDoc(doc(db, "chats", chatId))).data()?.unreadCount?.[activeChatID] + 1 || 1
        }, { merge: true });
        
        input.value = "";
    }

    async function msgOptions(msgId, data) {
        const isMe = data.sender === me.uid;
        const { value: action } = await Swal.fire({
            title: 'Message Options',
            showDenyButton: isMe,
            showCancelButton: true,
            confirmButtonText: 'Delete for Me',
            denyButtonText: 'Delete for Everyone',
            cancelButtonText: 'Edit',
            background: '#121212', color: '#fff'
        });

        if (action === true) await deleteDoc(doc(db, "messages", msgId)); // Simplified
        if (action === false && isMe) await deleteDoc(doc(db, "messages", msgId)); 
        if (action === undefined && isMe) {
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: data.text, background: '#121212', color: '#fff' });
            if(newText) await updateDoc(doc(db, "messages", msgId), { text: newText });
        }
    }

    async function sendMediaMsg(input) {
        const file = input.files[0];
        if(!file) return;
        Swal.fire({ title: 'Sending...', didOpen: () => Swal.showLoading() });
        const url = await uploadToCloudinary(file);
        const type = file.type.startsWith('image') ? 'image' : 'video';
        const chatId = getChatId(me.uid, activeChatID);
        
        await addDoc(collection(db, "messages"), { chatId, sender: me.uid, url, type, timestamp: serverTimestamp() });
        Swal.close();
    }

    // --- Helper Functions ---
    function getChatId(u1, u2) { return u1 < u2 ? u1 + "_" + u2 : u2 + "_" + u1; }

    function timeAgo(ts) {
        if(!ts) return "now";
        const diff = Math.floor((new Date() - ts.toDate()) / 1000);
        if(diff < 60) return diff + "s";
        if(diff < 3600) return Math.floor(diff/60) + "m";
        if(diff < 86400) return Math.floor(diff/3600) + "h";
        return ts.toDate().toLocaleDateString();
    }

    async function confirmDeleteChat(chatId) {
        const res = await Swal.fire({ title: 'Delete Conversation?', icon: 'warning', showCancelButton: true, background: '#121212', color: '#fff' });
        if(res.isConfirmed) await deleteDoc(doc(db, "chats", chatId));
    }

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou');
        const resp = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        return data.secure_url;
    }

    // Global Window Functions
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);

    // Initial Loaders (Simplified for space)
    async function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (s) => {
            const d = s.data();
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
        });
    }

    async function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                area.innerHTML += `
                    <div class="post-card">
                        <div class="post-user" onclick="viewUser('${p.uid}')">
                            <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                            <b>${p.authorName}</b>
                        </div>
                        ${p.img ? `<img src="${p.img}" class="post-img">` : `<div style="padding:15px;">${p.text}</div>`}
                    </div>
                `;
            });
        });
    }

    window.previewMedia = (input) => {
        const file = input.files[0];
        const box = document.getElementById('preview-box');
        const render = document.getElementById('media-render');
        box.style.display = 'block';
        const url = URL.createObjectURL(file);
        render.innerHTML = file.type.startsWith('video') ? `<video src="${url}" autoplay muted loop></video>` : `<img src="${url}">`;
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;
        let url = file ? await uploadToCloudinary(file) : null;
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: url, authorName: me.displayName, authorImg: me.photoURL, timestamp: serverTimestamp()
        });
        document.getElementById('post-text').value = "";
        document.getElementById('preview-box').style.display = 'none';
    };

</script>
</body>
</html>
