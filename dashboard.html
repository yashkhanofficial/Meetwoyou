<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .story-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-item { flex-shrink: 0; text-align: center; width: 65px; cursor: pointer; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: cover; background: #050505; cursor: pointer; }

        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; color: #fff; cursor: pointer; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <i class="far fa-bell" style="font-size:22px;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-area">
        <div class="story-item" onclick="document.getElementById('story-file').click()">
            <div class="story-ring" style="display:flex; align-items:center; justify-content:center; background:#262626; border: 2px dashed #555;"><i class="fas fa-plus"></i></div>
            <div style="font-size:10px; margin-top:5px;">Add Story</div>
            <input type="file" id="story-file" accept="image/*" style="display:none" onchange="uploadStory(this)">
        </div>
    </div>
    
    <div style="background: var(--card); padding: 15px; border-bottom: 1px solid #262626;">
        <textarea id="post-text" placeholder="কী ভাবছেন?"></textarea>
        <div id="img-preview-box"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:10px; border-radius:5px; flex:1;">ছবি যোগ করুন</button>
            <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
            <button class="btn-main" onclick="uploadPost()" style="flex:1;">পোস্ট করুন</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="বন্ধুদের খুঁজুন..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div id="my-profile-content" style="text-align: center; padding: 20px;"></div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:20px;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <b id="view-profile-name">প্রোফাইল</b>
    </div>
    <div id="user-profile-info" style="text-align:center; padding:20px;"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212; position:sticky; bottom:0;">
        <input type="text" id="chat-input" placeholder="মেসেজ লিখুন..." style="margin:0;">
        <button onclick="sendMsg()" style="color:var(--primary); background:none; border:none; font-weight:bold;">পাঠান</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) { me = user; init(); } else { window.location.href = "index.html"; }
    });

    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    async function init() {
        const ref = doc(db, "users", me.uid);
        const snap = await getDoc(ref);
        if(!snap.exists()) {
            await setDoc(ref, { uid: me.uid, displayName: me.displayName || "User", photoURL: me.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png", followers: [], following: [], bio: "Hello!" });
        }
        loadMyProfile(); loadFeed(); loadAllUsers(); loadStories();
    }

    // --- প্রোফাইল ভিউ (অন্য ইউজার) ---
    window.viewUserProfile = async (uid) => {
        const uSnap = await getDoc(doc(db, "users", uid));
        const u = uSnap.data();
        document.getElementById('view-profile-name').innerText = u.displayName;
        const info = document.getElementById('user-profile-info');
        info.innerHTML = `
            <img src="${u.photoURL}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--primary);">
            <h3>${u.displayName}${u.verified ? vB : ''}</h3>
            <p style="color:gray;">${u.bio || ''}</p>
            <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                <span><b>${u.followers?.length || 0}</b><br>Followers</span>
                <span><b>${u.following?.length || 0}</b><br>Following</span>
            </div>
            <div style="display:flex; gap:10px; padding:0 20px;">
                <button class="btn-main" onclick="toggleFollow('${uid}')" style="flex:1;">${u.followers?.includes(me.uid) ? 'Unfollow' : 'Follow'}</button>
                <button class="btn-main" onclick="openChat('${uid}', '${u.displayName}', '${u.photoURL}')" style="flex:1; background:#262626;">Message</button>
            </div>
        `;
        document.getElementById('user-profile-view').style.display = 'block';
        
        // লোড ইউজার পোস্টস
        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid)), (snap) => {
            const grid = document.getElementById('user-posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                grid.innerHTML += `<div class="grid-item">${d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:5px; font-size:10px;">${d.data().text}</div>`}</div>`;
            });
        });
    };

    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';

    // --- ফিড লোড (ছবিসহ) ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `
                    <div class="post-user" onclick="viewUserProfile('${p.uid}')">
                        <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                        <b>${p.authorName}${vB}</b>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${id}')">` : ''}
                    <div style="padding:15px 15px 5px;">${p.text}</div>
                    <div style="padding:10px 15px; display:flex; gap:20px; font-size:20px;">
                        <i class="far fa-heart" id="like-${id}" onclick="toggleLike('${id}')"></i>
                        <i class="far fa-comment" onclick="showComments('${id}')"></i>
                    </div>
                    <div style="padding:0 15px; font-size:14px;"><b>${p.likes?.length || 0} likes</b></div>
                `;
                area.appendChild(div);
            });
        });
    }

    // --- পোস্ট আপলোড ---
    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return;
        Swal.fire({title: 'আপলোড হচ্ছে...', didOpen: () => Swal.showLoading()});
        const uSnap = await getDoc(doc(db, "users", me.uid));
        const userData = uSnap.data();
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: selectedImgBase64,
            authorName: userData.displayName, authorImg: userData.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        selectedImgBase64 = null;
        Swal.fire("সফল!", "আপনার পোস্ট শেয়ার করা হয়েছে।", "success");
    };

    // --- কমেন্ট সিস্টেম ---
    window.showComments = async (postId) => {
        const { value: text } = await Swal.fire({
            title: 'কমেন্ট লিখুন',
            input: 'text',
            inputPlaceholder: 'আপনার মতামত...',
            showCancelButton: true
        });
        if (text) {
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ uid: me.uid, name: me.displayName, text: text, time: new Date() })
            });
            Swal.fire("কমেন্ট করা হয়েছে!");
        }
    };

    // --- মেসেজিং ---
    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';

    // --- ইউটিলিটি ---
    window.previewImg = (i) => {
        const r = new FileReader(); r.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        r.readAsDataURL(i.files[0]);
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(id === 'profile') loadMyProfile();
    };

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            document.getElementById('my-profile-content').innerHTML = `
                <img src="${d.photoURL}" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
                <h2>${d.displayName}${vB}</h2>
                <p>${d.bio || ''}</p>
            `;
        });
        // লোড মাই পোস্টস
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                grid.innerHTML += `<div class="grid-item">${d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:10px;">${d.data().text}</div>`}</div>`;
            });
        });
    }

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    const h = `<div class="post-user" onclick="viewUserProfile('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <b>${u.displayName}${u.verified?vB:''}</b>
                    </div>`;
                    list.innerHTML += h;
                    chatList.innerHTML += h.replace("viewUserProfile", "openChatDirect");
                }
            });
        });
    };
    
    window.openChatDirect = (uid) => getDoc(doc(db, "users", uid)).then(s => openChat(uid, s.data().displayName, s.data().photoURL));
    window.uploadStory = (input) => { /* স্টোরি আপলোড লজিক */ };
    function loadStories() { /* স্টোরি লোড লজিক */ }

</script>
</body>
    </html>
