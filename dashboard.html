<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; --msg-sent: #0084ff; --msg-recv: #262626; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-input-area { padding: 0 15px; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; }
        .preview-container { position: relative; margin: 10px 15px; border-radius: 12px; overflow: hidden; display: none; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 12px; display: block; }
        .remove-preview { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 5; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .action-btns { display: flex; gap: 20px; }
        .action-icon { font-size: 20px; color: var(--primary); cursor: pointer; transition: transform 0.2s; }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; cursor: pointer; display: flex; justify-content: center; background: #000; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        
        .like-animation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .like-animation.active { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        #chat-screen, #user-profile-view, #post-detail-view, #story-viewer { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        
        /* Advanced Messaging Styles */
        .chat-list-item { display: flex; align-items: center; padding: 12px 15px; transition: background 0.2s; cursor: pointer; position: relative; user-select: none; }
        .chat-list-item:active { background: #1a1a1a; }
        .chat-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-right: 12px; }
        .chat-info { flex: 1; border-bottom: 0.5px solid #262626; padding-bottom: 10px; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-last-msg { color: var(--gray); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .unread-badge { background: var(--primary); color: white; border-radius: 50%; min-width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 70%; font-size: 15px; position: relative; word-wrap: break-word; user-select: none; }
        .chat-bubble.sent { background: var(--msg-sent); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .chat-bubble.recv { background: var(--msg-recv); align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .chat-media { border-radius: 12px; max-width: 200px; cursor: pointer; margin-bottom: 4px; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 4px; text-align: right; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        
        .story-container { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        
        .chat-footer { padding: 12px; display: flex; align-items: center; gap: 12px; background: #000; border-top: 1px solid #262626; }
        .chat-input-pill { background: #1c1c1c; border-radius: 25px; padding: 8px 15px; flex: 1; display: flex; align-items: center; }
        .chat-input-pill input { background: transparent; border: none; margin: 0; padding: 5px; outline: none; }
        .call-icons { display: flex; gap: 18px; color: var(--primary); font-size: 18px; margin-right: 10px; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring watched">
            <div class="add-story-btn"><i class="fas fa-plus"></i></div>
            <div class="story-name">Your Story</div>
            <input type="file" id="story-file" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display: flex; gap: 12px;"></div>
    </div>
    <div class="composer-card">
        <div class="composer-header"><img id="composer-user-img" src="" class="composer-avatar"><b id="composer-user-name">...</b></div>
        <div class="composer-input-area"><textarea id="post-text" class="composer-textarea" placeholder="What's happening?"></textarea></div>
        <div id="preview-box" class="preview-container"><button class="remove-preview" onclick="clearPreview()"><i class="fas fa-times"></i></button><div id="media-render"></div></div>
        <div class="composer-actions">
            <div class="action-btns"><i class="far fa-image action-icon" onclick="document.getElementById('post-file').click()"></i><i class="fas fa-video action-icon" onclick="document.getElementById('post-file').click()"></i></div>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button id="share-post-btn" class="share-btn-modern" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">Chats</h3>
        <i class="fas fa-edit" style="color:var(--primary);"></i>
    </div>
    <div id="chat-list-area"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;"><i class="fas fa-camera" style="font-size: 12px;"></i></label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray);"></p>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; background:#000;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="margin-right:15px; cursor:pointer;"></i>
        <img id="chat-h-img" src="" style="width:38px; height:38px; border-radius:50%; margin-right:12px;">
        <div style="flex:1;">
            <b id="chat-h-name" style="font-size:16px;"></b>
            <div id="chat-h-status" style="font-size:11px; color:#00ff00;">Online</div>
        </div>
        <div class="call-icons">
            <i class="fas fa-phone-alt" onclick="handleCall('audio')"></i>
            <i class="fas fa-video" onclick="handleCall('video')"></i>
        </div>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; background:#000;"></div>
    <div class="chat-footer">
        <i class="fas fa-plus-circle" style="color:var(--primary); font-size:20px;" onclick="document.getElementById('msg-file').click()"></i>
        <i class="fas fa-microphone" style="color:var(--primary); font-size:20px;" id="voice-btn"></i>
        <div class="chat-input-pill">
            <input type="text" id="chat-input" placeholder="Message...">
            <i class="far fa-smile" style="color:var(--gray);"></i>
        </div>
        <input type="file" id="msg-file" style="display:none" onchange="sendMediaMsg(this)">
        <i class="fas fa-paper-plane" style="color:var(--primary); font-size:22px; cursor:pointer;" onclick="sendMsg()"></i>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let pressTimer;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            init(); 
            setTimeout(() => document.getElementById('app-loader').style.display = 'none', 1200);
        } else { window.location.href = "index.html"; }
    });

    function init() { 
        loadFeed(); 
        loadAllUsers(); 
        loadMyProfile();
        loadChatList();
        updateLastSeen();
    }

    function updateLastSeen() {
        if(me) updateDoc(doc(db, "users", me.uid), { lastSeen: serverTimestamp() });
        setTimeout(updateLastSeen, 60000);
    }

    // Dynamic Chat List (Messenger Style)
    function loadChatList() {
        const q = query(collection(db, "conversations"), where("participants", "array-contains", me.uid), orderBy("lastMsgTime", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chat-list-area');
            list.innerHTML = "";
            snap.forEach(async (docData) => {
                const data = docData.data();
                const otherUid = data.participants.find(p => p !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherUid));
                const u = uSnap.data();
                const unreadCount = data.unread?.[me.uid] || 0;

                const div = document.createElement('div');
                div.className = "chat-list-item";
                div.innerHTML = `
                    <img src="${u.photoURL}" class="chat-avatar">
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <b>${u.displayName}${u.isVerified?vB:''}</b>
                            <small style="color:var(--gray)">${timeAgo(data.lastMsgTime)}</small>
                        </div>
                        <div class="chat-last-msg">
                            <span style="${unreadCount > 0 ? 'color:white; font-weight:600' : ''}">${data.lastMsgText || 'Start a conversation'}</span>
                            ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                        </div>
                    </div>
                `;

                // 3 Second Press to Delete Conversation
                div.onmousedown = div.ontouchstart = () => {
                    pressTimer = setTimeout(() => confirmDeleteChat(docData.id), 3000);
                };
                div.onmouseup = div.ontouchend = () => clearTimeout(pressTimer);
                div.onclick = () => openChat(otherUid, u.displayName, u.photoURL, docData.id);
                list.appendChild(div);
            });
        });
    }

    async function confirmDeleteChat(convId) {
        const res = await Swal.fire({ title: 'Delete Conversation?', text: "This will clear chat history for you.", icon: 'warning', showCancelButton: true, background: '#121212', color: '#fff' });
        if(res.isConfirmed) await deleteDoc(doc(db, "conversations", convId));
    }

    // Advanced Messaging Logic
    window.openChat = async (uid, name, img, convId) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        // Reset Unread
        if(convId) await updateDoc(doc(db, "conversations", convId), { [`unread.${me.uid}`]: 0 });

        const q = query(collection(db, "messages"), where("chatId", "in", [[me.uid, uid].sort().join('_')]), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const mId = d.id;
                const isMe = m.sender === me.uid;
                const bubble = document.createElement('div');
                bubble.className = `chat-bubble ${isMe ? 'sent' : 'recv'}`;
                
                let content = m.type === 'image' ? `<img src="${m.media}" class="chat-media">` : 
                              m.type === 'video' ? `<video src="${m.media}" class="chat-media" controls></video>` : 
                              m.text;
                
                bubble.innerHTML = `${content} <span class="msg-time">${timeAgo(m.timestamp)}</span>`;

                // Press to Edit/Delete
                bubble.onmousedown = bubble.ontouchstart = (e) => {
                    pressTimer = setTimeout(() => handleMessageActions(mId, m.text, isMe), 1000);
                };
                bubble.onmouseup = bubble.ontouchend = () => clearTimeout(pressTimer);
                
                box.appendChild(bubble);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    async function handleMessageActions(msgId, oldText, isMe) {
        const buttons = isMe ? { confirm: 'Edit', deny: 'Delete for Everyone', cancel: 'Delete for Me' } : { confirm: false, deny: false, cancel: 'Delete for Me' };
        
        const { value: action } = await Swal.fire({
            title: 'Message Options',
            showConfirmButton: isMe, showDenyButton: isMe, showCancelButton: true,
            confirmButtonText: 'Edit', denyButtonText: 'Delete For Everyone', cancelButtonText: 'Delete for Me',
            background: '#121212', color: '#fff'
        });

        if (action === true) { // Edit
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: oldText, background: '#121212', color: '#fff' });
            if(newText) await updateDoc(doc(db, "messages", msgId), { text: newText });
        } else if (Swal.isVisible() && !action) { // Swals unique handling for deny/cancel
             // Implement specific logic for forMe vs Everyone based on button clicks
             await deleteDoc(doc(db, "messages", msgId));
        }
    }

    window.sendMsg = async (mediaUrl = null, type = 'text') => {
        const i = document.getElementById('chat-input');
        if(!i.value.trim() && !mediaUrl) return;
        
        const chatId = [me.uid, activeChatID].sort().join('_');
        const msgData = {
            chatId, sender: me.uid, receiver: activeChatID,
            text: i.value, media: mediaUrl, type,
            timestamp: serverTimestamp()
        };

        await addDoc(collection(db, "messages"), msgData);
        
        // Update Conversation Meta
        const convRef = doc(db, "conversations", chatId);
        const convSnap = await getDoc(convRef);
        const unreadKey = `unread.${activeChatID}`;
        
        const updateData = {
            lastMsgText: type === 'text' ? i.value : `Sent a ${type}`,
            lastMsgTime: serverTimestamp(),
            participants: [me.uid, activeChatID],
            [unreadKey]: (convSnap.exists() ? (convSnap.data().unread?.[activeChatID] || 0) : 0) + 1
        };
        
        await setDoc(convRef, updateData, { merge: true });
        i.value = "";
    };

    window.sendMediaMsg = async (input) => {
        if(!input.files[0]) return;
        const file = input.files[0];
        const type = file.type.startsWith('video') ? 'video' : 'image';
        Swal.fire({title: 'Sending...', didOpen: () => Swal.showLoading(), background: '#121212'});
        const url = await uploadToCloudinary(file);
        sendMsg(url, type);
        Swal.close();
    };

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou');
        const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
        const data = await res.json();
        return data.secure_url;
    }

    function timeAgo(ts) {
        if(!ts) return "now";
        const s = Math.floor((new Date() - ts.toDate()) / 1000);
        if(s < 60) return "Just now";
        if(s < 3600) return Math.floor(s/60) + "m";
        if(s < 86400) return Math.floor(s/3600) + "h";
        return ts.toDate().toLocaleDateString();
    }

    // Common Functions from Previous Build
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);
    window.handleCall = (type) => Swal.fire({ title: `Starting ${type} call...`, icon: 'info', timer: 2000, showConfirmButton: false, background: '#121212', color: '#fff' });

    // UI Loaders for Home/Profile (same as original)
    async function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(async d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `<div class="post-user"><img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;"><b>${p.authorName}</b></div>
                <div class="post-img-container">${p.img?`<img src="${p.img}" class="post-img">` : `<div style="padding:20px;">${p.text}</div>`}</div>`;
                area.appendChild(div);
            });
        });
    }

    function loadAllUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(d => {
                if(d.id !== me.uid) {
                    const u = d.data();
                    list.innerHTML += `<div class="post-user" onclick="openChat('${d.id}', '${u.displayName}', '${u.photoURL}')">
                        <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%; margin-right:10px;">
                        <div><b>${u.displayName}</b></div>
                    </div>`;
                }
            });
        });
    }

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('composer-user-img').src = d.photoURL;
            document.getElementById('composer-user-name').innerText = d.displayName;
            document.getElementById('p-bio').innerText = d.bio || "Founder & CEO";
        });
    }

</script>
