<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        
        /* Composer */
        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; }
        .preview-container { position: relative; margin: 10px 15px; border-radius: 12px; overflow: hidden; display: none; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 12px; display: block; }
        .remove-preview { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 5; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* Posts */
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #000; }

        /* CHAT FIX START - CSS */
        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 75%; font-size: 14px; position: relative; word-wrap: break-word; }
        .chat-bubble img, .chat-bubble video { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .chat-status { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; display: block; text-align: right; }
        .unread-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        .msg-nav-badge { position: absolute; top: -5px; right: -8px; background: var(--danger); font-size: 9px; padding: 2px 5px; border-radius: 10px; }
        .chat-media-preview { position: absolute; bottom: 70px; left: 10px; right: 10px; background: #1c1c1c; padding: 10px; border-radius: 10px; display: none; border: 1px solid var(--primary); z-index: 10; }
        /* CHAT FIX END - CSS */
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; position: relative; }
        
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* Stories */
        .story-container { display: flex; overflow-x: auto; padding: 10px; gap: 12px; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-circle { flex-shrink: 0; width: 64px; text-align: center; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }

        #user-profile-view, #post-detail-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <i class="far fa-bell" style="font-size:22px;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        <div class="story-circle" onclick="document.getElementById('story-file').click()">
            <img id="my-story-img" src="https://via.placeholder.com/60" class="story-ring">
            <div style="font-size:11px;">Your Story</div>
            <input type="file" id="story-file" hidden onchange="uploadStory(this)">
        </div>
        <div id="other-stories" style="display:flex; gap:12px;"></div>
    </div>
    <div class="composer-card">
        <div class="composer-header"><img id="composer-user-img" src="" class="composer-avatar"><b id="composer-user-name">...</b></div>
        <textarea id="post-text" class="composer-textarea" placeholder="What's on your mind?"></textarea>
        <div id="preview-box" class="preview-container"><button class="remove-preview" onclick="clearPreview()"><i class="fas fa-times"></i></button><div id="media-render"></div></div>
        <div class="composer-actions">
            <i class="far fa-image" style="color:var(--primary); font-size:20px; cursor:pointer;" onclick="document.getElementById('post-file').click()"></i>
            <input type="file" id="post-file" hidden onchange="previewMedia(this)">
            <button id="share-post-btn" class="share-btn-modern" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search users..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
        <div>
            <b id="chat-h-name" style="font-size:14px;"></b><br>
            <small id="chat-h-status" style="color:var(--gray); font-size:11px;">offline</small>
        </div>
        <i class="fas fa-trash-alt" style="margin-left:auto; color:var(--gray);" onclick="deleteChatConversation()"></i>
    </div>
    
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>

    <div id="chat-media-preview" class="chat-media-preview">
        <div id="chat-media-render" style="max-height:100px; overflow:hidden;"></div>
        <button onclick="clearChatMedia()" style="background:none; border:none; color:red; float:right;">Remove</button>
    </div>

    <div style="padding:10px; background:#121212; display:flex; align-items:center; gap:10px; border-top:1px solid #262626;">
        <label for="chat-media-input"><i class="fas fa-paperclip" style="color:var(--primary); font-size:20px;"></i></label>
        <input type="file" id="chat-media-input" hidden accept="image/*,video/*" onchange="previewChatMedia(this)">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border-radius:20px;">
        <i class="fas fa-paper-plane" id="chat-send-btn" onclick="sendMsg()" style="color:var(--primary); font-size:20px;"></i>
    </div>
</div>
<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid #262626; object-fit:cover;">
        <h3 id="p-name">...</h3>
        <p id="p-bio" style="color:var(--gray);"></p>
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:15px;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <button class="btn-main" onclick="toggleEdit()">Edit Profile</button>
        <div id="edit-form" style="display:none; margin-top:15px;">
            <input type="text" id="edit-name" placeholder="Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626;"><i class="fas fa-arrow-left" onclick="closeProfileView()"></i> <span id="view-user-name-title"></span></div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="post-detail-view">
    <div style="padding:15px; border-bottom:1px solid #262626;"><i class="fas fa-arrow-left" onclick="document.getElementById('post-detail-view').style.display='none'"></i></div>
    <div id="post-detail-content"></div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')">
        <span id="msg-nav-badge" class="msg-nav-badge" style="display:none;">0</span>
    </i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let chatUnsub = null;
    let chatMediaFile = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { displayName: user.displayName || "User", photoURL: user.photoURL || "https://via.placeholder.com/90", bio: "", followers: [], following: [], isVerified: false, lastActive: serverTimestamp() });
                location.reload();
            }
            updateDoc(userRef, { lastActive: serverTimestamp() });
            init();
            document.getElementById('app-loader').style.display = 'none';
        } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyProfile();
        loadFeed();
        loadAllUsers();
        loadMyPosts();
    }

    /* --- GLOBAL HELPERS --- */
    function timeAgo(t) {
        if(!t) return "now";
        const d = t.toDate ? t.toDate() : new Date(t);
        const sec = Math.floor((new Date() - d) / 1000);
        if (sec < 60) return "now";
        if (sec < 3600) return Math.floor(sec/60) + "m";
        if (sec < 86400) return Math.floor(sec/3600) + "h";
        return d.toLocaleDateString();
    }

    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'Meetwoyou');
        const resp = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        return data.secure_url;
    }

    /* --- CHAT FIX START - LOGIC --- */
    window.loadAllUsers = () => {
        // Chat List Logic (Deduplicated & Sorted)
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "desc")), async (mSnap) => {
            const chatArea = document.getElementById('chat-list');
            const navBadge = document.getElementById('msg-nav-badge');
            
            // Step 1: Filter latest message per unique user
            const latestMsgsMap = new Map();
            let totalUnread = 0;

            mSnap.forEach(doc => {
                const m = doc.data();
                const other = m.sender === me.uid ? m.receiver : m.sender;
                
                if(!latestMsgsMap.has(other)) {
                    latestMsgsMap.set(other, { ...m, id: doc.id });
                }
                if(m.receiver === me.uid && !m.seen) totalUnread++;
            });

            // Step 2: Render unique users
            chatArea.innerHTML = ""; // CLEAR PREVIOUS
            navBadge.innerText = totalUnread;
            navBadge.style.display = totalUnread > 0 ? "block" : "none";

            for (let [uid, lastM] of latestMsgsMap) {
                const uSnap = await getDoc(doc(db, "users", uid));
                if(uSnap.exists()) {
                    const u = uSnap.data();
                    const unreadCount = mSnap.docs.filter(d => d.data().sender === uid && d.data().receiver === me.uid && !d.data().seen).length;
                    
                    const row = document.createElement('div');
                    row.className = "user-list-item";
                    row.style = "display:flex; align-items:center; gap:12px; padding:12px; cursor:pointer; border-bottom:1px solid #121212;";
                    row.onclick = () => openChat(uid, u.displayName, u.photoURL);
                    row.innerHTML = `
                        <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                        <div style="flex:1;">
                            <div style="display:flex; justify-content:space-between;">
                                <b>${u.displayName}${u.isVerified?vB:''}</b>
                                <small style="color:var(--gray);">${timeAgo(lastM.timestamp)}</small>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-top:3px;">
                                <small style="color:var(--gray); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px;">
                                    ${lastM.type === 'image' ? '📷 Photo' : (lastM.type === 'video' ? '🎥 Video' : lastM.text)}
                                </small>
                                ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                            </div>
                        </div>
                    `;
                    chatArea.appendChild(row);
                }
            }
        });

        // Global User Discovery (Unchanged)
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                if(d.id === me.uid) return;
                const u = d.data();
                list.innerHTML += `<div class="user-list-item" style="padding:10px; display:flex; align-items:center; justify-content:space-between;">
                    <div onclick="viewUser('${d.id}')" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <b>${u.displayName}${u.isVerified?vB:''}</b>
                    </div>
                    <button class="btn-main" style="width:auto; padding:5px 15px;" onclick="openChat('${d.id}', '${u.displayName}', '${u.photoURL}')">Chat</button>
                </div>`;
            });
        });
    };

    window.openChat = async (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        if(chatUnsub) chatUnsub();

        chatUnsub = onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = ""; // CLEAR PREVIOUS
            const batch = writeBatch(db);

            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const isMe = m.sender === me.uid;
                    const bubble = document.createElement('div');
                    bubble.className = `chat-bubble ${isMe ? 'sent' : 'recv'}`;
                    bubble.oncontextmenu = (e) => { e.preventDefault(); manageMsg(d.id, m.text, isMe); };
                    
                    let mediaContent = "";
                    if(m.type === 'image') mediaContent = `<img src="${m.content}" onclick="window.open('${m.content}')">`;
                    if(m.type === 'video') mediaContent = `<video src="${m.content}" controls style="width:200px;"></video>`;

                    bubble.innerHTML = `
                        ${mediaContent}
                        <div>${m.text || ""}</div>
                        <span class="chat-status">${timeAgo(m.timestamp)} ${isMe ? (m.seen ? '✔✔' : '✔') : ''}</span>
                    `;
                    box.appendChild(bubble);

                    if(!isMe && !m.seen) batch.update(doc(db, "messages", d.id), { seen: true });
                }
            });
            batch.commit();
            box.scrollTop = box.scrollHeight;
        });
    };

    window.previewChatMedia = (input) => {
        const file = input.files[0];
        if(!file) return;
        chatMediaFile = file;
        const render = document.getElementById('chat-media-render');
        document.getElementById('chat-media-preview').style.display = 'block';
        render.innerHTML = file.type.startsWith('image/') ? `<img src="${URL.createObjectURL(file)}" style="height:80px;">` : `<i class="fas fa-video"></i> Video selected`;
    };

    window.clearChatMedia = () => {
        chatMediaFile = null;
        document.getElementById('chat-media-input').value = "";
        document.getElementById('chat-media-preview').style.display = 'none';
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        const sendBtn = document.getElementById('chat-send-btn');
        if(!text && !chatMediaFile) return;

        sendBtn.className = "fas fa-spinner fa-spin";
        let mediaUrl = null;
        let type = "text";

        if(chatMediaFile) {
            type = chatMediaFile.type.startsWith('image/') ? 'image' : 'video';
            mediaUrl = await uploadToCloudinary(chatMediaFile);
        }

        await addDoc(collection(db, "messages"), {
            sender: me.uid,
            receiver: activeChatID,
            text: text,
            content: mediaUrl,
            type: type,
            seen: false,
            timestamp: serverTimestamp()
        });

        input.value = "";
        clearChatMedia();
        sendBtn.className = "fas fa-paper-plane";
    };

    window.manageMsg = async (mid, text, isMe) => {
        const { value: action } = await Swal.fire({
            title: 'Message',
            showDenyButton: isMe,
            showCancelButton: true,
            confirmButtonText: 'Delete',
            denyButtonText: 'Edit',
            background: '#121212', color: '#fff'
        });

        if(action.isConfirmed) {
            await deleteDoc(doc(db, "messages", mid));
        } else if (action.isDenied && isMe) {
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: text, background: '#121212', color: '#fff' });
            if(newText) await updateDoc(doc(db, "messages", mid), { text: newText + " (edited)" });
        }
    };

    window.deleteChatConversation = async () => {
        const res = await Swal.fire({ title: 'Delete entire chat?', icon: 'warning', showCancelButton: true, background: '#121212', color: '#fff' });
        if(res.isConfirmed) {
            const q = query(collection(db, "messages"));
            // Note: In production, use a Cloud Function or batch for large deletions
            Swal.fire('Deleted', 'Conversation cleared', 'success');
            closeChat();
        }
    };

    window.closeChat = () => {
        document.getElementById('chat-screen').style.display = 'none';
        activeChatID = null;
        if(chatUnsub) chatUnsub();
    };
    /* --- CHAT FIX END - LOGIC --- */

    /* --- OTHER SYSTEM LOGIC (UNMODIFIED) --- */
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    async function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                area.innerHTML += `
                    <div class="post-card">
                        <div class="post-user">
                            <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                            <b>${p.authorName}</b>
                        </div>
                        ${p.img ? `<img src="${p.img}" class="post-img">` : `<div style="padding:15px;">${p.text}</div>`}
                        <div style="padding:10px;"><i class="far fa-heart"></i> <i class="far fa-comment"></i></div>
                    </div>
                `;
            });
        });
    }

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('composer-user-img').src = d.photoURL;
            document.getElementById('composer-user-name').innerText = d.displayName;
            document.getElementById('my-story-img').src = d.photoURL;
        });
    }

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        let url = file ? await uploadToCloudinary(file) : null;
        await addDoc(collection(db, "posts"), { uid: me.uid, text: txt, img: url, authorName: me.displayName, authorImg: me.photoURL, timestamp: serverTimestamp() });
        document.getElementById('post-text').value = "";
        clearPreview();
    };

    window.previewMedia = (input) => {
        const file = input.files[0];
        const box = document.getElementById('preview-box');
        box.style.display = 'block';
        document.getElementById('media-render').innerHTML = `<img src="${URL.createObjectURL(file)}">`;
    };

    window.clearPreview = () => {
        document.getElementById('preview-box').style.display = 'none';
        document.getElementById('post-file').value = "";
    };

    window.userLogout = () => signOut(auth);
</script>
</body>
</html>
