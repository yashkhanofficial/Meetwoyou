<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --success: #22c55e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; display: none; }
        .v-active .v-badge { display: inline-block !important; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; cursor: pointer; }
        #chat-screen, #user-profile-view, #post-detail-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; font-size: 14px; }
        .post-time { font-size: 10px; color: var(--gray); padding: 0 15px; }
        .info-row { font-size: 13px; margin: 5px 0; color: #ccc; display: flex; align-items: center; gap: 8px; }
        .info-row i { color: var(--primary); width: 15px; text-align: center; }
        .follow-btn-sm { background: var(--primary); border: none; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .msg-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;">Add Photo</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..." oninput="searchUsers(this.value)"></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name" class="v-container">Loading...<i class="fas fa-check-circle v-badge"></i></h3>
        <p id="p-username" style="color:var(--primary); margin-top:-10px; font-size:13px;"></p>
        <p id="p-bio" style="color:var(--gray); margin-bottom:10px; font-size:14px;"></p>
        
        <div id="p-extra-info" style="text-align: left; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none;"></div>

        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>

        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-username" placeholder="Username (Unique)">
            <textarea id="edit-bio" placeholder="Bio"></textarea>
            <input type="text" id="edit-edu" placeholder="Education">
            <input type="text" id="edit-work" placeholder="Work/Occupation">
            <input type="date" id="edit-dob" placeholder="Date of Birth">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()" style="cursor:pointer;"></i>
        <span>Profile</span>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="post-detail-view">
    <div style="padding:15px; border-bottom:1px solid #262626;">
        <i class="fas fa-arrow-left" onclick="document.getElementById('post-detail-view').style.display='none'" style="cursor:pointer;"></i>
    </div>
    <div id="post-detail-content"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name" class="v-container"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold; cursor:pointer;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let globalV = false;

    // --- Admin Control Settings ---
    onSnapshot(doc(db, "settings", "global_config"), (snap) => {
        if(snap.exists()) { globalV = snap.data().vBadgeVisible; }
        document.body.classList.toggle('v-active', globalV);
    });

    function formatNumbers(data) {
        if (!data) return "0";
        let count = Array.isArray(data) ? data.length : parseInt(data);
        if (isNaN(count)) return "0";
        if (count >= 1000000) return (count / 1000000).toFixed(1) + "M";
        if (count >= 1000) return (count / 1000).toFixed(1) + "K";
        return count.toString();
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            init(); 
        } else { window.location.href = "index.html"; }
    });

    function init() { loadMyProfile(); loadFeed(); loadAllUsers(); loadMyPosts(); loadChats(); }

    function timeAgo(t) {
        if(!t) return "...";
        const s = Math.floor((new Date() - t.toDate()) / 1000);
        if (s < 60) return "Just now";
        if (s < 3600) return Math.floor(s/60) + "m";
        if (s < 86400) return Math.floor(s/3600) + "h";
        return t.toDate().toLocaleDateString();
    }

    function renderPost(p, id, target, isDetail = false) {
        const isLiked = Array.isArray(p.likes) && p.likes.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user v-container ${p.isVerified?'v-active':''}" onclick="${isDetail ? '' : `viewUser('${p.uid}')`}">
                <img src="${p.authorImg || 'https://via.placeholder.com/35'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b class="v-container">${p.authorName}<i class="fas fa-check-circle v-badge"></i></b>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-v post-menu-trigger" style="margin-left:auto; padding:10px;"></i>` : ''}
            </div>
            ${p.img ? `<img src="${p.img}" class="post-img main-img">` : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'} like-btn" style="color:${isLiked?'red':''}"></i>
                <i class="far fa-comment comment-btn"></i>
                <i class="far fa-paper-plane share-btn" onclick="sharePost('${id}')"></i>
            </div>
            <div class="post-time">${timeAgo(p.timestamp)}</div>
            <div style="padding:5px 15px; font-size:14px;">
                <b class="likes-count">${formatNumbers(p.likes)} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
            </div>
        `;
        const imgEl = div.querySelector('.main-img');
        if(imgEl) imgEl.ondblclick = () => toggleLike(id, isLiked);
        div.querySelector('.like-btn').onclick = () => toggleLike(id, isLiked);
        div.querySelector('.comment-btn').onclick = () => showComments(id);
        const menuBtn = div.querySelector('.post-menu-trigger');
        if(menuBtn) menuBtn.onclick = (e) => { e.stopPropagation(); postMenu(id, p.text); };
        target.appendChild(div);
    }

    async function toggleLike(id, liked) { 
        const ref = doc(db, "posts", id);
        const snap = await getDoc(ref);
        const cur = snap.data().likes;
        if(typeof cur === 'number') {
             await updateDoc(ref, { likes: liked ? cur - 1 : cur + 1 });
        } else {
             await updateDoc(ref, { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) }); 
        }
    }

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(d => renderPost(d.data(), d.id, area));
        });
    }

    window.viewUser = async (uid) => {
        if(uid === me.uid) return showSec('profile');
        const uSnap = await getDoc(doc(db, "users", uid));
        const u = uSnap.data();
        const meSnap = await getDoc(doc(db, "users", me.uid));
        const isFollowing = Array.isArray(meSnap.data().following) && meSnap.data().following.includes(uid);

        const view = document.getElementById('user-profile-view');
        view.style.display = 'flex';
        document.getElementById('user-profile-content').innerHTML = `
            <div style="text-align:center; padding:20px;" class="${u.isVerified?'v-active':''}">
                <img src="${u.photoURL || 'https://via.placeholder.com/80'}" style="width:80px; height:80px; border-radius:50%; border:2px solid #262626;">
                <h3 class="v-container">${u.displayName}<i class="fas fa-check-circle v-badge"></i></h3>
                <p style="color:var(--primary); font-size:12px; margin-top:-10px;">@${u.username || 'user'}</p>
                <p style="color:gray; font-size:14px;">${u.bio || ''}</p>
                <div style="text-align:left; background:#1a1a1a; padding:10px; border-radius:8px; margin:10px 15px; font-size:13px;">
                    ${u.work ? `<div class="info-row"><i class="fas fa-briefcase"></i> Works at ${u.work}</div>` : ''}
                    ${u.edu ? `<div class="info-row"><i class="fas fa-graduation-cap"></i> Studied at ${u.edu}</div>` : ''}
                </div>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px;">
                    <b>${formatNumbers(u.followers)}<br><small>Followers</small></b>
                    <b>${formatNumbers(u.following)}<br><small>Following</small></b>
                </div>
                <div style="display:flex; gap:10px; padding:0 15px;">
                    <button class="btn-main flw-btn">${isFollowing?'Unfollow':'Follow'}</button>
                    <button class="btn-main msg-btn" style="background:#262626;">Message</button>
                </div>
            </div>`;
        
        view.querySelector('.flw-btn').onclick = () => toggleFollow(uid, isFollowing);
        view.querySelector('.msg-btn').onclick = () => openChat(uid, u.displayName, u.photoURL, u.isVerified);

        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid)), (snap) => {
            const grid = document.getElementById('user-posts-grid'); grid.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "grid-item";
                item.onclick = () => viewSinglePost(d.id);
                item.innerHTML = d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:10px; font-size:10px;">${d.data().text}</div>`;
                grid.appendChild(item);
            });
        });
    };

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            const profileSec = document.getElementById('profile-sec');
            profileSec.className = `section active ${d.isVerified?'v-active':''}`;
            document.getElementById('p-name').innerHTML = d.displayName + `<i class="fas fa-check-circle v-badge"></i>`;
            document.getElementById('p-username').innerText = "@" + (d.username || "username");
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('count-followers').innerText = formatNumbers(d.followers);
            document.getElementById('count-following').innerText = formatNumbers(d.following);
            
            const extra = document.getElementById('p-extra-info');
            extra.innerHTML = "";
            if(d.work || d.edu || d.dob) {
                extra.style.display = "block";
                if(d.work) extra.innerHTML += `<div class="info-row"><i class="fas fa-briefcase"></i> ${d.work}</div>`;
                if(d.edu) extra.innerHTML += `<div class="info-row"><i class="fas fa-graduation-cap"></i> ${d.edu}</div>`;
                if(d.dob) extra.innerHTML += `<div class="info-row"><i class="fas fa-birthday-cake"></i> Born ${d.dob}</div>`;
            }
        });
    }

    window.saveProfile = async () => {
        const data = {
            displayName: document.getElementById('edit-name').value,
            username: document.getElementById('edit-username').value.toLowerCase().replace(/\s/g, ''),
            bio: document.getElementById('edit-bio').value,
            edu: document.getElementById('edit-edu').value,
            work: document.getElementById('edit-work').value,
            dob: document.getElementById('edit-dob').value
        };
        await updateDoc(doc(db, "users", me.uid), data);
        toggleEdit();
    };

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(d => {
                if(d.id === me.uid) return;
                const u = d.data();
                const meSnapData = Array.isArray(u.followers) && u.followers.includes(me.uid);
                const div = document.createElement('div');
                div.className = `post-user ${u.isVerified?'v-active':''}`;
                div.innerHTML = `
                    <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%;" onclick="viewUser('${d.id}')">
                    <div style="flex:1;" onclick="viewUser('${d.id}')">
                        <b class="v-container">${u.displayName}<i class="fas fa-check-circle v-badge"></i></b><br>
                        <small style="color:gray;">${formatNumbers(u.followers)} followers</small>
                    </div>
                    <button class="follow-btn-sm" onclick="toggleFollow('${d.id}', ${meSnapData})">${meSnapData?'Unfollow':'Follow'}</button>
                `;
                list.appendChild(div);
            });
        });
    };

    window.loadChats = () => {
        const q = query(collection(db, "chats"), where("users", "array-contains", me.uid), orderBy("lastActive", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            snap.forEach(async d => {
                const chatData = d.data();
                const otherId = chatData.users.find(id => id !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherId));
                const u = uSnap.data();
                const item = document.createElement('div');
                item.className = "msg-list-item";
                item.onclick = () => openChat(otherId, u.displayName, u.photoURL, u.isVerified);
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;" class="${u.isVerified?'v-active':''}">
                        <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%;">
                        <div>
                            <b class="v-container">${u.displayName}<i class="fas fa-check-circle v-badge"></i></b>
                            <p style="margin:0; font-size:12px; color:gray;">${chatData.lastMsg || 'Tap to chat'}</p>
                        </div>
                    </div>
                    <small style="color:var(--gray);">${chatData.lastActive ? timeAgo(chatData.lastActive) : ''}</small>
                `;
                list.appendChild(item);
            });
        });
    };

    window.openChat = async (uid, name, img, verified) => {
        activeChatID = uid;
        const header = document.getElementById('chat-screen');
        header.className = verified ? "v-active" : "";
        document.getElementById('chat-h-name').innerHTML = name + `<i class="fas fa-check-circle v-badge"></i>`;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        const q = query(collection(db, "messages"), 
            where("chatId", "in", [`${me.uid}_${uid}`, `${uid}_${me.uid}`]), 
            orderBy("timestamp", "asc"));

        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        const chatId = me.uid < activeChatID ? `${me.uid}_${activeChatID}` : `${activeChatID}_${me.uid}`;
        const msg = i.value; i.value = "";
        await addDoc(collection(db, "messages"), { 
            chatId, sender: me.uid, text: msg, timestamp: serverTimestamp() 
        });
        await setDoc(doc(db, "chats", chatId), {
            users: [me.uid, activeChatID], lastMsg: msg, lastActive: serverTimestamp()
        }, { merge: true });
    };

    async function toggleFollow(uid, following) {
        const myRef = doc(db, "users", me.uid);
        const userRef = doc(db, "users", uid);
        if(following) {
            await updateDoc(myRef, { following: arrayRemove(uid) });
            await updateDoc(userRef, { followers: arrayRemove(me.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(uid) });
            await updateDoc(userRef, { followers: arrayUnion(me.uid) });
        }
    }

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;
        Swal.fire({title: 'Posting...', didOpen: () => Swal.showLoading()});
        let imgUrl = file ? await uploadToCloudinary(file) : null;
        const mySnap = await getDoc(doc(db, "users", me.uid));
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: imgUrl,
            authorName: me.displayName, authorImg: me.photoURL,
            isVerified: mySnap.data().isVerified || false,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        document.getElementById('post-text').value = ""; 
        document.getElementById('img-preview-box').innerHTML = ""; 
        Swal.close();
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.toggleEdit = () => { const e = document.getElementById('edit-form'); e.style.display = e.style.display==='none'?'block':'none'; };
    window.userLogout = () => signOut(auth);
    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.sharePost = (id) => { navigator.clipboard.writeText(window.location.origin + "?post=" + id); Swal.fire({ title: "Link Copied!", icon: "success", timer: 1000, showConfirmButton: false }); };
    window.shareMyProfile = () => { navigator.clipboard.writeText(window.location.origin + "?u=" + me.uid); Swal.fire({ title: "Profile Link Copied!", icon: "success", timer: 1000, showConfirmButton: false }); };
    
    async function uploadToCloudinary(file) {
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'Meetwoyou');
        const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, { method: 'POST', body: fd });
        const data = await res.json(); return data.secure_url;
    }

    window.updateProfilePic = async (input) => {
        if(!input.files[0]) return;
        Swal.fire({title: 'Updating...', didOpen: () => Swal.showLoading()});
        const url = await uploadToCloudinary(input.files[0]);
        await updateDoc(doc(db, "users", me.uid), { photoURL: url });
        location.reload();
    };

    window.previewImg = (i) => {
        const r = new FileReader(); r.onload = (e) => {
            document.getElementById('img-preview-box').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        }; r.readAsDataURL(i.files[0]);
    };

    window.loadMyPosts = () => {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            document.getElementById('count-posts').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid'); grid.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "grid-item";
                item.onclick = () => viewSinglePost(d.id);
                item.innerHTML = d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:10px; font-size:10px; color:gray;">${d.data().text}</div>`;
                grid.appendChild(item);
            });
        });
    };

    window.viewSinglePost = (id) => {
        const view = document.getElementById('post-detail-view');
        const content = document.getElementById('post-detail-content');
        view.style.display = 'flex';
        onSnapshot(doc(db, "posts", id), (snap) => {
            if(!snap.exists()) { view.style.display='none'; return; }
            content.innerHTML = "";
            renderPost(snap.data(), id, content, true);
        });
    };

    async function showComments(postId) {
        const snap = await getDoc(doc(db, "posts", postId));
        const comments = snap.data().comments || [];
        let html = '<div style="max-height:200px; overflow-y:auto; text-align:left;">';
        comments.forEach(c => html += `<p style="font-size:13px; margin:5px 0;"><b>${c.user}:</b> ${c.text}</p>`);
        html += '</div>';
        const { value: newComment } = await Swal.fire({
            title: 'Comments', html: html, input: 'text', inputPlaceholder: 'Write a comment...',
            showCancelButton: true, confirmButtonText: 'Post', background: '#121212', color: '#fff'
        });
        if(newComment) await updateDoc(doc(db, "posts", postId), { comments: arrayUnion({ user: me.displayName, text: newComment }) });
    }
</script>
</body>
</html>
