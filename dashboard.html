<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Cyber Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8e44ad; --bg: #050505; --card: #18191a; --text: #e4e6eb; --input: #3a3b3c; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        /* Header */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .header h2 { color: var(--primary); margin: 0; font-style: italic; }

        /* Story Section (Facebook Style) */
        .story-container { display: flex; padding: 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .story-card { min-width: 100px; height: 160px; background: #242526; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #333; }
        .story-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .story-add { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: var(--primary); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        /* Profile Content */
        .main-content { padding: 15px; max-width: 500px; margin: auto; }
        .profile-header { text-align: center; background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .img-box { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        #profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .cam-btn { position: absolute; bottom: 5px; right: 5px; background: var(--primary); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 12px; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--input); border: none; color: white; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .save-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Bottom Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #b0b3b8; text-align: center; flex: 1; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader" class="loader">🚀 Connecting to Meetwoyou...</div>

<div class="header">
    <h2>Meetwoyou</h2>
    <i class="fas fa-bell" style="font-size: 20px;"></i>
</div>

<div class="story-container">
    <div class="story-card">
        <img id="story-preview" src="https://via.placeholder.com/100x160" alt="">
        <div class="story-add"><i class="fas fa-plus"></i></div>
    </div>
    <div class="story-card"><img src="https://picsum.photos/100/160?random=1"></div>
    <div class="story-card"><img src="https://picsum.photos/100/160?random=2"></div>
</div>

<div class="main-content">
    <div class="profile-header">
        <div class="img-box">
            <img id="profile-img" src="https://via.placeholder.com/150" alt="Profile">
            <label for="photo-upload" class="cam-btn"><i class="fas fa-camera"></i></label>
            <input type="file" id="photo-upload" style="display:none" accept="image/*">
        </div>
        <input type="text" id="user-name" placeholder="Profile Name">
        <textarea id="user-bio" rows="2" placeholder="Bio / Status (Cyber Security Student)"></textarea>
        <button class="save-btn" id="save-btn"><i class="fas fa-check-circle"></i> Update Identity</button>
        <button id="logout-btn" style="background:transparent; color:#ff4d4d; border:none; margin-top:15px; cursor:pointer;">Logout Session</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item"><i class="fas fa-circle-notch"></i><span>Story</span></div>
    <div class="nav-item"><i class="fas fa-search"></i><span>Search</span></div>
    <div class="nav-item"><i class="fas fa-user-shield"></i><span>Profile</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('user-name').value = user.displayName || "";
            document.getElementById('profile-img').src = user.photoURL || "https://via.placeholder.com/150";
            
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if (docSnap.exists()) {
                document.getElementById('user-bio').value = docSnap.data().bio || "";
            }
            document.getElementById('loader').style.display = 'none';
        } else {
            setTimeout(() => { if(!auth.currentUser) window.location.href="index.html"; }, 1500);
        }
    });

    document.getElementById('save-btn').onclick = async () => {
        const user = auth.currentUser;
        if (!user) return;
        
        const btn = document.getElementById('save-btn');
        btn.innerHTML = "Processing...";
        
        const name = document.getElementById('user-name').value;
        const bio = document.getElementById('user-bio').value;
        const photoFile = document.getElementById('photo-upload').files[0];

        try {
            let photoUrl = user.photoURL;
            if (photoFile) {
                const formData = new FormData();
                formData.append('file', photoFile);
                formData.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                photoUrl = data.secure_url;
            }

            await setDoc(doc(db, "users", user.uid), { displayName: name, bio: bio, photoURL: photoUrl }, { merge: true });
            await updateProfile(user, { displayName: name, photoURL: photoUrl });
            alert("Identity Secured Successfully!");
            location.reload();
        } catch (e) { alert(e.message); btn.innerHTML = "Update Identity"; }
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
