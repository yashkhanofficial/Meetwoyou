<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 14px; margin-left: 5px; }
        
        .section { display: none; max-width: 500px; margin: auto; }
        .section.active { display: block; }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 10px; margin-bottom: 5px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; }
        .post-user img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .post-img { width: 100%; max-height: 500px; object-fit: cover; }
        
        .action-bar { padding: 10px 15px; display: flex; gap: 20px; font-size: 22px; }
        .liked { color: #ed4956; animation: scale 0.3s ease; }
        @keyframes scale { 0% {transform: scale(1);} 50% {transform: scale(1.3);} 100% {transform: scale(1);} }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding-top: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav i { font-size: 24px; color: #fff; cursor: pointer; opacity: 0.7; }
        .nav i.active { opacity: 1; color: var(--primary); }

        .btn-post { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }
        
        #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="font-family: 'Grand Hotel', cursive; font-size: 24px;">Meetwoyou</h2>
    <i class="far fa-heart" style="font-size: 22px;"></i>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-bottom: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <div id="img-preview"></div>
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <i class="far fa-image" style="font-size: 24px; cursor: pointer;" onclick="document.getElementById('post-file').click()"></i>
            <input type="file" id="post-file" accept="image/*" style="display:none" onchange="handlePreview(this)">
            <button class="btn-post" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="profile-sec" class="section">
    <div id="my-info-header" style="text-align: center; padding: 20px;">
        </div>
    <div class="profile-grid" id="my-posts-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:20px;">
        <i class="fas fa-arrow-left" onclick="closeProfile()"></i>
        <b id="v-header-name">Profile</b>
    </div>
    <div id="v-info" style="text-align:center; padding:20px;"></div>
    <div class="profile-grid" id="v-posts"></div>
</div>

<div class="nav">
    <i class="fas fa-home active" onclick="showSec('home', this)"></i>
    <i class="fas fa-search" onclick="showSec('discover', this)"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile', this)"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImg = null;
    const vIcon = `<i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { me = user; init(); } else { window.location.href = "login.html"; }
    });

    async function init() {
        const uRef = doc(db, "users", me.uid);
        const uSnap = await getDoc(uRef);
        if(!uSnap.exists()) {
            await setDoc(uRef, { uid: me.uid, displayName: me.displayName || "New User", photoURL: me.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png", verified: false, bio: "Digital Creator" });
        }
        loadFeed();
        loadAllUsers();
    }

    // --- Upload Post ---
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        if(!text && !selectedImg) return;
        
        Swal.fire({ title: 'Posting...', didOpen: () => Swal.showLoading() });
        const userSnap = await getDoc(doc(db, "users", me.uid));
        const userData = userSnap.data();

        await addDoc(collection(db, "posts"), {
            uid: me.uid,
            text: text,
            img: selectedImg,
            authorName: userData.displayName,
            authorImg: userData.photoURL,
            verified: userData.verified || false,
            timestamp: serverTimestamp(),
            likes: []
        });

        document.getElementById('post-text').value = "";
        document.getElementById('img-preview').innerHTML = "";
        selectedImg = null;
        Swal.close();
    };

    // --- Load Feed ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const isLiked = p.likes?.includes(me.uid);
                area.innerHTML += `
                    <div class="post-card">
                        <div class="post-user" onclick="viewProfile('${p.uid}')">
                            <img src="${p.authorImg}">
                            <b>${p.authorName}${p.verified ? vIcon : ''}</b>
                        </div>
                        ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${d.id}')">` : ''}
                        <div style="padding:10px 15px;">
                            <div class="action-bar" style="padding:0 0 10px 0;">
                                <i class="${isLiked ? 'fas fa-heart liked' : 'far fa-heart'}" onclick="toggleLike('${d.id}')"></i>
                                <i class="far fa-comment"></i>
                            </div>
                            <div style="font-size:14px; font-weight:bold; margin-bottom:5px;">${p.likes?.length || 0} likes</div>
                            <div style="font-size:15px;">${p.text}</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- Like System ---
    window.toggleLike = async (id) => {
        const ref = doc(db, "posts", id);
        const d = await getDoc(ref);
        if(d.data().likes?.includes(me.uid)) {
            await updateDoc(ref, { likes: arrayRemove(me.uid) });
        } else {
            await updateDoc(ref, { likes: arrayUnion(me.uid) });
        }
    };

    // --- Profile View ---
    window.viewProfile = async (uid) => {
        const u = (await getDoc(doc(db, "users", uid))).data();
        document.getElementById('v-header-name').innerText = u.displayName;
        document.getElementById('v-info').innerHTML = `
            <img src="${u.photoURL}" style="width:90px; height:90px; border-radius:50%; border:2px solid #222; object-fit:cover;">
            <h3 style="margin:10px 0 5px;">${u.displayName}${u.verified?vIcon:''}</h3>
            <p style="color:gray; font-size:14px;">${u.bio || ''}</p>
        `;
        document.getElementById('user-profile-view').style.display = 'block';
        
        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid)), (snap) => {
            const grid = document.getElementById('v-posts');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="grid-item">${p.img ? `<img src="${p.img}">` : `<div style="padding:10px; font-size:10px;">${p.text}</div>`}</div>`;
            });
        });
    };

    window.closeProfile = () => document.getElementById('user-profile-view').style.display = 'none';

    // --- My Profile ---
    async function loadMyProfile() {
        const u = (await getDoc(doc(db, "users", me.uid))).data();
        document.getElementById('my-info-header').innerHTML = `
            <img src="${u.photoURL}" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #222;">
            <h3 style="margin:10px 0 5px;">${u.displayName}${u.verified?vIcon:''}</h3>
            <p style="color:gray; font-size:14px; margin-bottom:15px;">${u.bio || ''}</p>
            <button onclick="editProfile()" style="background:#262626; color:white; border:none; padding:8px 20px; border-radius:5px; font-weight:bold;">Edit Profile</button>
        `;
        
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="grid-item">${p.img ? `<img src="${p.img}">` : `<div style="padding:10px; font-size:10px;">${p.text}</div>`}</div>`;
            });
        });
    }

    window.editProfile = async () => {
        const { value: bio } = await Swal.fire({
            title: 'Edit Bio',
            input: 'text',
            inputPlaceholder: 'Tell something about yourself...',
            showCancelButton: true
        });
        if(bio) {
            await updateDoc(doc(db, "users", me.uid), { bio: bio });
            loadMyProfile();
        }
    };

    // --- Helpers ---
    window.handlePreview = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImg = e.target.result;
            document.getElementById('img-preview').innerHTML = `<img src="${selectedImg}" style="width:100%; border-radius:10px; margin:10px 0;">`;
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        el.classList.add('active');
        if(id === 'profile') loadMyProfile();
    };

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    list.innerHTML += `
                        <div class="post-user" onclick="viewProfile('${d.id}')">
                            <img src="${u.photoURL}">
                            <b>${u.displayName}${u.verified ? vIcon : ''}</b>
                        </div>
                    `;
                }
            });
        });
    };

</script>
</body>
</html>
