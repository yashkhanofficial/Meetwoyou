<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meetwoyou Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
 --primary:#0095f6;
 --bg:#000;
 --card:#121212;
 --text:#fff;
 --gray:#888;
}
body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0}

.section{display:none;padding:10px}
.section.active{display:block}

textarea,input{
 width:100%;
 padding:10px;
 margin:5px 0;
 background:#111;
 color:#fff;
 border:1px solid #333;
 border-radius:6px;
}

.post{
 border-bottom:1px solid #333;
 padding:10px;
}

.btn{
 background:var(--primary);
 border:none;
 color:#fff;
 padding:8px;
 border-radius:5px;
 cursor:pointer;
}

.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
 background:#000;
 padding:10px;
 border-top:1px solid #333;
}

.chat{
 position:fixed;
 inset:0;
 background:#000;
 display:none;
 flex-direction:column;
}

.msg{
 padding:6px;
 margin:4px;
 border-radius:6px;
 max-width:70%;
}

.me{background:#0095f6;margin-left:auto}
.other{background:#222}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="section active">
<textarea id="postText" placeholder="What's on your mind?"></textarea>
<button class="btn" onclick="addPost()">Post</button>
<div id="feed"></div>
</div>

<!-- CHAT LIST -->
<div id="chatList" class="section">
<h3>Chats</h3>
<div id="chatUsers"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<h2 id="name"></h2>
<input id="newName" placeholder="Update name">
<button class="btn" onclick="updateProfile()">Save</button>
<br><br>
<button class="btn" onclick="logout()">Logout</button>
</div>

<!-- CHAT BOX -->
<div class="chat" id="chatBox">
<div style="padding:10px;border-bottom:1px solid #333">
<button onclick="closeChat()">⬅</button>
<b id="chatName"></b>
</div>

<div id="messages" style="flex:1;overflow:auto;padding:10px"></div>

<div style="padding:10px">
<input id="msgInput">
<button class="btn" onclick="sendMsg()">Send</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('chatList')">Chat</button>
<button onclick="show('profile')">Profile</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {getFirestore,collection,addDoc,onSnapshot,query,orderBy,doc,setDoc,getDoc,updateDoc,arrayUnion,arrayRemove,where} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"YOUR_KEY",
 authDomain:"",
 projectId:""
});

const auth=getAuth(app);
const db=getFirestore(app);

let me=null,activeChat=null,chatUserName="";

onAuthStateChanged(auth,async user=>{
 if(user){me=user;init()}else location.href="index.html";
});

function show(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

async function init(){
 const ref=doc(db,'users',me.uid);
 const snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   displayName:me.displayName||"User",
   createdAt:Date.now()
  });
 }

 loadProfile();
 loadFeed();
 loadUsers();
 loadChatList();
}

/* PROFILE */
async function loadProfile(){
 const s=await getDoc(doc(db,'users',me.uid));
 document.getElementById('name').innerText=s.data().displayName;
}

window.updateProfile=async()=>{
 const name=document.getElementById('newName').value;
 if(!name)return;
 await updateDoc(doc(db,'users',me.uid),{displayName:name});
 loadProfile();
 Swal.fire("Updated!");
}

/* POSTS */
window.addPost=async()=>{
 const txt=document.getElementById('postText').value;
 if(!txt)return;

 await addDoc(collection(db,'posts'),{
  uid:me.uid,
  text:txt,
  likes:[],
  timestamp:Date.now()
 });

 document.getElementById('postText').value='';
}

function loadFeed(){
 onSnapshot(query(collection(db,'posts'),orderBy('timestamp','desc')),(snap)=>{
  const feed=document.getElementById('feed');
  feed.innerHTML='';

  snap.forEach(d=>{
   const p=d.data();
   const liked=p.likes.includes(me.uid);

   feed.innerHTML+=`
   <div class="post">
    ${p.text}<br>
    <button onclick="like('${d.id}',${liked})">
    ${liked?'❤️':'🤍'} ${p.likes.length}
    </button>
   </div>`;
  });
 });
}

window.like=async(id,liked)=>{
 await updateDoc(doc(db,'posts',id),{
  likes:liked?arrayRemove(me.uid):arrayUnion(me.uid)
 });
}

/* CHAT */
function getChatId(a,b){return a<b?a+"_"+b:b+"_"+a}

function loadUsers(){
 onSnapshot(collection(db,'users'),snap=>{
  const box=document.getElementById('chatUsers');
  box.innerHTML='';

  snap.forEach(d=>{
   if(d.id!==me.uid){
    box.innerHTML+=`
    <div onclick="openChat('${d.id}','${d.data().displayName}')">
    ${d.data().displayName}
    </div>`;
   }
  });
 });
}

window.openChat=(uid,name)=>{
 activeChat=getChatId(me.uid,uid);
 chatUserName=name;

 document.getElementById('chatBox').style.display='flex';
 document.getElementById('chatName').innerText=name;

 onSnapshot(query(collection(db,'chats',activeChat,'messages'),orderBy('timestamp')),(snap)=>{
  const box=document.getElementById('messages');
  box.innerHTML='';

  snap.forEach(d=>{
   const m=d.data();
   box.innerHTML+=`
   <div class="msg ${m.sender===me.uid?'me':'other'}">
   ${m.text}
   </div>`;
  });

  box.scrollTop=box.scrollHeight;
 });
}

window.sendMsg=async()=>{
 const i=document.getElementById('msgInput');
 if(!i.value)return;

 await addDoc(collection(db,'chats',activeChat,'messages'),{
  text:i.value,
  sender:me.uid,
  timestamp:Date.now()
 });

 await setDoc(doc(db,'chats',activeChat),{
  users:[me.uid],
  last:i.value,
  time:Date.now()
 },{merge:true});

 i.value='';
}

window.closeChat=()=>document.getElementById('chatBox').style.display='none';

/* CHAT LIST */
function loadChatList(){
 onSnapshot(collection(db,'chats'),snap=>{
  const box=document.getElementById('chatUsers');

  snap.forEach(d=>{
   const c=d.data();
   if(c.last){
    box.innerHTML+=`
    <div>
     💬 ${c.last}
    </div>`;
   }
  });
 });
}

/* LOGOUT */
window.logout=()=>{
 signOut(auth).then(()=>location.href="index.html");
}

</script>
</body>
</html>
