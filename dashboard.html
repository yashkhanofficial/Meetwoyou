<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; 
            --text: #ffffff; --gray: #b0b3b8; --accent: #1da1f2; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; }
        
        /* Profile Header Design */
        .cover-photo { width: 100%; height: 180px; background: linear-gradient(45deg, #2c3e50, #000); background-size: cover; background-position: center; border-radius: 0 0 20px 20px; position: relative; }
        .p-main-info { margin-top: -60px; text-align: center; padding: 0 15px; }
        .p-avatar-big { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--bg); object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .stats-bar { display: flex; justify-content: center; gap: 25px; margin: 15px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 10px 0; }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 18px; }
        .stat-item span { font-size: 12px; color: var(--gray); }

        /* Post Menu & Interactions */
        .post-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; }
        .post-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .post-menu { cursor: pointer; padding: 5px; color: var(--gray); }
        
        /* Notifications */
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #222; }
        .unread { background: rgba(142, 68, 173, 0.1); border-left: 3px solid var(--primary); }

        /* Story Design */
        .story-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .story-card { min-width: 90px; height: 140px; border-radius: 12px; background: #222; position: relative; overflow: hidden; border: 2px solid var(--primary); }
        .story-card img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { position: absolute; bottom: 5px; left: 5px; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* Grid for Info */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; padding: 15px; background: #151515; border-radius: 12px; margin: 10px 0; }
        .info-box { font-size: 13px; color: var(--gray); display: flex; align-items: center; gap: 8px; }
        .info-box i { color: var(--primary); }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { position: relative; color: var(--gray); font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .badge { position: absolute; top: -8px; right: -10px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        .section { display: none; max-width: 600px; margin: auto; padding: 15px; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div style="background: var(--card); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;">
    <h2 style="color:var(--primary); margin:0; font-style: italic;">Meetwoyou</h2>
    <div style="display:flex; gap:15px; align-items:center;">
        <i class="fas fa-search" onclick="showSec('friends')" style="cursor:pointer;"></i>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--gray); cursor:pointer;"></i>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-container" id="story-area">
        </div>
    <div class="post-card">
        <div style="display:flex; gap:10px;">
            <img src="" id="user-mini-avatar" class="avatar" style="width:40px; height:40px;">
            <textarea id="post-text" placeholder="What's on your mind?" style="background:none; border:none; resize:none;"></textarea>
        </div>
        <hr style="border:0.1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label for="post-file" style="cursor:pointer; color:var(--gray);"><i class="fas fa-images text-primary"></i> Photo</label>
            <input type="file" id="post-file" hidden>
            <button class="btn-main" onclick="uploadPost()" style="width:100px;">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="notif-sec" class="section">
    <h3 style="border-left: 4px solid var(--primary); padding-left:10px;">Notifications</h3>
    <div id="notif-list"></div>
</div>

<div id="profile-sec" class="section" style="padding:0;">
    <div class="cover-photo" id="p-cover"></div>
    <div class="p-main-info">
        <img id="p-img" src="" class="p-avatar-big">
        <h2 style="margin:10px 0 0 0;" id="p-name-disp">Loading... <i class="fas fa-check-circle v-badge"></i></h2>
        <p id="p-username" style="color:var(--primary); margin:0; font-size:14px;">@username</p>
        <p id="p-bio-disp" style="color:var(--gray); margin:10px 0;">Bio goes here...</p>
        
        <div class="stats-bar">
            <div class="stat-item"><b>1.2k</b><span>Followers</span></div>
            <div class="stat-item"><b>850</b><span>Following</span></div>
            <div class="stat-item"><b>150</b><span>Posts</span></div>
        </div>

        <div class="info-grid">
            <div class="info-box"><i class="fas fa-graduation-cap"></i> <span id="p-edu">Education</span></div>
            <div class="info-box"><i class="fas fa-map-marker-alt"></i> <span id="p-loc">Location</span></div>
            <div class="info-box"><i class="fas fa-birthday-cake"></i> <span id="p-dob">Date of Birth</span></div>
            <div class="info-box"><i class="fas fa-globe"></i> <span id="p-web">Website</span></div>
        </div>

        <div style="display:flex; gap:10px; padding:0 15px;">
            <button class="btn-main" onclick="openEditProfile()" style="background:#333;">Edit Profile</button>
            <button class="btn-main" onclick="copyProfileLink()"><i class="fas fa-share"></i> Profile Link</button>
        </div>
    </div>
    <div id="my-posts-area" style="padding:15px;"></div>
</div>

<div class="nav-bar">
    <i class="fas fa-home nav-item active" onclick="showSec('home', this)"></i>
    <i class="fas fa-user-friends nav-item" onclick="showSec('friends', this)"></i>
    <i class="fas fa-bell nav-item" onclick="showSec('notif', this)"><span class="badge">3</span></i>
    <i class="fas fa-comment-dots nav-item" onclick="showSec('msg', this)"></i>
    <i class="fas fa-user-circle nav-item" onclick="showSec('profile', this)"></i>
</div>

<script type="module">
    // (Firebase Imports as before...)

    // 1. UNIQUE PROFILE LINKS
    // We simulate this by checking URL params: ?u=USER_ID
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const viewUID = urlParams.get('u');
        if(viewUID) {
            viewUserProfile(viewUID);
        }
    };

    // 2. 3-DOT MENU FOR POSTS
    function createPostCard(p, pid) {
        const isOwner = p.uid === auth.currentUser.uid;
        return `
            <div class="post-card" id="post-${pid}">
                <div class="post-top">
                    <div style="display:flex; gap:10px; align-items:center;" onclick="viewUserProfile('${p.uid}')">
                        <img src="${p.photo}" class="avatar" style="width:45px; height:45px;">
                        <div>
                            <b>${p.name} <i class="fas fa-check-circle v-badge"></i></b><br>
                            <small style="color:var(--gray)">${timeAgo(p.timestamp)}</small>
                        </div>
                    </div>
                    ${isOwner ? `<i class="fas fa-ellipsis-v post-menu" onclick="showPostOptions('${pid}', '${p.text}')"></i>` : ''}
                </div>
                <p style="margin:15px 0;">${p.text}</p>
                ${p.img ? `<img src="${p.img}" style="width:100%; border-radius:10px; max-height:350px; object-fit:cover;">` : ''}
                <div class="post-actions" style="display:flex; justify-content:space-between; margin-top:15px; color:var(--gray);">
                    <div onclick="likePost('${pid}')"><i class="fas fa-heart"></i> ${p.likes || 0}</div>
                    <div onclick="openComments('${pid}')"><i class="fas fa-comment"></i> Comment</div>
                    <div onclick="sharePost('${pid}')"><i class="fas fa-share-alt"></i> Share</div>
                </div>
            </div>
        `;
    }

    // 3. POST OPTIONS (EDIT/DELETE)
    window.showPostOptions = (pid, text) => {
        Swal.fire({
            title: 'Post Options',
            showDenyButton: true,
            showCancelButton: true,
            confirmButtonText: 'Edit Post',
            denyButtonText: 'Delete Post',
        }).then((result) => {
            if (result.isConfirmed) {
                editPost(pid, text);
            } else if (result.isDenied) {
                deletePost(pid);
            }
        });
    };

    // 4. STORY SYSTEM (24H AUTO DELETE)

    // 5. PROFILE LINK COPY
    window.copyProfileLink = () => {
        const link = window.location.origin + "?u=" + auth.currentUser.uid;
        navigator.clipboard.writeText(link);
        Swal.fire('Copied!', 'Your profile link is ready to share.', 'success');
    };

    // 6. FOLLOW/FRIEND LOGIC
    window.toggleFollow = async (targetUID) => {
        // Update target's followers list

        // Send Notification

    // 7. TIME AGO HELPER
    function timeAgo(ts) {
        if(!ts) return "Just now";
        const seconds = Math.floor((new Date() - ts.toDate()) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return Math.floor(seconds/86400) + "d ago";
    }

</script>

</body>
</html>
