<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Stories CSS */
        .stories-container { display: flex; gap: 12px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-circle { min-width: 65px; height: 65px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); cursor: pointer; position: relative; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .add-story { border: 2px dashed #444; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 20px; }

        /* Modern Post Input */
        .post-input-box { background: var(--card); margin: 10px; border-radius: 12px; border: 1px solid #262626; padding: 12px; }
        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .input-row img { width: 35px; height: 35px; border-radius: 50%; }
        .input-row textarea { background: transparent; border: none; resize: none; color: white; flex: 1; font-size: 15px; outline: none; padding-top: 8px; }
        .post-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #262626; padding-top: 10px; }
        .action-btn { color: var(--gray); font-size: 14px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { color: var(--primary); }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; cursor: pointer; display: flex; justify-content: center; background: #000; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        
        .like-animation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .like-animation.active { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }

        #chat-screen, #user-profile-view, #post-detail-view, #story-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        #story-view { justify-content: center; background: #111; overflow: hidden; }
        .story-progress { position: absolute; top: 10px; left: 10px; right: 10px; height: 2px; background: #444; display: flex; gap: 4px; }
        .progress-bar { height: 100%; background: #fff; width: 0%; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div class="stories-container" id="stories-area">
        <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
            <i class="fas fa-plus"></i>
            <input type="file" id="story-file" accept="image/*" style="display:none" onchange="uploadStory(this)">
        </div>
    </div>

    <div class="post-input-box">
        <div class="input-row">
            <img id="my-avatar" src="https://via.placeholder.com/35">
            <textarea id="post-text" placeholder="What's happening?"></textarea>
        </div>
        <div id="img-preview-box"></div>
        <div class="post-actions">
            <div class="action-btn" onclick="document.getElementById('post-file').click()">
                <i class="far fa-image"></i> Photo
                <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
            </div>
            <button class="btn-main" onclick="uploadPost()" style="width:auto; padding:6px 20px; margin:0;">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:5px;"></p>
        <div id="p-details-box" class="profile-details"></div>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="story-view">
    <div class="story-progress" id="story-prog-cont"></div>
    <div style="position:absolute; top:25px; left:15px; display:flex; align-items:center; gap:10px; z-index:10;">
        <img id="st-user-img" src="" style="width:35px; height:35px; border-radius:50%; border:1px solid #fff;">
        <b id="st-user-name" style="text-shadow: 1px 1px 5px #000;"></b>
    </div>
    <i class="fas fa-times" onclick="closeStory()" style="position:absolute; top:25px; right:20px; font-size:24px; z-index:10; cursor:pointer;"></i>
    <img id="st-img" src="" style="width:100%; max-height:85vh; object-fit:contain;">
    <div style="position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:30px; align-items:center;">
        <div onclick="reactStory('❤️')" style="font-size:30px; cursor:pointer;">❤️</div>
        <div id="st-views" style="font-size:14px; color:#fff;"><i class="far fa-eye"></i> 0</div>
    </div>
</div>

<div id="chat-screen">...</div>
<div id="user-profile-view">...</div>
<div id="post-detail-view">...</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, limit, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let storyTimer = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            document.getElementById('my-avatar').src = user.photoURL || "https://via.placeholder.com/35";
            init(); 
            setTimeout(() => document.getElementById('app-loader').style.display = 'none', 1200);
        } else { window.location.href = "index.html"; }
    });

    function init() { 
        loadMyProfile(); 
        loadFeed(); 
        loadStories();
        loadAllUsers(); 
        loadMyPosts(); 
    }

    // --- STORY LOGIC ---
    window.uploadStory = async (input) => {
        if(!input.files[0]) return;
        Swal.fire({title: 'Uploading Story...', didOpen: () => Swal.showLoading(), background: '#121212', color: '#fff'});
        const url = await uploadToCloudinary(input.files[0]);
        await addDoc(collection(db, "stories"), {
            uid: me.uid,
            img: url,
            authorName: me.displayName,
            authorImg: me.photoURL,
            timestamp: serverTimestamp(),
            expiresAt: Date.now() + (24 * 60 * 60 * 1000), // 24 hours
            views: [],
            reactions: []
        });
        Swal.close();
    };

    async function loadStories() {
        const now = Date.now();
        const q = query(collection(db, "stories"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snap) => {
            const area = document.getElementById('stories-area');
            // Keep the "Add Story" button
            area.innerHTML = `
                <div class="story-circle add-story" onclick="document.getElementById('story-file').click()">
                    <i class="fas fa-plus"></i>
                    <input type="file" id="story-file" accept="image/*" style="display:none" onchange="uploadStory(this)">
                </div>`;

            snap.forEach(docSnap => {
                const s = docSnap.data();
                if(s.expiresAt < now) {
                    deleteDoc(doc(db, "stories", docSnap.id)); // Auto delete
                    return;
                }
                
                const div = document.createElement('div');
                div.className = "story-circle";
                div.onclick = () => openStory(docSnap.id, s);
                div.innerHTML = `<img src="${s.authorImg}">`;
                area.appendChild(div);
            });
        });
    }

    window.openStory = async (id, data) => {
        const view = document.getElementById('story-view');
        view.style.display = 'flex';
        document.getElementById('st-user-name').innerText = data.authorName;
        document.getElementById('st-user-img').src = data.authorImg;
        document.getElementById('st-img').src = data.img;
        document.getElementById('st-views').innerHTML = `<i class="far fa-eye"></i> ${data.views.length}`;
        
        // Mark as viewed
        if(!data.views.includes(me.uid)) {
            await updateDoc(doc(db, "stories", id), { views: arrayUnion(me.uid) });
        }

        // Progress Bar
        const prog = document.getElementById('story-prog-cont');
        prog.innerHTML = '<div class="progress-bar" id="p-bar"></div>';
        setTimeout(() => { document.getElementById('p-bar').style.width = '100%'; document.getElementById('p-bar').style.transition = '5s linear'; }, 50);

        storyTimer = setTimeout(() => closeStory(), 5000);
    };

    window.closeStory = () => {
        clearTimeout(storyTimer);
        document.getElementById('story-view').style.display = 'none';
    };

    window.reactStory = async (emoji) => {
        // Simple reaction logic
        Swal.fire({ title: emoji, timer: 800, showConfirmButton: false, background: 'transparent' });
    };

    // --- MODERN POST LOGIC ---
    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;
        
        Swal.fire({title: 'Posting...', didOpen: () => Swal.showLoading(), background: '#121212', color: '#fff'});
        let imgUrl = file ? await uploadToCloudinary(file) : null;
        
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: imgUrl, 
            authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        
        document.getElementById('post-text').value = ""; 
        document.getElementById('post-file').value = "";
        document.getElementById('img-preview-box').innerHTML = ""; 
        Swal.close();
    };

    async function uploadToCloudinary(file) {
        const fd = new FormData(); 
        fd.append('file', file); 
        fd.append('upload_preset', 'Meetwoyou');
        const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, { method: 'POST', body: fd });
        const data = await res.json(); 
        return data.secure_url;
    }

    // --- OTHER CORE FUNCTIONS (UNCHANGED) ---
    async function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(async (doc) => {
                const p = doc.data();
                const postDiv = await createPostElement(p, doc.id);
                area.appendChild(postDiv);
            });
        });
    }

    async function createPostElement(p, id) {
        const isLiked = p.likes?.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="viewUser('${p.uid}')">
                <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b>${p.authorName}</b>
            </div>
            <div class="post-img-container">
                ${p.img ? `<img src="${p.img}" class="post-img">` : `<div style="padding:20px; font-size:16px;">${p.text}</div>`}
            </div>
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}; cursor:pointer;" onclick="toggleLike('${id}', ${isLiked})"></i>
                <i class="far fa-comment"></i>
            </div>
            <div style="padding:0 15px; font-size:14px;"><b>${p.likes.length} likes</b></div>
        `;
        return div;
    }

    window.toggleLike = async (id, liked) => {
        await updateDoc(doc(db, "posts", id), { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.previewImg = (i) => {
        const r = new FileReader(); r.onload = (e) => {
            document.getElementById('img-preview-box').innerHTML = `<img src="${e.target.result}" style="width:100px; border-radius:8px; margin-top:10px;">`;
        }; r.readAsDataURL(i.files[0]);
    };

    // Placeholder for other missing functions from original
    window.userLogout = () => signOut(auth);
    window.loadMyProfile = () => { /* Logic to load profile */ };
    window.loadAllUsers = () => { /* Logic to load users */ };
    window.loadMyPosts = () => { /* Logic for my posts */ };

</script>
</body>
</html>
