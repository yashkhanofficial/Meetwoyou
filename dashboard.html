<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        /* Dynamic Loader Effect */
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; cursor: pointer; }
        
        #chat-screen, #user-profile-view, #post-detail-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; position: relative; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; outline: none; }
        .post-time { font-size: 10px; color: var(--gray); padding: 0 15px; }

        /* Professional Chat Item */
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #121212; cursor: pointer; }
        .chat-item:active { background: #1a1a1a; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;"><i class="far fa-bell" style="font-size:22px;"></i></div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"><i class="fas fa-camera"></i> Media</button>
            <button class="btn-main" onclick="uploadPost()" style="width: auto; padding: 8px 25px; margin: 0;">Post</button>
        </div>
        <div id="img-preview-box"></div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:5px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>

        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()" style="cursor:pointer;"></i>
        <span>Profile</span>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="post-detail-view">
    <div style="padding:15px; border-bottom:1px solid #262626;">
        <i class="fas fa-arrow-left" onclick="document.getElementById('post-detail-view').style.display='none'" style="cursor:pointer;"></i>
    </div>
    <div id="post-detail-content"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px; position: sticky; top:0; background: #000; z-index:10;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212; position: sticky; bottom:0;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border-radius: 20px; background: #262626;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold; cursor:pointer; padding: 0 10px;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    // Helper: Dynamic V-Badge check
    function getV(isVerified) {
        return isVerified ? vB : '';
    }

    // Helper: Image Compression (High Quality, Low Size)
    async function compressMedia(file) {
        if (file.type.startsWith('video')) return file; // Skip video compression for now
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max_size = 1080;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7); // 0.7 quality balance
                };
            };
        });
    }

    function smartCount(data) {
        if (!data) return "0";
        if (typeof data === 'string' && data.startsWith("boost:")) return data.replace("boost:", ""); 
        if (Array.isArray(data)) {
            const count = data.length;
            if (count >= 1000000) return (count / 1000000).toFixed(1) + "M";
            if (count >= 1000) return (count / 1000).toFixed(1) + "K";
            return count.toString();
        }
        return data;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    displayName: user.displayName || "New User",
                    photoURL: user.photoURL || "https://via.placeholder.com/90",
                    bio: "Welcome to Meetwoyou!",
                    followers: [], following: [], uid: user.uid,
                    isVerified: false, timestamp: serverTimestamp()
                });
                location.reload(); return; 
            }
            init(); 
            setTimeout(() => document.getElementById('app-loader').style.display='none', 1000);
        } else { window.location.href = "index.html"; }
    });

    function init() { loadMyProfile(); loadFeed(); loadAllUsers(); loadMyPosts(); loadChatList(); }

    function timeAgo(timestamp) {
        if(!timestamp) return "...";
        const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return timestamp.toDate().toLocaleDateString();
    }

    async function renderPost(p, id, target, isDetail = false) {
        const uSnap = await getDoc(doc(db, "users", p.uid));
        const userData = uSnap.exists() ? uSnap.data() : {};
        const isLiked = Array.isArray(p.likes) && p.likes.includes(me.uid);
        
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="${isDetail ? '' : `viewUser('${p.uid}')`}">
                <img src="${p.authorImg || 'https://via.placeholder.com/35'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b>${p.authorName}${getV(userData.isVerified)}</b>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-v post-menu-trigger" style="margin-left:auto; padding:10px;"></i>` : ''}
            </div>
            ${p.img ? (p.img.includes('video') ? `<video src="${p.img}" class="post-img" controls></video>` : `<img src="${p.img}" class="post-img main-img">`) : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'} like-btn" style="color:${isLiked?'red':''}"></i>
                <i class="far fa-comment comment-btn"></i>
                <i class="far fa-paper-plane share-btn"></i>
            </div>
            <div class="post-time">${timeAgo(p.timestamp)}</div>
            <div style="padding:5px 15px; font-size:14px;">
                <b class="likes-count">${smartCount(p.likes)} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
            </div>
        `;
        const imgEl = div.querySelector('.main-img');
        if(imgEl) imgEl.ondblclick = () => toggleLike(id, isLiked);
        div.querySelector('.like-btn').onclick = () => toggleLike(id, isLiked);
        div.querySelector('.comment-btn').onclick = () => showComments(id);
        div.querySelector('.share-btn').onclick = () => sharePost(id);
        target.appendChild(div);
    }

    async function toggleLike(id, liked) { 
        const postRef = doc(db, "posts", id);
        await updateDoc(postRef, { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) }); 
    }

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(d => renderPost(d.data(), d.id, area));
        });
    }

    function loadMyPosts() {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            document.getElementById('count-posts').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid'); grid.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "grid-item";
                item.onclick = () => viewSinglePost(d.id);
                item.innerHTML = d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:10px; font-size:10px;">${d.data().text}</div>`;
                grid.appendChild(item);
            });
        });
    }

    window.viewUser = async (uid) => {
        if(uid === me.uid) return showSec('profile');
        const uSnap = await getDoc(doc(db, "users", uid));
        const u = uSnap.data();
        const meSnap = await getDoc(doc(db, "users", me.uid));
        const isFollowing = Array.isArray(meSnap.data().following) && meSnap.data().following.includes(uid);

        const view = document.getElementById('user-profile-view');
        view.style.display = 'flex';
        document.getElementById('user-profile-content').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <img src="${u.photoURL}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                <h3>${u.displayName}${getV(u.isVerified)}</h3>
                <p style="color:gray;">${u.bio || ''}</p>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px;">
                    <b>${smartCount(u.followers)} <br><small>Followers</small></b>
                    <b>${smartCount(u.following)} <br><small>Following</small></b>
                </div>
                <div style="display:flex; gap:10px; padding:0 15px;">
                    <button class="btn-main flw-btn" style="background:${isFollowing?'#262626':'#0095f6'}">${isFollowing?'Unfollow':'Follow'}</button>
                    <button class="btn-main msg-btn" style="background:#262626;">Message</button>
                </div>
            </div>`;
        
        view.querySelector('.flw-btn').onclick = () => toggleFollow(uid, isFollowing);
        view.querySelector('.msg-btn').onclick = () => openChat(uid, u.displayName, u.photoURL);
        
        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid)), (snap) => {
            const grid = document.getElementById('user-posts-grid'); grid.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div'); item.className = "grid-item";
                item.onclick = () => viewSinglePost(d.id);
                item.innerHTML = d.data().img ? `<img src="${d.data().img}">` : `<div style="padding:10px;">${d.data().text}</div>`;
                grid.appendChild(item);
            });
        });
    };

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + getV(d.isVerified);
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('count-followers').innerText = smartCount(d.followers);
            document.getElementById('count-following').innerText = smartCount(d.following);
        });
    }

    async function toggleFollow(uid, following) {
        const myRef = doc(db, "users", me.uid);
        const userRef = doc(db, "users", uid);
        if(following) {
            await updateDoc(myRef, { following: arrayRemove(uid) });
            await updateDoc(userRef, { followers: arrayRemove(me.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(uid) });
            await updateDoc(userRef, { followers: arrayUnion(me.uid) });
        }
        viewUser(uid);
    }

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(async d => {
                if(d.id === me.uid) return;
                const u = d.data();
                const meData = (await getDoc(doc(db, "users", me.uid))).data();
                const isFollowing = meData.following.includes(d.id);
                const html = `
                <div class="chat-item">
                    <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;" onclick="viewUser('${d.id}')">
                    <div style="flex:1" onclick="viewUser('${d.id}')">
                        <b>${u.displayName}${getV(u.isVerified)}</b><br>
                        <small style="color:gray;">${smartCount(u.followers)} Followers</small>
                    </div>
                    <button onclick="toggleFollow('${d.id}', ${isFollowing})" style="background:${isFollowing?'#262626':'#0095f6'}; color:white; border:none; padding:5px 12px; border-radius:5px; font-weight:bold;">${isFollowing?'Unfollow':'Follow'}</button>
                </div>`;
                list.innerHTML += html;
            });
        });
    };

    function loadChatList() {
        // Advanced: Sorting by last message timestamp
        onSnapshot(query(collection(db, "chats"), where("users", "arrayContains", me.uid), orderBy("lastTime", "desc")), (snap) => {
            const chatList = document.getElementById('chat-list'); chatList.innerHTML = "";
            snap.forEach(async d => {
                const chat = d.data();
                const otherUid = chat.users.find(id => id !== me.uid);
                const uSnap = await getDoc(doc(db, "users", otherUid));
                const u = uSnap.data();
                const div = document.createElement('div');
                div.className = "chat-item";
                div.onclick = () => openChat(otherUid, u.displayName, u.photoURL);
                div.innerHTML = `
                    <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1">
                        <b>${u.displayName}${getV(u.isVerified)}</b><br>
                        <small style="color:${chat.unread?'#fff':'gray'}; font-weight:${chat.unread?'bold':'normal'}">${chat.lastMsg || 'Sent a message'}</small>
                    </div>
                    <small style="color:gray;">${chat.lastTime ? timeAgo(chat.lastTime) : ''}</small>
                `;
                chatList.appendChild(div);
            });
        });
    }

    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + getV(false); // Verified check handled in logic
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        const msg = i.value; i.value = "";
        const chatID = me.uid < activeChatID ? me.uid+"_"+activeChatID : activeChatID+"_"+me.uid;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: msg, timestamp: serverTimestamp() });
        await setDoc(doc(db, "chats", chatID), { users: [me.uid, activeChatID], lastMsg: msg, lastTime: serverTimestamp(), unread: true }, { merge: true });
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;
        Swal.fire({title: 'Processing...', didOpen: () => Swal.showLoading(), background:'#121212', color:'#fff'});
        
        let finalUrl = null;
        if(file) {
            const compressed = await compressMedia(file);
            const fd = new FormData(); fd.append('file', compressed); fd.append('upload_preset', 'Meetwoyou');
            const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            finalUrl = data.secure_url;
        }
        
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: finalUrl, authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        document.getElementById('post-text').value = ""; document.getElementById('img-preview-box').innerHTML = ""; Swal.close();
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.userLogout = () => signOut(auth);
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.previewMedia = (i) => {
        const r = new FileReader(); r.onload = (e) => {
            document.getElementById('img-preview-box').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        }; r.readAsDataURL(i.files[0]);
    };
    window.toggleEdit = () => { const e = document.getElementById('edit-form'); e.style.display = e.style.display==='none'?'block':'none'; };
</script>
</body>
</html>
