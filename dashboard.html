<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .story-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-item { flex-shrink: 0; text-align: center; width: 65px; cursor: pointer; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; cursor: pointer; }

        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; color: #fff; cursor: pointer; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-logout { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px; border-radius: 6px; margin-top: 20px; width: 100%; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 8px; }
        .notification-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <div id="noti-dot" class="notification-dot"></div>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-area">
        <div class="story-item" onclick="document.getElementById('story-file').click()">
            <div class="story-ring" style="display:flex; align-items:center; justify-content:center; background:#262626; border: 2px dashed #555;">
                <i class="fas fa-plus"></i>
            </div>
            <div style="font-size:10px; margin-top:5px;">Add Story</div>
            <input type="file" id="story-file" accept="image/*" style="display:none" onchange="uploadStory(this)">
        </div>
    </div>
    
    <div style="background: var(--card); padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-bottom:10px;">Add Photo</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position:relative; display:inline-block;">
            <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626; cursor:pointer;" onclick="document.getElementById('p-file-input').click()">
            <input type="file" id="p-file-input" style="display:none" accept="image/*" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name"></h3>
        <p id="p-bio" style="color:var(--gray);"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>

        <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
        
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-bio" placeholder="Bio">
            <input type="text" id="edit-edu" placeholder="Education">
            <input type="text" id="edit-web" placeholder="Website URL">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>

        <button class="btn-logout" onclick="userLogout()">Logout</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <b>Profile</b>
        <i class="fas fa-share-alt" id="user-share-btn"></i>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) { me = user; init(); } else { window.location.href = "index.html"; }
    });

    async function init() {
        const ref = doc(db, "users", me.uid);
        const snap = await getDoc(ref);
        if(!snap.exists()) {
            await setDoc(ref, { uid: me.uid, displayName: me.displayName || "User", photoURL: me.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png", followers: [], following: [], bio: "Hello world!" });
        }
        loadMyProfile(); loadFeed(); loadAllUsers(); loadMyPosts(); listenNotifications(); loadStories();
    }

    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    function timeAgo(date) {
        if (!date) return "...";
        const seconds = Math.floor((new Date() - date.toDate()) / 1000);
        if (seconds < 60) return seconds + "s ago";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return Math.floor(seconds/86400) + "d ago";
    }

    // --- Profile & Updates ---
    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + vB;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
        });
    }

    window.updateProfilePic = (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            Swal.showLoading();
            await updateDoc(doc(db, "users", me.uid), { photoURL: e.target.result });
            Swal.fire("Success", "Profile photo updated", "success");
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.saveProfile = async () => {
        await updateDoc(doc(db, "users", me.uid), {
            bio: document.getElementById('edit-bio').value,
            edu: document.getElementById('edit-edu').value,
            web: document.getElementById('edit-web').value
        });
        Swal.fire("Profile Updated!"); toggleEdit();
    };

    // --- Stories ---
    window.uploadStory = (input) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            Swal.showLoading();
            await addDoc(collection(db, "stories"), { uid: me.uid, img: e.target.result, authorName: me.displayName, authorImg: me.photoURL, timestamp: serverTimestamp() });
            Swal.fire("Story Posted!", "", "success");
        };
        reader.readAsDataURL(input.files[0]);
    };

    function loadStories() {
        onSnapshot(query(collection(db, "stories"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('story-area');
            area.innerHTML = area.firstElementChild.outerHTML; // Keep add button
            const now = new Date().getTime();
            snap.forEach(docSnap => {
                const s = docSnap.data();
                if(s.timestamp && (now - s.timestamp.toDate().getTime() < 86400000)) {
                    const div = document.createElement('div');
                    div.className = "story-item";
                    div.innerHTML = `<img src="${s.authorImg}" class="story-ring"><div style="font-size:10px;">${s.authorName}</div>`;
                    div.onclick = () => Swal.fire({ imageUrl: s.img, background: '#000', showConfirmButton: false });
                    area.appendChild(div);
                }
            });
        });
    }

    // --- Posts ---
    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return;
        Swal.showLoading();
        const uSnap = await getDoc(doc(db, "users", me.uid));
        const userData = uSnap.data();
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: selectedImgBase64,
            authorName: userData.displayName, authorImg: userData.photoURL,
            timestamp: serverTimestamp(), likes: []
        });
        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        selectedImgBase64 = null;
        Swal.fire("Posted!", "", "success");
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const isLiked = p.likes?.includes(me.uid);
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `
                    <div class="post-user">
                        <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                        <b>${p.authorName}${vB}</b>
                        <span style="font-size:10px; color:gray; margin-left:auto;">${timeAgo(p.timestamp)}</span>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img" id="img-${id}">` : `<div style="padding:15px;">${p.text}</div>`}
                    <div style="padding:10px 15px; display:flex; gap:15px; font-size:20px;">
                        <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                        <i class="far fa-comment"></i>
                    </div>
                    <div style="padding:0 15px; font-size:14px;"><b>${p.likes?.length || 0} likes</b><br>${p.img ? `<b>${p.authorName}</b> ${p.text}` : ''}</div>
                `;
                const imgEl = div.querySelector(`#img-${id}`);
                if(imgEl) imgEl.addEventListener('dblclick', () => toggleLike(id, isLiked));
                area.appendChild(div);
            });
        });
    }

    window.toggleLike = async (id, alreadyLiked) => {
        const ref = doc(db, "posts", id);
        await updateDoc(ref, { likes: alreadyLiked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
    };

    // --- Messages & Others ---
    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };

    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    const h = `<div class="post-user" style="cursor:pointer;" onclick="viewUser('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}${vB}</b>
                    </div>`;
                    list.innerHTML += h;
                    chatList.innerHTML += h.replace("viewUser", "openChatDirect");
                }
            });
        });
    };

    window.previewImg = (i) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${selectedImgBase64}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        reader.readAsDataURL(i.files[0]);
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.toggleEdit = () => { const e = document.getElementById('edit-form'); e.style.display = e.style.display==='none'?'block':'none'; };
    window.userLogout = () => signOut(auth).then(() => window.location.reload());
    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.openChatDirect = (uid) => getDoc(doc(db, "users", uid)).then(s => openChat(uid, s.data().displayName, s.data().photoURL));

    // Global listeners for simpler access from HTML onclick
    window.viewUser = async (uid) => { /* logic here */ };
    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + vB;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    function listenNotifications() {
        const q = query(collection(db, "notifications"), where("to", "==", me.uid), where("read", "==", false));
        onSnapshot(q, (snap) => {
            document.getElementById('noti-dot').style.display = snap.size > 0 ? 'block' : 'none';
        });
    }

    window.loadMyPosts = () => {
        const q = query(collection(db, "posts"), where("uid", "==", me.uid));
        onSnapshot(q, (snap) => {
            document.getElementById('count-posts').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="grid-item">${p.img ? `<img src="${p.img}">`: `<div style="padding:10px;">${p.text}</div>`}</div>`;
            });
        });
    };

</script>
</body>
</html>
