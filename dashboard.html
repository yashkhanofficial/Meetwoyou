<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; }
        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-logout { background: #ed4956; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .notification-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
        .profile-info-list { text-align: left; padding: 15px; font-size: 14px; color: #ccc; }
        .profile-info-list div { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <div id="noti-dot" class="notification-dot"></div>
    </div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="আপনার মনে কি আছে?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;"><i class="fas fa-camera"></i> ফটো যোগ করুন</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">পোস্ট করুন</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="বন্ধু খুঁজুন..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">মেসেজ</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
        <h3 id="p-name"></h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:10px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>

        <div id="my-profile-info" class="profile-info-list"></div>

        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>

        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-bio" placeholder="Bio">
            <input type="text" id="edit-edu" placeholder="Education">
            <input type="text" id="edit-work" placeholder="Work">
            <input type="date" id="edit-dob">
            <input type="text" id="edit-web" placeholder="Website URL">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
        
        <button class="btn-logout" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i> লগ-আউট</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <i class="fas fa-share-alt" id="user-share-btn"></i>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="মেসেজ লিখুন..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">পাঠান</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user; 
            await checkUserRecord(user);
            init(); 
        } else { 
            window.location.href = "index.html"; 
        }
    });

    // নতুন ইউজার ডাটাবেসে না থাকলে তৈরি করা (Fix for user list)
    async function checkUserRecord(user) {
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        if (!snap.exists()) {
            await setDoc(userRef, {
                uid: user.uid,
                displayName: user.displayName || "New User",
                photoURL: user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                followers: [],
                following: [],
                bio: "Meetwoyou ইউজার"
            });
        }
    }

    function init() {
        loadMyProfile();
        loadFeed();
        loadAllUsers();
        loadMyPosts();
        listenNotifications();
    }

    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    // --- Profile System ---
    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + vB;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
            
            document.getElementById('my-profile-info').innerHTML = `
                ${d.work ? `<div><i class="fas fa-briefcase"></i> ${d.work}</div>` : ''}
                ${d.edu ? `<div><i class="fas fa-graduation-cap"></i> ${d.edu}</div>` : ''}
                ${d.dob ? `<div><i class="fas fa-birthday-cake"></i> ${d.dob}</div>` : ''}
                ${d.web ? `<div><i class="fas fa-link"></i> <a href="${d.web}" target="_blank" style="color:var(--primary);">${d.web}</a></div>` : ''}
            `;
        });
    }

    window.saveProfile = async () => {
        Swal.fire({title: 'Updating...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        await updateDoc(doc(db, "users", me.uid), {
            bio: document.getElementById('edit-bio').value,
            edu: document.getElementById('edit-edu').value,
            work: document.getElementById('edit-work').value,
            dob: document.getElementById('edit-dob').value,
            web: document.getElementById('edit-web').value
        });
        Swal.fire("Profile Updated!", "", "success"); 
        toggleEdit();
    };

    window.userLogout = () => {
        Swal.fire({
            title: 'আপনি কি নিশ্চিত?',
            text: "লগ-আউট করলে আপনাকে পুনরায় লগইন করতে হবে।",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ed4956',
            confirmButtonText: 'হ্যাঁ, লগ-আউট করুন'
        }).then((result) => {
            if (result.isConfirmed) {
                signOut(auth);
            }
        });
    };

    // --- Feed & Posts ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                renderPost(docSnap.data(), docSnap.id, area);
            });
        });
    }

    function renderPost(p, id, target) {
        const isLiked = p.likes?.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="viewUser('${p.uid}')">
                <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                <b>${p.authorName}${vB}</b>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-v" style="margin-left:auto;" onclick="event.stopPropagation(); postMenu('${id}', '${p.text}')"></i>` : ''}
            </div>
            ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${id}', ${isLiked})">` : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                <i class="far fa-comment" onclick="addComment('${id}', '${p.uid}')"></i>
                <i class="far fa-paper-plane" onclick="sharePost('${id}')"></i>
            </div>
            <div style="padding:0 15px; font-size:14px;">
                <b>${p.likes?.length || 0} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
            </div>
        `;
        target.appendChild(div);
    }

    // --- Core Social Functions ---
    window.toggleLike = async (postId, alreadyLiked) => {
        const ref = doc(db, "posts", postId);
        await updateDoc(ref, { likes: alreadyLiked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
        if(!alreadyLiked) {
            const pSnap = await getDoc(ref);
            sendNotification(pSnap.data().uid, 'liked your post');
        }
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return;
        Swal.fire({title: 'Posting...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        
        const uSnap = await getDoc(doc(db, "users", me.uid));
        const userData = uSnap.data();

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: selectedImgBase64,
            authorName: userData.displayName, authorImg: userData.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });

        document.getElementById('post-text').value = "";
        selectedImgBase64 = null;
        document.getElementById('img-preview-box').innerHTML = "";
        Swal.fire("Posted Successfully!", "", "success");
    };

    // --- Message & Chat (Fix for new users in list) ---
    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    const h = `<div class="post-user" onclick="viewUser('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}${vB}</b>
                    </div>`;
                    list.innerHTML += h;
                    
                    const chatH = `<div class="post-user" onclick="openChatDirect('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <div><b>${u.displayName}${vB}</b><br><small style="color:gray;">Message him/her</small></div>
                    </div>`;
                    chatList.innerHTML += chatH;
                }
            });
        });
    };

    window.openChatDirect = (uid) => {
        getDoc(doc(db, "users", uid)).then(s => openChat(uid, s.data().displayName, s.data().photoURL));
    };

    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + vB;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "messages"), { 
            sender: me.uid, 
            receiver: activeChatID, 
            text: i.value, 
            timestamp: serverTimestamp() 
        });
        i.value = "";
    };

    // --- Helper Functions ---
    window.previewImg = (i) => {
        const r = new FileReader();
        r.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${selectedImgBase64}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        r.readAsDataURL(i.files[0]);
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        closeProfileView();
    };

    window.toggleEdit = () => { 
        const e = document.getElementById('edit-form'); 
        e.style.display = e.style.display==='none'?'block':'none'; 
    };

    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';

    async function sendNotification(to, type) {
        if(to === me.uid) return;
        await addDoc(collection(db, "notifications"), {
            to, fromName: me.displayName || "Someone", type, timestamp: serverTimestamp(), read: false
        });
    }

    function listenNotifications() {
        const q = query(collection(db, "notifications"), where("to", "==", me.uid), where("read", "==", false));
        onSnapshot(q, (snap) => {
            document.getElementById('noti-dot').style.display = snap.size > 0 ? 'block' : 'none';
        });
    }
    
    // ... বাকি ফাংশনগুলো আগের মতোই কাজ করবে ...
</script>
</body>
</html>
