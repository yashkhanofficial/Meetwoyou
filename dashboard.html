<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .v-badge { color: var(--verified); font-size: 14px; margin-left: 5px; }
        
        .section { display: none; max-width: 500px; margin: auto; padding: 10px; }
        .section.active { display: block; }

        /* Post UI */
        .post-card { border-bottom: 1px solid #262626; padding: 15px 0; }
        .post-user { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 0 10px; }
        .post-img { width: 100%; max-height: 450px; object-fit: cover; border-radius: 4px; margin: 10px 0; }
        .post-btns { display: flex; gap: 15px; padding: 5px 10px; font-size: 20px; }
        .post-desc { padding: 0 10px; font-size: 14px; }

        /* Profile */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #262626; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Form & Buttons */
        .btn-main { background: var(--primary); color: white; border: none; padding: 8px; border-radius: 5px; font-weight: 600; cursor: pointer; width: 100%; }
        input, textarea { width: 100%; padding: 10px; background: #121212; border: 1px solid #262626; color: white; border-radius: 5px; margin-bottom: 10px; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }
        
        /* Floating Chat */
        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div>
        <i class="far fa-heart" onclick="showNotifications()" style="font-size: 22px; margin-right: 15px;"></i>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="font-size: 20px;"></i>
    </div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="text" id="post-img-url" placeholder="Paste Image URL (Coming Soon: Direct Upload)">
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3>Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 0;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid #262626;">
        <h3 id="p-name" style="margin:10px 0 5px 0;"></h3>
        <p id="p-bio" style="color:var(--gray); font-size:14px; margin:0;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 20px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        
        <button class="btn-main" style="background:#262626; width:80%;" onclick="toggleEdit()">Edit Profile</button>
    </div>

    <div id="edit-form" style="display:none; padding:15px; background:#121212; border-radius:10px;">
        <input type="text" id="edit-work" placeholder="Profession">
        <input type="text" id="edit-edu" placeholder="Education">
        <input type="text" id="edit-country" placeholder="Country">
        <button class="btn-main" onclick="saveExtraInfo()">Update Info</button>
    </div>

    <hr style="border:0; border-top:1px solid #262626;">
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:15px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <b id="chat-target-name">Chat</b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px;"></div>
    <div style="padding:10px; display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-paper-plane" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            me = user;
            initProfile();
            loadFeed();
            loadUsers();
            loadMyPosts();
        } else {
            window.location.href = "index.html";
        }
    });

    // Profile Setup & Badge Logic
    async function initProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            const badge = `<i class="fas fa-check-circle v-badge"></i>`;
            document.getElementById('p-name').innerHTML = d.displayName + badge;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "No bio set";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
        });
    }

    // Load Feed with Photo support
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `
                    <div class="post-user">
                        <img src="${p.authorImg}" style="width:32px; height:32px; border-radius:50%;">
                        <b>${p.authorName} <i class="fas fa-check-circle v-badge"></i></b>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="post-btns">
                        <i class="far fa-heart" onclick="likePost('${id}')"></i>
                        <i class="far fa-comment" onclick="Swal.fire('Comments disabled')"></i>
                        ${p.uid === me.uid ? `<i class="far fa-trash-alt" onclick="deletePost('${id}')" style="margin-left:auto"></i>` : ''}
                    </div>
                    <div class="post-desc">
                        <b>${p.authorName}</b> ${p.text}
                    </div>
                `;
                area.appendChild(div);
            });
        });
    }

    // Load My Posts in Grid
    function loadMyPosts() {
        const q = query(collection(db, "posts"), where("uid", "==", me.uid));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snap.size;
            snap.forEach(docSnap => {
                const p = docSnap.data();
                if(p.img) {
                    grid.innerHTML += `<div class="grid-item"><img src="${p.img}"></div>`;
                } else {
                    grid.innerHTML += `<div class="grid-item" style="display:flex; align-items:center; justify:center; font-size:10px; padding:5px;">${p.text}</div>`;
                }
            });
        });
    }

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const imgUrl = document.getElementById('post-img-url').value;
        if(!txt && !imgUrl) return;

        const uSnap = await getDoc(doc(db, "users", me.uid));
        const u = uSnap.data();

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: imgUrl || null,
            authorName: u.displayName, authorImg: u.photoURL,
            timestamp: serverTimestamp(), likes: []
        });
        
        document.getElementById('post-text').value = "";
        document.getElementById('post-img-url').value = "";
        Swal.fire('Success', 'Post shared!', 'success');
    };

    window.deletePost = async (id) => {
        if(confirm("Delete this post?")) {
            await deleteDoc(doc(db, "posts", id));
        }
    };

    // Chat History Logic
    window.openChat = async (uid, name) => {
        activeChatID = uid;
        document.getElementById('chat-target-name').innerText = name;
        document.getElementById('chat-screen').style.display = 'flex';
        
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(docSnap => {
                const m = docSnap.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const isMe = m.sender === me.uid;
                    box.innerHTML += `<div style="text-align: ${isMe?'right':'left'}; margin-bottom:10px;">
                        <span style="background:${isMe?'#0095f6':'#262626'}; padding:8px 12px; border-radius:15px; display:inline-block;">${m.text}</span>
                    </div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        await addDoc(collection(db, "messages"), {
            sender: me.uid, receiver: activeChatID, text: inp.value, timestamp: serverTimestamp()
        });
        inp.value = "";
    };

    window.saveExtraInfo = async () => {
        await updateDoc(doc(db, "users", me.uid), {
            work: document.getElementById('edit-work').value,
            edu: document.getElementById('edit-edu').value,
            country: document.getElementById('edit-country').value
        });
        Swal.fire('Success', 'Profile Updated', 'success');
        toggleEdit();
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.loadUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                const uid = docSnap.id;
                if(uid !== me.uid) {
                    list.innerHTML += `<div class="post-user" onclick="openChat('${uid}', '${u.displayName}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}</b>
                    </div>`;
                    chatList.innerHTML += `<div class="post-user" onclick="openChat('${uid}', '${u.displayName}')">
                        <img src="${u.photoURL}" style="width:45px; height:45px; border-radius:50%;">
                        <div><b>${u.displayName}</b><br><small style="color:gray">Tap to chat</small></div>
                    </div>`;
                }
            });
        });
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.toggleEdit = () => {
        const f = document.getElementById('edit-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    };
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
