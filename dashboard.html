<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou | Master Admin Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; --dim: #94a3b8; --danger: #ff4d4d; --input: #1f2937; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .navbar { background: var(--card); padding: 15px 25px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-card h3 { margin: 0; font-size: 28px; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 14px; width: fit-content; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; color: var(--dim); cursor: pointer; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .u-head { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .u-head img { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary); }
        input { background: var(--input); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-up { background: var(--primary); color: white; }
        .btn-del { background: rgba(255, 77, 77, 0.1); color: var(--danger); width: 50px; flex: none; border: 1px solid var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <div style="font-weight:700; font-size:20px; color:var(--primary)">Master Admin <small style="font-size:10px; color:gray">v2.0</small></div>
        <button class="btn" style="width: auto; background: #2d3748; color: white;" onclick="location.href='dashboard.html'">Back Home</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="u-count">0</h3><p style="color:var(--dim); font-size:12px;">Total Users</p></div>
        <div class="stat-card"><h3 id="p-count">0</h3><p style="color:var(--dim); font-size:12px;">Total Posts</p></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="t-u" onclick="window.switchTab('users')">Users</button>
        <button class="tab-btn" id="t-p" onclick="window.switchTab('posts')">Posts</button>
    </div>

    <div id="sec-u" class="grid"></div>
    <div id="sec-p" class="grid" style="display:none;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- Critical Logic: Handles both Boosted Strings and Normal Arrays ---
    window.smartCount = (data) => {
        if (!data) return "0";
        if (typeof data === 'string' && data.startsWith("boost:")) return data.replace("boost:", "");
        if (Array.isArray(data)) return data.length.toString();
        return data.toString();
    };

    const formatNum = (num) => {
        if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return num.toString();
    };

    window.switchTab = (t) => {
        document.getElementById('sec-u').style.display = t === 'users' ? 'grid' : 'none';
        document.getElementById('sec-p').style.display = t === 'posts' ? 'grid' : 'none';
        document.getElementById('t-u').classList.toggle('active', t === 'users');
        document.getElementById('t-p').classList.toggle('active', t === 'posts');
    };

    window.boostU = async (id) => {
        const val = document.getElementById(`f-${id}`).value;
        if(!val) return;
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "users", id), { followers: "boost:" + formatted });
        Swal.fire({ icon: 'success', title: 'User Boosted!', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
    };

    window.boostP = async (id) => {
        const val = document.getElementById(`l-${id}`).value;
        if(!val) return;
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "posts", id), { likes: "boost:" + formatted });
        Swal.fire({ icon: 'success', title: 'Post Boosted!', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
    };

    window.delU = async (id) => { if(confirm("Delete User?")) await deleteDoc(doc(db, "users", id)); };
    window.delP = async (id) => { if(confirm("Delete Post?")) await deleteDoc(doc(db, "posts", id)); };

    // Real-time Listeners
    onSnapshot(collection(db, "users"), (snap) => {
        document.getElementById('u-count').innerText = snap.size;
        const area = document.getElementById('sec-u');
        area.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="u-head">
                    <img src="${u.photoURL || 'https://via.placeholder.com/50'}">
                    <div style="overflow:hidden">
                        <b style="display:block; white-space:nowrap; text-overflow:ellipsis;">${u.displayName || 'Unnamed'}</b>
                        <small style="color:var(--dim)">Followers: ${window.smartCount(u.followers)}</small>
                    </div>
                </div>
                <input type="number" id="f-${d.id}" placeholder="Enter Boost Value">
                <div class="btn-group">
                    <button class="btn btn-up" onclick="window.boostU('${d.id}')">Boost</button>
                    <button class="btn btn-del" onclick="window.delU('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>`;
            area.appendChild(card);
        });
    });

    onSnapshot(collection(db, "posts"), (snap) => {
        document.getElementById('p-count').innerText = snap.size;
        const area = document.getElementById('sec-p');
        area.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div style="margin-bottom:12px">
                    <b style="color:var(--primary)">@${p.authorName}</b>
                    <p style="font-size:11px; color:var(--dim); margin:5px 0;">Likes: ${window.smartCount(p.likes)}</p>
                </div>
                <input type="number" id="l-${d.id}" placeholder="Enter Likes Boost">
                <div class="btn-group">
                    <button class="btn btn-up" onclick="window.boostP('${d.id}')">Boost</button>
                    <button class="btn btn-del" onclick="window.delP('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>`;
            area.appendChild(card);
        });
    });
</script>
</body>
</html>
