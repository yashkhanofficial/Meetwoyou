<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Nexus Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Glassmorphism Header */
        .glass-header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        /* Unique Sidebar Design */
        .sidebar { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .nav-link { 
            display: flex; align-items: center; gap: 15px; padding: 12px 18px;
            border-radius: 12px; transition: 0.3s; color: #94a3b8; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { 
            background: linear-gradient(45deg, #7c3aed, #4f46e5); 
            color: white; transform: translateX(5px);
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        /* Responsive Main View */
        #main-content { 
            height: calc(100vh - 75px); 
            overflow-y: auto; scrollbar-width: none; scroll-behavior: smooth;
        }
        #main-content::-webkit-scrollbar { display: none; }

        /* Mobile View Tweaks */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { 
                background: rgba(15, 23, 42, 0.95); 
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="hidden md:flex sidebar w-72 flex-col p-6 space-y-8 z-50">
        <div class="px-2">
            <h1 class="text-3xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500 tracking-tighter">Meetwoyou</h1>
        </div>

        <nav class="flex-1 space-y-3">
            <div onclick="loadPage('newsfeed', this)" class="nav-link active">
                <i class="fas fa-home"></i> <span class="font-semibold">Home Feed</span>
            </div>
            <div onclick="loadPage('friends', this)" class="nav-link">
                <i class="fas fa-users"></i> <span class="font-semibold">Connections</span>
            </div>
            <div onclick="loadPage('messages', this)" class="nav-link">
                <i class="fas fa-comment-dots"></i> <span class="font-semibold">Messages</span>
            </div>
            <div onclick="loadPage('search', this)" class="nav-link">
                <i class="fas fa-search"></i> <span class="font-semibold">Explore</span>
            </div>
            <div onclick="loadPage('profile', this)" class="nav-link">
                <i class="fas fa-user-circle"></i> <span class="font-semibold">Profile</span>
            </div>
            <div onclick="loadPage('settings', this)" class="nav-link">
                <i class="fas fa-cog"></i> <span class="font-semibold">Settings</span>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="glass-header h-[75px] flex items-center justify-between px-6 sticky top-0 z-40">
            <div class="flex items-center gap-3 md:hidden">
                <h1 class="text-2xl font-black italic text-purple-500">M.</h1>
            </div>
            <h2 id="page-title" class="text-xl font-bold tracking-tight text-white">Home Feed</h2>
            
            <div class="flex items-center gap-5">
                <div class="relative cursor-pointer hover:scale-110 transition" onclick="loadPage('notifications', this)">
                    <i class="fas fa-bell text-xl text-gray-400"></i>
                    <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#0b0f1a]"></span>
                </div>

                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-sm font-bold text-white">Loading...</p>
                        <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Premium</p>
                    </div>
                    <img id="user-profile-pic" src="https://via.placeholder.com/40" class="w-11 h-11 rounded-full border-2 border-purple-500/50 object-cover shadow-lg shadow-purple-500/10">
                </div>
            </div>
        </header>

        <div id="main-content" class="p-4 md:p-10">
            <div id="loader" class="flex flex-col items-center justify-center h-full">
                <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-gray-500 font-medium">Syncing Nexus...</p>
            </div>
        </div>

        <nav class="md:hidden mobile-nav fixed bottom-0 w-full h-18 flex items-center justify-around px-2 z-50 pb-4 pt-2">
            <div onclick="loadPage('newsfeed', this)" class="text-purple-500 text-2xl"><i class="fas fa-home"></i></div>
            <div onclick="loadPage('friends', this)" class="text-gray-400 text-2xl"><i class="fas fa-users"></i></div>
            <div onclick="loadPage('messages', this)" class="text-gray-400 text-2xl"><i class="fas fa-comment-dots"></i></div>
            <div onclick="loadPage('search', this)" class="text-gray-400 text-2xl"><i class="fas fa-search"></i></div>
            <div onclick="loadPage('settings', this)" class="text-gray-400 text-2xl"><i class="fas fa-cog"></i></div>
        </nav>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.displayName || "Agent";
                document.getElementById('user-profile-pic').src = user.photoURL || "https://via.placeholder.com/40";
                loadPage('newsfeed'); 
            } else {
                window.location.href = "index.html";
            }
        });

        window.loadPage = async (pageName, element = null) => {
            const contentArea = document.getElementById('main-content');
            const titleArea = document.getElementById('page-title');
            
            if(element) {
                document.querySelectorAll('.nav-link, .mobile-nav div').forEach(el => {
                    el.classList.remove('active', 'text-purple-500');
                    el.classList.add('text-gray-400');
                });
                element.classList.add('active', 'text-purple-500');
            }

            titleArea.innerText = pageName.charAt(0).toUpperCase() + pageName.slice(1);
            
            try {
                const response = await fetch(`${pageName}.html`);
                if(!response.ok) throw new Error();
                const html = await response.text();
                contentArea.innerHTML = html;
            } catch (err) {
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center">
                        <i class="fas fa-file-code text-5xl text-gray-700 mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-400">Section Under Construction</h3>
                        <p class="text-gray-600">Please create <b>${pageName}.html</b> to view this section.</p>
                    </div>`;
            }
        };
    </script>
</body>
</html>
