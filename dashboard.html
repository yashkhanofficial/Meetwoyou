<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --input-bg: #1c1c1c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 50px; height: 50px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* New Notification Styles */
        #noti-sec { padding: 10px; }
        .noti-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; margin-bottom: 8px; background: #121212; border: 1px solid #262626; transition: background 0.3s; }
        .noti-card.unread { background: #1a2634; border-left: 3px solid var(--primary); }
        .noti-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .noti-content { flex: 1; font-size: 14px; }
        .noti-time { font-size: 10px; color: var(--gray); margin-top: 4px; }
        .noti-badge { position: absolute; top: -5px; right: -8px; background: var(--danger); color: white; font-size: 9px; padding: 2px 5px; border-radius: 50%; }

        /* Rest of your existing styles */
        .composer-card { background: var(--card); margin: 12px; border-radius: 16px; border: 1px solid #262626; overflow: hidden; }
        .composer-header { display: flex; align-items: center; gap: 12px; padding: 15px; }
        .composer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .composer-textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; resize: none; min-height: 60px; outline: none; }
        .composer-actions { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-top: 1px solid #262626; background: #181818; }
        .share-btn-modern { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; position: relative; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #000; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; position: relative; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #121212; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <h2 style="font-family: 'Grand Hotel', cursive; margin-top: 15px;">Meetwoyou</h2>
</div>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;" onclick="showSec('noti')">
        <i class="far fa-bell" style="font-size:22px; cursor:pointer;"></i>
        <span id="noti-count" class="noti-badge" style="display:none;">0</span>
    </div>
</div>

<div id="home-sec" class="section active">
    <div id="feed-area"></div>
</div>

<div id="noti-sec" class="section">
    <h3 style="padding: 10px;">Notifications</h3>
    <div id="notification-list">
        <p style="text-align:center; color:gray; padding:20px;">No new notifications</p>
    </div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
        <h3 id="p-name"></h3>
        <p id="p-bio"></p>
        <button class="btn-main" onclick="userLogout()">Logout</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;

    onAuthStateChanged(auth, (user) => {
        if (user) { 
            me = user;
            initNotifications(); // Start listening for notifications
            loadMyProfile();
            document.getElementById('app-loader').style.display = 'none';
        } else { window.location.href = "index.html"; }
    });

    // 1. Function to save notification to database
    window.saveNotification = async (targetUid, message, type, postId = null) => {
        if (targetUid === me.uid) return; // Nijer kaaj e nije notification pabe na
        
        await addDoc(collection(db, "notifications"), {
            toUid: targetUid,
            fromUid: me.uid,
            fromName: me.displayName,
            fromImg: me.photoURL,
            message: message,
            type: type,
            postId: postId,
            seen: false,
            timestamp: serverTimestamp()
        });
    };

    // 2. Real-time listener for notifications
    function initNotifications() {
        const q = query(
            collection(db, "notifications"),
            where("toUid", "==", me.uid),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snap) => {
            const list = document.getElementById('notification-list');
            const countBadge = document.getElementById('noti-count');
            let unreadCount = 0;
            let html = "";

            if (snap.empty) {
                list.innerHTML = `<p style="text-align:center; color:gray; padding:20px;">No notifications</p>`;
                return;
            }

            snap.forEach((doc) => {
                const n = doc.data();
                if (!n.seen) unreadCount++;

                html += `
                    <div class="noti-card ${n.seen ? '' : 'unread'}" onclick="handleNotiClick('${doc.id}', '${n.postId}')">
                        <img src="${n.fromImg}" class="noti-img">
                        <div class="noti-content">
                            <b>${n.fromName}</b> ${n.message}
                            <div class="noti-time">${timeAgo(n.timestamp)}</div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;

            if (unreadCount > 0) {
                countBadge.innerText = unreadCount;
                countBadge.style.display = 'block';
                // Show real-time popup for NEW notifications only (Simple Logic)
                const latest = snap.docChanges()[0];
                if(latest && latest.type === "added" && !latest.doc.data().seen) {
                    Swal.fire({
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                        icon: 'info', title: snap.docChanges()[0].doc.data().message, background: '#121212', color: '#fff'
                    });
                }
            } else {
                countBadge.style.display = 'none';
            }
        });
    }

    // 3. Mark notification as read
    window.handleNotiClick = async (notiId, postId) => {
        await updateDoc(doc(db, "notifications", notiId), { seen: true });
        if (postId && postId !== "null") {
            // Post open korar logic thakle eikhane diben
            Swal.fire({title: "Post Link", text: "Post open logic eikhane hobe", background: '#121212'});
        }
    };

    // Example hooks to trigger notifications in your existing functions:
    // Update your Like function:
    // async function toggleLike(id, liked, targetOwnerUid) { 
    //    ... existing logic ...
    //    if(!liked) saveNotification(targetOwnerUid, "liked your post", "like", id);
    // }

    // Navigation and UI
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        // If clicking notification section, you might want to mark all as seen logic here
    };

    function timeAgo(ts) {
        if(!ts) return "...";
        const seconds = Math.floor((new Date() - ts.toDate()) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return ts.toDate().toLocaleDateString();
    }

    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            document.getElementById('p-name').innerText = d.displayName;
            document.getElementById('p-img').src = d.photoURL;
        });
    }

    window.userLogout = () => signOut(auth);

</script>
</body>
</html>
