<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Advanced Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; --accent: #1da1f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }

        .avatar { object-fit: cover; border-radius: 50%; border: 1px solid #333; }
        .v-badge { color: var(--accent); font-size: 0.8em; margin-left: 4px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; outline: none; box-sizing: border-box; }

        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Story & Post UI */
        .story-bar { display: flex; gap: 12px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; }
        .story-item { min-width: 70px; text-align: center; cursor: pointer; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 2.5px solid var(--primary); padding: 2px; }
        .post-card { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
        .post-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }

        /* User List UI */
        .user-item { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: #252526; }

        /* Chat System */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-header { background: var(--card); padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 75%; font-size: 14px; }
        .msg.sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #242526; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* Notification Badge */
        .notif-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header" style="background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
    <h2 style="color:var(--primary); margin:0; font-style: italic;">Meetwoyou</h2>
    <div style="display: flex; gap: 20px; align-items: center;">
        <div style="position: relative; cursor: pointer;" onclick="showSec('notif', this)">
            <i class="fas fa-bell" style="color: var(--gray); font-size: 20px;"></i>
            <span id="notif-count" class="notif-badge" style="display:none;">0</span>
        </div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--gray); cursor:pointer;"></i>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-list">
        <div class="story-item" onclick="uploadStory()">
            <div class="story-circle" style="background:#222; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
            <small>Add Story</small>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="friends-sec" class="section">
    <h3 style="border-left: 4px solid var(--primary); padding-left: 10px;">Find Friends</h3>
    <input type="text" id="friend-search" placeholder="Search by name..." oninput="filterFriends()">
    <div id="friends-list-area"></div>
</div>

<div id="notif-sec" class="section">
    <h3 style="border-left: 4px solid var(--primary); padding-left: 10px;">Notifications</h3>
    <div id="notif-list-area" style="color: var(--gray); text-align: center; margin-top: 20px;">No new notifications</div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align:center; background:var(--card); padding:20px; border-radius:20px;">
        <img id="p-img" src="https://via.placeholder.com/110" class="avatar" style="width:100px; height:100px; border:2px solid var(--primary);">
        <h3 id="display-name-view">User <i class="fas fa-check-circle v-badge"></i></h3>
        <button class="btn-main" onclick="toggleEditForm()" style="background:#333; width: auto; padding: 8px 20px;">Edit Profile</button>
        <div id="edit-profile-form" style="display:none; margin-top: 15px;">
            <input type="text" id="p-name" placeholder="Full Name">
            <input type="text" id="p-bio" placeholder="Bio">
            <button class="btn-main" id="p-save-btn">Save</button>
        </div>
    </div>
    <h4 style="margin-top:20px;">My Posts</h4>
    <div id="my-posts-area"></div>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="cw-img" class="avatar" style="width:40px; height:40px; cursor:pointer;" onclick="viewChatUserProfile()">
        <div style="flex:1; cursor:pointer;" onclick="viewChatUserProfile()">
            <b id="cw-name">User</b> <i class="fas fa-check-circle v-badge"></i><br>
            <small style="color:var(--gray); font-size:10px;">Click to view profile</small>
        </div>
    </div>
    <div class="chat-msgs" id="chat-box"></div>
    <div class="chat-input-area" style="background:var(--card); padding:10px; display:flex;">
        <input type="text" id="m-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--primary); font-size:22px; margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <i class="fas fa-home nav-item active" onclick="showSec('home', this)"></i>
    <i class="fas fa-user-friends nav-item" onclick="showSec('friends', this)"></i>
    <i class="fas fa-plus-square nav-item" onclick="triggerPostModal()"></i>
    <i class="fas fa-user-circle nav-item" onclick="showSec('profile', this)"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let chatUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadUserData(user.uid);
            loadFriends();
            loadPosts();
            listenNotifications();
        } else {
            window.location.href = "index.html";
        }
    });

    // --- Friends List & Chat Toggle Logic ---
    function loadFriends() {
        onSnapshot(collection(db, "users"), (snap) => {
            const area = document.getElementById('friends-list-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                if(docSnap.id !== auth.currentUser.uid) {
                    const div = document.createElement('div');
                    div.className = "user-item";
                    // CLICK HERE OPENS CHAT DIRECTLY
                    div.onclick = () => openChat(docSnap.id, u.displayName, u.photoURL);
                    div.innerHTML = `
                        <img src="${u.photoURL || 'https://via.placeholder.com/50'}" class="avatar" style="width:45px; height:45px;">
                        <div style="flex:1">
                            <b>${u.displayName} <i class="fas fa-check-circle v-badge"></i></b><br>
                            <small style="color:var(--gray)">Tap to chat</small>
                        </div>
                        <i class="fas fa-comment-dots" style="color:var(--primary)"></i>
                    `;
                    area.appendChild(div);
                }
            });
        });
    }

    // --- Chat System ---
    window.openChat = (uid, name, img) => {
        chatUID = uid;
        document.getElementById('cw-name').innerText = name;
        document.getElementById('cw-img').src = img || 'https://via.placeholder.com/40';
        document.getElementById('chat-screen').style.display = 'flex';
        
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === auth.currentUser.uid && m.receiver === uid) || (m.sender === uid && m.receiver === auth.currentUser.uid)) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = m.sender === auth.currentUser.uid ? "msg sent" : "msg received";
                    msgDiv.innerText = m.content;
                    box.appendChild(msgDiv);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.viewChatUserProfile = () => { if(chatUID) viewUserProfile(chatUID); };

    window.viewUserProfile = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        const u = snap.data();
        Swal.fire({
            title: u.displayName,
            html: `<img src="${u.photoURL || 'https://via.placeholder.com/100'}" class="avatar" style="width:80px; height:80px; margin-bottom:10px;"><br><b>Bio:</b> ${u.bio || 'No bio'}`,
            confirmButtonText: 'Close',
            confirmButtonColor: '#8e44ad'
        });
    };

    // --- Notification System (Simple) ---
    function listenNotifications() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(1));
        onSnapshot(q, (snap) => {
            snap.docChanges().forEach((change) => {
                if (change.type === "added" && !change.doc.metadata.hasPendingWrites) {
                    const post = change.doc.data();
                    if(post.uid !== auth.currentUser.uid) {
                        showToast(`New Post from ${post.name}`);
                    }
                }
            });
        });
    }

    function showToast(text) {
        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
        Toast.fire({ icon: 'info', title: text });
    }

    // --- Post Logic ---
    window.triggerPostModal = async () => {
        const { value: text } = await Swal.fire({ title: 'New Post', input: 'textarea', inputPlaceholder: "What's on your mind?", showCancelButton: true });
        if(text) {
            await addDoc(collection(db, "posts"), {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName || "User",
                photo: auth.currentUser.photoURL,
                text: text,
                timestamp: serverTimestamp()
            });
            Swal.fire('Posted!', '', 'success');
        }
    };

    function loadPosts() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.photo || 'https://via.placeholder.com/40'}" class="avatar" style="width:40px; height:40px;">
                        <b>${p.name} <i class="fas fa-check-circle v-badge"></i></b>
                    </div>
                    <p>${p.text}</p>
                `;
                area.appendChild(card);
            });
        });
    }

    // --- UI Helpers ---
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el.classList) el.classList.add('active');
    };

    window.sendMsg = async () => {
        const input = document.getElementById('m-input');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            sender: auth.currentUser.uid,
            receiver: chatUID,
            content: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());
    window.toggleEditForm = () => {
        const f = document.getElementById('edit-profile-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    };

    async function loadUserData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if(snap.exists()) {
            document.getElementById('display-name-view').innerText = snap.data().displayName;
            document.getElementById('p-img').src = snap.data().photoURL || "https://via.placeholder.com/110";
        }
    }
</script>
</body>
</html>
