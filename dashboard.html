<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Advanced Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; --accent: #1da1f2; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }

        /* Smooth UI Elements */
        .avatar { object-fit: cover; border-radius: 50%; border: 2px solid #333; transition: 0.3s; }
        .v-badge { color: var(--accent); font-size: 0.8em; margin-left: 4px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main:hover { opacity: 0.8; transform: scale(0.98); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; outline: none; box-sizing: border-box; }

        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Profile & Cover Enhanced */
        .cover-container { width: 100%; height: 200px; background: linear-gradient(45deg, #2c3e50, #000000); position: relative; border-radius: 0 0 20px 20px; }
        .cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 20px 20px; }
        .p-img-overlap { margin-top: -65px; text-align: center; }
        .p-img-overlap img { width: 120px; height: 120px; border: 5px solid var(--bg); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Post & Feed */
        .post-card { background: var(--card); border-radius: 18px; padding: 18px; margin-top: 18px; border: 1px solid #282828; transition: 0.3s; }
        .post-card:hover { border-color: #444; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 12px; border: 1px solid #333; cursor: zoom-in; }
        .post-actions { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 12px; border-top: 1px solid #282828; }
        .action-btn { cursor: pointer; color: var(--gray); font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .action-btn:hover { color: var(--primary); }
        .liked { color: #e74c3c !important; font-weight: bold; }

        /* Story UI */
        .story-bar { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .story-item { min-width: 75px; text-align: center; position: relative; }
        .story-circle { width: 68px; height: 68px; border-radius: 50%; border: 3px solid var(--primary); padding: 3px; cursor: pointer; object-fit: cover; }
        
        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(26, 26, 27, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 22px; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }

        /* Social Icons Grid */
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .social-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #222; color: var(--gray); font-size: 16px; transition: 0.3s; text-decoration: none; }
        .social-icon:hover { background: var(--primary); color: white; }

        /* Notification Dot */
        .notif-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header" style="background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #282828;">
    <h2 style="color:var(--primary); margin:0; font-family: 'Georgia', serif;">Meetwoyou</h2>
    <div style="display: flex; gap: 18px; align-items: center;">
        <i class="fas fa-search" onclick="showSec('friends')" style="color:var(--gray); cursor:pointer;"></i>
        <div class="nav-item" onclick="showNotifications()">
            <i class="fas fa-bell"></i>
            <div id="notif-count" class="notif-badge"></div>
        </div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#e74c3c; cursor:pointer;"></i>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-area">
        <div class="story-item" onclick="addStory()">
            <div class="story-circle" style="background:#222; display:flex; align-items:center; justify-content:center; border: 2px dashed var(--primary);">
                <i class="fas fa-plus"></i>
            </div>
            <small style="font-size: 10px;">Add Story</small>
        </div>
    </div>
    
    <div class="post-card" style="margin-top: 5px;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <div id="post-preview" style="display:none; margin-bottom: 10px; position: relative;">
            <img id="preview-img" style="width:100%; border-radius: 10px;">
            <i class="fas fa-times" onclick="cancelPreview()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); padding:5px 8px; border-radius:50%; cursor:pointer;"></i>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label for="post-file" style="cursor:pointer; background:#222; padding:10px; border-radius:10px; border:1px solid #333; flex: 1; text-align: center;">
                <i class="fas fa-image" style="color:var(--success)"></i> Photo
            </label>
            <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImage(this)">
            <button class="btn-main" style="flex:2;" onclick="uploadPost()">Share Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="profile-sec" class="section">
    <div class="cover-container">
        <img id="p-cover-img" src="https://via.placeholder.com/800x250/222/555" class="cover-img">
        <label for="cover-upload" style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">
            <i class="fas fa-camera"></i> Edit Cover
        </label>
        <input type="file" id="cover-upload" style="display:none" onchange="updateCover(this)">
    </div>
    
    <div style="background:var(--card); padding:15px; border-radius:0 0 20px 20px; border:1px solid #282828; border-top:none;">
        <div class="p-img-overlap">
            <img id="p-img" src="https://via.placeholder.com/120" class="avatar">
        </div>
        
        <div style="text-align:center; margin-top:10px;">
            <h2 id="p-name-view" style="margin:0;">User Name <i class="fas fa-check-circle v-badge"></i></h2>
            <p id="p-username-view" style="color:var(--gray); margin:5px 0;">@username</p>
            <p id="p-bio-view" style="font-style: italic; color:#ddd; padding: 0 20px;">Digital Explorer & Content Creator</p>
            
            <div class="social-links" id="social-links-area">
                </div>

            <div class="stats-row">
                <div class="stat-box"> <b id="stat-posts">0</b> <span>Posts</span> </div>
                <div class="stat-box"> <b id="stat-followers">0</b> <span>Followers</span> </div>
                <div class="stat-box"> <b id="stat-following">0</b> <span>Following</span> </div>
            </div>

            <button class="btn-main" style="background:#333; width: auto; margin: 10px auto; padding: 8px 30px;" onclick="toggleEditForm()">
                <i class="fas fa-user-edit"></i> Edit Profile
            </button>
        </div>

        <div id="edit-profile-form" style="display:none; border-top: 1px solid #333; margin-top: 20px; padding-top: 15px;">
            <label>Basic Information</label>
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Short Bio">
            <input type="date" id="edit-dob" title="Date of Birth">
            <input type="text" id="edit-edu" placeholder="Education (School/University)">
            <input type="text" id="edit-work" placeholder="Workplace">
            <input type="text" id="edit-country" placeholder="Country">
            
            <label>Social & Web</label>
            <input type="text" id="edit-web" placeholder="Website URL">
            <input type="text" id="edit-fb" placeholder="Facebook Profile Link">
            <input type="text" id="edit-insta" placeholder="Instagram Username">
            <input type="text" id="edit-tw" placeholder="Twitter Username">
            <button class="btn-main" onclick="saveProfileData()">Save Everything</button>
        </div>
        
        <div class="profile-grid" style="margin-top: 20px; border-top:1px solid #333; padding-top:15px;">
            <div class="info-item"><i class="fas fa-birthday-cake"></i> <span>Born: <b id="view-dob">N/A</b></span></div>
            <div class="info-item"><i class="fas fa-graduation-cap"></i> <span>Studied: <b id="view-edu">N/A</b></span></div>
            <div class="info-item"><i class="fas fa-briefcase"></i> <span>Works: <b id="view-work">N/A</b></span></div>
            <div class="info-item"><i class="fas fa-globe"></i> <span>From: <b id="view-country">N/A</b></span></div>
        </div>
    </div>

    <h4 style="margin:25px 0 10px 5px; border-left: 4px solid var(--primary); padding-left:10px;">My Timeline</h4>
    <div id="my-posts-area"></div>
</div>

<div id="friends-sec" class="section">
    <h3>People Discovery</h3>
    <input type="text" id="search-input" placeholder="Search by name, skill, or country..." oninput="searchUsers()">
    <div id="users-list-area" style="margin-top: 15px;"></div>
</div>

<div id="msg-sec" class="section">
    <h3>Conversations</h3>
    <div id="chat-list-container"></div>
</div>

<div id="chat-screen" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:none; flex-direction:column;">
    <div class="header" style="padding:10px; display:flex; align-items:center; gap:15px; background:var(--card);">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-user-img" class="avatar" style="width:40px; height:40px;">
        <b id="chat-user-name">User</b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding:15px; background:var(--card); display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Type a message..." style="margin:0; border-radius:25px;">
        <button onclick="sendChatMessage()" style="background:var(--primary); border:none; color:white; width:45px; height:45px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-th-large"></i></div>
    <div class="nav-item" onclick="showSec('friends', this)"><i class="fas fa-users"></i></div>
    <div class="nav-item" onclick="showSec('msg', this)"><i class="fas fa-envelope"></i></div>
    <div class="nav-item" onclick="showSec('profile', this)"><i class="fas fa-user-circle"></i></div>
</div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, updateDoc, increment, deleteDoc, where, arrayUnion, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    let currentUserData = null;
    let activeChatID = null;

    // Auth State
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await syncUserData(user);
            initApp();
        } else {
            window.location.href = "index.html";
        }
    });

    // Core Initialization
    async function initApp() {
        loadFeed();
        loadStories();
        loadNotifications();
        loadUserList();
        loadChatList();
    }

    // --- Dynamic User Data Sync ---
    async function syncUserData(user) {
        const docRef = doc(db, "users", user.uid);
        const snap = await getDoc(docRef);
        if (snap.exists()) {
            currentUserData = snap.data();
            updateProfileUI();
        } else {
            // New user initial setup
            currentUserData = {
                uid: user.uid,
                displayName: user.displayName || "New Member",
                photoURL: user.photoURL || "https://via.placeholder.com/150",
                followers: [], following: [], postsCount: 0
            };
            await setDoc(docRef, currentUserData);
        }
    }

    function updateProfileUI() {
        const d = currentUserData;
        document.getElementById('p-img').src = d.photoURL;
        document.getElementById('p-name-view').innerText = d.displayName;
        document.getElementById('p-username-view').innerText = `@${d.username || 'user'}`;
        document.getElementById('p-bio-view').innerText = d.bio || "No bio added yet.";
        document.getElementById('view-dob').innerText = d.dob || "N/A";
        document.getElementById('view-edu').innerText = d.education || "N/A";
        document.getElementById('view-work').innerText = d.work || "N/A";
        document.getElementById('view-country').innerText = d.country || "N/A";
        document.getElementById('stat-followers').innerText = d.followers?.length || 0;
        document.getElementById('stat-following').innerText = d.following?.length || 0;
        document.getElementById('p-cover-img').src = d.coverURL || "https://via.placeholder.com/800x250/222/555";

        // Social Links Render
        const sArea = document.getElementById('social-links-area');
        sArea.innerHTML = '';
        if(d.fb) sArea.innerHTML += `<a href="${d.fb}" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>`;
        if(d.insta) sArea.innerHTML += `<a href="https://instagram.com/${d.insta}" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>`;
        if(d.tw) sArea.innerHTML += `<a href="https://twitter.com/${d.tw}" target="_blank" class="social-icon"><i class="fab fa-twitter"></i></a>`;
        if(d.website) sArea.innerHTML += `<a href="${d.website}" target="_blank" class="social-icon"><i class="fas fa-link"></i></a>`;
    }

    // --- Advanced Post System ---
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const fileInput = document.getElementById('post-file');
        const file = fileInput.files[0];
        
        if (!text && !file) return;
        Swal.showLoading();

        let imgUrl = "";
        if (file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            imgUrl = data.secure_url;
        }

        await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid,
            authorName: currentUserData.displayName,
            authorImg: currentUserData.photoURL,
            text: text,
            image: imgUrl,
            likes: [],
            timestamp: serverTimestamp()
        });

        await updateDoc(doc(db, "users", auth.currentUser.uid), { postsCount: increment(1) });
        
        document.getElementById('post-text').value = "";
        cancelPreview();
        Swal.fire({ icon: 'success', title: 'Posted!', timer: 1000, showConfirmButton: false });
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                area.appendChild(renderPost(p, docSnap.id));
            });
        });
    }

    function renderPost(p, id) {
        const isLiked = p.likes?.includes(auth.currentUser.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-header">
                <img src="${p.authorImg}" class="avatar" style="width:45px; height:45px;" onclick="viewOtherProfile('${p.uid}')">
                <div style="flex:1">
                    <b onclick="viewOtherProfile('${p.uid}')" style="cursor:pointer">${p.authorName} <i class="fas fa-check-circle v-badge"></i></b><br>
                    <small style="color:var(--gray); font-size:10px;">${p.timestamp ? new Date(p.timestamp.toDate()).toLocaleString() : 'Just now'}</small>
                </div>
                ${p.uid === auth.currentUser.uid ? `<i class="fas fa-trash" onclick="deleteMyPost('${id}')" style="color:#555; cursor:pointer"></i>` : ''}
            </div>
            <p style="white-space: pre-wrap;">${p.text}</p>
            ${p.image ? `<img src="${p.image}" class="post-img" onclick="window.open('${p.image}')">` : ''}
            <div class="post-actions">
                <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${id}', ${isLiked})">
                    <i class="fa${isLiked ? 's' : 'r'} fa-heart"></i> ${p.likes?.length || 0}
                </div>
                <div class="action-btn" onclick="sharePost('${id}')"><i class="far fa-share-square"></i> Share</div>
            </div>
        `;
        return div;
    }

    // --- Story System (Auto Delete Logic) ---
    window.addStory = async () => {
        const { value: file } = await Swal.fire({ title: 'Select Story Image', input: 'file', inputAttributes: { 'accept': 'image/*', 'aria-label': 'Upload story' } });
        if(file) {
            Swal.showLoading();
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            
            await addDoc(collection(db, "stories"), {
                uid: auth.currentUser.uid,
                img: data.secure_url,
                timestamp: serverTimestamp(),
                expiry: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
            });
            Swal.fire('Uploaded!', '', 'success');
        }
    };

    function loadStories() {
        const now = Date.now();
        onSnapshot(query(collection(db, "stories"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('story-area');
            area.innerHTML = area.firstElementChild.outerHTML; // Keep "Add Story"
            snap.forEach(docSnap => {
                const s = docSnap.data();
                if(s.expiry > now) {
                    area.innerHTML += `
                        <div class="story-item" onclick="viewStory('${s.img}')">
                            <img src="${s.img}" class="story-circle">
                        </div>`;
                }
            });
        });
    }

    // --- Relationship & Search ---
    window.searchUsers = () => {
        const term = document.getElementById('search-input').value.toLowerCase();
        loadUserList(term);
    };

    function loadUserList(term = "") {
        onSnapshot(query(collection(db, "users"), limit(20)), (snap) => {
            const area = document.getElementById('users-list-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                if(u.uid !== auth.currentUser.uid && (u.displayName.toLowerCase().includes(term) || u.country?.toLowerCase().includes(term))) {
                    area.innerHTML += `
                        <div class="post-card" style="display:flex; align-items:center; gap:15px; padding:10px;">
                            <img src="${u.photoURL}" class="avatar" style="width:50px; height:50px;">
                            <div style="flex:1">
                                <b>${u.displayName}</b><br><small>${u.country || 'Global User'}</small>
                            </div>
                            <button class="btn-main" style="width:auto; padding:5px 15px; font-size:12px;" onclick="viewOtherProfile('${u.uid}')">View</button>
                        </div>`;
                }
            });
        });
    }

    window.viewOtherProfile = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        const u = snap.data();
        const isFollowing = currentUserData.following?.includes(uid);

        Swal.fire({
            title: u.displayName,
            html: `
                <div style="text-align:center">
                    <img src="${u.photoURL}" class="avatar" style="width:100px; height:100px; border:3px solid var(--primary)">
                    <p>@${u.username || 'user'}</p>
                    <p style="font-size:14px; color:var(--gray)">${u.bio || ''}</p>
                    <div style="display:flex; gap:10px; justify-content:center">
                        <button class="btn-main" onclick="toggleFollow('${uid}', ${isFollowing})" style="background:${isFollowing ? '#333' : 'var(--primary)'}">${isFollowing ? 'Unfollow' : 'Follow'}</button>
                        <button class="btn-main" onclick="startChat('${uid}', '${u.displayName}', '${u.photoURL}')" style="background:var(--success)">Message</button>
                    </div>
                </div>
            `,
            showConfirmButton: false
        });
    };

    window.toggleFollow = async (uid, isFollowing) => {
        const myRef = doc(db, "users", auth.currentUser.uid);
        const targetRef = doc(db, "users", uid);

        if(isFollowing) {
            await updateDoc(myRef, { following: arrayRemove(uid) });
            await updateDoc(targetRef, { followers: arrayRemove(auth.currentUser.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(uid) });
            await updateDoc(targetRef, { followers: arrayUnion(auth.currentUser.uid) });
            // Notif
            await addDoc(collection(db, "notifications"), {
                to: uid, from: auth.currentUser.uid, fromName: currentUserData.displayName, type: "follow", timestamp: serverTimestamp()
            });
        }
        Swal.close();
        syncUserData(auth.currentUser);
    };

    // --- Messaging ---
    window.startChat = (uid, name, img) => {
        Swal.close();
        activeChatID = uid;
        document.getElementById('chat-user-img').src = img;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-screen').style.display = 'flex';
        loadMessages(uid);
    };

    function loadMessages(targetUID) {
        const box = document.getElementById('chat-box');
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            box.innerHTML = "";
            snap.forEach(docSnap => {
                const m = docSnap.data();
                if((m.sender === auth.currentUser.uid && m.receiver === targetUID) || (m.sender === targetUID && m.receiver === auth.currentUser.uid)) {
                    const msgDiv = document.createElement('div');
                    const isMe = m.sender === auth.currentUser.uid;
                    msgDiv.style = `padding:10px 15px; border-radius:15px; max-width:80%; align-self:${isMe ? 'flex-end' : 'flex-start'}; background:${isMe ? 'var(--primary)' : '#222'}; color:white; font-size:14px;`;
                    msgDiv.innerText = m.text;
                    box.appendChild(msgDiv);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendChatMessage = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            sender: auth.currentUser.uid,
            receiver: activeChatID,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    // --- Save Profile Data ---
    window.saveProfileData = async () => {
        const pData = {
            displayName: document.getElementById('edit-name').value,
            bio: document.getElementById('edit-bio').value,
            dob: document.getElementById('edit-dob').value,
            education: document.getElementById('edit-edu').value,
            work: document.getElementById('edit-work').value,
            country: document.getElementById('edit-country').value,
            website: document.getElementById('edit-web').value,
            fb: document.getElementById('edit-fb').value,
            insta: document.getElementById('edit-insta').value,
            tw: document.getElementById('edit-tw').value
        };
        Swal.showLoading();
        await updateDoc(doc(db, "users", auth.currentUser.uid), pData);
        await syncUserData(auth.currentUser);
        toggleEditForm();
        Swal.fire('Updated!', 'Profile is now fresh!', 'success');
    };

    // --- UI Helpers ---
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    };

    window.toggleEditForm = () => {
        const f = document.getElementById('edit-profile-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
        if(f.style.display === 'block') {
            document.getElementById('edit-name').value = currentUserData.displayName || "";
            document.getElementById('edit-bio').value = currentUserData.bio || "";
        }
    };

    window.previewImage = (input) => {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('post-preview').style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    };

    window.cancelPreview = () => {
        document.getElementById('post-file').value = "";
        document.getElementById('post-preview').style.display = 'none';
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());

</script>
</body>
</html>
