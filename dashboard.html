<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Advanced OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 14px; margin-left: 5px; }
        
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img-container { position: relative; width: 100%; min-height: 300px; background: #050505; display: flex; align-items: center; justify-content: center; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; }
        
        .heart-icon { position: absolute; font-size: 80px; color: white; opacity: 0; transform: scale(0); transition: 0.3s; pointer-events: none; }
        .heart-icon.animate { opacity: 0.8; transform: scale(1.2); animation: heartPop 0.8s forwards; }
        @keyframes heartPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(0); opacity: 0; } }

        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; position: relative; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }

        .profile-info-box { padding: 15px; font-size: 13px; color: var(--gray); line-height: 1.6; border-top: 1px solid #262626; margin-top: 10px; text-align: left; }
        .profile-info-box i { width: 20px; color: #fff; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; transition: 0.2s; }
        .nav i.active { color: var(--primary); }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .file-label { display: inline-block; padding: 8px 15px; background: #262626; border-radius: 5px; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="display:flex; gap:15px; align-items:center;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="font-size:20px; cursor:pointer;"></i>
    </div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <label class="file-label" for="post-file"><i class="fas fa-image"></i> Choose Photo</label>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Chats</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 25px 15px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
        <h3 id="p-name" style="margin:10px 0 5px 0;"></h3>
        <p id="p-bio" style="font-size:14px; color:var(--gray); margin-bottom:15px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <button class="btn-main" style="background:#262626; color:white;" onclick="toggleEdit()">Edit Profile</button>
        <div id="p-details" class="profile-info-box"></div>
    </div>

    <div id="edit-form" style="display:none; padding:15px; background:#121212;">
        <input type="text" id="edit-bio" placeholder="Update Bio">
        <input type="text" id="edit-work" placeholder="Work Info">
        <input type="text" id="edit-location" placeholder="Location">
        <button class="btn-main" onclick="saveAdvancedInfo()">Save Profile</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name">Name</b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border:none;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            me = user;
            loadProfile();
            loadFeed();
            loadUsers();
            loadMyPosts();
        } else {
            window.location.href = "index.html";
        }
    });

    // Profile & Following
    function loadProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + ` <i class="fas fa-check-circle v-badge"></i>`;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio || "No bio yet";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
            document.getElementById('p-details').innerHTML = `
                <div><i class="fas fa-briefcase"></i> ${d.work || 'No work info'}</div>
                <div><i class="fas fa-map-marker-alt"></i> ${d.location || 'Unknown location'}</div>
            `;
        });
    }

    // Photo Preview
    window.previewImg = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${selectedImgBase64}" style="width:100%; border-radius:8px; margin-top:10px;">`;
        };
        reader.readAsDataURL(input.files[0]);
    };

    // Feed with Share & Comment
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const isLiked = p.likes?.includes(me.uid);
                const div = document.createElement('div');
                div.className = "post-card";
                div.innerHTML = `
                    <div class="post-user" onclick="viewUser('${p.uid}')">
                        <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                        <b>${p.authorName} <i class="fas fa-check-circle v-badge"></i></b>
                    </div>
                    ${p.img ? `
                    <div class="post-img-container" ondblclick="doubleLike('${id}', this)">
                        <img src="${p.img}" class="post-img">
                        <i class="fas fa-heart heart-icon"></i>
                    </div>` : ''}
                    <div style="padding:10px 15px; font-size:22px; display:flex; gap:15px; align-items:center;">
                        <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'#ed4956':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                        <i class="far fa-comment" onclick="addComment('${id}')"></i>
                        <i class="far fa-paper-plane" onclick="sharePost('${id}')"></i>
                        ${p.uid === me.uid ? `<i class="far fa-trash-alt" onclick="deletePost('${id}')" style="margin-left:auto; font-size:18px;"></i>` : ''}
                    </div>
                    <div style="padding:0 15px; font-size:14px;">
                        <b>${p.likes?.length || 0} likes</b><br>
                        <b>${p.authorName}</b> ${p.text}
                        <div id="comments-${id}" style="font-size:12px; color:gray; margin-top:5px; cursor:pointer;" onclick="viewComments('${id}')">View comments...</div>
                    </div>
                `;
                area.appendChild(div);
            });
        });
    }

    // Double Like
    window.doubleLike = async (postId, el) => {
        const heart = el.querySelector('.heart-icon');
        heart.classList.add('animate');
        setTimeout(() => heart.classList.remove('animate'), 800);
        await toggleLike(postId, false, true);
    };

    window.toggleLike = async (postId, alreadyLiked, force = false) => {
        const ref = doc(db, "posts", postId);
        if (alreadyLiked && !force) {
            await updateDoc(ref, { likes: arrayRemove(me.uid) });
        } else {
            await updateDoc(ref, { likes: arrayUnion(me.uid) });
        }
    };

    // Upload Post Fix
    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return Swal.fire("Empty Post?");
        
        Swal.fire({ title: 'Sharing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            const uSnap = await getDoc(doc(db, "users", me.uid));
            const u = uSnap.data();
            await addDoc(collection(db, "posts"), {
                uid: me.uid, text: txt, img: selectedImgBase64 || null,
                authorName: u.displayName, authorImg: u.photoURL,
                timestamp: serverTimestamp(), likes: [], comments: []
            });
            document.getElementById('post-text').value = "";
            selectedImgBase64 = null;
            document.getElementById('img-preview-box').innerHTML = "";
            Swal.fire({ icon: 'success', title: 'Posted!', timer: 1500 });
        } catch(e) {
            Swal.fire("Error", "Image might be too large. Try smaller one.", "error");
        }
    };

    // View User & Follow System
    window.viewUser = async (uid) => {
        const uSnap = await getDoc(doc(db, "users", uid));
        const meSnap = await getDoc(doc(db, "users", me.uid));
        const u = uSnap.data();
        const myData = meSnap.data();
        const isFollowing = myData.following?.includes(uid);

        Swal.fire({
            background: '#121212', color: '#fff',
            html: `
                <img src="${u.photoURL}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                <h3>${u.displayName}</h3>
                <p style="color:gray">${u.bio || 'No bio'}</p>
                <button class="btn-main" onclick="toggleFollow('${uid}', ${isFollowing})">${isFollowing ? 'Unfollow' : 'Follow'}</button>
                <button class="btn-main" style="background:#262626" onclick="Swal.close(); openChat('${uid}', '${u.displayName}', '${u.photoURL}')">Message</button>
            `,
            showConfirmButton: false
        });
    };

    window.toggleFollow = async (targetUid, isFollowing) => {
        const myRef = doc(db, "users", me.uid);
        const targetRef = doc(db, "users", targetUid);
        if(isFollowing) {
            await updateDoc(myRef, { following: arrayRemove(targetUid) });
            await updateDoc(targetRef, { followers: arrayRemove(me.uid) });
        } else {
            await updateDoc(myRef, { following: arrayUnion(targetUid) });
            await updateDoc(targetRef, { followers: arrayUnion(me.uid) });
            // Add Notification
            await addDoc(collection(db, "notifications"), {
                to: targetUid, fromName: auth.currentUser.displayName, type: 'follow', timestamp: serverTimestamp()
            });
        }
        Swal.fire("Success!", "", "success");
    };

    // Share Post
    window.sharePost = (id) => {
        const url = window.location.href.split('?')[0] + "?post=" + id;
        navigator.clipboard.writeText(url);
        Swal.fire("Copied!", "Link copied to clipboard", "success");
    };

    // My Profile Posts Grid to Feed View
    window.loadMyPosts = () => {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid)), (snap) => {
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            document.getElementById('count-posts').innerText = snap.size;
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                grid.innerHTML += `
                    <div class="grid-item" onclick="viewSinglePost('${id}')">
                        ${p.img ? `<img src="${p.img}">` : `<div style="padding:10px; font-size:10px;">${p.text}</div>`}
                    </div>`;
            });
        });
    };

    window.viewSinglePost = async (id) => {
        const snap = await getDoc(doc(db, "posts", id));
        const p = snap.data();
        Swal.fire({
            background: '#000', color: '#fff',
            html: `
                <img src="${p.img || ''}" style="width:100%; border-radius:10px;">
                <p style="text-align:left; padding:10px;">${p.text}</p>
            `,
            showConfirmButton: false, showCloseButton: true
        });
    };

    // Comments
    window.addComment = async (postId) => {
        const { value: text } = await Swal.fire({
            title: 'Add Comment',
            input: 'text',
            inputPlaceholder: 'Write something...',
            background: '#121212', color: '#fff'
        });
        if(text) {
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ user: auth.currentUser.displayName, text: text })
            });
            Swal.fire("Commented!", "", "success");
        }
    };

    // Notifications
    window.showNotifications = () => {
        onSnapshot(query(collection(db, "notifications"), where("to", "==", me.uid), orderBy("timestamp", "desc")), (snap) => {
            let list = "";
            snap.forEach(d => {
                const n = d.data();
                list += `<div style="padding:10px; border-bottom:1px solid #333; text-align:left;">
                    <b>${n.fromName}</b> started following you.
                </div>`;
            });
            Swal.fire({ title: 'Notifications', html: list || "No new notifications", background: '#121212', color: '#fff' });
        });
    };

    // --- Standard UI Functions ---
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };
    window.toggleEdit = () => {
        const f = document.getElementById('edit-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    };
    window.saveAdvancedInfo = async () => {
        await updateDoc(doc(db, "users", me.uid), {
            bio: document.getElementById('edit-bio').value,
            work: document.getElementById('edit-work').value,
            location: document.getElementById('edit-location').value
        });
        Swal.fire('Updated!'); toggleEdit();
    };
    window.openChat = async (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(docSnap => {
                const m = docSnap.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    box.innerHTML += `<div class="chat-bubble ${m.sender === me.uid?'sent':'recv'}">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };
    window.sendMsg = async () => {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: inp.value, timestamp: serverTimestamp() });
        inp.value = "";
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());
    window.deletePost = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "posts", id)); };

    window.loadUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                if(docSnap.id !== me.uid) {
                    const html = `<div class="post-user" onclick="viewUser('${docSnap.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <div><b>${u.displayName} <i class="fas fa-check-circle v-badge"></i></b><br><small style="color:gray">${u.work || ''}</small></div>
                    </div>`;
                    list.innerHTML += html;
                    const chtml = html.replace("viewUser", "openChatFromList");
                    chatList.innerHTML += chtml;
                }
            });
        });
    };
    window.openChatFromList = (uid) => {
        getDoc(doc(db, "users", uid)).then(s => { const u = s.data(); openChat(uid, u.displayName, u.photoURL); });
    };

</script>
</body>
</html>
