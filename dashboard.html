<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; --accent: #1da1f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }

        /* Loader */
        .loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* Header */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .header h2 { color: var(--primary); margin: 0; font-style: italic; letter-spacing: 1px; }

        /* Sections */
        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Avatar System - Perfect Center */
        .avatar { object-fit: cover; object-position: center; border-radius: 50%; border: 1px solid #333; }

        /* Post Card UI */
        .post-card { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-header img { width: 45px; height: 45px; cursor: pointer; }
        .verify-badge { color: var(--accent); font-size: 12px; margin-left: 4px; }
        .post-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid #282828; }
        .action-btn { cursor: pointer; color: var(--gray); transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .action-btn:hover { color: var(--primary); }

        /* Chat Screen */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-header { background: var(--card); padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .chat-header b { cursor: pointer; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 75%; font-size: 14px; position: relative; }
        .msg.sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #242526; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Inputs & Global */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 18px; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="loader-img"></div>
    <p style="margin-top:15px; color:var(--primary); font-weight: bold;">Meetwoyou Secure Boot...</p>
</div>

<div class="header">
    <h2>Meetwoyou</h2>
    <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--gray); cursor:pointer;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="post-card">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <div style="display: flex; gap: 10px;">
            <label for="post-file" style="cursor:pointer; background:#222; padding:10px; border-radius:10px; flex:1; text-align:center; border:1px solid #333;">
                <i class="fas fa-image"></i> Photo
            </label>
            <input type="file" id="post-file" accept="image/*" style="display:none">
            <button class="btn-main" style="flex:2" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="search-sec" class="section">
    <input type="text" class="search-box" id="user-search" placeholder="Find people..." oninput="filterUsers()">
    <div id="all-users-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align:center; background:var(--card); padding:20px; border-radius:20px;">
        <div style="position:relative; width:100px; height:100px; margin:auto;">
            <img id="p-img" src="https://via.placeholder.com/100" class="avatar" style="width:100px; height:100px; border:2px solid var(--primary);">
            <label for="p-upload" style="position:absolute; bottom:0; right:0; background:var(--primary); padding:6px; border-radius:50%; cursor:pointer;"><i class="fas fa-camera"></i></label>
            <input type="file" id="p-upload" style="display:none">
        </div>
        <h3 id="display-name-view">User</h3>
        <input type="text" id="p-name" placeholder="Full Name">
        <textarea id="p-bio" placeholder="Bio"></textarea>
        <input type="text" id="p-edu" placeholder="Education">
        <input type="date" id="p-dob">
        <button class="btn-main" id="p-save-btn">Update Profile</button>
    </div>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="cw-img" class="avatar" style="width:40px; height:40px; cursor:pointer;" onclick="viewChatUserProfile()">
        <b id="cw-name" onclick="viewChatUserProfile()">User</b>
        <i class="fas fa-check-circle verify-badge" id="cw-v"></i>
    </div>
    <div class="chat-msgs" id="chat-box"></div>
    <div class="chat-input-area" style="background:var(--card); padding:10px; display:flex;">
        <input type="text" id="m-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--primary); font-size:20px; margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="showSec('search', this)"><i class="fas fa-users"></i><span>Users</span></div>
    <div class="nav-item" onclick="showSec('profile', this)"><i class="fas fa-user-edit"></i><span>Edit</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDocs, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    let chatUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loader').style.display = 'none';
            loadProfileData(user);
            loadUsers();
            loadPosts();
        } else {
            window.location.href = "index.html"; 
        }
    });

    // Profile Handling
    async function loadProfileData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        document.getElementById('p-img').src = user.photoURL || "https://via.placeholder.com/100";
        document.getElementById('p-name').value = user.displayName || "";
        document.getElementById('display-name-view').innerText = user.displayName || "User";
        if(snap.exists()) {
            document.getElementById('p-bio').value = snap.data().bio || "";
            document.getElementById('p-edu').value = snap.data().education || "";
            document.getElementById('p-dob').value = snap.data().dob || "";
        }
    }

    document.getElementById('p-save-btn').onclick = async () => {
        const user = auth.currentUser;
        let photoUrl = user.photoURL;
        const file = document.getElementById('p-upload').files[0];
        if(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json();
            photoUrl = data.secure_url;
        }
        const pData = { displayName: document.getElementById('p-name').value, bio: document.getElementById('p-bio').value, education: document.getElementById('p-edu').value, dob: document.getElementById('p-dob').value, photoURL: photoUrl };
        await setDoc(doc(db, "users", user.uid), pData, {merge:true});
        await updateProfile(user, {displayName: pData.displayName, photoURL: photoUrl});
        Swal.fire('Updated!', '', 'success').then(() => location.reload());
    };

    // Feed & Post Edit Logic
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;
        Swal.showLoading();
        let imgUrl = "";
        if(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json();
            imgUrl = data.secure_url;
        }
        await addDoc(collection(db, "posts"), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL, text, img: imgUrl, likes: 0, timestamp: serverTimestamp() });
        document.getElementById('post-text').value = "";
        Swal.fire('Posted!', '', 'success');
    };

    function loadPosts() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(pDoc => {
                const p = pDoc.data(); const pid = pDoc.id; const isOwner = p.uid === auth.currentUser.uid;
                const card = document.createElement('div'); card.className = "post-card";
                card.innerHTML = `
                    <div class="post-header">
                        <img src="${p.photo || 'https://via.placeholder.com/45'}" class="avatar" onclick="viewUserProfile('${p.uid}')">
                        <div style="flex:1">
                            <b>${p.name} <i class="fas fa-check-circle verify-badge"></i></b><br>
                            <small style="color:var(--gray); font-size:10px;">${p.timestamp ? new Date(p.timestamp.toDate()).toLocaleString() : ''}</small>
                        </div>
                        ${isOwner ? `
                            <i class="fas fa-edit" onclick="editPost('${pid}', \`${p.text}\`)" style="color:var(--gray); cursor:pointer; margin-right:10px;"></i>
                            <i class="fas fa-trash" onclick="deletePost('${pid}')" style="color:#e74c3c; cursor:pointer;"></i>
                        ` : ''}
                    </div>
                    <p>${p.text}</p>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="post-actions">
                        <div class="action-btn" onclick="handleLike('${pid}')"><i class="fas fa-heart"></i> ${p.likes || 0}</div>
                        <div class="action-btn" onclick="toggleComments('${pid}')"><i class="fas fa-comment"></i> Comment</div>
                        <div class="action-btn" onclick="sharePost('${pid}')"><i class="fas fa-share"></i> Share</div>
                    </div>
                    <div class="comment-container" id="comment-box-${pid}">
                        <div class="comment-list" id="comment-list-${pid}"></div>
                        <div class="comment-input-box">
                            <input type="text" id="c-input-${pid}" placeholder="Comment..." style="margin:0; padding:8px;">
                            <button onclick="addComment('${pid}')" style="background:var(--primary); border:none; color:white; border-radius:8px; padding:0 10px;"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                `;
                area.appendChild(card);
            });
        });
    }

    // Fixed Edit Post function
    window.editPost = async (pid, oldText) => {
        const { value: newText } = await Swal.fire({
            title: 'Edit Post',
            input: 'textarea',
            inputValue: oldText,
            showCancelButton: true
        });
        if (newText !== undefined) {
            await updateDoc(doc(db, "posts", pid), { text: newText });
            Swal.fire('Updated!', '', 'success');
        }
    };

    window.sharePost = (pid) => {
        const shareUrl = window.location.href + "#post-" + pid;
        navigator.clipboard.writeText(shareUrl);
        Swal.fire('Link Copied!', 'Post link copied to clipboard.', 'success');
    };

    // Chat and Messaging
    window.openChat = (uid, name, img) => {
        chatUID = uid;
        document.getElementById('cw-name').innerText = name;
        document.getElementById('cw-img').src = img || 'https://via.placeholder.com/40';
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(mDoc => {
                const m = mDoc.data();
                if((m.sender === auth.currentUser.uid && m.receiver === uid) || (m.sender === uid && m.receiver === auth.currentUser.uid)){
                    const div = document.createElement('div');
                    div.className = m.sender === auth.currentUser.uid ? "msg sent" : "msg received";
                    div.innerText = m.content; box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.viewChatUserProfile = () => { if(chatUID) viewUserProfile(chatUID); };

    window.viewUserProfile = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const u = snap.data();
            Swal.fire({
                title: u.displayName,
                html: `<img src="${u.photoURL || 'https://via.placeholder.com/100'}" class="avatar" style="width:100px; height:100px; border:2px solid var(--primary);"><br><br><b>Bio:</b> ${u.bio || 'Available'}<br><b>Education:</b> ${u.education || 'N/A'}`,
                showCancelButton: true,
                confirmButtonText: 'Message',
                confirmButtonColor: '#8e44ad'
            }).then(r => { if(r.isConfirmed) openChat(uid, u.displayName, u.photoURL); });
        }
    };

    window.sendMsg = async () => {
        const input = document.getElementById('m-input');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { sender: auth.currentUser.uid, receiver: chatUID, content: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };

    window.loadUsers = async () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('all-users-list'); list.innerHTML = "";
            snap.forEach(uDoc => {
                if(uDoc.id !== auth.currentUser.uid) {
                    const u = uDoc.data();
                    const div = document.createElement('div'); div.className = "user-card";
                    div.innerHTML = `<img src="${u.photoURL || 'https://via.placeholder.com/60'}" class="avatar"> <div><b>${u.displayName} <i class="fas fa-check-circle verify-badge"></i></b><br><small>${u.bio || 'Available'}</small></div>`;
                    div.onclick = () => openChat(uDoc.id, u.displayName, u.photoURL);
                    list.appendChild(div);
                }
            });
        });
    };

    // Standard Actions
    window.handleLike = (pid) => updateDoc(doc(db, "posts", pid), { likes: increment(1) });
    window.deletePost = (pid) => {
        Swal.fire({ title: 'Delete?', showCancelButton: true }).then(async (res) => {
            if(res.isConfirmed) await deleteDoc(doc(db, "posts", pid));
        });
    };
    window.toggleComments = (pid) => {
        const box = document.getElementById(`comment-box-${pid}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
        if(box.style.display === 'block') loadComments(pid);
    };
    window.addComment = async (pid) => {
        const input = document.getElementById(`c-input-${pid}`);
        if(!input.value.trim()) return;
        await addDoc(collection(db, "posts", pid, "comments"), { name: auth.currentUser.displayName, text: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };
    function loadComments(pid) {
        onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("timestamp", "asc")), (snap) => {
            const list = document.getElementById(`comment-list-${pid}`); list.innerHTML = "";
            snap.forEach(cDoc => {
                const c = cDoc.data(); list.innerHTML += `<div class="comment-item"><b>${c.name}:</b> ${c.text}</div>`;
            });
        });
    }

    // UI Navigation
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());
    window.filterUsers = () => {
        const t = document.getElementById('user-search').value.toLowerCase();
        document.querySelectorAll('.user-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(t) ? "flex" : "none");
    };
</script>
</body>
</html>
