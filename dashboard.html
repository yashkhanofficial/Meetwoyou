<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; }
        
        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .recv { background: #262626; align-self: flex-start; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        
        .notification-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-power-off" onclick="userLogout()" style="font-size:20px; color:var(--danger); cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Meetwoyou</h2>
    <div style="position: relative;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <div id="noti-dot" class="notification-dot"></div>
    </div>
</div>

<div id="home-sec" class="section active">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;">Add Photo</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <div style="position: relative; width: 90px; margin: auto;">
            <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
            <label for="p-file-up" style="position: absolute; bottom: 0; right: 0; background: var(--primary); padding: 5px; border-radius: 50%; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 12px;"></i>
            </label>
            <input type="file" id="p-file-up" style="display:none" onchange="updateProfilePic(this)">
        </div>
        <h3 id="p-name">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:10px;"></p>
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()" style="cursor:pointer;"></i>
        <i class="fas fa-share-alt" id="user-share-btn" style="cursor:pointer;"></i>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold; cursor:pointer;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user; 
            const uRef = doc(db, "users", user.uid);
            const snap = await getDoc(uRef);
            if(!snap.exists()) await setDoc(uRef, { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, followers:[], following:[] });
            init(); 
        } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyProfile();
        loadFeed();
        loadAllUsers();
        loadMyPosts();
    }

    // --- Post Controls ---
    window.toggleLike = async (id, liked) => {
        await updateDoc(doc(db, "posts", id), { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
    };

    window.addComment = async (postId, targetUid) => {
        const { value: text } = await Swal.fire({ 
            title: 'Write Comment', input: 'text', background: '#121212', color: '#fff', confirmButtonColor: '#0095f6' 
        });
        if(text) {
            await updateDoc(doc(db, "posts", postId), { comments: arrayUnion({ author: me.displayName, text: text, time: Date.now() }) });
            if(targetUid !== me.uid) sendNotification(targetUid, 'commented on your post');
        }
    };

    window.sharePost = (id) => {
        const url = window.location.origin + "?post=" + id;
        navigator.clipboard.writeText(url);
        Swal.fire({ icon: 'success', title: 'Link Copied!', background: '#121212', color: '#fff', timer: 1500, showConfirmButton: false });
    };

    window.postMenu = async (id, oldText) => {
        const { value: action } = await Swal.fire({
            title: 'Manage Post',
            showDenyButton: true, confirmButtonText: 'Edit', denyButtonText: 'Delete',
            background: '#121212', color: '#fff'
        });

        if (action === true) { // Edit
            const { value: newText } = await Swal.fire({ input: 'textarea', inputValue: oldText });
            if (newText) await updateDoc(doc(db, "posts", id), { text: newText });
        } else if (Swal.DismissReason.deny || true) { // Delete logic within SweetAlert deny
            Swal.fire({
                title: 'Are you sure?', text: "Post will be deleted permanently!", icon: 'warning',
                showCancelButton: true, confirmButtonText: 'Yes, Delete', background: '#121212', color: '#fff'
            }).then(async (result) => {
                if (result.isConfirmed) await deleteDoc(doc(db, "posts", id));
            });
        }
    };

    // --- Core Rendering ---
    function renderPost(p, id, target) {
        const isLiked = p.likes?.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="viewUser('${p.uid}')">
                <img src="${p.authorImg || 'https://via.placeholder.com/35'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                <b>${p.authorName}${vB}</b>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-v" style="margin-left:auto; padding:10px;" onclick="event.stopPropagation(); postMenu('${id}', '${p.text}')"></i>` : ''}
            </div>
            ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${id}', ${isLiked})">` : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                <i class="far fa-comment" onclick="addComment('${id}', '${p.uid}')"></i>
                <i class="far fa-paper-plane" onclick="sharePost('${id}')"></i>
            </div>
            <div style="padding:0 15px; font-size:14px;">
                <b>${p.likes?.length || 0} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
                <div style="color:gray; font-size:12px; margin-top:5px; cursor:pointer;" onclick="showComments('${id}')">View all ${p.comments?.length || 0} comments</div>
            </div>
        `;
        target.appendChild(div);
    }

    window.showComments = async (id) => {
        const snap = await getDoc(doc(db, "posts", id));
        const p = snap.data();
        let html = '<div style="max-height:300px; overflow-y:auto; text-align:left;">';
        p.comments?.forEach(c => {
            html += `<p style="margin:5px 0;"><b>${c.author}:</b> ${c.text}</p>`;
        });
        html += '</div>';
        Swal.fire({ title: 'Comments', html: html || 'No comments yet', background: '#121212', color: '#fff' });
    };

    window.viewSinglePost = async (id) => {
        const snap = await getDoc(doc(db, "posts", id));
        const p = snap.data();
        const area = document.createElement('div');
        area.style.background = '#000';
        renderPost(p, id, area);
        Swal.fire({ html: area, showConfirmButton: false, background: '#000', width: '500px', padding: '0' });
    };

    // --- Profile, Image & Other logic ---
    window.loadMyPosts = () => {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", me.uid), orderBy("timestamp", "desc")), (snap) => {
            document.getElementById('count-posts').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid'); grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="grid-item" onclick="viewSinglePost('${d.id}')">${p.img ? `<img src="${p.img}">` : `<div style="padding:10px; font-size:10px; color:gray;">${p.text}</div>`}</div>`;
            });
        });
    };

    // Re-linking existing profile logic
    window.loadMyProfile = () => {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data(); if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + vB;
            document.getElementById('p-img').src = d.photoURL || "https://via.placeholder.com/90";
            document.getElementById('p-bio').innerText = d.bio || "No bio yet";
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
            document.getElementById('edit-name').value = d.displayName;
            document.getElementById('edit-bio').value = d.bio || "";
        });
    };

    window.saveProfile = async () => {
        const name = document.getElementById('edit-name').value;
        const bio = document.getElementById('edit-bio').value;
        await updateDoc(doc(db, "users", me.uid), { displayName: name, bio: bio });
        await updateProfile(auth.currentUser, { displayName: name });
        Swal.fire("Success", "Profile Updated", "success");
        toggleEdit();
    };

    window.userLogout = () => {
        Swal.fire({ title: 'Logout?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Yes', background: '#121212', color: '#fff' })
        .then(r => { if(r.isConfirmed) signOut(auth); });
    };

    // Keep your Cloudinary & Post upload logic as it was
    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!txt && !file) return;
        Swal.fire({title: 'Posting...', didOpen: () => Swal.showLoading()});
        let imgUrl = null;
        if(file) {
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', 'Meetwoyou');
            const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, { method: 'POST', body: fd });
            const data = await res.json(); imgUrl = data.secure_url;
        }
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: imgUrl, authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        document.getElementById('post-text').value = ""; document.getElementById('post-file').value = "";
        document.getElementById('img-preview-box').innerHTML = ""; Swal.close();
    };

    // Navigation Helpers
    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        if(id === 'profile') window.scrollTo(0,0);
    };
    window.toggleEdit = () => { const e = document.getElementById('edit-form'); e.style.display = e.style.display==='none'?'block':'none'; };
    window.previewImg = (i) => {
        const r = new FileReader(); r.onload = (e) => {
            document.getElementById('img-preview-box').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        }; r.readAsDataURL(i.files[0]);
    };

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(d => renderPost(d.data(), d.id, area));
        });
    }

    // Load Discovery logic... (already working in your code)
    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    const html = `<div class="post-user" onclick="viewUser('${d.id}')"><img src="${u.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"><b>${u.displayName}${vB}</b></div>`;
                    list.innerHTML += html;
                    const cItem = document.createElement('div'); cItem.innerHTML = html;
                    cItem.onclick = () => openChat(d.id, u.displayName, u.photoURL);
                    chatList.appendChild(cItem);
                }
            });
        });
    };

</script>
</body>
</html>
