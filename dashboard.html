<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-circle { width: 40px; height: 40px; border: 3px solid #262626; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header { background: #000; padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; sticky: top; z-index: 100; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .section { display: none; max-width: 500px; margin: auto; padding: 10px; }
        .section.active { display: block; }
        .post-card { border-bottom: 1px solid #262626; padding: 15px 0; }
        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="app-loader">
    <div class="loader-circle"></div>
    <p class="mt-4 text-gray-400">Loading Meetwoyou...</p>
</div>

<div class="header">
    <h2 class="text-2xl font-bold italic text-white">Meetwoyou</h2>
    <i class="fas fa-sign-out-alt text-red-500" onclick="userLogout()"></i>
</div>

<div id="home-sec" class="section active">
    <div class="bg-gray-900 p-4 rounded-xl mb-4">
        <textarea id="post-text" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-white" placeholder="What's new?"></textarea>
        <div id="preview-box" class="my-2"></div>
        <div class="flex gap-2 mt-2">
            <button onclick="document.getElementById('post-file').click()" class="bg-gray-800 px-4 py-2 rounded-lg text-sm">Media</button>
            <input type="file" id="post-file" hidden accept="image/*,video/*" onchange="previewMedia(this)">
            <button onclick="uploadPost()" class="bg-blue-600 flex-1 py-2 rounded-lg font-bold">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <input type="text" id="user-search" oninput="searchUsers(this.value)" class="w-full bg-gray-900 p-3 rounded-lg mb-4" placeholder="Search friends...">
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 class="text-xl font-bold p-2">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="chat-screen">
    <div class="p-4 border-b border-gray-800 flex items-center gap-4">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" class="w-10 h-10 rounded-full object-cover">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
    <div class="p-4 bg-gray-900 flex gap-2">
        <input type="text" id="chat-input" class="flex-1 bg-black p-2 rounded-lg" placeholder="Type a message...">
        <button onclick="sendMsg()" class="text-blue-500 font-bold">Send</button>
    </div>
</div>

<nav class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment" onclick="showSec('msg')"></i>
    <i class="fas fa-user" onclick="showSec('profile')"></i>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            me = user;
            // ইউজার ডাটাবেসে আছে কিনা চেক করা
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    displayName: user.displayName || "User",
                    photoURL: user.photoURL || "https://via.placeholder.com/100",
                    uid: user.uid,
                    timestamp: serverTimestamp()
                });
            }
            init();
            document.getElementById('app-loader').style.display = 'none';
        } else {
            window.location.href = "index.html";
        }
    });

    function init() {
        loadFeed();
        loadUsers();
    }

    // নিউজ ফিড লোড করা
    function loadFeed() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            if(snap.empty) area.innerHTML = "<p class='text-center text-gray-500 mt-10'>No posts yet.</p>";
            snap.forEach(d => {
                const p = d.data();
                area.innerHTML += `
                    <div class="post-card">
                        <div class="flex items-center gap-3 px-2 mb-2">
                            <img src="${p.authorImg}" class="w-8 h-8 rounded-full">
                            <b class="text-sm">${p.authorName}</b>
                        </div>
                        ${p.img ? (p.fileType === 'video' ? `<video src="${p.img}" controls class="w-full"></video>` : `<img src="${p.img}" class="w-full">`) : ''}
                        <div class="p-2 text-sm text-gray-300">${p.text || ''}</div>
                    </div>`;
            });
        });
    }

    // ইউজার লিস্ট লোড করা
    function loadUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const cList = document.getElementById('chat-list');
            list.innerHTML = ""; cList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(u.uid !== me.uid) {
                    const html = `
                        <div class="flex items-center gap-4 p-3 border-b border-gray-900 cursor-pointer" onclick="openChat('${u.uid}', '${u.displayName}', '${u.photoURL}')">
                            <img src="${u.photoURL}" class="w-12 h-12 rounded-full object-cover">
                            <b>${u.displayName}</b>
                        </div>`;
                    list.innerHTML += html;
                    cList.innerHTML += html;
                }
            });
        });
    }

    // চ্যাট সিস্টেম
    window.openChat = (uid, name, img) => {
        window.activeChatID = uid;
        document.getElementById('chat-h-name').innerText = name;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const side = m.sender === me.uid ? 'bg-blue-600 self-end' : 'bg-gray-800 self-start';
                    box.innerHTML += `<div class="${side} px-3 py-2 rounded-xl max-w-[80%] text-sm">${m.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            sender: me.uid, receiver: window.activeChatID, text: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    // পোস্ট আপলোড
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;

        Swal.fire({title: 'Posting...', didOpen: () => Swal.showLoading()});
        
        let mediaUrl = null;
        let type = 'text';

        if(file) {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', 'Meetwoyou');
            const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload', { method: 'POST', body: fd });
            const data = await res.json();
            mediaUrl = data.secure_url;
            type = file.type.startsWith('video') ? 'video' : 'image';
        }

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: text, img: mediaUrl, fileType: type,
            authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp()
        });

        document.getElementById('post-text').value = "";
        document.getElementById('preview-box').innerHTML = "";
        Swal.close();
    };

    window.previewMedia = (input) => {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('preview-box').innerHTML = `<img src="${e.target.result}" class="w-20 rounded-lg">`;
        };
        reader.readAsDataURL(file);
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.userLogout = () => signOut(auth);

</script>
</body>
</html>
