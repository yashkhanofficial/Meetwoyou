<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; --accent: #1da1f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; overflow-x: hidden; }

        .loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .header h2 { color: var(--primary); margin: 0; font-style: italic; letter-spacing: 1px; }

        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Story Bar */
        .story-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .story-item { min-width: 70px; text-align: center; cursor: pointer; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; object-fit: cover; }

        /* Avatar System */
        .avatar { object-fit: cover; object-position: center; border-radius: 50%; }

        /* Post Card UI */
        .post-card { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-header img { width: 45px; height: 45px; cursor: pointer; }
        .verify-badge { color: var(--accent); font-size: 11px; margin-left: 3px; }
        .post-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 12px; border-top: 1px solid #282828; }
        .action-btn { cursor: pointer; color: var(--gray); font-size: 14px; display: flex; align-items: center; gap: 6px; }

        /* Profile Advance UI */
        .profile-info-grid { text-align: left; background: #222; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 14px; }
        .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; color: var(--gray); }
        .info-row i { color: var(--primary); width: 20px; }

        /* Chat Screen */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-header { background: var(--card); padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 75%; font-size: 14px; }
        .msg.sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #242526; align-self: flex-start; border-bottom-left-radius: 2px; }

        input, textarea { width: 100%; padding: 12px; margin: 6px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 18px; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="loader-img"></div>
    <p style="margin-top:15px; color:var(--primary); font-weight: bold;">Meetwoyou Secure Boot...</p>
</div>

<div class="header">
    <h2>Meetwoyou</h2>
    <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--gray); cursor:pointer;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-list">
        <div class="story-item" onclick="uploadStory()">
            <div class="story-circle" style="display:flex; align-items:center; justify-content:center; background:#222;">
                <i class="fas fa-plus"></i>
            </div>
            <small>My Story</small>
        </div>
    </div>

    <div class="post-card">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <div style="display: flex; gap: 10px;">
            <label for="post-file" style="cursor:pointer; background:#222; padding:10px; border-radius:10px; flex:1; text-align:center; border:1px solid #333;"><i class="fas fa-image"></i> Photo</label>
            <input type="file" id="post-file" accept="image/*" style="display:none">
            <button class="btn-main" style="flex:2; margin:0;" onclick="uploadPost()">Post</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="search-sec" class="section">
    <input type="text" class="search-box" id="user-search" placeholder="Search friends..." oninput="filterUsers()">
    <div id="all-users-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align:center; background:var(--card); padding:20px; border-radius:20px; border:1px solid #222;">
        <div style="position:relative; width:100px; height:100px; margin:auto;">
            <img id="p-img" src="https://via.placeholder.com/100" class="avatar" style="width:100px; height:100px; border:3px solid var(--primary);">
            <label for="p-upload" style="position:absolute; bottom:0; right:0; background:var(--primary); padding:6px; border-radius:50%; cursor:pointer;"><i class="fas fa-camera"></i></label>
            <input type="file" id="p-upload" style="display:none">
        </div>
        <h3 id="display-name-view" style="margin:10px 0 5px 0;">User Name</h3>
        <p id="p-bio-view" style="color:var(--gray); font-size:14px; margin-bottom:15px;">Your bio here</p>

        <div class="profile-info-grid" id="profile-info-display">
            </div>

        <div id="edit-profile-form" style="display:none;">
            <input type="text" id="p-name" placeholder="Full Name">
            <input type="text" id="p-bio" placeholder="Short Bio">
            <input type="text" id="p-work" placeholder="Workplace">
            <input type="text" id="p-edu" placeholder="Education">
            <input type="text" id="p-country" placeholder="Country">
            <input type="text" id="p-living" placeholder="Current City">
            <input type="date" id="p-dob">
            <button class="btn-main" id="p-save-btn">Save Changes</button>
        </div>
        <button class="btn-main" style="background:#333;" onclick="toggleEditForm()">Edit Profile</button>
    </div>
    <h4 style="margin-top:20px; border-left:4px solid var(--primary); padding-left:10px;">My Posts</h4>
    <div id="my-posts-area"></div>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="cw-img" class="avatar" style="width:40px; height:40px; cursor:pointer;" onclick="viewChatUserProfile()">
        <div style="flex:1" onclick="viewChatUserProfile()">
            <b id="cw-name">User</b> <i class="fas fa-check-circle verify-badge"></i><br>
            <small style="font-size:10px; color:var(--gray)">Active now</small>
        </div>
    </div>
    <div class="chat-msgs" id="chat-box"></div>
    <div class="chat-input-area" style="background:var(--card); padding:10px; display:flex;">
        <input type="text" id="m-input" placeholder="Type a message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--primary); font-size:20px; margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="showSec('search', this)"><i class="fas fa-users"></i><span>Friends</span></div>
    <div class="nav-item" onclick="showSec('profile', this)"><i class="fas fa-user-circle"></i><span>Profile</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDocs, updateDoc, increment, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    let chatUID = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loader').style.display = 'none';
            loadProfileData(user.uid);
            loadUsers();
            loadPosts();
            loadStories();
            loadMyPosts(user.uid);
        } else {
            window.location.href = "index.html"; 
        }
    });

    // Advance Profile Data
    async function loadProfileData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if(snap.exists()){
            const d = snap.data();
            if(uid === auth.currentUser.uid){
                document.getElementById('p-img').src = d.photoURL || "https://via.placeholder.com/100";
                document.getElementById('display-name-view').innerText = d.displayName || "User";
                document.getElementById('p-bio-view').innerText = d.bio || "No bio added.";
                
                document.getElementById('profile-info-display').innerHTML = `
                    <div class="info-row"><i class="fas fa-briefcase"></i> Works at <b>${d.work || 'N/A'}</b></div>
                    <div class="info-row"><i class="fas fa-graduation-cap"></i> Studied at <b>${d.education || 'N/A'}</b></div>
                    <div class="info-row"><i class="fas fa-home"></i> Lives in <b>${d.living || 'N/A'}</b></div>
                    <div class="info-row"><i class="fas fa-map-marker-alt"></i> From <b>${d.country || 'N/A'}</b></div>
                    <div class="info-row"><i class="fas fa-birthday-cake"></i> Born on <b>${d.dob || 'N/A'}</b></div>
                `;
                // Fill form
                document.getElementById('p-name').value = d.displayName || "";
                document.getElementById('p-bio').value = d.bio || "";
                document.getElementById('p-work').value = d.work || "";
                document.getElementById('p-edu').value = d.education || "";
                document.getElementById('p-country').value = d.country || "";
                document.getElementById('p-living').value = d.living || "";
                document.getElementById('p-dob').value = d.dob || "";
            }
        }
    }

    window.toggleEditForm = () => {
        const form = document.getElementById('edit-profile-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    document.getElementById('p-save-btn').onclick = async () => {
        const user = auth.currentUser;
        let photoUrl = user.photoURL;
        const file = document.getElementById('p-upload').files[0];
        if(file) {
            const formData = new FormData();
            formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json(); photoUrl = data.secure_url;
        }
        const pData = { 
            displayName: document.getElementById('p-name').value, 
            bio: document.getElementById('p-bio').value, 
            work: document.getElementById('p-work').value,
            education: document.getElementById('p-edu').value, 
            country: document.getElementById('p-country').value,
            living: document.getElementById('p-living').value,
            dob: document.getElementById('p-dob').value, 
            photoURL: photoUrl 
        };
        await setDoc(doc(db, "users", user.uid), pData, {merge:true});
        await updateProfile(user, {displayName: pData.displayName, photoURL: photoUrl});
        Swal.fire('Profile Updated!', '', 'success').then(() => location.reload());
    };

    // Story System (24h Auto Delete logic)
    window.uploadStory = async () => {
        const { value: file } = await Swal.fire({ title: 'Select Image', input: 'file', inputAttributes: { 'accept': 'image/*', 'aria-label': 'Upload story' } });
        if(file) {
            Swal.showLoading();
            const formData = new FormData();
            formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json();
            await addDoc(collection(db, "stories"), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL, img: data.secure_url, timestamp: Date.now() });
            Swal.fire('Story Shared!', '', 'success');
        }
    };

    function loadStories() {
        const now = Date.now();
        const fullDay = 24 * 60 * 60 * 1000;
        onSnapshot(collection(db, "stories"), (snap) => {
            const list = document.getElementById('story-list');
            list.innerHTML = `<div class="story-item" onclick="uploadStory()"><div class="story-circle" style="display:flex; align-items:center; justify-content:center; background:#222;"><i class="fas fa-plus"></i></div><small>Add Story</small></div>`;
            snap.forEach(doc => {
                const s = doc.data();
                if (now - s.timestamp > fullDay) {
                    deleteDoc(doc.ref); // Auto delete after 24h
                } else {
                    list.innerHTML += `<div class="story-item" onclick="viewStory('${s.img}')"><img src="${s.photo}" class="story-circle"><small>${s.name.split(' ')[0]}</small></div>`;
                }
            });
        });
    }

    window.viewStory = (url) => Swal.fire({ imageUrl: url, imageAlt: 'Story', showConfirmButton: false });

    // My Posts in Profile
    function loadMyPosts(uid) {
        onSnapshot(query(collection(db, "posts"), where("uid", "==", uid), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('my-posts-area'); area.innerHTML = "";
            snap.forEach(doc => area.appendChild(createPostCard(doc.data(), doc.id)));
        });
    }

    // Feed & Posting
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;
        Swal.showLoading();
        let imgUrl = "";
        if(file) {
            const formData = new FormData();
            formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json(); imgUrl = data.secure_url;
        }
        await addDoc(collection(db, "posts"), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL, text, img: imgUrl, likes: 0, timestamp: serverTimestamp() });
        document.getElementById('post-text').value = "";
        Swal.fire('Posted!', '', 'success');
    };

    function loadPosts() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area'); area.innerHTML = "";
            snap.forEach(doc => area.appendChild(createPostCard(doc.data(), doc.id)));
        });
    }

    function createPostCard(p, pid) {
        const div = document.createElement('div'); div.className = "post-card";
        div.innerHTML = `
            <div class="post-header">
                <img src="${p.photo || 'https://via.placeholder.com/45'}" class="avatar" onclick="viewUserProfile('${p.uid}')">
                <div style="flex:1">
                    <b>${p.name} <i class="fas fa-check-circle verify-badge"></i></b><br>
                    <small style="color:var(--gray); font-size:10px;">${p.timestamp ? new Date(p.timestamp.toDate()).toLocaleString() : ''}</small>
                </div>
            </div>
            <p>${p.text}</p>
            ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
            <div class="post-actions">
                <div class="action-btn" onclick="handleLike('${pid}')"><i class="fas fa-heart"></i> ${p.likes || 0}</div>
                <div class="action-btn" onclick="toggleComments('${pid}')"><i class="fas fa-comment"></i> Comment</div>
                <div class="action-btn" onclick="sharePost('${pid}')"><i class="fas fa-share"></i> Share</div>
            </div>
            <div class="comment-container" id="comment-box-${pid}" style="display:none">
                <div id="comment-list-${pid}" style="margin-top:10px; font-size:13px;"></div>
                <input type="text" id="c-input-${pid}" placeholder="Write a comment..." style="padding:8px;">
                <button class="btn-main" onclick="addComment('${pid}')">Send</button>
            </div>
        `;
        return div;
    }

    // Messaging System
    window.openChat = (uid, name, img) => {
        chatUID = uid;
        document.getElementById('cw-name').innerText = name;
        document.getElementById('cw-img').src = img || 'https://via.placeholder.com/40';
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(mDoc => {
                const m = mDoc.data();
                if((m.sender === auth.currentUser.uid && m.receiver === uid) || (m.sender === uid && m.receiver === auth.currentUser.uid)){
                    const div = document.createElement('div');
                    div.className = m.sender === auth.currentUser.uid ? "msg sent" : "msg received";
                    div.innerText = m.content; box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.viewChatUserProfile = () => { if(chatUID) viewUserProfile(chatUID); };

    window.viewUserProfile = async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const u = snap.data();
            Swal.fire({
                title: u.displayName,
                html: `
                    <img src="${u.photoURL || 'https://via.placeholder.com/100'}" class="avatar" style="width:80px; height:80px; border:2px solid var(--primary);"><br>
                    <p style="color:var(--gray)">${u.bio || ''}</p>
                    <div style="text-align:left; font-size:13px; background:#f4f4f4; color:#333; padding:10px; border-radius:10px;">
                        <i class="fas fa-briefcase"></i> Work: ${u.work || 'N/A'}<br>
                        <i class="fas fa-graduation-cap"></i> Edu: ${u.education || 'N/A'}<br>
                        <i class="fas fa-home"></i> Lives in: ${u.living || 'N/A'}<br>
                        <i class="fas fa-map-marker-alt"></i> From: ${u.country || 'N/A'}
                    </div>`,
                showCancelButton: true, confirmButtonText: 'Message', confirmButtonColor: '#8e44ad'
            }).then(r => { if(r.isConfirmed) openChat(uid, u.displayName, u.photoURL); });
        }
    };

    window.sendMsg = async () => {
        const input = document.getElementById('m-input');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { sender: auth.currentUser.uid, receiver: chatUID, content: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };

    window.loadUsers = async () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('all-users-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                if(doc.id !== auth.currentUser.uid){
                    const div = document.createElement('div'); div.style = "display:flex; align-items:center; gap:15px; background:var(--card); padding:10px; border-radius:12px; margin-bottom:10px; cursor:pointer;";
                    div.innerHTML = `<img src="${u.photoURL || 'https://via.placeholder.com/50'}" class="avatar" style="width:50px; height:50px;"> <div><b>${u.displayName}</b><br><small style="color:var(--gray)">View Profile</small></div>`;
                    div.onclick = () => viewUserProfile(doc.id);
                    list.appendChild(div);
                }
            });
        });
    };

    // Standard Social Logic
    window.handleLike = (pid) => updateDoc(doc(db, "posts", pid), { likes: increment(1) });
    window.sharePost = (pid) => { navigator.clipboard.writeText(window.location.href + "#" + pid); Swal.fire('Link Copied!', '', 'success'); };
    window.toggleComments = (pid) => { const b = document.getElementById(`comment-box-${pid}`); b.style.display = b.style.display === 'none' ? 'block' : 'none'; };
    window.addComment = async (pid) => {
        const i = document.getElementById(`c-input-${pid}`); if(!i.value) return;
        await addDoc(collection(db, "posts", pid, "comments"), { name: auth.currentUser.displayName, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };
    function loadComments(pid) {
        onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("timestamp", "asc")), (snap) => {
            const l = document.getElementById(`comment-list-${pid}`); l.innerHTML = "";
            snap.forEach(d => { const c = d.data(); l.innerHTML += `<div><b>${c.name}:</b> ${c.text}</div>`; });
        });
    }

    // UI Navigation
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
