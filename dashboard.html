<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Header & Nav */
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; }

        /* Sections */
        .section { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Story Bar */
        .story-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story-item { flex-shrink: 0; text-align: center; width: 65px; cursor: pointer; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; border: 2px solid var(--primary); object-fit: cover; }
        .story-name { font-size: 10px; color: var(--gray); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; margin-top: 5px; }

        /* Post Cards */
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 10px; }
        .post-user { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #050505; }
        .post-time { font-size: 10px; color: var(--gray); margin-left: auto; }

        /* Chat System */
        #chat-screen, #user-profile-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; position: relative; cursor: pointer; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Profile & Buttons */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-logout { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #262626; color: white; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .notification-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: red; border-radius: 50%; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive; font-size: 28px;">Meetwoyou</h2>
    <div style="position: relative;">
        <i class="far fa-bell" onclick="showNotifications()" style="font-size:22px; cursor:pointer;"></i>
        <div id="noti-dot" class="notification-dot"></div>
    </div>
</div>

<div id="home-sec" class="section active">
    <div class="story-bar" id="story-area">
        <div class="story-item" onclick="document.getElementById('story-file').click()">
            <div class="story-ring" style="display:flex; align-items:center; justify-content:center; background:#262626; border: 2px dashed #555;">
                <i class="fas fa-plus"></i>
            </div>
            <div class="story-name">Your Story</div>
            <input type="file" id="story-file" accept="image/*" style="display:none" onchange="uploadStory(this)">
        </div>
    </div>
    
    <div style="background: var(--card); padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid #262626;">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <button onclick="document.getElementById('post-file').click()" style="background:#262626; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;">Add Photo</button>
        <div id="img-preview-box"></div>
        <button class="btn-main" onclick="uploadPost()">Share Post</button>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..."></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:10px 15px;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 15px;">
        <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid #262626;">
        <h3 id="p-name"></h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:10px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin: 15px 0;">
            <div><b id="count-posts">0</b><br><small>Posts</small></div>
            <div><b id="count-followers">0</b><br><small>Followers</small></div>
            <div><b id="count-following">0</b><br><small>Following</small></div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:50px;" onclick="shareMyProfile()"><i class="fas fa-share-alt"></i></button>
        </div>

        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-bio" placeholder="Bio">
            <input type="text" id="edit-edu" placeholder="Education">
            <input type="text" id="edit-web" placeholder="Website URL">
            <button class="btn-main" onclick="saveProfile()">Update Profile</button>
        </div>

        <button class="btn-logout" onclick="userLogout()">Logout</button>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="user-profile-view">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; justify-content:space-between; align-items:center;">
        <i class="fas fa-arrow-left" onclick="closeProfileView()"></i>
        <b>Profile</b>
        <i class="fas fa-share-alt" id="user-share-btn"></i>
    </div>
    <div id="user-profile-content"></div>
    <div id="user-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Type a message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let selectedImgBase64 = null;
    let activeChatID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user; 
            await checkUserExists(user);
            init(); 
        } else { 
            window.location.href = "index.html"; 
        }
    });

    async function checkUserExists(user) {
        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);
        if(!snap.exists()) {
            await setDoc(ref, {
                uid: user.uid, displayName: user.displayName || "User", photoURL: user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                followers: [], following: [], bio: "New to Meetwoyou", timestamp: serverTimestamp()
            });
        }
    }

    function init() {
        loadMyProfile();
        loadFeed();
        loadAllUsers();
        loadMyPosts();
        listenNotifications();
        loadStories();
    }

    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    // Time Ago Helper
    function timeAgo(date) {
        if (!date) return "...";
        const seconds = Math.floor((new Date() - date.toDate()) / 1000);
        let interval = Math.floor(seconds / 31536000);
        if (interval >= 1) return interval + "y ago";
        interval = Math.floor(seconds / 2592000);
        if (interval >= 1) return interval + "mo ago";
        interval = Math.floor(seconds / 86400);
        if (interval >= 1) return interval + "d ago";
        interval = Math.floor(seconds / 3600);
        if (interval >= 1) return interval + "h ago";
        interval = Math.floor(seconds / 60);
        if (interval >= 1) return interval + "m ago";
        return Math.floor(seconds) + "s ago";
    }

    // --- Profile System ---
    function loadMyProfile() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            if(!d) return;
            document.getElementById('p-name').innerHTML = d.displayName + vB;
            document.getElementById('p-img').src = d.photoURL;
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('count-followers').innerText = d.followers?.length || 0;
            document.getElementById('count-following').innerText = d.following?.length || 0;
        });
    }

    window.saveProfile = async () => {
        await updateDoc(doc(db, "users", me.uid), {
            bio: document.getElementById('edit-bio').value,
            edu: document.getElementById('edit-edu').value,
            web: document.getElementById('edit-web').value
        });
        Swal.fire("Success", "Profile updated", "success");
        toggleEdit();
    };

    window.userLogout = () => {
        signOut(auth).then(() => window.location.reload());
    };

    // --- Stories (24h) ---
    window.uploadStory = (input) => {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            Swal.showLoading();
            await addDoc(collection(db, "stories"), {
                uid: me.uid, img: e.target.result, authorName: me.displayName, 
                authorImg: me.photoURL, timestamp: serverTimestamp()
            });
            Swal.fire("Story Posted", "Visible for 24 hours", "success");
        };
        reader.readAsDataURL(file);
    };

    function loadStories() {
        onSnapshot(query(collection(db, "stories"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('story-area');
            const now = new Date().getTime();
            // Clear but keep the "Add Story" button
            area.innerHTML = area.firstElementChild.outerHTML; 
            snap.forEach(docSnap => {
                const s = docSnap.data();
                if(!s.timestamp) return;
                const age = now - s.timestamp.toDate().getTime();
                if(age < 24 * 60 * 60 * 1000) { // 24 Hours
                    const div = document.createElement('div');
                    div.className = "story-item";
                    div.onclick = () => showStory(s.img, s.authorName);
                    div.innerHTML = `<img src="${s.authorImg}" class="story-ring"><div class="story-name">${s.authorName}</div>`;
                    area.appendChild(div);
                }
            });
        });
    }

    function showStory(img, name) {
        Swal.fire({ title: name, imageUrl: img, imageAlt: 'Story', background: '#000', color: '#fff', showConfirmButton: false });
    }

    // --- Feed & Posts ---
    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(docSnap => {
                renderPost(docSnap.data(), docSnap.id, area);
            });
        });
    }

    function renderPost(p, id, target) {
        const isLiked = p.likes?.includes(me.uid);
        const div = document.createElement('div');
        div.className = "post-card";
        div.innerHTML = `
            <div class="post-user" onclick="viewUser('${p.uid}')">
                <img src="${p.authorImg}" style="width:35px; height:35px; border-radius:50%;">
                <b>${p.authorName}${vB}</b>
                <span class="post-time">${timeAgo(p.timestamp)}</span>
                ${p.uid === me.uid ? `<i class="fas fa-ellipsis-h" style="margin-left:10px;" onclick="event.stopPropagation(); postMenu('${id}', '${p.text}')"></i>` : ''}
            </div>
            ${p.img ? `<img src="${p.img}" class="post-img" ondblclick="toggleLike('${id}', ${isLiked})">` : ''}
            <div style="padding:10px 15px; font-size:20px; display:flex; gap:15px; align-items:center;">
                <i class="${isLiked?'fas fa-heart':'far fa-heart'}" style="color:${isLiked?'red':''}" onclick="toggleLike('${id}', ${isLiked})"></i>
                <i class="far fa-comment" onclick="addComment('${id}', '${p.uid}')"></i>
                <i class="far fa-paper-plane" onclick="sharePost('${id}')"></i>
            </div>
            <div style="padding:0 15px; font-size:14px;">
                <b>${p.likes?.length || 0} likes</b><br>
                <b>${p.authorName}</b> ${p.text}
            </div>
        `;
        target.appendChild(div);
    }

    // --- Social Functions ---
    window.toggleFollow = async (uid, isFollowing) => {
        await updateDoc(doc(db, "users", me.uid), { following: isFollowing ? arrayRemove(uid) : arrayUnion(uid) });
        await updateDoc(doc(db, "users", uid), { followers: isFollowing ? arrayRemove(me.uid) : arrayUnion(me.uid) });
        if(!isFollowing) sendNotification(uid, 'started following you');
        closeProfileView(); viewUser(uid);
    };

    window.uploadPost = async () => {
        const txt = document.getElementById('post-text').value;
        if(!txt && !selectedImgBase64) return;
        Swal.showLoading();
        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: selectedImgBase64,
            authorName: me.displayName, authorImg: me.photoURL,
            timestamp: serverTimestamp(), likes: [], comments: []
        });
        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        selectedImgBase64 = null;
        Swal.fire("Shared!", "", "success");
    };

    // --- Message Edit/Delete ---
    window.openChat = (uid, name, img) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + vB;
        document.getElementById('chat-h-img').src = img;
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if((m.sender === me.uid && m.receiver === uid) || (m.sender === uid && m.receiver === me.uid)) {
                    const div = document.createElement('div');
                    div.className = `chat-bubble ${m.sender === me.uid?'sent':'recv'}`;
                    div.innerText = m.text;
                    if(m.sender === me.uid) {
                        div.onclick = () => msgMenu(d.id, m.text);
                    }
                    box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    async function msgMenu(id, text) {
        const { value: action } = await Swal.fire({
            title: 'Message Options',
            showDenyButton: true, confirmButtonText: 'Edit', denyButtonText: 'Delete'
        });
        if(action) {
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: text });
            if(newText) await updateDoc(doc(db, "messages", id), { text: newText });
        } else if (Swal.DismissReason.deny) {
            await deleteDoc(doc(db, "messages", id));
        }
    }

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        await addDoc(collection(db, "messages"), { sender: me.uid, receiver: activeChatID, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };

    // --- User List ---
    window.loadAllUsers = () => {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            const chatList = document.getElementById('chat-list');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== me.uid) {
                    list.innerHTML += `<div class="post-user" onclick="viewUser('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}${vB}</b>
                        <button class="btn-main" style="width:80px; margin-left:auto; padding:5px;">Profile</button>
                    </div>`;
                    chatList.innerHTML += `<div class="post-user" onclick="openChatDirect('${d.id}')">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}${vB}</b>
                    </div>`;
                }
            });
        });
    };

    // --- Standard Helpers ---
    window.previewImg = (i) => {
        const r = new FileReader();
        r.onload = (e) => {
            selectedImgBase64 = e.target.result;
            document.getElementById('img-preview-box').innerHTML = `<img src="${selectedImgBase64}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        r.readAsDataURL(i.files[0]);
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.toggleEdit = () => {
        const f = document.getElementById('edit-form');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    window.closeProfileView = () => document.getElementById('user-profile-view').style.display = 'none';
    window.closeChat = () => document.getElementById('chat-screen').style.display = 'none';
    window.openChatDirect = (uid) => getDoc(doc(db, "users", uid)).then(s => openChat(uid, s.data().displayName, s.data().photoURL));

    window.viewUser = async (uid) => {
        if(uid === me.uid) return showSec('profile');
        const uSnap = await getDoc(doc(db, "users", uid));
        const u = uSnap.data();
        const meSnap = await getDoc(doc(db, "users", me.uid));
        const isFollowing = meSnap.data().following?.includes(uid);

        document.getElementById('user-profile-view').style.display = 'flex';
        document.getElementById('user-profile-content').innerHTML = `
            <div style="text-align:center; padding:20px;">
                <img src="${u.photoURL}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                <h3>${u.displayName}${vB}</h3>
                <p style="color:gray;">${u.bio || ''}</p>
                <div style="display:flex; justify-content:center; gap:20px; margin:10px;">
                    <b>${u.followers?.length || 0} <br><small>Followers</small></b>
                    <b>${u.following?.length || 0} <br><small>Following</small></b>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" onclick="toggleFollow('${uid}', ${isFollowing})">${isFollowing?'Unfollow':'Follow'}</button>
                    <button class="btn-main" style="background:#262626;" onclick="openChat('${uid}', '${u.displayName}', '${u.photoURL}')">Message</button>
                </div>
            </div>
        `;
    };

    window.postMenu = async (id, oldText) => {
        const { value: action } = await Swal.fire({
            title: 'Post Options',
            showDenyButton: true, confirmButtonText: 'Edit', denyButtonText: 'Delete'
        });
        if(action) {
            const { value: newText } = await Swal.fire({ input: 'textarea', inputValue: oldText });
            if(newText) await updateDoc(doc(db, "posts", id), { text: newText });
        } else if (Swal.DismissReason.deny) {
            if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id));
        }
    };
    
    // Notifications...
    async function sendNotification(to, type) {
        if(to === me.uid) return;
        await addDoc(collection(db, "notifications"), { to, fromName: me.displayName, type, timestamp: serverTimestamp(), read: false });
    }
    function listenNotifications() {
        onSnapshot(query(collection(db, "notifications"), where("to", "==", me.uid), where("read", "==", false)), (snap) => {
            document.getElementById('noti-dot').style.display = snap.size > 0 ? 'block' : 'none';
        });
    }

</script>
</body>
</html>
