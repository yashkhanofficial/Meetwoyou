<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-item { transition: all 0.3s; border-radius: 15px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        #main-content { height: calc(100vh - 80px); overflow-y: auto; scrollbar-width: none; }
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 50; }
    </style>
</head>
<body class="flex h-screen">

    <nav class="sidebar w-20 md:w-64 flex flex-col p-4 space-y-6">
        <div class="text-center md:text-left px-2 mb-4">
            <h1 class="hidden md:block text-2xl font-black italic text-purple-500 tracking-tighter">Meetwoyou</h1>
            <i class="md:hidden fab fa-medium-m text-3xl text-purple-500"></i>
        </div>

        <div class="space-y-2 flex-1">
            <div onclick="loadPage('newsfeed', this)" class="nav-item active flex items-center p-4 gap-4">
                <i class="fas fa-th-large"></i> <span class="hidden md:block font-semibold">News Feed</span>
            </div>
            <div onclick="loadPage('friends', this)" class="nav-item flex items-center p-4 gap-4">
                <i class="fas fa-user-friends"></i> <span class="hidden md:block font-semibold">Friends</span>
            </div>
            <div onclick="loadPage('messages', this)" class="nav-item flex items-center p-4 gap-4">
                <i class="fas fa-comment-alt"></i> <span class="hidden md:block font-semibold">Messages</span>
            </div>
            <div onclick="loadPage('search', this)" class="nav-item flex items-center p-4 gap-4">
                <i class="fas fa-search"></i> <span class="hidden md:block font-semibold">Search</span>
            </div>
            <div onclick="loadPage('profile', this)" class="nav-item flex items-center p-4 gap-4">
                <i class="fas fa-user-circle"></i> <span class="hidden md:block font-semibold">Profile</span>
            </div>
        </div>

        <div class="border-t border-white/10 pt-4">
            <div onclick="loadPage('settings', this)" class="nav-item flex items-center p-4 gap-4">
                <i class="fas fa-cog"></i> <span class="hidden md:block font-semibold">Settings</span>
            </div>
            <div id="logout-btn" class="nav-item flex items-center p-4 gap-4 text-red-400 hover:bg-red-500/10">
                <i class="fas fa-sign-out-alt"></i> <span class="hidden md:block font-semibold">Logout</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        <header class="glass-header h-20 flex items-center justify-between px-8 border-bottom border-white/10">
            <h2 id="page-title" class="text-xl font-bold">News Feed</h2>
            <div class="flex items-center gap-4">
                <span id="user-display-name" class="hidden md:block text-sm font-medium text-gray-300">Loading...</span>
                <img id="user-profile-pic" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border-2 border-purple-500 shadow-lg shadow-purple-500/20">
            </div>
        </header>

        <div id="main-content" class="p-6">
            <div id="content-loader" class="text-center mt-20">
                <p class="text-purple-400 animate-pulse font-bold">Initializing Interface...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check Login State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display-name').innerText = user.displayName || "User";
                document.getElementById('user-profile-pic').src = user.photoURL || "https://via.placeholder.com/40";
                loadPage('newsfeed'); // Default Page
            } else {
                window.location.href = "index.html";
            }
        });

        // Dynamic Page Loader Function
        window.loadPage = async (pageName, element = null) => {
            const contentArea = document.getElementById('main-content');
            const titleArea = document.getElementById('page-title');
            
            // UI Active State update
            if(element) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            titleArea.innerText = pageName.charAt(0).toUpperCase() + pageName.slice(1).replace('-', ' ');
            
            try {
                const response = await fetch(`${pageName}.html`);
                const html = await response.text();
                contentArea.innerHTML = html;
            } catch (err) {
                contentArea.innerHTML = `<div class="text-center text-red-400 mt-10">Error loading ${pageName}.html. Make sure the file exists!</div>`;
            }
        };

        // Logout Logic
        document.getElementById('logout-btn').onclick = () => {
            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of Meetwoyou!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#7c3aed',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, Logout',
                background: '#1e293b',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => window.location.href = "index.html");
                }
            })
        };
    </script>
</body>
</html>
