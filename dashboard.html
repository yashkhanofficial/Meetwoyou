<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; --border: #262626; }
        
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; overflow-x: hidden; }

        /* Loading Spinner */
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #262626; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; display: none; }
        .is-verified .v-badge { display: inline-block; }

        .section { display: none; max-width: 600px; margin: auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Post Styles */
        .post-card { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 8px; }
        .post-header { display: flex; align-items: center; gap: 10px; padding: 12px; }
        .post-img-container { width: 100%; background: #050505; min-height: 250px; display: flex; align-items: center; }
        .post-img { width: 100%; object-fit: contain; }
        
        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav i { font-size: 22px; color: #fff; cursor: pointer; transition: 0.2s; }
        .nav i:active { transform: scale(0.8); color: var(--primary); }

        /* Inputs */
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: #fff; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.5; }

        /* Chat */
        #chat-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .chat-msg { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .sent { background: var(--primary); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Profile Grid */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; cursor: pointer; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="app-loader"><div class="spinner"></div></div>

<div class="header">
    <i class="fas fa-sign-out-alt" onclick="userLogout()" style="color:var(--danger); font-size:18px;"></i>
    <div class="logo">Meetwoyou</div>
    <i class="far fa-heart" style="font-size:20px;"></i>
</div>

<div id="home-sec" class="section active">
    <div style="padding: 15px; border-bottom: 1px solid var(--border);">
        <div style="display:flex; gap:10px; align-items:center;">
            <img id="my-mini-avatar" src="https://via.placeholder.com/40" style="width:40px; height:40px; border-radius:50%;">
            <textarea id="post-text" placeholder="What's on your mind?" style="margin:0; height:45px; border:none; background:transparent;"></textarea>
        </div>
        <div id="img-preview-box"></div>
        <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
            <button onclick="document.getElementById('post-file').click()" style="background:none; border:none; color:var(--primary); font-weight:600;"><i class="far fa-image"></i> Photo/Video</button>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this)">
            <button class="btn-main" onclick="uploadPost()" id="post-btn">Share</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="discover-sec" class="section">
    <div style="padding:15px;"><input type="text" id="user-search" placeholder="Search friends..." oninput="searchUsers(this.value)"></div>
    <div id="user-list"></div>
</div>

<div id="msg-sec" class="section">
    <h3 style="padding:15px; margin:0;">Messages</h3>
    <div id="chat-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="text-align: center; padding: 25px 15px;">
        <img id="p-img" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid var(--border);">
        <h3 id="p-name" class="user-name-box">Loading...</h3>
        <p id="p-bio" style="color:var(--gray); margin-bottom:15px; font-size:14px;"></p>
        
        <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;">
            <div><b id="count-posts">0</b><br><small style="color:var(--gray)">Posts</small></div>
            <div><b id="count-followers">0</b><br><small style="color:var(--gray)">Followers</small></div>
            <div><b id="count-following">0</b><br><small style="color:var(--gray)">Following</small></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#262626; flex:1;" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn-main" style="background:#262626; width:45px;" onclick="shareMyProfile()"><i class="fas fa-share"></i></button>
        </div>
        <div id="edit-form" style="display:none; margin-top:15px; text-align:left;">
            <input type="text" id="edit-name" placeholder="Full Name">
            <input type="text" id="edit-bio" placeholder="Bio">
            <button class="btn-main" onclick="saveProfile()">Update</button>
        </div>
    </div>
    <div id="my-posts-grid" class="profile-grid"></div>
</div>

<div id="chat-screen">
    <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:#000;">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%;">
        <b id="chat-h-name" class="user-name-box"></b>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:12px; display:flex; gap:10px; background:#121212;">
        <input type="text" id="chat-input" placeholder="Type a message..." style="margin:0; background:#000;">
        <button onclick="sendMsg()" style="background:none; color:var(--primary); border:none; font-weight:bold;">Send</button>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="showSec('home')"></i>
    <i class="fas fa-search" onclick="showSec('discover')"></i>
    <i class="fas fa-comment-dots" onclick="showSec('msg')"></i>
    <i class="fas fa-user-circle" onclick="showSec('profile')"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    const vBadgeHTML = `<i class="fas fa-check-circle v-badge"></i>`;

    // --- Loading Control ---
    window.onload = () => setTimeout(() => document.getElementById('app-loader').style.display='none', 800);

    // --- Image Compression (Client Side) ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1080;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
        });
    }

    // --- Utility: Format Counts ---
    function formatCount(data) {
        if (!data) return "0";
        if (typeof data === 'string' && data.startsWith("boost:")) return data.split(":")[1];
        const count = Array.isArray(data) ? data.length : parseInt(data) || 0;
        if (count >= 1000000) return (count/1000000).toFixed(1) + "M";
        if (count >= 1000) return (count/1000).toFixed(1) + "K";
        return count;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            me = user;
            const uRef = doc(db, "users", user.uid);
            const snap = await getDoc(uRef);
            if (!snap.exists()) {
                await setDoc(uRef, { displayName: user.displayName || "User", photoURL: user.photoURL || "", followers: [], following: [], isVerified: false, bio: "" });
            }
            init();
        } else { window.location.href = "index.html"; }
    });

    function init() {
        loadMyData();
        loadFeed();
        loadUsers();
        loadMessagesList();
    }

    function loadMyData() {
        onSnapshot(doc(db, "users", me.uid), (snap) => {
            const d = snap.data();
            document.getElementById('p-name').innerHTML = d.displayName + (d.isVerified ? vBadgeHTML : "");
            if(d.isVerified) document.getElementById('p-name').classList.add('is-verified');
            document.getElementById('p-img').src = d.photoURL || "https://via.placeholder.com/90";
            document.getElementById('my-mini-avatar').src = d.photoURL || "https://via.placeholder.com/40";
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('count-followers').innerText = formatCount(d.followers);
            document.getElementById('count-following').innerText = formatCount(d.following);
        });
    }

    async function uploadPost() {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if (!txt && !file) return;

        const btn = document.getElementById('post-btn');
        btn.disabled = true; btn.innerText = "Sharing...";

        let mediaUrl = null;
        if (file) {
            const blob = file.type.startsWith('image') ? await compressImage(file) : file;
            const fd = new FormData();
            fd.append('file', blob);
            fd.append('upload_preset', 'Meetwoyou');
            const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            mediaUrl = data.secure_url;
        }

        const meSnap = await getDoc(doc(db, "users", me.uid));
        const myInfo = meSnap.data();

        await addDoc(collection(db, "posts"), {
            uid: me.uid, text: txt, img: mediaUrl, type: file?.type.startsWith('video') ? 'video' : 'image',
            authorName: myInfo.displayName, authorImg: myInfo.photoURL, isVerified: myInfo.isVerified || false,
            timestamp: serverTimestamp(), likes: [], comments: []
        });

        document.getElementById('post-text').value = "";
        document.getElementById('img-preview-box').innerHTML = "";
        btn.disabled = false; btn.innerText = "Share";
    }

    function loadFeed() {
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const postDiv = document.createElement('div');
                postDiv.className = "post-card";
                postDiv.innerHTML = `
                    <div class="post-header ${p.isVerified ? 'is-verified' : ''}">
                        <img src="${p.authorImg || 'https://via.placeholder.com/35'}" style="width:35px; height:35px; border-radius:50%;">
                        <b>${p.authorName} ${vBadgeHTML}</b>
                    </div>
                    ${p.img ? (p.type === 'video' ? `<video src="${p.img}" controls class="post-img"></video>` : `<img src="${p.img}" class="post-img">`) : ''}
                    <div style="padding:10px 15px;">
                        <div style="display:flex; gap:15px; font-size:20px; margin-bottom:8px;">
                            <i class="far fa-heart"></i><i class="far fa-comment"></i><i class="far fa-paper-plane"></i>
                        </div>
                        <b style="font-size:14px;">${formatCount(p.likes)} likes</b><br>
                        <span style="font-size:14px;"><b>${p.authorName}</b> ${p.text}</span>
                    </div>
                `;
                area.appendChild(postDiv);
            });
        });
    }

    function loadUsers() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                if(d.id === me.uid) return;
                const u = d.data();
                list.innerHTML += `
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 15px;" class="${u.isVerified ? 'is-verified' : ''}">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img src="${u.photoURL || 'https://via.placeholder.com/45'}" style="width:45px; height:45px; border-radius:50%;">
                            <div>
                                <b>${u.displayName} ${vBadgeHTML}</b><br>
                                <small style="color:var(--gray)">${formatCount(u.followers)} followers</small>
                            </div>
                        </div>
                        <button class="btn-main" style="padding:6px 12px; font-size:12px;" onclick="followUser('${d.id}')">Follow</button>
                    </div>
                `;
            });
        });
    }

    // --- Professional Chat Logic ---
    window.openChat = (uid, name, img, isVerified) => {
        activeChatID = uid;
        document.getElementById('chat-h-name').innerHTML = name + (isVerified ? vBadgeHTML : "");
        document.getElementById('chat-h-img').src = img || "https://via.placeholder.com/35";
        document.getElementById('chat-screen').style.display = 'flex';
        
        onSnapshot(query(collection(db, "messages"), 
            where("chatPair", "in", [[me.uid, uid], [uid, me.uid]]), 
            orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const cls = m.sender === me.uid ? 'sent' : 'recv';
                box.innerHTML += `<div class="chat-msg ${cls}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    function loadMessagesList() {
        // মেসেজ লিস্ট লেটেস্ট মেসেজ অনুযায়ী সর্ট করার জন্য আমরা "chats" নামক আলাদা কালেকশন ব্যবহার করতে পারি
        // এখানে সিম্পল ভার্সন রাখা হয়েছে।
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(d => {
                if(d.id === me.uid) return;
                const u = d.data();
                const div = document.createElement('div');
                div.className = `post-header ${u.isVerified ? 'is-verified' : ''}`;
                div.style.cursor = "pointer";
                div.innerHTML = `<img src="${u.photoURL || 'https://via.placeholder.com/45'}" style="width:45px; height:45px; border-radius:50%;">
                                 <div><b>${u.displayName} ${vBadgeHTML}</b><br><small style="color:var(--gray)">Tap to chat</small></div>`;
                div.onclick = () => openChat(d.id, u.displayName, u.photoURL, u.isVerified);
                list.appendChild(div);
            });
        });
    }

    window.sendMsg = async () => {
        const inp = document.getElementById('chat-input');
        if(!inp.value || !activeChatID) return;
        const msg = inp.value;
        inp.value = "";
        await addDoc(collection(db, "messages"), {
            sender: me.uid, receiver: activeChatID,
            chatPair: [me.uid, activeChatID].sort(), // consistent pair for query
            text: msg, timestamp: serverTimestamp()
        });
    };

    window.showSec = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
    };

    window.closeChat = () => document.getElementById('chat-screen').style.display='none';
    window.userLogout = () => signOut(auth);

    window.previewMedia = (input) => {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const box = document.getElementById('img-preview-box');
            box.innerHTML = file.type.startsWith('video') 
                ? `<video src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;" muted autoplay></video>`
                : `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-top:10px;">`;
        };
        reader.readAsDataURL(file);
    };

</script>
</body>
</html>
