<div class="max-w-4xl mx-auto space-y-6 animate-fade-in">
    <div class="relative bg-slate-900/50 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl">
        <div class="h-40 bg-gradient-to-r from-purple-900 via-indigo-900 to-slate-900"></div>
        
        <div class="px-8 pb-8">
            <div class="relative -mt-16 mb-4 flex items-end justify-between">
                <div class="relative group">
                    <img id="p-image" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-3xl border-4 border-[#0b0f1a] object-cover shadow-2xl transition group-hover:scale-105">
                    <label for="img-upload" class="absolute bottom-2 right-2 bg-purple-600 p-2 rounded-xl cursor-pointer hover:bg-purple-500 shadow-lg">
                        <i class="fas fa-camera text-white text-sm"></i>
                    </label>
                    <input type="file" id="img-upload" class="hidden" accept="image/*">
                </div>
                <div class="flex gap-3 mb-2">
                    <button class="bg-white/5 hover:bg-white/10 text-white px-6 py-2.5 rounded-xl font-semibold transition border border-white/10">Edit Design</button>
                </div>
            </div>

            <div class="space-y-1">
                <h1 id="p-name" class="text-3xl font-extrabold tracking-tight text-white">Loading...</h1>
                <p class="text-purple-400 font-medium flex items-center gap-2">
                    <i class="fas fa-shield-alt text-xs"></i> Cyber Professional
                </p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 space-y-6">
            <div class="bg-slate-900/50 p-6 rounded-[2rem] border border-white/5">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">Connections</h3>
                <div class="flex justify-between items-center">
                    <div class="text-center">
                        <p class="text-2xl font-black text-white">1.2k</p>
                        <p class="text-[10px] text-gray-500">Friends</p>
                    </div>
                    <div class="w-px h-8 bg-white/10"></div>
                    <div class="text-center">
                        <p class="text-2xl font-black text-white">450</p>
                        <p class="text-[10px] text-gray-500">Posts</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-2 bg-slate-900/50 p-8 rounded-[2rem] border border-white/5 space-y-6">
            <h3 class="text-xl font-bold text-white mb-2">Account Settings</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 ml-2 mb-1 block">Display Name</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-purple-500 text-white transition">
                </div>
                <div>
                    <label class="text-xs text-gray-500 ml-2 mb-1 block">Bio / Status</label>
                    <textarea id="edit-bio" rows="3" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-purple-500 text-white transition" placeholder="Tell the world about yourself..."></textarea>
                </div>
                
                <div class="pt-4 flex flex-col gap-3">
                    <button onclick="updateProfileData()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-purple-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-check-circle"></i> Save Changes
                    </button>
                    
                    <button id="p-logout" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 font-bold py-4 rounded-2xl border border-red-500/20 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-sign-out-alt"></i> Logout Session
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
</style>
