<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .profile-cover {
            background: linear-gradient(135deg, #6b21a8, #4f46e5, #1e2937);
        }
    </style>
</head>
<body class="bg-[#0b0f1a] text-white min-h-screen pb-20">

<div class="max-w-5xl mx-auto space-y-6 animate-fade-in pt-8 px-4">

    <!-- Profile Card -->
    <div class="relative bg-slate-900/70 rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl backdrop-blur-xl">
        
        <!-- Cover Photo -->
        <div class="h-48 md:h-56 profile-cover relative group">
            <img id="p-cover" 
                 src="https://via.placeholder.com/1200x400/1e2937/64748b?text=Cover+Photo" 
                 class="w-full h-full object-cover hidden transition-all duration-300">
            
            <label for="cover-upload" 
                   class="absolute bottom-4 right-4 bg-black/60 hover:bg-black/80 p-3 rounded-2xl cursor-pointer opacity-0 group-hover:opacity-100 transition-all shadow-lg">
                <i class="fas fa-camera text-white text-xl"></i>
            </label>
            <input type="file" id="cover-upload" accept="image/*" class="hidden">
        </div>

        <div class="px-6 md:px-10 pb-10">
            
            <!-- Profile Picture + Buttons -->
            <div class="relative -mt-20 md:-mt-24 mb-6 flex flex-col md:flex-row items-center md:items-end justify-between gap-6">
                <div class="relative group">
                    <img id="p-image" 
                         src="https://via.placeholder.com/180/334155/94a3b8?text=Profile" 
                         class="w-36 h-36 md:w-44 md:h-44 rounded-3xl border-[6px] border-[#0b0f1a] object-cover shadow-2xl transition-all">
                    
                    <label for="img-upload" 
                           class="absolute bottom-3 right-3 bg-purple-600 hover:bg-purple-500 p-3.5 rounded-2xl cursor-pointer shadow-xl transition-all">
                        <i class="fas fa-camera text-white"></i>
                    </label>
                    <input type="file" id="img-upload" accept="image/*" class="hidden">
                </div>

                <div class="flex gap-3 w-full md:w-auto">
                    <button id="add-story" 
                            class="flex-1 md:flex-none bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-8 py-3.5 rounded-2xl font-semibold shadow-lg shadow-purple-500/30 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-plus"></i> Add Story
                    </button>
                    <button onclick="openEditModal()" 
                            class="flex-1 md:flex-none bg-slate-800 hover:bg-slate-700 border border-white/10 text-white px-8 py-3.5 rounded-2xl font-semibold transition-all">
                        Edit Profile
                    </button>
                </div>
            </div>

            <!-- User Info -->
            <div class="text-center md:text-left">
                <h1 id="p-name" class="text-4xl font-bold text-white flex items-center justify-center md:justify-start gap-3">
                    Loading...
                    <i id="v-badge" class="fas fa-check-circle text-blue-500 text-2xl hidden"></i>
                </h1>
                <p class="text-purple-400 font-medium text-xl">@<span id="p-username">username</span></p>
                
                <p id="p-bio" class="mt-4 text-gray-300 text-[17px] max-w-2xl mx-auto md:mx-0 leading-relaxed">
                    No bio added yet.
                </p>

                <!-- Social Links -->
                <div id="p-socials" class="flex justify-center md:justify-start gap-6 mt-6 text-2xl text-gray-400">
                    <!-- Dynamic social icons will be added here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Info Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- About Me -->
        <div class="md:col-span-1 bg-slate-900/70 p-8 rounded-3xl border border-white/10">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">About Me</h3>
            <div class="space-y-5 text-gray-300">
                <div class="flex items-start gap-4">
                    <i class="fas fa-graduation-cap text-purple-400 text-xl w-6 mt-0.5"></i>
                    <div>
                        <p class="text-xs text-gray-500">Education</p>
                        <p id="p-edu" class="font-medium">Not Set</p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <i class="fas fa-birthday-cake text-purple-400 text-xl w-6 mt-0.5"></i>
                    <div>
                        <p class="text-xs text-gray-500">Date of Birth</p>
                        <p id="p-dob" class="font-medium">Not Set</p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <i class="fas fa-venus-mars text-purple-400 text-xl w-6 mt-0.5"></i>
                    <div>
                        <p class="text-xs text-gray-500">Gender</p>
                        <p id="p-gender" class="font-medium">Other</p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <i class="fas fa-link text-purple-400 text-xl w-6 mt-0.5"></i>
                    <div>
                        <p class="text-xs text-gray-500">Website</p>
                        <p id="p-site" class="font-medium text-purple-400">Not Set</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="md:col-span-2 bg-slate-900/70 p-8 rounded-3xl border border-white/10 flex items-center justify-around text-center">
            <div>
                <p id="stat-posts" class="text-5xl font-black text-white">0</p>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Posts</p>
            </div>
            <div class="w-px h-16 bg-white/10"></div>
            <div>
                <p id="stat-followers" class="text-5xl font-black text-white">0</p>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Followers</p>
            </div>
            <div class="w-px h-16 bg-white/10"></div>
            <div>
                <p id="stat-friends" class="text-5xl font-black text-white">0</p>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Friends</p>
            </div>
        </div>
    </div>

</div>

<!-- Edit Profile Modal -->
<div id="edit-modal" class="fixed inset-0 bg-black/90 backdrop-blur-lg hidden flex items-center justify-center p-4 z-[1000]">
    <div class="bg-[#0f172a] w-full max-w-lg rounded-3xl p-8 border border-white/10 max-h-[92vh] overflow-y-auto">
        
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold">Update Profile</h2>
            <i onclick="closeEditModal()" class="fas fa-times text-2xl text-gray-400 hover:text-white cursor-pointer"></i>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Full Name</label>
                <input type="text" id="in-name" 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Username (without @)</label>
                <input type="text" id="in-username" 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Bio</label>
                <textarea id="in-bio" rows="3"
                          class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500 resize-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Education</label>
                    <input type="text" id="in-edu" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Date of Birth</label>
                    <input type="date" id="in-dob" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Gender</label>
                <select id="in-gender" 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white">
                    <option value="Other">Other</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="pt-4 border-t border-white/10">
                <p class="text-xs font-medium text-gray-400 mb-4">Social Links</p>
                <div class="space-y-4">
                    <input type="url" id="in-fb" placeholder="Facebook Profile URL" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500">
                    <input type="url" id="in-ig" placeholder="Instagram Profile URL" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:border-purple-500 outline-none text-white placeholder-gray-500">
                </div>
            </div>

            <div class="flex gap-4 pt-6">
                <button onclick="closeEditModal()" 
                        class="flex-1 py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-semibold transition">
                    Cancel
                </button>
                <button onclick="saveData()" 
                        class="flex-1 py-4 bg-purple-600 hover:bg-purple-500 rounded-2xl font-semibold transition">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase + Scripts -->
<script type="module">
    // ============== Firebase Setup ==============
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        databaseURL: "https://meetwoyou-436a2-default-rtdb.firebaseio.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4",
        measurementId: "G-LF9FLW7Y7E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    // ============== DOM Elements ==============
    const pName = document.getElementById('p-name');
    const pUsername = document.getElementById('p-username');
    const pBio = document.getElementById('p-bio');
    const pImage = document.getElementById('p-image');
    const pCover = document.getElementById('p-cover');
    const pEdu = document.getElementById('p-edu');
    const pDob = document.getElementById('p-dob');
    const pGender = document.getElementById('p-gender');
    const pSite = document.getElementById('p-site');
    const pSocials = document.getElementById('p-socials');

    const inName = document.getElementById('in-name');
    const inUsername = document.getElementById('in-username');
    const inBio = document.getElementById('in-bio');
    const inEdu = document.getElementById('in-edu');
    const inDob = document.getElementById('in-dob');
    const inGender = document.getElementById('in-gender');
    const inFb = document.getElementById('in-fb');
    const inIg = document.getElementById('in-ig');

    // ============== Cloudinary Upload Function ==============
    async function uploadToCloudinary(file, folder = "profile") {
        if (!file) return null;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'Meetwoyou');
        formData.append('folder', `meetwoyou/${folder}`);

        try {
            const response = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.secure_url) {
                return data.secure_url;
            } else {
                alert("Upload failed: " + (data.error?.message || "Unknown error"));
                return null;
            }
        } catch (err) {
            console.error(err);
            alert("Image upload error. Please try again.");
            return null;
        }
    }

    // ============== Load Profile ==============
    async function loadUserProfile(uid) {
        try {
            const snapshot = await get(ref(db, 'users/' + uid));
            const data = snapshot.val() || {};

            pName.textContent = data.displayName || "No Name";
            pUsername.textContent = data.username || uid.slice(0, 8);
            pBio.textContent = data.bio || "No bio added yet.";

            if (data.photoURL) pImage.src = data.photoURL;
            if (data.coverURL) {
                pCover.src = data.coverURL;
                pCover.classList.remove('hidden');
            }

            pEdu.textContent = data.education || "Not Set";
            pDob.textContent = data.dob || "Not Set";
            pGender.textContent = data.gender || "Other";
            pSite.textContent = data.website || "Not Set";

            // Social Links
            pSocials.innerHTML = '';
            if (data.facebook) {
                pSocials.innerHTML += `<a href="${data.facebook}" target="_blank" class="hover:text-blue-500 transition"><i class="fab fa-facebook"></i></a>`;
            }
            if (data.instagram) {
                pSocials.innerHTML += `<a href="${data.instagram}" target="_blank" class="hover:text-pink-500 transition"><i class="fab fa-instagram"></i></a>`;
            }

            // Stats (you can make these dynamic later)
            document.getElementById('stat-posts').textContent = "12";
            document.getElementById('stat-followers').textContent = "248";
            document.getElementById('stat-friends').textContent = "89";

        } catch (error) {
            console.error("Error loading profile:", error);
        }
    }

    // ============== Edit Modal Functions ==============
    window.openEditModal = function() {
        if (!currentUser) {
            alert("Please login to edit profile");
            return;
        }

        // Pre-fill modal
        inName.value = pName.textContent || '';
        inUsername.value = pUsername.textContent || '';
        inBio.value = pBio.textContent === "No bio added yet." ? "" : pBio.textContent;
        inEdu.value = pEdu.textContent === "Not Set" ? "" : pEdu.textContent;
        inDob.value = pDob.textContent === "Not Set" ? "" : pDob.textContent;
        inGender.value = pGender.textContent || "Other";
        inFb.value = ""; // You can load from data if stored
        inIg.value = "";

        const modal = document.getElementById('edit-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    };

    window.closeEditModal = function() {
        const modal = document.getElementById('edit-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    };

    window.saveData = async function() {
        if (!currentUser) return;

        const updates = {
            displayName: inName.value.trim(),
            username: inUsername.value.trim().toLowerCase(),
            bio: inBio.value.trim(),
            education: inEdu.value.trim(),
            dob: inDob.value,
            gender: inGender.value,
            facebook: inFb.value.trim(),
            instagram: inIg.value.trim(),
            lastUpdated: Date.now()
        };

        try {
            await update(ref(db, 'users/' + currentUser.uid), updates);
            alert("✅ Profile updated successfully!");
            closeEditModal();
            loadUserProfile(currentUser.uid); // Refresh UI
        } catch (error) {
            console.error(error);
            alert("Failed to save: " + error.message);
        }
    };

    // ============== Image Upload Listeners ==============
    document.getElementById('img-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentUser) return;

        const loadingText = "Uploading...";
        pImage.style.opacity = "0.6";

        const url = await uploadToCloudinary(file, "profile_pics");
        if (url) {
            await update(ref(db, 'users/' + currentUser.uid), { photoURL: url });
            pImage.src = url;
            alert("Profile picture updated!");
        }
        pImage.style.opacity = "1";
    });

    document.getElementById('cover-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentUser) return;

        const url = await uploadToCloudinary(file, "cover_photos");
        if (url) {
            await update(ref(db, 'users/' + currentUser.uid), { coverURL: url });
            pCover.src = url;
            pCover.classList.remove('hidden');
            alert("Cover photo updated!");
        }
    });

    // Add Story Button
    document.getElementById('add-story').addEventListener('click', () => {
        alert("🎉 Story feature is coming soon!\n\nYou can extend this to upload 24-hour stories.");
    });

    // ============== Auth State ==============
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadUserProfile(user.uid);
        } else {
            console.log("No user is signed in.");
            // Redirect to login page if needed:
            // window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
