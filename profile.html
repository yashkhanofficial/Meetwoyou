<div class="max-w-5xl mx-auto space-y-6 pb-28">
    <div class="relative bg-slate-900/40 rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
        <div class="h-48 md:h-64 bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 relative group">
            <img id="view-cover" class="w-full h-full object-cover">
            <label for="cover-upload" class="absolute bottom-4 right-4 bg-black/40 p-2 rounded-xl cursor-pointer border border-white/10 opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-camera text-white"></i>
            </label>
            <input type="file" id="cover-upload" class="hidden" onchange="uploadToCloudinary(this, 'cover')">
        </div>
        
        <div class="px-6 md:px-10 pb-8">
            <div class="relative -mt-16 mb-4 flex flex-col md:flex-row items-center md:items-end justify-between gap-4">
                <div class="relative group">
                    <img id="view-avatar" src="https://via.placeholder.com/150" class="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] border-4 border-[#0b0f1a] object-cover bg-slate-800 shadow-2xl">
                    <label for="avatar-upload" class="absolute bottom-2 right-2 bg-purple-600 p-2.5 rounded-2xl cursor-pointer border-2 border-[#0b0f1a]">
                        <i class="fas fa-pen text-white text-xs"></i>
                    </label>
                    <input type="file" id="avatar-upload" class="hidden" onchange="uploadToCloudinary(this, 'avatar')">
                </div>
                
                <div class="flex gap-3 mb-2">
                    <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="bg-white/5 text-white px-8 py-3 rounded-2xl font-bold border border-white/10 hover:bg-white/10 transition">Edit Profile</button>
                    <button onclick="copyProfileLink()" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-purple-400"><i class="fas fa-share-alt"></i></button>
                </div>
            </div>

            <div class="text-center md:text-left">
                <h1 id="view-name" class="text-3xl font-black text-white">Syncing...</h1>
                <p class="text-purple-400 font-bold">@<span id="view-username">username</span></p>
                <p id="view-bio" class="mt-3 text-gray-400 max-w-lg text-sm italic">No bio added yet.</p>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-[#0f172a] w-full max-w-lg rounded-[2.5rem] p-8 border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black text-white">Edit Profile</h2>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="text-gray-500 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-purple-500">
                <input type="text" id="in-username" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-purple-500">
                <textarea id="in-bio" placeholder="Bio" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white h-24 outline-none focus:border-purple-500"></textarea>
                <input type="text" id="in-edu" placeholder="Education" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white">
                <input type="date" id="in-dob" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-gray-400">
                <button id="save-btn" onclick="saveProfile()" class="w-full bg-purple-600 p-4 rounded-2xl font-bold text-white shadow-lg shadow-purple-600/30">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ১. প্রোফাইল রিয়েল-টাইম লোড করা
    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    // UI আপডেট
                    document.getElementById('view-name').innerText = d.fullName || "Agent";
                    document.getElementById('view-username').innerText = d.username || "user_" + user.uid.slice(0,5);
                    document.getElementById('view-bio').innerText = d.bio || "No bio added yet.";
                    document.getElementById('view-avatar').src = d.profilePicUrl || user.photoURL || "https://via.placeholder.com/150";
                    document.getElementById('view-cover').src = d.coverPicUrl || "";

                    // এডিট ফিল্ডে ডাটা সেট করা
                    document.getElementById('in-name').value = d.fullName || "";
                    document.getElementById('in-username').value = d.username || "";
                    document.getElementById('in-bio').value = d.bio || "";
                    document.getElementById('in-edu').value = d.education || "";
                    document.getElementById('in-dob').value = d.dob || "";
                } else {
                    // প্রথমবার ডাটাবেজে ইউজার তৈরি করা
                    setDoc(doc(db, "users", user.uid), {
                        fullName: user.displayName || "Agent",
                        username: "user_" + user.uid.slice(0,5),
                        bio: "",
                        profilePicUrl: user.photoURL || ""
                    });
                }
            });
        }
    });

    // ২. Cloudinary তে ইমেজ আপলোড
    window.uploadToCloudinary = async (input, type) => {
        const file = input.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'Meetwoyou'); 

        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            const imageUrl = data.secure_url;

            const user = auth.currentUser;
            const field = type === 'avatar' ? 'profilePicUrl' : 'coverPicUrl';
            await setDoc(doc(db, "users", user.uid), { [field]: imageUrl }, { merge: true });
            alert("Image updated!");
        } catch (err) { alert("Upload failed!"); }
    };

    // ৩. প্রোফাইল সেভ করা
    window.saveProfile = async () => {
        const user = auth.currentUser;
        if(!user) return;
        
        const btn = document.getElementById('save-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        const updatedData = {
            fullName: document.getElementById('in-name').value,
            username: document.getElementById('in-username').value,
            bio: document.getElementById('in-bio').value,
            education: document.getElementById('in-edu').value,
            dob: document.getElementById('in-dob').value,
            updatedAt: new Date()
        };

        try {
            await setDoc(doc(db, "users", user.uid), updatedData, { merge: true });
            document.getElementById('edit-modal').classList.add('hidden');
            alert("Success!");
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "Save Changes";
            btn.disabled = false;
        }
    };
</script>
