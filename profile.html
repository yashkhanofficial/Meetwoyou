<div class="max-w-5xl mx-auto space-y-6 page-fade pb-20">
    
    <div class="relative bg-slate-900/40 rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
        <div class="h-48 md:h-64 bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 relative group">
            <img id="cover-img" src="" class="w-full h-full object-cover hidden">
            <label for="cover-upload" class="absolute bottom-4 right-4 bg-black/40 backdrop-blur-md p-2 rounded-xl cursor-pointer opacity-0 group-hover:opacity-100 transition border border-white/10">
                <i class="fas fa-camera text-white"></i>
            </label>
            <input type="file" id="cover-upload" class="hidden">
        </div>
        
        <div class="px-6 md:px-10 pb-8">
            <div class="relative -mt-16 mb-4 flex flex-col md:flex-row items-center md:items-end justify-between gap-4">
                <div class="relative group">
                    <img id="p-image" src="https://via.placeholder.com/150" class="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] border-4 border-[#0b0f1a] object-cover shadow-2xl transition group-hover:scale-105">
                    <label for="img-upload" class="absolute bottom-2 right-2 bg-purple-600 p-2.5 rounded-2xl cursor-pointer shadow-lg hover:bg-purple-500 transition border-2 border-[#0b0f1a]">
                        <i class="fas fa-pen text-white text-xs"></i>
                    </label>
                    <input type="file" id="img-upload" class="hidden" accept="image/*">
                </div>
                
                <div class="flex gap-3 mb-2 w-full md:w-auto">
                    <button class="flex-1 md:flex-none bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-purple-600/20 transition active:scale-95">Add Story</button>
                    <button onclick="loadPage('settings')" class="p-3 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/10 transition">
                        <i class="fas fa-ellipsis-h text-gray-400"></i>
                    </button>
                </div>
            </div>

            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black text-white flex items-center justify-center md:justify-start gap-2">
                    <span id="p-name">Loading...</span>
                    <i id="v-badge" class="fas fa-check-circle text-blue-500 text-xl hidden" title="Verified Account"></i>
                </h1>
                <p class="text-gray-400 mt-1 font-medium">@<span id="p-username">username</span></p>
                <p id="p-bio" class="mt-3 text-gray-300 max-w-lg text-sm leading-relaxed">Cyber Security Student | Digital Artist | Meetwoyou Creator</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
        <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-white/5 text-center">
            <p id="count-posts" class="text-2xl font-black text-white">0</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Posts</p>
        </div>
        <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-white/5 text-center">
            <p id="count-friends" class="text-2xl font-black text-white">0</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Friends</p>
        </div>
        <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-white/5 text-center">
            <p id="count-reach" class="text-2xl font-black text-purple-400">0</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Reach</p>
        </div>
    </div>

    <div class="bg-gradient-to-br from-purple-900/20 to-indigo-900/20 p-6 rounded-[2.5rem] border border-purple-500/10">
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-bold text-white flex items-center gap-2"><i class="fas fa-chart-line text-purple-400"></i> Profile Analytics</h3>
            <span class="text-[10px] bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full font-bold">LIVE</span>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="space-y-1">
                <p class="text-gray-500 text-[10px] font-bold">POST VIEWS</p>
                <p class="text-xl font-bold text-white">2.4k</p>
            </div>
            <div class="space-y-1">
                <p class="text-gray-500 text-[10px] font-bold">ENGAGEMENT</p>
                <p class="text-xl font-bold text-white">88%</p>
            </div>
            <div class="space-y-1">
                <p class="text-gray-500 text-[10px] font-bold">PROFILE CLICKS</p>
                <p class="text-xl font-bold text-white">152</p>
            </div>
            <div class="space-y-1">
                <p class="text-gray-500 text-[10px] font-bold">SAVED POSTS</p>
                <p class="text-xl font-bold text-white">43</p>
            </div>
        </div>
    </div>

    <div class="space-y-4">
        <div class="flex items-center justify-between px-2">
            <h3 class="font-black text-lg text-white">My Timeline</h3>
            <div class="flex gap-4 text-xs font-bold text-gray-500 uppercase">
                <span class="text-purple-500 cursor-pointer">Posts</span>
                <span class="cursor-pointer hover:text-white">Media</span>
            </div>
        </div>
        
        <div id="user-posts" class="space-y-6">
            <div class="p-10 text-center bg-white/5 rounded-[2rem] border border-dashed border-white/10">
                <i class="fas fa-layer-group text-3xl text-gray-700 mb-3"></i>
                <p class="text-gray-500 text-sm">No posts yet. Start sharing your nexus!</p>
            </div>
        </div>
    </div>
</div>
