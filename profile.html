<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0b0f1a; color: white; }
        .profile-cover { background: linear-gradient(135deg, #6b21a8, #4f46e5, #1e2937); }
    </style>
</head>
<body class="min-h-screen pb-20">

<div class="max-w-5xl mx-auto px-4 pt-8 space-y-8">

    <!-- Profile Card -->
    <div class="relative bg-slate-900/80 rounded-[2.8rem] overflow-hidden border border-white/10 shadow-2xl">
        <div class="h-64 profile-cover relative group">
            <img id="p-cover" src="https://via.placeholder.com/1200x500/1e2937/64748b?text=Cover+Photo" 
                 class="w-full h-full object-cover hidden">
            <label for="cover-upload" class="absolute bottom-6 right-6 bg-black/70 p-4 rounded-2xl cursor-pointer opacity-0 group-hover:opacity-100">
                <i class="fas fa-camera text-2xl"></i>
            </label>
            <input type="file" id="cover-upload" accept="image/*" class="hidden">
        </div>

        <div class="px-8 pb-10">
            <div class="relative -mt-28 flex flex-col md:flex-row items-center md:items-end justify-between gap-6">
                <div class="relative group">
                    <img id="p-image" src="https://via.placeholder.com/200" 
                         class="w-44 h-44 rounded-3xl border-8 border-[#0b0f1a] object-cover shadow-2xl">
                    <label for="img-upload" class="absolute -bottom-2 -right-2 bg-purple-600 p-4 rounded-2xl cursor-pointer">
                        <i class="fas fa-camera text-xl"></i>
                    </label>
                    <input type="file" id="img-upload" accept="image/*" class="hidden">
                </div>

                <div class="flex gap-4">
                    <button id="add-story" class="bg-gradient-to-r from-purple-600 to-indigo-600 px-8 py-4 rounded-2xl font-semibold flex items-center gap-2">
                        <i class="fas fa-plus"></i> Add Story
                    </button>
                    <button onclick="openEditModal()" class="bg-slate-800 hover:bg-slate-700 border border-white/10 px-8 py-4 rounded-2xl font-semibold">
                        Edit Profile
                    </button>
                </div>
            </div>

            <div class="mt-10 text-center md:text-left">
                <h1 id="p-name" class="text-4xl font-bold">Loading...</h1>
                <p class="text-purple-400 text-2xl">@<span id="p-username">username</span></p>
                <p id="p-bio" class="mt-5 text-gray-300 text-lg">No bio added yet.</p>
                <div id="p-socials" class="flex justify-center md:justify-start gap-8 mt-6 text-3xl text-gray-400"></div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-6 bg-slate-900/70 rounded-3xl p-8 border border-white/10 text-center">
        <div><p id="stat-posts" class="text-5xl font-black">0</p><p class="text-xs text-gray-500">Posts</p></div>
        <div><p id="stat-followers" class="text-5xl font-black">0</p><p class="text-xs text-gray-500">Followers</p></div>
        <div><p id="stat-following" class="text-5xl font-black">0</p><p class="text-xs text-gray-500">Following</p></div>
    </div>

    <!-- About Me -->
    <div class="bg-slate-900/70 rounded-3xl p-8 border border-white/10">
        <h3 class="uppercase text-gray-400 text-sm font-bold mb-6">About Me</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex gap-4"><i class="fas fa-graduation-cap text-purple-400 text-2xl"></i><div><p class="text-xs text-gray-500">Education</p><p id="p-edu">Not Set</p></div></div>
            <div class="flex gap-4"><i class="fas fa-birthday-cake text-purple-400 text-2xl"></i><div><p class="text-xs text-gray-500">Date of Birth</p><p id="p-dob">Not Set</p></div></div>
            <div class="flex gap-4"><i class="fas fa-venus-mars text-purple-400 text-2xl"></i><div><p class="text-xs text-gray-500">Gender</p><p id="p-gender">Other</p></div></div>
            <div class="flex gap-4"><i class="fas fa-link text-purple-400 text-2xl"></i><div><p class="text-xs text-gray-500">Website</p><p id="p-site">Not Set</p></div></div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[1000]">
    <div class="bg-[#0f172a] w-full max-w-lg rounded-3xl p-8 border border-white/10 max-h-[90vh] overflow-auto">
        <div class="flex justify-between mb-8">
            <h2 class="text-2xl font-bold">Edit Profile</h2>
            <i onclick="closeEditModal()" class="fas fa-times text-3xl cursor-pointer"></i>
        </div>
        <div class="space-y-6">
            <input type="text" id="in-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
            <input type="text" id="in-username" placeholder="Username" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
            <textarea id="in-bio" placeholder="Bio" rows="3" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="in-edu" placeholder="Education" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
                <input type="date" id="in-dob" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
            </div>
            <select id="in-gender" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other" selected>Other</option>
            </select>
            <input type="url" id="in-fb" placeholder="Facebook URL" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">
            <input type="url" id="in-ig" placeholder="Instagram URL" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4">

            <div class="flex gap-4 pt-6">
                <button onclick="closeEditModal()" class="flex-1 py-4 bg-white/10 rounded-2xl">Cancel</button>
                <button onclick="saveData()" class="flex-1 py-4 bg-purple-600 rounded-2xl font-semibold">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        databaseURL: "https://meetwoyou-436a2-default-rtdb.firebaseio.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    // Load Profile
    function loadProfile(uid) {
        console.log("Loading profile for:", uid); // Debug

        onValue(ref(db, `users/${uid}`), (snapshot) => {
            const data = snapshot.val() || {};
            console.log("User data:", data);

            document.getElementById('p-name').textContent = data.displayName || "No Name";
            document.getElementById('p-username').textContent = data.username || uid.slice(0,8);
            document.getElementById('p-bio').textContent = data.bio || "No bio added yet.";

            if (data.photoURL) document.getElementById('p-image').src = data.photoURL;
            if (data.coverURL) {
                document.getElementById('p-cover').src = data.coverURL;
                document.getElementById('p-cover').classList.remove('hidden');
            }

            document.getElementById('p-edu').textContent = data.education || "Not Set";
            document.getElementById('p-dob').textContent = data.dob || "Not Set";
            document.getElementById('p-gender').textContent = data.gender || "Other";
            document.getElementById('p-site').textContent = data.website || "Not Set";
        });

        // Followers
        onValue(ref(db, `followers/${uid}`), (snap) => {
            const count = snap.val() ? Object.keys(snap.val()).length : 0;
            document.getElementById('stat-followers').textContent = count;
        });
    }

    // Edit Functions
    window.openEditModal = function() {
        if (!currentUser) return alert("Please login first");
        document.getElementById('edit-modal').classList.remove('hidden');
        document.getElementById('edit-modal').classList.add('flex');
    };

    window.closeEditModal = function() {
        document.getElementById('edit-modal').classList.add('hidden');
        document.getElementById('edit-modal').classList.remove('flex');
    };

    window.saveData = async function() {
        if (!currentUser) return;

        const updates = {
            displayName: document.getElementById('in-name').value.trim(),
            username: document.getElementById('in-username').value.trim().toLowerCase(),
            bio: document.getElementById('in-bio').value.trim(),
            education: document.getElementById('in-edu').value.trim(),
            dob: document.getElementById('in-dob').value,
            gender: document.getElementById('in-gender').value,
            facebook: document.getElementById('in-fb').value.trim(),
            instagram: document.getElementById('in-ig').value.trim(),
            lastUpdated: Date.now()
        };

        try {
            await update(ref(db, `users/${currentUser.uid}`), updates);
            alert("✅ Profile updated!");
            closeEditModal();
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        }
    };

    // Image Uploads
    document.getElementById('img-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentUser) return;
        // uploadToCloudinary function add করতে হবে (আগের কোড থেকে নাও)
        alert("Profile picture upload logic - add Cloudinary function");
    });

    // Auth
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadProfile(user.uid);
        } else {
            alert("Please login to view profile");
        }
    });
</script>
</body>
</html>
