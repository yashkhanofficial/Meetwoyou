<div class="max-w-5xl mx-auto px-4 py-8 space-y-8">

  <!-- Profile Header -->
  <div style="background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333;">
    <!-- Cover -->
    <div style="height: 220px; position: relative; background: linear-gradient(135deg, #8e44ad, #6c3483);">
      <img id="view-cover" style="width:100%; height:100%; object-fit: cover;" alt="cover">
      <label for="cover-upload" style="position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,0.6); padding:10px; border-radius:50%; cursor:pointer;">
        <i class="fas fa-camera"></i>
      </label>
      <input type="file" id="cover-upload" class="hidden" accept="image/*" onchange="uploadImage(this, 'cover')">
    </div>

    <!-- Avatar + Buttons -->
    <div style="padding: 0 20px 30px; position: relative;">
      <div style="position: relative; width: 110px; height: 110px; margin-top: -55px;">
        <img id="view-avatar" src="https://via.placeholder.com/120" style="width:100%; height:100%; border-radius: 20px; border: 4px solid var(--card); object-fit: cover;">
        <label for="avatar-upload" style="position:absolute; bottom: -5px; right: -5px; background:#8e44ad; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid var(--card); cursor:pointer;">
          <i class="fas fa-pen"></i>
        </label>
        <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="uploadImage(this, 'avatar')">
      </div>

      <div style="margin-top: 15px; display:flex; gap:12px; justify-content: flex-end;">
        <button onclick="openEditModal()" class="btn-main" style="padding:12px 24px; font-size:15px;">Edit Profile</button>
        <button onclick="copyProfileLink()" style="background:#333; padding:12px 18px; border-radius:12px;">
          <i class="fas fa-share-alt"></i>
        </button>
      </div>

      <div style="text-align:center; margin-top:20px;">
        <h1 id="view-name" style="font-size:28px; font-weight:bold; margin:0;">Syncing...</h1>
        <p style="color:#bb86fc; font-size:18px; margin:5px 0;">@<span id="view-username">username</span></p>
        <p id="view-bio" style="margin-top:15px; color:#ccc; line-height:1.5;">No bio added yet.</p>
      </div>
    </div>
  </div>

  <!-- Basic Info -->
  <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #333;">
    <h3 style="color:#bb86fc; margin-bottom:15px;">Basic Information</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; font-size:15px;">
      <div><strong>Education:</strong> <span id="view-edu">Not set</span></div>
      <div><strong>Birthday:</strong> <span id="view-dob">Not set</span></div>
      <div><strong>Country:</strong> <span id="view-country">Not set</span></div>
      <div><strong>Living:</strong> <span id="view-living">Not set</span></div>
      <div><strong>Website:</strong> <span id="view-website" style="color:#bb86fc;">Not set</span></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:2000;">
  <div style="background:var(--card); width:92%; max-width:420px; border-radius:20px; padding:25px; border:1px solid #444;">
    <h2 style="margin-bottom:20px; text-align:center;">Edit Profile</h2>
    
    <input id="in-name" type="text" placeholder="Full Name" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <input id="in-username" type="text" placeholder="Username" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <textarea id="in-bio" placeholder="Bio" rows="3" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;"></textarea>
    
    <input id="in-edu" type="text" placeholder="Education" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <input id="in-dob" type="date" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <input id="in-country" type="text" placeholder="Country" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <input id="in-living" type="text" placeholder="Living in" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">
    <input id="in-website" type="url" placeholder="Website" style="width:100%; padding:14px; margin:8px 0; background:#222; border:1px solid #444; border-radius:10px; color:white;">

    <button onclick="saveProfileData()" id="save-btn" class="btn-main" style="margin-top:20px;">Save Changes</button>
  </div>
</div>

<script type="module">
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const auth = getAuth();
  const db = getFirestore();
  let currentUid = null;

  const notify = (msg, type = 'success') => {
    Swal.fire({
      toast: true,
      position: 'top-end',
      icon: type,
      title: msg,
      showConfirmButton: false,
      timer: 2000
    });
  };

  window.openEditModal = () => document.getElementById('edit-modal').style.display = 'flex';
  window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';

  window.copyProfileLink = () => {
    const username = document.getElementById('view-username').innerText.trim();
    if (!username || username === "username") return notify("Username not loaded", "error");
    navigator.clipboard.writeText(`\( {window.location.origin}/profile?u= \){username}`);
    notify("Profile link copied!");
  };

  window.uploadImage = async (input, type) => {
    const file = input.files[0];
    if (!file || !currentUid) return notify("Please login", "error");

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', "Meetwoyou");

    try {
      const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, { method: 'POST', body: formData });
      const data = await res.json();
      const field = type === 'avatar' ? 'profilePicUrl' : 'coverPicUrl';
      await updateDoc(doc(db, "users", currentUid), { [field]: data.secure_url });
      notify(type === 'avatar' ? 'Avatar Updated' : 'Cover Updated');
    } catch (e) {
      notify("Upload failed", "error");
    }
  };

  window.saveProfileData = async () => {
    const btn = document.getElementById('save-btn');
    btn.innerText = "Saving...";
    btn.disabled = true;

    try {
      await setDoc(doc(db, "users", currentUid), {
        fullName: document.getElementById('in-name').value.trim(),
        username: document.getElementById('in-username').value.trim().toLowerCase(),
        bio: document.getElementById('in-bio').value.trim(),
        education: document.getElementById('in-edu').value.trim(),
        dob: document.getElementById('in-dob').value,
        country: document.getElementById('in-country').value.trim(),
        living: document.getElementById('in-living').value.trim(),
        website: document.getElementById('in-website').value.trim(),
        updatedAt: new Date().toISOString()
      }, { merge: true });

      closeEditModal();
      notify("Profile updated successfully!");
    } catch (e) {
      notify("Save failed", "error");
    } finally {
      btn.innerText = "Save Changes";
      btn.disabled = false;
    }
  };

  // Main Profile Loader
  const user = auth.currentUser;
  if (user) {
    currentUid = user.uid;
    const userRef = doc(db, "users", user.uid);

    onSnapshot(userRef, (snap) => {
      if (!snap.exists()) {
        setDoc(userRef, { fullName: user.displayName || "New User", username: "user_" + user.uid.slice(0,6) });
        return;
      }

      const d = snap.data();
      const u = auth.currentUser;

      document.getElementById('view-name').textContent = d.fullName || u.displayName || "User";
      document.getElementById('view-username').textContent = d.username || "user_" + u.uid.slice(0,6);
      document.getElementById('view-bio').textContent = d.bio || "No bio added yet.";

      document.getElementById('view-avatar').src = d.profilePicUrl || u.photoURL || "https://via.placeholder.com/120";
      if (d.coverPicUrl) document.getElementById('view-cover').src = d.coverPicUrl;

      document.getElementById('view-edu').textContent = d.education || "Not set";
      document.getElementById('view-dob').textContent = d.dob || "Not set";
      document.getElementById('view-country').textContent = d.country || "Not set";
      document.getElementById('view-living').textContent = d.living || "Not set";
      document.getElementById('view-website').textContent = d.website || "Not set";

      // Fill edit form
      document.getElementById('in-name').value = d.fullName || "";
      document.getElementById('in-username').value = d.username || "";
      document.getElementById('in-bio').value = d.bio || "";
      document.getElementById('in-edu').value = d.education || "";
      document.getElementById('in-dob').value = d.dob || "";
      document.getElementById('in-country').value = d.country || "";
      document.getElementById('in-living').value = d.living || "";
      document.getElementById('in-website').value = d.website || "";
    });
  }
</script>
