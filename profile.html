<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Meetwoyou</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .profile-card { background: linear-gradient(135deg, #4f46e5, #7e22ce); }
  </style>
</head>
<body class="bg-[#0b0f1a] text-white min-h-screen pb-20">

<div class="max-w-5xl mx-auto space-y-6 pb-28 animate-fade-in px-4">

  <!-- Profile Header -->
  <div class="relative bg-slate-900/40 rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
    <!-- Cover -->
    <div class="h-48 md:h-64 bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 relative group">
      <img id="view-cover" class="w-full h-full object-cover opacity-70" alt="cover">
      <label for="cover-upload" class="absolute bottom-4 right-4 bg-black/50 backdrop-blur-md p-3 rounded-2xl cursor-pointer border border-white/10 hover:bg-black/70 transition">
        <i class="fas fa-camera text-white"></i>
      </label>
      <input type="file" id="cover-upload" class="hidden" accept="image/*" onchange="uploadToCloudinary(this, 'cover')">
    </div>

    <!-- Avatar + Buttons -->
    <div class="px-6 md:px-10 pb-8">
      <div class="relative -mt-16 mb-6 flex flex-col md:flex-row items-center md:items-end justify-between gap-6">
        <div class="relative group">
          <div class="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] border-4 border-[#0b0f1a] overflow-hidden shadow-2xl bg-slate-800">
            <img id="view-avatar" src="https://via.placeholder.com/150" class="w-full h-full object-cover" alt="avatar">
          </div>
          <label for="avatar-upload" class="absolute bottom-3 right-3 bg-purple-600 p-3 rounded-2xl cursor-pointer shadow-xl border-2 border-[#0b0f1a]">
            <i class="fas fa-pen text-white text-sm"></i>
          </label>
          <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="uploadToCloudinary(this, 'avatar')">
        </div>

        <div class="flex gap-3">
          <button onclick="openEditModal()" 
            class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-2xl font-semibold border border-white/10 transition flex items-center gap-2">
            <i class="fas fa-edit"></i> Edit Profile
          </button>
          <button onclick="copyProfileLink()" 
            class="p-4 bg-white/10 hover:bg-purple-500/20 rounded-2xl border border-white/10 text-purple-400 transition">
            <i class="fas fa-share-alt"></i>
          </button>
        </div>
      </div>

      <!-- Name, Username, Bio -->
      <div class="text-center md:text-left">
        <h1 id="view-name" class="text-3xl font-black text-white">Syncing...</h1>
        <p id="view-username-container" class="text-purple-400 font-bold text-xl">@<span id="view-username">username</span></p>
        <p id="view-bio" class="mt-3 text-gray-400 max-w-lg text-base leading-relaxed">No bio added yet.</p>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-4">
    <div class="bg-slate-900/40 p-6 rounded-3xl border border-white/5 text-center">
      <p id="stat-followers" class="text-3xl font-black text-white">0</p>
      <p class="text-xs text-gray-500 uppercase tracking-widest">Followers</p>
    </div>
    <div class="bg-slate-900/40 p-6 rounded-3xl border border-white/5 text-center">
      <p id="stat-following" class="text-3xl font-black text-white">0</p>
      <p class="text-xs text-gray-500 uppercase tracking-widest">Following</p>
    </div>
    <div class="bg-slate-900/40 p-6 rounded-3xl border border-white/5 text-center">
      <p id="stat-posts" class="text-3xl font-black text-white">0</p>
      <p class="text-xs text-gray-500 uppercase tracking-widest">Posts</p>
    </div>
  </div>

  <!-- Basic Info -->
  <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-white/5">
    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-4 flex items-center gap-2">
      <i class="fas fa-info-circle"></i> Basic Information
    </h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 text-sm">
      <p><i class="fas fa-graduation-cap w-6 text-gray-500"></i> Education: <span id="view-edu" class="text-white font-medium">Not set</span></p>
      <p><i class="fas fa-birthday-cake w-6 text-gray-500"></i> Birthday: <span id="view-dob" class="text-white font-medium">Not set</span></p>
      <p><i class="fas fa-map-marker-alt w-6 text-gray-500"></i> Country: <span id="view-country" class="text-white font-medium">Not set</span></p>
      <p><i class="fas fa-home w-6 text-gray-500"></i> Living in: <span id="view-living" class="text-white font-medium">Not set</span></p>
      <p><i class="fas fa-globe w-6 text-gray-500"></i> Website: <span id="view-website" class="text-purple-400 font-medium">Not set</span></p>
    </div>
  </div>

</div>

<!-- Edit Modal (Improved) -->
<div id="edit-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-4 overflow-y-auto">
  <div class="bg-[#0f172a] w-full max-w-lg rounded-3xl p-8 border border-white/10">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-black">Edit Profile</h2>
      <button onclick="closeEditModal()" class="text-gray-400 hover:text-white text-2xl">✕</button>
    </div>

    <div class="space-y-5">
      <input id="in-name" type="text" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-purple-500 outline-none">
      <input id="in-username" type="text" placeholder="Username (unique)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-purple-500 outline-none">
      <textarea id="in-bio" placeholder="Bio..." rows="3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-purple-500 outline-none"></textarea>
      
      <input id="in-edu" type="text" placeholder="Education" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl">
      <input id="in-dob" type="date" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white">
      <input id="in-country" type="text" placeholder="Country" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl">
      <input id="in-living" type="text" placeholder="Currently living in" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl">
      <input id="in-website" type="url" placeholder="Website / Portfolio" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl">

      <button onclick="saveProfileData()" id="save-btn"
        class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-bold text-lg transition">
        Save Changes
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const db = getFirestore();
  const auth = getAuth();

  let currentUserUid = null;

  // Modal functions
  window.openEditModal = () => document.getElementById('edit-modal').classList.remove('hidden');
  window.closeEditModal = () => document.getElementById('edit-modal').classList.add('hidden');

  // Copy Profile Link
  window.copyProfileLink = () => {
    const username = document.getElementById('view-username').innerText.trim();
    if (!username || username === "username") {
      alert("Username not loaded yet!");
      return;
    }
    const link = `\( {window.location.origin}/profile?u= \){username}`;
    navigator.clipboard.writeText(link).then(() => {
      alert("✅ Profile link copied!");
    });
  };

  // Real-time Listener (Improved with better error handling)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserUid = user.uid;
      const docRef = doc(db, "users", user.uid);

      onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
          const data = snap.data();

          // Main Profile
          document.getElementById('view-name').innerText = data.fullName || user.displayName || "User";
          document.getElementById('view-username').innerText = data.username || "user_" + user.uid.slice(0,6);
          document.getElementById('view-bio').innerText = data.bio || "No bio added yet.";

          document.getElementById('view-avatar').src = data.profilePicUrl || user.photoURL || "https://via.placeholder.com/150";
          document.getElementById('view-cover').src = data.coverPicUrl || "https://via.placeholder.com/800x300/4f46e5/ffffff?text=Cover";

          // Extra fields
          document.getElementById('view-edu').innerText = data.education || "Not set";
          document.getElementById('view-dob').innerText = data.dob || "Not set";
          document.getElementById('view-country').innerText = data.country || "Not set";
          document.getElementById('view-living').innerText = data.living || "Not set";
          document.getElementById('view-website').innerText = data.website || "Not set";

          // Stats (followers/following/posts) - add your own logic later
          document.getElementById('stat-followers').innerText = data.followersCount || 0;
          document.getElementById('stat-following').innerText = data.followingCount || 0;
          document.getElementById('stat-posts').innerText = data.postsCount || 0;

          // Fill edit form
          document.getElementById('in-name').value = data.fullName || "";
          document.getElementById('in-username').value = data.username || "";
          document.getElementById('in-bio').value = data.bio || "";
          document.getElementById('in-edu').value = data.education || "";
          document.getElementById('in-dob').value = data.dob || "";
          document.getElementById('in-country').value = data.country || "";
          document.getElementById('in-living').value = data.living || "";
          document.getElementById('in-website').value = data.website || "";
        } else {
          // Create default profile
          setDoc(docRef, {
            fullName: user.displayName || "New User",
            username: "user_" + user.uid.slice(0,6),
            bio: "",
            createdAt: new Date().toISOString()
          });
        }
      }, (error) => {
        console.error("Snapshot error:", error);
        document.getElementById('view-name').innerText = "Error loading profile";
      });
    } else {
      console.log("No user logged in");
    }
  });

  // Cloudinary Upload (unchanged but safer)
  window.uploadToCloudinary = async (input, type) => {
    const file = input.files[0];
    if (!file || !currentUserUid) return alert("Please login first");

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'Meetwoyou');   // change if your preset is different

    try {
      const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (!data.secure_url) throw new Error("Upload failed");

      const field = type === 'avatar' ? 'profilePicUrl' : 'coverPicUrl';
      await updateDoc(doc(db, "users", currentUserUid), { [field]: data.secure_url });
      alert(`${type === 'avatar' ? 'Profile Picture' : 'Cover Photo'} updated successfully!`);
    } catch (err) {
      console.error(err);
      alert("Upload failed. Please try again.");
    }
  };

  // Save Profile (Fixed)
  window.saveProfileData = async () => {
    if (!currentUserUid) return alert("Not logged in");

    const btn = document.getElementById('save-btn');
    btn.innerHTML = 'Saving...';
    btn.disabled = true;

    const updatedData = {
      fullName: document.getElementById('in-name').value.trim(),
      username: document.getElementById('in-username').value.trim().toLowerCase(),
      bio: document.getElementById('in-bio').value.trim(),
      education: document.getElementById('in-edu').value.trim(),
      dob: document.getElementById('in-dob').value,
      country: document.getElementById('in-country').value.trim(),
      living: document.getElementById('in-living').value.trim(),
      website: document.getElementById('in-website').value.trim(),
      updatedAt: new Date().toISOString()
    };

    try {
      await setDoc(doc(db, "users", currentUserUid), updatedData, { merge: true });
      closeEditModal();
      alert("Profile updated successfully!");
    } catch (e) {
      alert("Save failed: " + e.message);
    } finally {
      btn.innerHTML = 'Save Changes';
      btn.disabled = false;
    }
  };
</script>

</body>
      </html>
