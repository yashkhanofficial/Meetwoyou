<div class="max-w-5xl mx-auto space-y-6 pb-28 animate-fade-in">
    
    <div class="relative bg-slate-900/40 rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl">
        <div class="h-48 md:h-64 bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 relative group">
            <img id="view-cover" class="w-full h-full object-cover">
            <label for="cover-upload" class="absolute bottom-4 right-4 bg-black/40 backdrop-blur-md p-2 rounded-xl cursor-pointer border border-white/10 opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-camera text-white"></i>
            </label>
            <input type="file" id="cover-upload" class="hidden" onchange="uploadToCloudinary(this, 'cover')">
        </div>
        
        <div class="px-6 md:px-10 pb-8">
            <div class="relative -mt-16 mb-4 flex flex-col md:flex-row items-center md:items-end justify-between gap-4">
                <div class="relative group">
                    <div class="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] border-4 border-[#0b0f1a] overflow-hidden shadow-2xl bg-slate-800">
                        <img id="view-avatar" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                    </div>
                    <label for="avatar-upload" class="absolute bottom-2 right-2 bg-purple-600 p-2.5 rounded-2xl cursor-pointer shadow-lg border-2 border-[#0b0f1a]">
                        <i class="fas fa-pen text-white text-xs"></i>
                    </label>
                    <input type="file" id="avatar-upload" class="hidden" onchange="uploadToCloudinary(this, 'avatar')">
                </div>
                
                <div class="flex gap-3 mb-2">
                    <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="bg-white/5 text-white px-8 py-3 rounded-2xl font-bold border border-white/10 hover:bg-white/10 transition">Edit Profile</button>
                    <button onclick="copyProfileLink()" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-purple-400"><i class="fas fa-share-alt"></i></button>
                </div>
            </div>

            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black text-white flex items-center justify-center md:justify-start gap-2">
                    <span id="view-name">Loading...</span>
                    <i id="verified-badge" class="fas fa-check-circle text-blue-500 text-xl hidden"></i>
                </h1>
                <p class="text-purple-400 font-bold">@<span id="view-username">username</span></p>
                <p id="view-bio" class="mt-3 text-gray-400 max-w-lg text-sm italic">No bio added yet.</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-white/5 flex justify-around items-center text-center">
            <div><p id="stat-followers" class="text-2xl font-black text-white">0</p><p class="text-[10px] text-gray-500 font-bold uppercase">Followers</p></div>
            <div class="w-px h-8 bg-white/10"></div>
            <div><p id="stat-posts" class="text-2xl font-black text-white">0</p><p class="text-[10px] text-gray-500 font-bold uppercase">Posts</p></div>
        </div>
        <div class="md:col-span-2 bg-slate-900/40 p-6 rounded-[2rem] border border-white/5 space-y-4">
            <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">About Info</h3>
            <div id="about-info" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-300">
                <p><i class="fas fa-graduation-cap w-6"></i> Education: <span id="view-edu">Not set</span></p>
                <p><i class="fas fa-birthday-cake w-6"></i> Birthday: <span id="view-dob">Not set</span></p>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-[#0f172a] w-full max-w-lg rounded-[2.5rem] p-8 border border-white/10 shadow-2xl my-10">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black text-white">Edit Profile</h2>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="text-gray-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-purple-500">
                <input type="text" id="in-username" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-purple-500">
                <textarea id="in-bio" placeholder="Short Bio" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white h-24 outline-none"></textarea>
                <input type="text" id="in-edu" placeholder="Education" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white">
                <input type="date" id="in-dob" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-gray-400">
                <button id="save-btn" onclick="saveData()" class="w-full bg-purple-600 p-4 rounded-2xl font-bold text-white shadow-lg shadow-purple-600/30">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- Cloudinary Upload Logic ---
    window.uploadToCloudinary = async (input, type) => {
        const file = input.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'Meetwoyou'); // আপনার প্রিসেট নাম

        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            const imageUrl = data.secure_url;

            // ডাটাবেজে ছবির লিঙ্ক আপডেট করা
            const user = auth.currentUser;
            const field = type === 'avatar' ? 'profilePicUrl' : 'coverPicUrl';
            await setDoc(doc(db, "users", user.uid), { [field]: imageUrl }, { merge: true });
            
            alert(`${type.toUpperCase()} updated successfully!`);
        } catch (err) {
            console.error(err);
            alert("Upload failed. Check Cloudinary settings.");
        }
    };

    // --- Profile Sync Logic ---
    onAuthStateChanged(auth, (user) => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('view-name').innerText = d.fullName || "User";
                    document.getElementById('view-username').innerText = d.username || "agent";
                    document.getElementById('view-bio').innerText = d.bio || "No bio yet.";
                    document.getElementById('view-avatar').src = d.profilePicUrl || "https://via.placeholder.com/150";
                    document.getElementById('view-cover').src = d.coverPicUrl || "";
                    if(d.coverPicUrl) document.getElementById('view-cover').classList.remove('hidden');
                    
                    document.getElementById('view-edu').innerText = d.education || "Not set";
                    document.getElementById('view-dob').innerText = d.dob || "Not set";

                    // ইনপুট ফিল্ড আপডেট
                    document.getElementById('in-name').value = d.fullName || "";
                    document.getElementById('in-username').value = d.username || "";
                    document.getElementById('in-bio').value = d.bio || "";
                    document.getElementById('in-edu').value = d.education || "";
                    document.getElementById('in-dob').value = d.dob || "";
                }
            });
        }
    });

    // --- Save Logic ---
    window.saveData = async () => {
        const user = auth.currentUser;
        const btn = document.getElementById('save-btn');
        btn.innerText = "Syncing...";
        
        const data = {
            fullName: document.getElementById('in-name').value,
            username: document.getElementById('in-username').value,
            bio: document.getElementById('in-bio').value,
            education: document.getElementById('in-edu').value,
            dob: document.getElementById('in-dob').value,
        };

        try {
            await setDoc(doc(db, "users", user.uid), data, { merge: true });
            document.getElementById('edit-modal').classList.add('hidden');
            btn.innerText = "Save Changes";
        } catch (e) { alert(e.message); }
    };
                        </script>
