<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Meetwoyou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8e44ad; --bg: #0d0d0d; --card: #1a1a1b; --text: #ffffff; --gray: #b0b3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--card); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .profile-card { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        .img-box { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .img-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .img-box label { position: absolute; bottom: 5px; right: 5px; background: var(--primary); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 12px; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: var(--gray); font-size: 20px; text-align: center; flex: 1; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>

<div class="header">
    <a href="home.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
    <h3 style="margin:0;">Edit Profile</h3>
</div>

<div class="container">
    <div class="profile-card">
        <div class="img-box">
            <img id="p-img-view" src="https://via.placeholder.com/120">
            <label for="p-upload"><i class="fas fa-camera"></i></label>
            <input type="file" id="p-upload" style="display:none" onchange="previewProfileImg(this)">
        </div>

        <input type="text" id="p-name" placeholder="Full Name">
        <textarea id="p-bio" placeholder="Write something about you..."></textarea>
        <input type="text" id="p-edu" placeholder="Education">
        <input type="date" id="p-dob">
        
        <button class="btn-save" id="save-profile-btn">Update Profile</button>
    </div>
</div>

<div class="nav-bar">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="search.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user-edit"></i><span>Edit</span></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ১. ইমেজ প্রিভিউ
    window.previewProfileImg = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('p-img-view').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    };

    // ২. ডাটা লোড করা
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            
            // UI Update
            document.getElementById('p-name').value = user.displayName || "";
            document.getElementById('p-img-view').src = user.photoURL || "https://via.placeholder.com/120";

            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('p-bio').value = data.bio || "";
                document.getElementById('p-edu').value = data.education || "";
                document.getElementById('p-dob').value = data.dob || "";
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // ৩. প্রোফাইল আপডেট করা
    document.getElementById('save-profile-btn').onclick = async () => {
        const user = auth.currentUser;
        if(!user) return;

        const btn = document.getElementById('save-profile-btn');
        btn.innerText = "Updating...";
        btn.disabled = true;

        try {
            let photoUrl = user.photoURL;
            const file = document.getElementById('p-upload').files[0];

            // Cloudinary তে ছবি আপলোড
            if (file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'Meetwoyou');
                const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, {method:'POST', body:formData});
                const data = await res.json();
                photoUrl = data.secure_url;
            }

            const updatedData = {
                fullName: document.getElementById('p-name').value,
                bio: document.getElementById('p-bio').value,
                education: document.getElementById('p-edu').value,
                dob: document.getElementById('p-dob').value,
                profilePicUrl: photoUrl,
                uid: user.uid
            };

            // Firestore এবং Auth এ সেভ করা
            await setDoc(doc(db, "users", user.uid), updatedData, { merge: true });
            await updateProfile(user, { 
                displayName: updatedData.fullName, 
                photoURL: photoUrl 
            });

            Swal.fire('Saved', 'Your profile is updated!', 'success');
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        } finally {
            btn.innerText = "Update Profile";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
