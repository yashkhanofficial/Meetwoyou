<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Meetwoyou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 20px; sticky: top; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .setting-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #262626; }
        .setting-item h4 { margin: 0 0 10px 0; color: var(--gray); font-size: 12px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid #262626; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #262626; color: white; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .back-btn { font-size: 20px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-arrow-left back-btn" onclick="window.location.href='dashboard.html'"></i>
    <h2 style="margin:0;">Settings</h2>
</div>

<div class="container">
    <div class="setting-item">
        <h4>Display Name</h4>
        <input type="text" id="set-name" placeholder="Enter new name">
        <button class="btn btn-primary" onclick="updateName()">Update Name</button>
    </div>

    <div class="setting-item">
        <h4>Account Security</h4>
        <input type="password" id="set-pass" placeholder="New Password">
        <button class="btn btn-outline" onclick="changePass()">Change Password</button>
    </div>

    <div class="setting-item">
        <h4>Verification</h4>
        <p style="font-size: 13px; color: var(--gray);">Get a blue checkmark next to your name.</p>
        <button class="btn btn-outline" onclick="applyVerification()">Apply for Verification</button>
    </div>

    <div class="setting-item" style="border-color: #331111;">
        <h4>Danger Zone</h4>
        <button class="btn btn-danger" onclick="deleteAccount()">Delete My Account</button>
        <button class="btn btn-outline" style="margin-top: 15px;" onclick="logout()">Logout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updateProfile, updatePassword, deleteUser, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, updateDoc, deleteDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let user = null;

    onAuthStateChanged(auth, (u) => {
        if (u) { 
            user = u;
            document.getElementById('set-name').value = u.displayName || "";
        } else { window.location.href = "index.html"; }
    });

    window.updateName = async () => {
        const newName = document.getElementById('set-name').value.trim();
        if(!newName) return;
        try {
            await updateProfile(user, { displayName: newName });
            await updateDoc(doc(db, "users", user.uid), { displayName: newName });
            Swal.fire({ icon: 'success', title: 'Name Updated', background: '#121212', color: '#fff' });
        } catch (e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); }
    };

    window.changePass = async () => {
        const newPass = document.getElementById('set-pass').value;
        if(newPass.length < 6) return Swal.fire('Password too short');
        try {
            await updatePassword(user, newPass);
            Swal.fire({ icon: 'success', title: 'Password Changed', background: '#121212', color: '#fff' });
            document.getElementById('set-pass').value = "";
        } catch (e) { Swal.fire('Error', 'Please logout and login again to change password.', 'error'); }
    };

    window.applyVerification = async () => {
        try {
            await addDoc(collection(db, "verification_requests"), {
                uid: user.uid,
                name: user.displayName,
                timestamp: serverTimestamp()
            });
            Swal.fire({ icon: 'success', title: 'Request Sent', text: 'Our team will review your profile.', background: '#121212', color: '#fff' });
        } catch (e) { Swal.fire('Error sending request'); }
    };

    window.deleteAccount = async () => {
        const res = await Swal.fire({
            title: 'Are you sure?',
            text: "This will permanently delete your posts and account.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ed4956',
            background: '#121212', color: '#fff'
        });
        if(res.isConfirmed) {
            try {
                await deleteDoc(doc(db, "users", user.uid));
                await deleteUser(user);
                window.location.href = "index.html";
            } catch (e) { Swal.fire('Error', 'Please re-authenticate to delete account.', 'error'); }
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
