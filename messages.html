<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #8e8e8e; --verified: #0095f6; --danger: #ed4956; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        .header { background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .v-badge { color: var(--verified); font-size: 13px; margin-left: 4px; }
        
        #chat-screen, #chat-list-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin: 4px 0; max-width: 75%; font-size: 14px; position: relative; cursor: pointer; transition: background 0.2s; }
        .chat-bubble:active { opacity: 0.8; }
        .sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .recv { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .chat-status { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; text-align: right; display: block; }
        .online-dot { width: 10px; height: 10px; background: #4cd137; border-radius: 50%; border: 2px solid #000; }
        .unread-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; min-width: 15px; text-align: center; }
        
        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #121212; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav i { font-size: 24px; cursor: pointer; color: #fff; position: relative; }
        
        .chat-media { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'" style="font-size:20px; cursor:pointer;"></i>
    <h2 style="margin:0; font-family: 'Grand Hotel', cursive;">Messages</h2>
    <div></div>
</div>

<div id="chat-list-screen" style="display:flex; flex-direction:column;">
    <div id="chat-list" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="chat-screen">
    <div style="padding:15px; border-bottom:1px solid #262626; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer;"></i>
        <div style="position:relative;">
            <img id="chat-h-img" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
            <div id="chat-online-indicator" style="position:absolute; bottom:0; right:0; display:none;" class="online-dot"></div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <b id="chat-h-name" style="font-size:14px;"></b>
            <small id="chat-h-status" style="font-size:11px; color:var(--gray);">offline</small>
        </div>
        <div style="margin-left:auto; display:flex; gap:18px;">
            <i class="fas fa-phone-alt" style="color:var(--primary); cursor:pointer;"></i>
            <i class="fas fa-video" style="color:var(--primary); cursor:pointer;"></i>
            <i class="fas fa-info-circle" style="color:var(--gray); cursor:pointer;" onclick="deleteChatConversation()"></i>
        </div>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; background: radial-gradient(circle at top right, #0a0a0a, #000);"></div>
    <div style="padding:12px; display:flex; align-items:center; gap:10px; background:#121212; border-top:1px solid #262626;">
        <label for="chat-file-input">
            <i class="fas fa-camera" style="color:var(--primary); font-size:18px; cursor:pointer;"></i>
        </label>
        <input type="file" id="chat-file-input" style="display:none;" accept="image/*,video/*" onchange="sendChatMedia(this)">
        <input type="text" id="chat-input" placeholder="Message..." style="margin:0; border-radius:25px; padding-left:15px; height:40px;">
        <i class="far fa-paper-plane" onclick="sendMsg()" style="color:var(--primary); font-size:20px; cursor:pointer;"></i>
    </div>
</div>

<div class="nav">
    <i class="fas fa-home" onclick="window.location.href='dashboard.html'"></i>
    <i class="fas fa-search" onclick="window.location.href='dashboard.html#discover'"></i>
    <i class="fas fa-comment-dots" style="color:var(--primary);"></i>
    <i class="fas fa-user-circle" onclick="window.location.href='dashboard.html#profile'"></i>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, arrayUnion, arrayRemove, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null;
    let activeChatID = null;
    let chatUnsubscribe = null;
    let statusUnsubscribe = null;
    const vB = ` <i class="fas fa-check-circle v-badge"></i>`;

    function timeAgo(timestamp) {
        if(!timestamp) return "...";
        const date = timestamp instanceof Timestamp ? timestamp.toDate() : new Date(timestamp);
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return date.toLocaleDateString();
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            me = user;
            document.getElementById('chat-list-screen').style.display = 'flex';
            loadChatList();
        } else { 
            window.location.href = "index.html"; 
        }
    });

    function loadChatList() {
        const msgQuery = query(collection(db, "messages"), orderBy("timestamp", "desc"));

        onSnapshot(msgQuery, async (mSnap) => {
            const chatList = document.getElementById('chat-list');
            let interactedMap = new Map();

            mSnap.forEach(mDoc => {
                const m = mDoc.data();
                if(m.sender !== me.uid && m.receiver !== me.uid) return;

                const otherUid = m.sender === me.uid ? m.receiver : m.sender;
                if(!interactedMap.has(otherUid)) {
                    interactedMap.set(otherUid, {
                        lastMsg: m.mediaType ? `Sent a ${m.mediaType}` : (m.text || "Media"),
                        time: m.timestamp,
                        unread: (m.receiver === me.uid && !m.seen) ? 1 : 0
                    });
                } else if(m.receiver === me.uid && !m.seen) {
                    interactedMap.get(otherUid).unread++;
                }
            });

            chatList.innerHTML = interactedMap.size === 0 ? '<p style="text-align:center; color:gray; padding:40px 20px;">No messages yet.</p>' : "";

            for(let [uid, data] of interactedMap) {
                const uSnap = await getDoc(doc(db, "users", uid));
                if(uSnap.exists()){
                    const u = uSnap.data();
                    const badgeHtml = data.unread > 0 ? `<span class="unread-badge">${data.unread}</span>` : "";
                    chatList.innerHTML += `
                        <div class="user-list-item" onclick="openChat('\( {uid}', ' \){u.displayName}', '${u.photoURL}')">
                            <div style="display:flex; align-items:center; gap:12px; flex:1;">
                                <img src="${u.photoURL}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                                <div style="flex:1;">
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <b>\( {u.displayName} \){u.isVerified?vB:''}</b>
                                        <small style="color:var(--gray); font-size:10px;">${timeAgo(data.time)}</small>
                                    </div>
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <small style="color:${data.unread>0?'#fff':'var(--gray)'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;">
                                            ${data.lastMsg}
                                        </small>
                                        ${badgeHtml}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                }
            }
        });
    }

    window.openChat = async (uid, name, img) => {
        activeChatID = uid;
        const headerName = document.getElementById('chat-h-name');
        const headerImg = document.getElementById('chat-h-img');
        const headerStatus = document.getElementById('chat-h-status');
        const onlineIndicator = document.getElementById('chat-online-indicator');
        
        headerName.innerHTML = name;
        headerImg.src = img;
        document.getElementById('chat-list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';

        if(chatUnsubscribe) chatUnsubscribe();
        if(statusUnsubscribe) statusUnsubscribe();

        statusUnsubscribe = onSnapshot(doc(db, "users", uid), (snap) => {
            const data = snap.data();
            if(data?.isVerified) headerName.innerHTML = name + vB;
            const lastActive = data?.lastActive?.toDate();
            const isOnline = lastActive && (new Date() - lastActive < 300000);
            headerStatus.innerText = isOnline ? 'Active now' : `Last seen: ${timeAgo(data?.lastActive)}`;
            onlineIndicator.style.display = isOnline ? 'block' : 'none';
        });

        const qChat = query(collection(db, "messages"), orderBy("timestamp", "asc"));

        chatUnsubscribe = onSnapshot(qChat, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            let batch = writeBatch(db);
            let hasUnseen = false;

            snap.forEach(d => {
                const m = d.data();
                const betweenUs = (m.sender === me.uid && m.receiver === activeChatID) || (m.sender === activeChatID && m.receiver === me.uid);
                if(!betweenUs) return;

                const isMe = m.sender === me.uid;
                const statusIcon = m.seen ? '<i class="fas fa-check-double" style="color:#0095f6;"></i>' : '<i class="fas fa-check"></i>';
                
                let mediaContent = "";
                if(m.mediaUrl) {
                    if(m.mediaType === 'video') {
                        mediaContent = `<video src="${m.mediaUrl}" class="chat-media" controls></video>`;
                    } else {
                        mediaContent = `<img src="\( {m.mediaUrl}" class="chat-media" onclick="window.open(' \){m.mediaUrl}', '_blank')">`;
                    }
                }

                box.innerHTML += `
                    <div class="chat-bubble \( {isMe?'sent':'recv'}" onclick="manageMessage(' \){d.id}', '${m.text || ''}', ${isMe})">
                        \( {m.text ? `<div> \){m.text}</div>` : ''}
                        ${mediaContent}
                        <span class="chat-status">${timeAgo(m.timestamp)} ${isMe ? statusIcon : ''}</span>
                    </div>`;
                
                if(!isMe && !m.seen) {
                    batch.update(doc(db, "messages", d.id), { seen: true });
                    hasUnseen = true;
                }
            });
            if(hasUnseen) batch.commit();
            box.scrollTop = box.scrollHeight;
        });
    };

    window.closeChat = () => {
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('chat-list-screen').style.display = 'flex';
        if(chatUnsubscribe) chatUnsubscribe();
        if(statusUnsubscribe) statusUnsubscribe();
        activeChatID = null;
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chat-input');
        const text = i.value.trim();
        if(!text || !activeChatID) return;
        i.value = "";
        await addDoc(collection(db, "messages"), { 
            sender: me.uid, 
            receiver: activeChatID, 
            text: text, 
            seen: false,
            timestamp: serverTimestamp() 
        });
    };

    window.sendChatMedia = async (input) => {
        if(!input.files[0] || !activeChatID) return;
        const file = input.files[0];
        const type = file.type.startsWith('video') ? 'video' : 'image';
        Swal.fire({title: 'Sending...', didOpen: () => Swal.showLoading(), background: '#121212', color: '#fff', toast: true, position: 'top'});
        try {
            const url = await uploadToCloudinary(file);
            await addDoc(collection(db, "messages"), {
                sender: me.uid,
                receiver: activeChatID,
                mediaUrl: url,
                mediaType: type,
                seen: false,
                timestamp: serverTimestamp()
            });
            Swal.close();
        } catch (e) {
            Swal.fire({icon: 'error', title: 'Failed to send media', background: '#121212', color: '#fff'});
        }
        input.value = "";
    };

    window.manageMessage = async (mid, text, isMe) => {
        const actions = isMe ? ['Edit', 'Delete for me', 'Cancel'] : ['Delete for me', 'Cancel'];
        const { value: choice } = await Swal.fire({
            title: 'Message Options',
            input: 'radio',
            inputOptions: actions.reduce((acc, curr) => ({...acc, [curr]: curr}), {}),
            background: '#121212', color: '#fff', showConfirmButton: true
        });

        if(choice === 'Edit' && isMe) {
            const { value: newText } = await Swal.fire({ input: 'text', inputValue: text, background: '#121212', color: '#fff' });
            if(newText) await updateDoc(doc(db, "messages", mid), { text: newText + " (edited)" });
        } else if(choice === 'Delete for me') {
            await deleteDoc(doc(db, "messages", mid));
        }
    };

    window.deleteChatConversation = async () => {
        const res = await Swal.fire({ 
            title: 'Delete Chat?', 
            text: "This will remove the conversation record.",
            icon: 'warning', showCancelButton: true, background: '#121212', color: '#fff' 
        });
        if(res.isConfirmed) {
            closeChat();
        }
    };

    async function uploadToCloudinary(file) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.cloudinary.com/v1_1/dpgawb5sl/auto/upload');
            xhr.onload = () => {
                const resp = JSON.parse(xhr.responseText);
                if(resp.secure_url) resolve(resp.secure_url);
                else reject(new Error("Cloudinary Error"));
            };
            xhr.onerror = () => reject(new Error("Network Error"));
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', 'Meetwoyou');
            xhr.send(fd);
        });
    }

    window.userLogout = () => signOut(auth);
</script>
</body>
  </html>
