<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(45deg, #7c3aed, #4f46e5);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4);
        }
        .hidden { display: none !important; }
        .pass-container { position: relative; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
        }

        /* Top Install Banner Animation */
        #pwa-install-banner {
            animation: slideDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 90%;
            max-width: 350px;
        }
        @keyframes slideDown {
            from { top: -100px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        .app-logo-mini {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
        }
    </style>

    <link rel="icon" type="image/png" sizes="32x32" href="https://meetwoyou.github.io/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://meetwoyou.github.io/apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-animate"></div>

    <div class="glass-card p-10 rounded-[2.5rem] w-full max-w-md relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600/20 rounded-full blur-3xl"></div>
        
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-white tracking-tighter italic mb-2">Meetwoyou</h1>
            <p class="text-gray-400 text-sm font-light">Connect with the world instantly.</p>
        </header>

        <div id="login-section" class="space-y-5">
            <input type="email" id="login-email" placeholder="Email Address" class="input-field w-full px-5 py-4 rounded-2xl">
            <div class="pass-container">
                <input type="password" id="login-password" placeholder="Password" class="input-field w-full px-5 py-4 rounded-2xl">
                <i class="fas fa-eye toggle-password" onclick="togglePass('login-password', this)"></i>
            </div>
            <div class="flex justify-end">
                <button onclick="showSection('forgot-section')" class="text-xs text-purple-400 hover:text-purple-300 transition font-medium">Forgot Password?</button>
            </div>
            <button id="login-btn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl">Sign In</button>
            <div class="flex items-center my-6 opacity-30">
                <hr class="w-full border-gray-500">
                <span class="px-3 text-[10px] text-white font-black uppercase tracking-widest">OR</span>
                <hr class="w-full border-gray-500">
            </div>
           <button id="google-login" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-semibold py-4 rounded-2xl flex items-center justify-center transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5 mr-3" alt="Google">
                Continue with Google
           </button>
            <p class="text-center text-gray-400 text-sm mt-8">
                Don't have an account? 
                <button onclick="showSection('signup-section')" class="text-purple-400 font-bold hover:underline ml-1">Create Account</button>
            </p>
        </div>

        <div id="signup-section" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="signup-first-name" placeholder="First Name" class="input-field px-5 py-4 rounded-2xl">
                <input type="text" id="signup-last-name" placeholder="Last Name" class="input-field px-5 py-4 rounded-2xl">
            </div>
            <input type="email" id="signup-email" placeholder="Email Address" class="input-field w-full px-5 py-4 rounded-2xl">
            <div class="pass-container">
                <input type="password" id="signup-password" placeholder="Create Password" class="input-field w-full px-5 py-4 rounded-2xl">
                <i class="fas fa-eye toggle-password" onclick="togglePass('signup-password', this)"></i>
            </div>
            <button id="signup-btn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl mt-4">Join Now</button>
            <button onclick="showSection('login-section')" class="w-full text-gray-400 text-sm hover:text-white transition mt-4 font-medium text-center">Back to Login</button>
        </div>

        <div id="forgot-section" class="hidden space-y-6">
            <div class="text-center">
                <h2 class="text-white font-bold text-xl mb-2">Reset Password</h2>
                <p class="text-gray-400 text-xs">We'll send a recovery link to your email.</p>
            </div>
            <input type="email" id="forgot-email" placeholder="Recovery Email" class="input-field w-full px-5 py-4 rounded-2xl">
            <button id="reset-btn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl">Send Link</button>
            <button onclick="showSection('login-section')" class="w-full text-gray-400 text-sm hover:text-white transition font-medium text-center">Back to Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const adminEmail = "admin@meetwoyou.com";

        const notify = (msg, type = 'success') => {
            Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                background: '#1e293b',
                color: '#fff'
            }).fire({ icon: type, title: msg });
        };

        const handleRedirection = (userEmail) => {
            window.location.href = userEmail.toLowerCase() === adminEmail.toLowerCase() ? "admin.html" : "dashboard.html";
        };

        window.togglePass = (id, icon) => {
            const el = document.getElementById(id);
            el.type = el.type === "password" ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        };

        window.showSection = (id) => {
            ['login-section', 'signup-section', 'forgot-section'].forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        // Firebase - Reset Password Logic Fixed
        document.getElementById('reset-btn').onclick = async () => {
            const email = document.getElementById('forgot-email').value;
            if(!email) return notify("Enter email first!", "error");
            try {
                await sendPasswordResetEmail(auth, email);
                notify("Recovery link sent to " + email);
                showSection('login-section');
            } catch (error) { notify(error.message, "error"); }
        };

        // Firebase - Signup Logic
        document.getElementById('signup-btn').onclick = async () => {
            const fName = document.getElementById('signup-first-name').value;
            const lName = document.getElementById('signup-last-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            if(!email || !password || !fName) return notify("All fields required!", "error");
            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(res.user, { displayName: `${fName} ${lName}` });
                notify(`Account created! Welcome ${fName}`);
                setTimeout(() => handleRedirection(email), 1500); 
            } catch (error) { notify(error.message, "error"); }
        };

        // Firebase - Login Logic
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if(!email || !password) return notify("Please fill all fields!", "error");
            try {
                await signInWithEmailAndPassword(auth, email, password);
                notify("Login Successful!");
                setTimeout(() => handleRedirection(email), 1500); 
            } catch (error) { notify("Invalid email or password", "error"); }
        };

        // Firebase - Google Login
        document.getElementById('google-login').onclick = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                notify("Welcome " + res.user.displayName);
                setTimeout(() => handleRedirection(res.user.email), 1500); 
            } catch (error) { notify("Google sign-in failed", "error"); }
        };
    </script>

    <script>
    // 1. Service Worker & Force Refresh
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.update();
                console.log('SW Active');
            });
        });
    }

    // 2. Optimized Top Install Banner
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        setTimeout(() => {
            if (!document.getElementById('pwa-install-banner')) {
                const banner = document.createElement('div');
                banner.id = 'pwa-install-banner';
                // Using your 192x192 logo
                banner.innerHTML = `
                    <img src="./web-app-manifest-192x192.png" class="app-logo-mini" alt="Logo">
                    <div style="flex:1">
                        <div style="font-size:14px;font-weight:800;color:white">Meetwoyou</div>
                        <div style="font-size:11px;color:#94a3b8">Add to home screen</div>
                    </div>
                    <button style="background:#7c3aed;padding:6px 15px;border-radius:10px;font-size:12px;font-weight:bold">Install</button>
                `;
                document.body.appendChild(banner);

                banner.addEventListener('click', async () => {
                    banner.remove();
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        deferredPrompt = null;
                    }
                });
            }
        }, 2000);
    });

    window.addEventListener('appinstalled', () => {
        if(document.getElementById('pwa-install-banner')) {
            document.getElementById('pwa-install-banner').remove();
        }
    });
    </script>
</body>
</html>
