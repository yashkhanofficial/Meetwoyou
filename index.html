<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Loader covering full screen until auth check is done */
        #auth-loader {
            position: fixed; inset: 0; background: #0f172a; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .input-field:focus { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); outline: none; }
        .btn-primary { background: linear-gradient(45deg, #7c3aed, #4f46e5); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4); }
        .hidden { display: none !important; }
        .pass-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; }
    </style>
    <link rel="manifest" href="./site.webmanifest">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div id="auth-loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500"></div>
    </div>

    <div class="bg-animate"></div>

    <div id="main-content" class="glass-card p-10 rounded-[2.5rem] w-full max-w-md relative overflow-hidden hidden">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-white tracking-tighter italic mb-2">Meetwoyou</h1>
            <p class="text-gray-400 text-sm">Connect with the world instantly.</p>
        </header>

        <div id="login-section" class="space-y-5">
            <input type="email" id="login-email" placeholder="Email Address" class="input-field w-full px-5 py-4 rounded-2xl">
            <div class="pass-container">
                <input type="password" id="login-password" placeholder="Password" class="input-field w-full px-5 py-4 rounded-2xl">
                <i class="fas fa-eye toggle-password" onclick="togglePass('login-password', this)"></i>
            </div>
            <button id="login-btn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl">Sign In</button>
            <div class="flex items-center my-6 opacity-30">
                <hr class="w-full border-gray-500"><span class="px-3 text-[10px] text-white font-black">OR</span><hr class="w-full border-gray-500">
            </div>
            <button id="google-login" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-semibold py-4 rounded-2xl flex items-center justify-center">
                Continue with Google
            </button>
            <p class="text-center text-gray-400 text-sm mt-8">
                New here? <button onclick="showSection('signup-section')" class="text-purple-400 font-bold">Create Account</button>
            </p>
        </div>

        <div id="signup-section" class="hidden space-y-4">
            <input type="text" id="signup-name" placeholder="Full Name" class="input-field w-full px-5 py-4 rounded-2xl">
            <input type="email" id="signup-email" placeholder="Email Address" class="input-field w-full px-5 py-4 rounded-2xl">
            <div class="pass-container">
                <input type="password" id="signup-password" placeholder="Password" class="input-field w-full px-5 py-4 rounded-2xl">
            </div>
            <button id="signup-btn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl">Join Now</button>
            <button onclick="showSection('login-section')" class="w-full text-gray-400 text-sm text-center">Back to Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, setPersistence, browserLocalPersistence, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // persistence set করার পরে onAuthStateChanged রান হবে
        setPersistence(auth, browserLocalPersistence)
            .then(() => {
                // সেশন চেক শুরু
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        // ইউজার লগইন থাকলে সরাসরি ড্যাশবোর্ডে চলে যাবে
                        window.location.replace("dashboard.html");
                    } else {
                        // ইউজার লগইন না থাকলে লোডার সরিয়ে লগইন ফর্ম দেখাবে
                        document.getElementById('auth-loader').style.display = 'none';
                        document.getElementById('main-content').classList.remove('hidden');
                    }
                });
            })
            .catch((error) => {
                console.error("Persistence Error: ", error);
            });

        window.togglePass = (id, icon) => {
            const el = document.getElementById(id);
            el.type = el.type === "password" ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        };

        window.showSection = (id) => {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('signup-section').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };

        const notify = (msg, type = 'success') => {
            Swal.fire({ toast: true, position: 'top-end', icon: type, title: msg, showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff' });
        };

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if(!email || !password) return notify("Fill all fields", "error");
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect onAuthStateChanged হ্যান্ডেল করবে
            } catch (e) { notify("Invalid credentials", "error"); }
        };

        document.getElementById('google-login').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) { notify("Google sign-in failed", "error"); }
        };

        document.getElementById('signup-btn').onclick = async () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(res.user, { displayName: name });
            } catch (e) { notify(e.message, "error"); }
        };
    </script>
</body>
</html>
