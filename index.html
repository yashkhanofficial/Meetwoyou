<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Meetwoyou</h1>
        <p class="text-center text-gray-500 mb-8">নতুন মানুষের সাথে আলাপ শুরু হোক</p>

        <div id="login-form">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">ইমেইল</label>
                <input type="email" id="email" placeholder="example@mail.com" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition">
            </div>

            <button id="login-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow-lg transition">
                লগইন করুন
            </button>
        </div>

        <div class="mt-6 flex items-center justify-between">
            <hr class="w-full border-gray-300">
            <span class="px-2 text-gray-400 text-sm">বা</span>
            <hr class="w-full border-gray-300">
        </div>

        <button id="google-login" class="w-full mt-6 bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 rounded-lg flex items-center justify-center transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5 mr-2">
            Google দিয়ে লগইন
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার দেওয়া Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4",
            measurementId: "G-LF9FLW7Y7E"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Google Login Function
        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                alert("স্বাগতম " + result.user.displayName + "!");
                // এখানে আপনি সফল লগইনের পর ইউজারকে ড্যাশবোর্ডে পাঠাতে পারেন
            } catch (error) {
                console.error(error);
                alert("লগইন ব্যর্থ হয়েছে: " + error.message);
            }
        };
    </script>
</body>
</html>
