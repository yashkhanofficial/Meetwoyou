<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2 italic">Meetwoyou</h1>
        
        <div id="login-section">
            <p class="text-center text-gray-500 mb-8">স্বাগতম! লগইন করুন</p>
            <input type="email" id="login-email" placeholder="ইমেইল" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-4 focus:outline-none focus:border-purple-500">
            <input type="password" id="login-password" placeholder="পাসওয়ার্ড" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-2 focus:outline-none focus:border-purple-500">
            <div class="text-right mb-4">
                <button onclick="showSection('forgot-section')" class="text-xs text-purple-600 hover:underline">পাসওয়ার্ড ভুলে গেছেন?</button>
            </div>
            <button class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-purple-700 transition">লগইন</button>
            
            <div class="mt-6 flex items-center justify-between opacity-50"><hr class="w-full"> <span class="px-2 text-xs">বা</span> <hr class="w-full"></div>
            
            <button id="google-login" class="w-full mt-6 bg-white border border-gray-300 py-3 rounded-lg flex items-center justify-center hover:bg-gray-50 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5 mr-2"> Google দিয়ে লগইন
            </button>
            <p class="mt-8 text-center text-sm">অ্যাকাউন্ট নেই? <button onclick="showSection('signup-section')" class="text-purple-600 font-bold hover:underline">নতুন অ্যাকাউন্ট তৈরি করুন</button></p>
        </div>

        <div id="signup-section" class="hidden">
            <p class="text-center text-gray-500 mb-8">নতুন অ্যাকাউন্ট খুলুন</p>
            <input type="text" placeholder="পুরো নাম" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-4 focus:outline-none focus:border-purple-500">
            <input type="email" id="signup-email" placeholder="ইমেইল" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-4 focus:outline-none focus:border-purple-500">
            <input type="password" id="signup-password" placeholder="পাসওয়ার্ড" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-6 focus:outline-none focus:border-purple-500">
            <button class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-green-700 transition">অ্যাকাউন্ট খুলুন</button>
            <p class="mt-6 text-center text-sm"><button onclick="showSection('login-section')" class="text-gray-600 hover:underline">ফিরে যান</button></p>
        </div>

        <div id="forgot-section" class="hidden">
            <p class="text-center text-gray-500 mb-8">পাসওয়ার্ড রিসেট করুন</p>
            <p class="text-xs text-gray-400 mb-4 text-center">আপনার ইমেইল দিন, আমরা একটি রিসেট লিঙ্ক পাঠাবো।</p>
            <input type="email" placeholder="আপনার ইমেইল" class="w-full px-4 py-3 rounded-lg bg-gray-100 border mb-6 focus:outline-none focus:border-purple-500">
            <button class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg shadow-md hover:bg-orange-600 transition">লিঙ্ক পাঠান</button>
            <p class="mt-6 text-center text-sm"><button onclick="showSection('login-section')" class="text-gray-600 hover:underline">ফিরে যান</button></p>
        </div>
    </div>

    <script type="module">
        // --- Firebase Logic ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Section Toggle Function
        window.showSection = (id) => {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('signup-section').classList.add('hidden');
            document.getElementById('forgot-section').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };

        // Google Login
        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                alert("স্বাগতম " + result.user.displayName + "!");
            } catch (error) {
                alert("এরর: " + error.message);
            }
        };
    </script>
</body>
</html>
