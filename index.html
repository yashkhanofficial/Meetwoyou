<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2 italic">Meetwoyou</h1>
        <p class="text-center text-gray-500 mb-8">নতুন মানুষের সাথে আলাপ শুরু হোক</p>

        <div id="login-form">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">ইমেইল</label>
                <input type="email" id="email" placeholder="example@mail.com" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition">
            </div>
            
            <div class="mb-4 text-right">
                <label class="block text-gray-700 text-sm font-bold mb-2 text-left">পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition">
                <a href="#" class="text-xs text-purple-600 hover:underline mt-2 inline-block">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>

            <button id="login-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:scale-105 active:scale-95">
                লগইন করুন
            </button>
        </div>

        <div class="mt-6 flex items-center justify-between">
            <hr class="w-full border-gray-300">
            <span class="px-2 text-gray-400 text-sm whitespace-nowrap">অন্যভাবে লগইন করুন</span>
            <hr class="w-full border-gray-300">
        </div>

        <button id="google-login" class="w-full mt-6 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold py-3 rounded-lg flex items-center justify-center transition shadow-sm active:bg-gray-100">
            <svg class="w-6 h-6 mr-3" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.94l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
            Google দিয়ে লগইন
        </button>

        <p class="mt-8 text-center text-sm text-gray-600">
            অ্যাকাউন্ট নেই? <a href="#" id="signup-link" class="text-purple-600 font-bold hover:underline">নতুন অ্যাকাউন্ট তৈরি করুন</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4",
            measurementId: "G-LF9FLW7Y7E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Google Login
        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                alert("স্বাগতম " + result.user.displayName + "!");
                // এখানে ড্যাশবোর্ড কোড বসবে
            } catch (error) {
                alert("এরর: " + error.message);
            }
        };

        // Placeholder for other features
        document.getElementById('signup-link').onclick = () => alert("খুব শীঘ্রই এই ফিচারটি আসছে!");
    </script>
</body>
</html>
