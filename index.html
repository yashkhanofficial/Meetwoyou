<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Meetwoyou</h1>
        <p class="text-center text-gray-500 mb-8">নতুন মানুষের সাথে আলাপ শুরু হোক</p>

        <form>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">ইমেইল বা ফোন নম্বর</label>
                <input type="text" placeholder="example@mail.com" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition duration-300">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">পাসওয়ার্ড</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-100 border focus:border-purple-500 focus:bg-white focus:outline-none transition duration-300">
            </div>

            <button class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
                লগইন করুন
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <hr class="w-full border-gray-300">
            <span class="px-2 text-gray-400 text-sm">বা</span>
            <hr class="w-full border-gray-300">
        </div>

        <button class="w-full mt-6 bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 rounded-lg flex items-center justify-center transition duration-300">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5 mr-2">
            Google দিয়ে লগইন
        </button>

        <p class="mt-8 text-center text-sm text-gray-600">
            অ্যাকাউন্ট নেই? <a href="#" class="text-purple-600 font-bold hover:underline">রেজিস্ট্রেশন করুন</a>
        </p>
    </div>
</body>
</html>
