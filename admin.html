<div class="stats-grid">
    <div class="stat-card">
        <h3>TOTAL USERS</h3>
        <p id="total-users-count">0</p>
    </div>
    <div class="stat-card">
        <h3>ONLINE NOW</h3>
        <p id="online-count" style="color: var(--success);">0</p>
    </div>
    <div class="stat-card">
        <h3>GLOBAL V-BADGE</h3>
        <label class="switch">
            <input type="checkbox" id="global-v-switch" onclick="toggleGlobalV()">
            <span class="slider"></span>
        </label>
        <small id="v-status-text">OFF</small>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- Utility Function: Number Formatting (e.g., 50k, 1M) ---
    function formatNumbers(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }

    // --- Loading Delay Fix & Online Counter ---
    // User active thakle 'status' collection-e update korbe (Dashboard/Home page-e thakbe)
    function trackOnlineUsers() {
        onSnapshot(collection(db, "status"), (snap) => {
            document.getElementById('online-count').innerText = snap.size;
        });
    }

    // --- Global V-Badge System ---
    // Settings name-e ekta special doc create hobe database-e
    window.toggleGlobalV = async () => {
        const isEnabled = document.getElementById('global-v-switch').checked;
        await setDoc(doc(db, "settings", "global_config"), { vBadgeVisible: isEnabled }, { merge: true });
        document.getElementById('v-status-text').innerText = isEnabled ? "ON" : "OFF";
    };

    // --- Follower Boost Fix (Prevents resetting to 1) ---
    window.setFollowers = async (uid) => {
        const inputVal = parseInt(document.getElementById(`f-${uid}`).value);
        if(isNaN(inputVal)) return;

        try {
            // Ekhane array use na kore directly 'followerCount' field update kora hobe
            // Jate user follow korle updateDoc(..., { followerCount: increment(1) }) kaj kore
            await updateDoc(doc(db, "users", uid), { 
                followerCount: inputVal,
                boosted: true // Ei flag thakle system bujhbe eta manually set
            });
            Swal.fire("Success", `Followers set to ${formatNumbers(inputVal)}`, "success");
        } catch(e) { console.error(e); }
    };

    // --- Load Data with Formatting ---
    function loadData() {
        onSnapshot(collection(db, "users"), (snap) => {
            const userList = document.getElementById('user-list');
            userList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                // Check if it's array or number
                const count = u.followerCount || (Array.isArray(u.followers) ? u.followers.length : 0);
                
                const card = document.createElement('div');
                card.innerHTML = `
                    <div class="input-group">
                        <span>Followers: ${formatNumbers(count)}</span>
                        <input type="number" id="f-${d.id}" placeholder="Set New">
                        <button onclick="setFollowers('${d.id}')">Boost</button>
                    </div>
                `;
                userList.appendChild(card);
            });
        });
    }
</script>

<style>
    /* CSS for Switch */
    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .slider { position: absolute; cursor: pointer; background: #ccc; border-radius: 34px; width: 100%; height: 100%; transition: .4s; }
    input:checked + .slider { background: var(--success); }
</style>
