<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Meetwoyou - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-5">

    <div id="admin-content" style="display:none;" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500"><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
            <div class="flex gap-3">
                <button onclick="sendGlobalAlert()" class="bg-amber-600 px-4 py-2 rounded-lg hover:bg-amber-500 text-sm"><i class="fas fa-bullhorn"></i> Send Notice</button>
                <button onclick="location.href='index.html'" class="bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600 text-sm">Back to App</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm uppercase tracking-wider">Total Users</h3>
                <p id="total-users" class="text-4xl font-bold text-blue-400 mt-2">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm uppercase tracking-wider">Total Posts</h3>
                <p id="total-posts" class="text-4xl font-bold text-green-400 mt-2">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm uppercase tracking-wider">Total Reels</h3>
                <p id="total-reels" class="text-4xl font-bold text-purple-400 mt-2">0</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-2xl">
            <div class="p-4 bg-gray-700/50 border-b border-gray-700 font-bold flex justify-between items-center">
                <span>User Management Center</span>
                <span class="text-xs text-gray-400">Live Sync Enabled</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-900/50 text-gray-400 text-sm">
                        <tr>
                            <th class="p-4">Profile</th>
                            <th class="p-4">UID (Identity)</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-list" class="divide-y divide-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
            authDomain: "meetwoyou-436a2.firebaseapp.com",
            projectId: "meetwoyou-436a2",
            storageBucket: "meetwoyou-436a2.firebasestorage.app",
            messagingSenderId: "612788132077",
            appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "info.yashkhanofficial@gmail.com";

        // Security: Email Whitelist Check
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-content').style.display = 'block';
                loadStats();
                loadUsers();
            } else {
                alert("Unauthorized Access! Redirecting...");
                window.location.href = "index.html";
            }
        });

        function loadStats() {
            onSnapshot(collection(db, "users"), snap => document.getElementById('total-users').innerText = snap.size);
            onSnapshot(collection(db, "posts"), snap => document.getElementById('total-posts').innerText = snap.size);
            onSnapshot(collection(db, "reels"), snap => document.getElementById('total-reels').innerText = snap.size);
        }

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    const isV = u.verified || false;
                    const row = `
                        <tr class="hover:bg-gray-700/30 transition">
                            <td class="p-4 flex items-center gap-3">
                                <img src="${u.photoURL}" class="w-10 h-10 rounded-full border-2 border-gray-600 object-cover">
                                <div>
                                    <p class="font-semibold text-sm">${u.displayName} ${isV ? '<i class="fas fa-check-circle text-blue-500"></i>' : ''}</p>
                                    <p class="text-[10px] text-gray-500">${u.email || 'No Email'}</p>
                                </div>
                            </td>
                            <td class="p-4 font-mono text-[10px] text-gray-500">${d.id}</td>
                            <td class="p-4">
                                <span class="px-2 py-0.5 rounded-full text-[10px] ${isV ? 'bg-blue-900/50 text-blue-400 border border-blue-500/30' : 'bg-gray-700 text-gray-400'}">
                                    ${isV ? 'VERIFIED' : 'PENDING'}
                                </span>
                            </td>
                            <td class="p-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="verifyUser('${d.id}', ${isV})" class="p-2 bg-blue-600/20 text-blue-400 rounded-lg hover:bg-blue-600 hover:text-white transition" title="Verify User">
                                        <i class="fas fa-certificate text-xs"></i>
                                    </button>
                                    <button onclick="deleteUser('${d.id}')" class="p-2 bg-red-600/20 text-red-400 rounded-lg hover:bg-red-600 hover:text-white transition" title="Delete User">
                                        <i class="fas fa-trash-alt text-xs"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    list.innerHTML += row;
                });
            });
        }

        window.deleteUser = async (id) => {
            if(confirm("আপনি কি নিশ্চিতভাবে এই ইউজারকে ডিলিট করতে চান? এটি আর ফিরিয়ে আনা যাবে না।")) {
                await deleteDoc(doc(db, "users", id));
            }
        };

        window.verifyUser = async (id, status) => {
            await updateDoc(doc(db, "users", id), { verified: !status });
        };

        // Global Alert Functionality
        window.sendGlobalAlert = async () => {
            const msg = prompt("সব ইউজারের জন্য একটি জরুরি নোটিশ লিখুন:");
            if(msg) {
                await addDoc(collection(db, "notifications"), {
                    message: msg,
                    sender: "Admin",
                    type: "global_alert",
                    timestamp: serverTimestamp()
                });
                alert("নোটিশ পাঠানো হয়েছে!");
            }
        };

    </script>
</body>
</html>
