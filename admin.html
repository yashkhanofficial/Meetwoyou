<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Advanced Authority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #7c3aed; 
            --primary-dark: #6d28d9;
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --danger: #ef4444; 
            --success: #22c55e;
            --warning: #f59e0b;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: #020617; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); position: fixed; height: 100vh; }
        .main-content { flex: 1; margin-left: 260px; padding: 30px; }
        
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 14px; color: #94a3b8; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; }

        /* Search Bar */
        .search-box { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; margin-bottom: 25px; width: 100%; max-width: 400px; display: flex; align-items: center; gap: 10px; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); }
        .badge-v { color: #0ea5e9; }
        
        .controls { display: flex; gap: 8px; margin-top: 15px; }
        .btn { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; flex: 1; transition: 0.2s; }
        .btn-v { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; border: 1px solid #0ea5e9; }
        .btn-v.active { background: #0ea5e9; color: white; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        
        .input-group { margin-top: 15px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .input-group input { background: #0f172a; border: 1px solid #475569; color: white; padding: 6px; width: 80px; border-radius: 5px; text-align: center; }
        
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 180px; object-fit: cover; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 15px 10px; }
            .logo span, .nav-link span { display: none; }
            .main-content { margin-left: 70px; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class="fas fa-shield-alt"></i> <span>Meetwoyou</span></div>
    <div class="nav-link active" onclick="showTab('users', this)"><i class="fas fa-users"></i> <span>Users</span></div>
    <div class="nav-link" onclick="showTab('posts', this)"><i class="fas fa-th-large"></i> <span>Posts</span></div>
    <div class="nav-link" style="color:var(--danger); margin-top: 50px;" onclick="location.href='dashboard.html'"><i class="fas fa-sign-out-alt"></i> <span>Exit</span></div>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>TOTAL USERS</h3>
            <p id="total-users-count">0</p>
        </div>
        <div class="stat-card">
            <h3>TOTAL POSTS</h3>
            <p id="total-posts-count">0</p>
        </div>
        <div class="stat-card" style="border-left-color: var(--success);">
            <h3>SYSTEM STATUS</h3>
            <p style="font-size: 18px; color: var(--success);">Online</p>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search" style="color:#94a3b8"></i>
        <input type="text" id="adminSearch" placeholder="Search user or content..." onkeyup="filterContent()">
    </div>

    <div id="users-section" class="tab-content">
        <h2 style="margin-bottom: 20px;">Manage Users</h2>
        <div class="grid" id="user-list"></div>
    </div>

    <div id="posts-section" class="tab-content" style="display:none;">
        <h2 style="margin-bottom: 20px;">Review Posts</h2>
        <div class="grid" id="post-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Same Config as before
    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== "admin@meetwoyou.com") {
            Swal.fire({ icon: 'error', title: 'Restricted Area', text: 'You are not authorized!', timer: 3000, showConfirmButton: false });
            setTimeout(() => window.location.href = "index.html", 2000);
        } else {
            loadData();
        }
    });

    function loadData() {
        // Users Load
        onSnapshot(collection(db, "users"), (snap) => {
            document.getElementById('total-users-count').innerText = snap.size;
            const userList = document.getElementById('user-list');
            userList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const fCount = u.followers ? (Array.isArray(u.followers) ? u.followers.length : u.followers) : 0;
                
                const card = document.createElement('div');
                card.className = "card user-card-item";
                card.setAttribute('data-name', u.displayName.toLowerCase());
                card.innerHTML = `
                    <div class="user-info">
                        <img src="${u.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                        <div>
                            <div style="font-weight:bold">${u.displayName} ${u.isVerified ? '<i class="fas fa-check-circle badge-v"></i>' : ''}</div>
                            <small style="color:#94a3b8">${u.email}</small>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn btn-v ${u.isVerified ? 'active' : ''}" onclick="toggleV('${d.id}', ${u.isVerified})">
                            <i class="fas fa-certificate"></i> ${u.isVerified ? 'Unverify' : 'Verify'}
                        </button>
                        <button class="btn btn-del" onclick="deleteAcc('${d.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="input-group">
                        <span style="font-size:12px; color:#94a3b8">Followers:</span>
                        <input type="number" id="f-${d.id}" value="${fCount}">
                        <button class="btn" style="background:var(--primary); color:white" onclick="setFollowers('${d.id}')">Update</button>
                    </div>
                `;
                userList.appendChild(card);
            });
        });

        // Posts Load
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            document.getElementById('total-posts-count').innerText = snap.size;
            const postList = document.getElementById('post-list');
            postList.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const lCount = p.likes ? (Array.isArray(p.likes) ? p.likes.length : p.likes) : 0;
                const card = document.createElement('div');
                card.className = "card post-card-item";
                card.setAttribute('data-name', p.authorName.toLowerCase());
                card.innerHTML = `
                    <div style="font-size:14px; color:var(--primary)"><b>@${p.authorName}</b></div>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin:10px 0; font-size:13px">${p.text || 'No text content'}</div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="input-group">
                        <span style="font-size:12px; color:#94a3b8">Likes:</span>
                        <input type="number" id="l-${d.id}" value="${lCount}">
                        <button class="btn" style="background:var(--primary); color:white" onclick="setLikes('${d.id}')">Set</button>
                    </div>
                    <button class="btn btn-del" style="width:100%; margin-top:10px;" onclick="deletePost('${d.id}')">Remove Content</button>
                `;
                postList.appendChild(card);
            });
        });
    }

    // Functions
    window.setFollowers = async (uid) => {
        const count = parseInt(document.getElementById(`f-${uid}`).value);
        try {
            const data = count < 50000 ? new Array(count).fill("boost") : count;
            await updateDoc(doc(db, "users", uid), { followers: data });
            Swal.fire("Updated!", "Follower count changed.", "success");
        } catch(e) { console.error(e); }
    };

    window.setLikes = async (pid) => {
        const count = parseInt(document.getElementById(`l-${pid}`).value);
        try {
            const data = count < 50000 ? new Array(count).fill("boost") : count;
            await updateDoc(doc(db, "posts", pid), { likes: data });
            Swal.fire("Success", "Post likes updated.", "success");
        } catch(e) { console.error(e); }
    };

    window.toggleV = async (uid, status) => {
        await updateDoc(doc(db, "users", uid), { isVerified: !status });
    };

    window.deleteAcc = async (uid) => {
        const res = await Swal.fire({ title: 'Are you sure?', text: "This user will be permanently removed!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Yes, delete!' });
        if(res.isConfirmed) await deleteDoc(doc(db, "users", uid));
    };

    window.deletePost = async (pid) => {
        if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", pid));
    };

    window.showTab = (tab, el) => {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(tab + '-section').style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    // Search Filter Logic
    window.filterContent = () => {
        const val = document.getElementById('adminSearch').value.toLowerCase();
        document.querySelectorAll('.user-card-item, .post-card-item').forEach(card => {
            const name = card.getAttribute('data-name');
            card.style.display = name.includes(val) ? 'block' : 'none';
        });
    };
</script>
</body>
</html>
