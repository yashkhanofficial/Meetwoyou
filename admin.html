<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #020617; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .admin-container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card); padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-boost { background: var(--success); color: white; margin-bottom: 8px; }
        .btn-boost:hover { opacity: 0.9; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; }
        .tabs { margin-bottom: 25px; display: flex; gap: 10px; }
        .tab-btn { background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; cursor: pointer; border-radius: 8px; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        .user-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .user-meta img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2 style="margin:0;"><i class="fas fa-shield-alt"></i> Admin Panel</h2>
        <button class="btn" style="width: auto; background: #334155; color: white;" onclick="location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Dashboard
        </button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-u" onclick="window.switchTab('users')">Users List</button>
        <button class="tab-btn" id="tab-p" onclick="window.switchTab('posts')">Global Posts</button>
    </div>

    <div id="users-sec" class="grid">
        <div style="color: var(--primary); padding: 20px;">Loading users...</div>
    </div>

    <div id="posts-sec" class="grid" style="display:none;">
        <div style="color: var(--primary); padding: 20px;">Loading posts...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Number formatter for K, M
    const formatNum = (num) => {
        if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return num.toString();
    };

    // Exporting functions to window for HTML access
    window.switchTab = (tab) => {
        document.getElementById('users-sec').style.display = tab === 'users' ? 'grid' : 'none';
        document.getElementById('posts-sec').style.display = tab === 'posts' ? 'grid' : 'none';
        document.getElementById('tab-u').classList.toggle('active', tab === 'users');
        document.getElementById('tab-p').classList.toggle('active', tab === 'posts');
    };

    window.boostFollowers = async (id) => {
        const val = document.getElementById(`f-${id}`).value;
        if(!val) return Swal.fire("Error", "Please enter a number", "error");
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "users", id), { followers: "boost:" + formatted });
        Swal.fire("Boosted!", `Followers set to ${formatted}`, "success");
    };

    window.boostLikes = async (id) => {
        const val = document.getElementById(`l-${id}`).value;
        if(!val) return Swal.fire("Error", "Please enter a number", "error");
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "posts", id), { likes: "boost:" + formatted });
        Swal.fire("Boosted!", `Likes set to ${formatted}`, "success");
    };

    window.deleteUser = async (id) => {
        const res = await Swal.fire({ title: 'Are you sure?', text: "User will be permanently deleted!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
        if(res.isConfirmed) await deleteDoc(doc(db, "users", id));
    };

    window.deletePost = async (id) => {
        const res = await Swal.fire({ title: 'Delete Post?', text: "This cannot be undone!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
        if(res.isConfirmed) await deleteDoc(doc(db, "posts", id));
    };

    // Real-time Data Loading
    onSnapshot(collection(db, "users"), (snap) => {
        const area = document.getElementById('users-sec'); area.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="user-meta">
                    <img src="${u.photoURL || 'https://via.placeholder.com/45'}">
                    <div>
                        <div style="font-weight:bold; font-size:15px;">${u.displayName}</div>
                        <div style="font-size:11px; color:#94a3b8;">UID: ${d.id.substring(0,10)}...</div>
                    </div>
                </div>
                <input type="number" id="f-${d.id}" placeholder="Follower Count (e.g. 1000)">
                <button class="btn btn-boost" onclick="window.boostFollowers('${d.id}')"><i class="fas fa-rocket"></i> Boost</button>
                <button class="btn btn-del" onclick="window.deleteUser('${d.id}')"><i class="fas fa-trash-alt"></i> Delete</button>
            `;
            area.appendChild(card);
        });
    });

    onSnapshot(collection(db, "posts"), (snap) => {
        const area = document.getElementById('posts-sec'); area.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div style="margin-bottom:12px;">
                    <b style="color:var(--primary)">@${p.authorName}</b>
                    <p style="font-size:13px; margin:5px 0; color:#cbd5e1;">${p.text ? p.text.substring(0, 50) + '...' : '[Image Only]'}</p>
                </div>
                <input type="number" id="l-${d.id}" placeholder="Like Count">
                <button class="btn btn-boost" onclick="window.boostLikes('${d.id}')"><i class="fas fa-heart"></i> Boost Likes</button>
                <button class="btn btn-del" onclick="window.deletePost('${d.id}')"><i class="fas fa-times"></i> Remove Post</button>
            `;
            area.appendChild(card);
        });
    });
</script>
</body>
</html>
