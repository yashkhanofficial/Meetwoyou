<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #020617; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-boost { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; margin-top: 5px; }
        .tabs { margin-bottom: 20px; }
        .tab-btn { background: #1e293b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .tab-btn.active { background: var(--primary); }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2><i class="fas fa-user-shield"></i> Meetwoyou Admin</h2>
    <button onclick="location.href='dashboard.html'" style="background:gray; color:white; padding:8px 15px; border-radius:5px; border:none; cursor:pointer;">Back to Dashboard</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('users')">Users</button>
    <button class="tab-btn" onclick="switchTab('posts')">Posts</button>
</div>

<div id="users-sec" class="grid"></div>
<div id="posts-sec" class="grid" style="display:none;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // সংখ্যা ফরম্যাট করার জন্য (1000 -> 1K)
    const formatNum = (num) => {
        if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return num.toString();
    };

    // ডাটা লোড করা
    function loadAdminData() {
        // Users
        onSnapshot(collection(db, "users"), (snap) => {
            const area = document.getElementById('users-sec'); area.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${u.photoURL}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${u.displayName}</b>
                    </div>
                    <div style="margin-top:15px;">
                        <input type="number" id="f-${d.id}" placeholder="Enter Follower Count (e.g. 5000)">
                        <button class="btn btn-boost" onclick="boostFollowers('${d.id}')">Boost Followers</button>
                        <button class="btn btn-del" onclick="deleteUser('${d.id}')">Delete User</button>
                    </div>
                `;
                area.appendChild(card);
            });
        });

        // Posts
        onSnapshot(collection(db, "posts"), (snap) => {
            const area = document.getElementById('posts-sec'); area.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <p><b>Post by:</b> ${p.authorName}</p>
                    <p style="font-size:12px; color:gray;">${p.text || '[Image Post]'}</p>
                    <div style="margin-top:10px;">
                        <input type="number" id="l-${d.id}" placeholder="Enter Like Count">
                        <button class="btn btn-boost" onclick="boostLikes('${d.id}')">Boost Likes</button>
                        <button class="btn btn-del" onclick="deletePost('${d.id}')">Delete Post</button>
                    </div>
                `;
                area.appendChild(card);
            });
        });
    }

    // বুস্ট ফাংশন (অবশ্যই "boost:" যোগ করবে)
    window.boostFollowers = async (id) => {
        const val = document.getElementById(`f-${id}`).value;
        if(!val) return;
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "users", id), { followers: "boost:" + formatted });
        Swal.fire("Success", "Followers boosted to " + formatted, "success");
    };

    window.boostLikes = async (id) => {
        const val = document.getElementById(`l-${id}`).value;
        if(!val) return;
        const formatted = formatNum(parseInt(val));
        await updateDoc(doc(db, "posts", id), { likes: "boost:" + formatted });
        Swal.fire("Success", "Likes boosted to " + formatted, "success");
    };

    window.deleteUser = async (id) => { if(confirm("Delete this user?")) await deleteDoc(doc(db, "users", id)); };
    window.deletePost = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };

    window.switchTab = (tab) => {
        document.getElementById('users-sec').style.display = tab === 'users' ? 'grid' : 'none';
        document.getElementById('posts-sec').style.display = tab === 'posts' ? 'grid' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    };

    loadAdminData();
</script>
</body>
</html>
