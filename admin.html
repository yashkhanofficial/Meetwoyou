<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou | Ultra Admin Authority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --info: #0ea5e9;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #020617;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

        .nav-link {
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        .nav-link.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .stat-card span { color: var(--text-dim); font-size: 14px; }
        .stat-card h2 { margin: 10px 0 0; font-size: 28px; }

        /* Controls Area */
        .toolbar {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            background: var(--bg);
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            width: 300px;
        }

        .filter-select {
            background: var(--bg);
            color: white;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 8px;
        }

        /* Lists */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .user-top { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .user-top img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); }
        .badge-v { color: #0095f6; }
        .banned-badge { background: var(--danger); font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        .action-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-v { background: var(--info); color: white; }
        .btn-ban { background: var(--warning); color: black; }
        .btn-del { background: var(--danger); color: white; }
        .btn-boost { background: var(--success); color: white; }

        .input-group {
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
        }

        .input-group label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .input-row { display: flex; gap: 5px; align-items: center; }

        input[type="number"] {
            background: var(--bg);
            border: 1px solid #334155;
            color: white;
            padding: 6px;
            width: 100%;
            border-radius: 6px;
        }

        .media-preview { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #334155; }

        /* Report Item */
        .report-card { border-left: 4px solid var(--danger); }
        .report-meta { font-size: 12px; color: var(--text-dim); margin-top: 5px; }

        /* Bulk Bar */
        .bulk-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .select-check { position: absolute; top: 15px; right: 15px; transform: scale(1.3); cursor: pointer; }

        /* Loading Overlay */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner { width: 50px; height: 50px; border: 5px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        [hidden] { display: none !important; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<aside class="sidebar">
    <div class="logo"><i class="fas fa-shield-cat"></i> Meetwoyou</div>
    <nav>
        <div class="nav-link active" onclick="showTab('analytics', this)"><i class="fas fa-chart-pie"></i> Analytics</div>
        <div class="nav-link" onclick="showTab('users', this)"><i class="fas fa-users"></i> User Management</div>
        <div class="nav-link" onclick="showTab('posts', this)"><i class="fas fa-stream"></i> Post Control</div>
        <div class="nav-link" onclick="showTab('reports', this)"><i class="fas fa-flag"></i> Reports <span id="report-badge" style="background:var(--danger); font-size:10px; padding:2px 6px; border-radius:10px; display:none">0</span></div>
        <div class="nav-link" onclick="showTab('logs', this)"><i class="fas fa-history"></i> Activity Logs</div>
    </nav>
    <div style="margin-top:auto">
        <button class="btn btn-del" style="width:100%" onclick="window.location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Exit Admin</button>
    </div>
</aside>

<main class="main-content">
    <div class="header">
        <h2 id="tab-title">Analytics Overview</h2>
        <div id="auth-status" style="font-size:14px; color:var(--text-dim)">Checking Admin...</div>
    </div>

    <section id="analytics-section" class="tab-content">
        <div class="stats-grid">
            <div class="stat-card"><span>Total Users</span><h2 id="stat-users">0</h2></div>
            <div class="stat-card"><span>Total Posts</span><h2 id="stat-posts">0</h2></div>
            <div class="stat-card"><span>Total Reports</span><h2 id="stat-reports">0</h2></div>
            <div class="stat-card"><span>Verified Users</span><h2 id="stat-verified">0</h2></div>
        </div>
    </section>

    <section id="users-section" class="tab-content" hidden>
        <div class="toolbar">
            <input type="text" class="search-box" id="userSearch" placeholder="Search by name or email..." oninput="renderUsers()">
            <select class="filter-select" id="userFilter" onchange="renderUsers()">
                <option value="all">All Users</option>
                <option value="verified">Verified Only</option>
                <option value="banned">Banned Only</option>
                <option value="high">Followers > 1000</option>
            </select>
            <button class="btn btn-v" onclick="bulkVerify()">Bulk Verify</button>
        </div>
        <div class="grid" id="user-list"></div>
    </section>

    <section id="posts-section" class="tab-content" hidden>
        <div class="toolbar">
            <input type="text" class="search-box" id="postSearch" placeholder="Search post content..." oninput="renderPosts()">
            <span style="color:var(--text-dim)">Total: <span id="post-count">0</span></span>
        </div>
        <div class="grid" id="post-list"></div>
    </section>

    <section id="reports-section" class="tab-content" hidden>
        <div class="grid" id="report-list"></div>
    </section>

    <section id="logs-section" class="tab-content" hidden>
        <div class="card">
            <div id="logs-list" style="max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 13px;"></div>
        </div>
    </section>
</main>

<div class="bulk-bar" id="bulk-bar">
    <span id="bulk-count">0 Selected</span>
    <button class="btn btn-v" onclick="execBulk('verify')">Verify</button>
    <button class="btn btn-ban" onclick="execBulk('ban')">Ban</button>
    <button class="btn btn-del" onclick="execBulk('delete')">Delete</button>
    <button class="btn" style="background:#475569" onclick="clearSelection()">Cancel</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, addDoc, serverTimestamp, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let masterUsers = [];
    let masterPosts = [];
    let masterReports = [];
    let selectedUsers = new Set();

    // --- AUTH CHECK ---
    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== "admin@meetwoyou.com") {
            Swal.fire({ icon: 'error', title: 'Access Denied', text: 'Admin identity required.', background: '#1e293b', color: '#fff' });
            setTimeout(() => window.location.href = "index.html", 2500);
        } else {
            document.getElementById('auth-status').innerText = `Logged in as Admin: ${user.email}`;
            document.getElementById('loader').style.display = 'none';
            initApp();
        }
    });

    // --- INITIALIZATION ---
    function initApp() {
        // Users Listener
        onSnapshot(collection(db, "users"), (snap) => {
            masterUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderUsers();
            updateStats();
        });

        // Posts Listener
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            masterPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderPosts();
            updateStats();
        });

        // Reports Listener
        onSnapshot(collection(db, "reports"), (snap) => {
            masterReports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderReports();
            updateStats();
        });

        // Logs Listener
        onSnapshot(query(collection(db, "logs"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('logs-list');
            list.innerHTML = snap.docs.map(d => {
                const log = d.data();
                return `<div style="padding:8px; border-bottom:1px solid #334155">
                    <span style="color:var(--primary)">[${log.timestamp?.toDate().toLocaleString() || '... '}]</span> 
                    ${log.action} -> <span style="color:var(--info)">${log.target}</span>
                </div>`;
            }).join('');
        });
    }

    // --- RENDER FUNCTIONS ---
    window.renderUsers = () => {
        const list = document.getElementById('user-list');
        const searchTerm = document.getElementById('userSearch').value.toLowerCase();
        const filter = document.getElementById('userFilter').value;

        let filtered = masterUsers.filter(u => 
            (u.displayName?.toLowerCase().includes(searchTerm) || u.email?.toLowerCase().includes(searchTerm))
        );

        if (filter === 'verified') filtered = filtered.filter(u => u.isVerified);
        if (filter === 'banned') filtered = filtered.filter(u => u.banned);
        if (filter === 'high') filtered = filtered.filter(u => getCount(u.followers) > 1000);

        list.innerHTML = filtered.map(u => `
            <div class="card">
                <input type="checkbox" class="select-check" onchange="toggleSelect('${u.id}')" ${selectedUsers.has(u.id) ? 'checked' : ''}>
                <div class="user-top">
                    <img src="${u.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                    <div>
                        <div style="font-weight:700">${u.displayName} ${u.isVerified ? '<i class="fas fa-check-circle badge-v"></i>' : ''} ${u.banned ? '<span class="banned-badge">BANNED</span>' : ''}</div>
                        <div style="font-size:12px; color:var(--text-dim)">${u.email}</div>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-v" onclick="updateField('users', '${u.id}', {isVerified: ${!u.isVerified}})">${u.isVerified ? 'Unverify' : 'Verify'}</button>
                    <button class="btn btn-ban" onclick="updateField('users', '${u.id}', {banned: ${!u.banned}})">${u.banned ? 'Unban' : 'Ban'}</button>
                    <button class="btn btn-del" onclick="deleteItem('users', '${u.id}')">Delete</button>
                </div>
                <div class="input-group">
                    <label>Manage Followers</label>
                    <div class="input-row">
                        <input type="number" id="f-${u.id}" value="${getCount(u.followers)}">
                        <button class="btn btn-boost" onclick="setBoost('users', '${u.id}', 'followers', 'f-${u.id}')">Set</button>
                        <button class="btn btn-boost" style="background:#a855f7" onclick="autoBoost('users', '${u.id}', 'followers', 'f-${u.id}')"><i class="fas fa-bolt"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    };

    window.renderPosts = () => {
        const list = document.getElementById('post-list');
        const searchTerm = document.getElementById('postSearch').value.toLowerCase();
        
        let filtered = masterPosts.filter(p => p.text?.toLowerCase().includes(searchTerm) || p.authorName?.toLowerCase().includes(searchTerm));
        document.getElementById('post-count').innerText = filtered.length;

        list.innerHTML = filtered.map(p => `
            <div class="card">
                <div style="font-size:13px; margin-bottom:10px"><b>${p.authorName}</b> <span style="color:var(--text-dim)">• ${p.timestamp?.toDate().toLocaleDateString() || ''}</span></div>
                <div style="background:var(--bg); padding:10px; border-radius:8px; font-size:13px">${p.text || '<i>No text</i>'}</div>
                
                ${p.img ? `<img src="${p.img}" class="media-preview">` : ''}
                ${p.video ? `<video src="${p.video}" class="media-preview" controls></video>` : ''}

                <div class="input-group">
                    <label><i class="fas fa-heart"></i> Likes</label>
                    <div class="input-row">
                        <input type="number" id="l-${p.id}" value="${getCount(p.likes)}">
                        <button class="btn btn-boost" onclick="setBoost('posts', '${p.id}', 'likes', 'l-${p.id}')">Set</button>
                    </div>
                    <label style="margin-top:10px"><i class="fas fa-eye"></i> Views</label>
                    <div class="input-row">
                        <input type="number" id="v-${p.id}" value="${getCount(p.views)}">
                        <button class="btn btn-boost" onclick="setBoost('posts', '${p.id}', 'views', 'v-${p.id}')">Set</button>
                    </div>
                </div>
                <button class="btn btn-del" style="width:100%; margin-top:12px; justify-content:center" onclick="deleteItem('posts', '${p.id}')">Delete Post</button>
            </div>
        `).join('');
    };

    window.renderReports = () => {
        const list = document.getElementById('report-list');
        if (masterReports.length === 0) {
            list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:50px; color:var(--text-dim)">No pending reports. Great job!</div>`;
            return;
        }
        list.innerHTML = masterReports.map(r => `
            <div class="card report-card">
                <div style="font-weight:700; color:var(--danger)">Reason: ${r.reason}</div>
                <div class="report-meta">Reported By: ${r.reportedBy || 'Unknown'}</div>
                <div class="report-meta">Post ID: ${r.postId}</div>
                <div class="action-btns">
                    <button class="btn btn-v" onclick="viewReportedPost('${r.postId}')">View Post</button>
                    <button class="btn btn-del" onclick="deleteItem('reports', '${r.id}')">Dismiss</button>
                </div>
            </div>
        `).join('');
    };

    // --- CORE LOGIC ---
    const getCount = (field) => {
        if (!field) return 0;
        return Array.isArray(field) ? field.length : field;
    };

    window.updateField = async (col, id, data) => {
        try {
            await updateDoc(doc(db, col, id), data);
            logAction(`Updated ${Object.keys(data).join(',')}`, id);
        } catch (e) { console.error(e); }
    };

    window.setBoost = async (col, id, field, inputId) => {
        const val = parseInt(document.getElementById(inputId).value);
        if (isNaN(val)) return;

        let payload = {};
        if (val < 50000) {
            payload[field] = new Array(val).fill("boost_system");
        } else {
            payload[field] = val;
        }

        await updateDoc(doc(db, col, id), payload);
        logAction(`Boosted ${field} to ${val}`, id);
        Swal.fire({ title: 'Success', text: 'Data updated!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    };

    window.autoBoost = (col, id, field, inputId) => {
        const current = parseInt(document.getElementById(inputId).value) || 0;
        const newVal = current + Math.floor(Math.random() * 100) + 50;
        document.getElementById(inputId).value = newVal;
        setBoost(col, id, field, inputId);
    };

    window.deleteItem = async (col, id) => {
        const result = await Swal.fire({
            title: 'Are you sure?',
            text: "This action cannot be undone!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            background: '#1e293b',
            color: '#fff'
        });

        if (result.isConfirmed) {
            await deleteDoc(doc(db, col, id));
            logAction(`Deleted item from ${col}`, id);
        }
    };

    window.logAction = async (action, target) => {
        await addDoc(collection(db, "logs"), {
            action,
            target,
            timestamp: serverTimestamp()
        });
    };

    function updateStats() {
        document.getElementById('stat-users').innerText = masterUsers.length;
        document.getElementById('stat-posts').innerText = masterPosts.length;
        document.getElementById('stat-reports').innerText = masterReports.length;
        document.getElementById('stat-verified').innerText = masterUsers.filter(u => u.isVerified).length;
        
        const rBadge = document.getElementById('report-badge');
        if(masterReports.length > 0) {
            rBadge.innerText = masterReports.length;
            rBadge.style.display = 'inline-block';
        } else {
            rBadge.style.display = 'none';
        }
    }

    // --- BULK SYSTEM ---
    window.toggleSelect = (id) => {
        if (selectedUsers.has(id)) selectedUsers.delete(id);
        else selectedUsers.add(id);
        
        const bar = document.getElementById('bulk-bar');
        if (selectedUsers.size > 0) {
            bar.style.display = 'flex';
            document.getElementById('bulk-count').innerText = `${selectedUsers.size} Selected`;
        } else {
            bar.style.display = 'none';
        }
    };

    window.clearSelection = () => {
        selectedUsers.clear();
        document.querySelectorAll('.select-check').forEach(c => c.checked = false);
        document.getElementById('bulk-bar').style.display = 'none';
    };

    window.execBulk = async (action) => {
        const batch = writeBatch(db);
        const ids = Array.from(selectedUsers);

        for (const id of ids) {
            const ref = doc(db, "users", id);
            if (action === 'verify') batch.update(ref, { isVerified: true });
            if (action === 'ban') batch.update(ref, { banned: true });
            if (action === 'delete') batch.delete(ref);
        }

        await batch.commit();
        logAction(`Bulk ${action}`, `${ids.length} users`);
        clearSelection();
        Swal.fire('Completed', `Bulk ${action} finished.`, 'success');
    };

    // --- UTILS ---
    window.showTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(s => s.hidden = true);
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`${tab}-section`).hidden = false;
        btn.classList.add('active');
        document.getElementById('tab-title').innerText = btn.innerText;
    };

    window.viewReportedPost = (postId) => {
        showTab('posts', document.querySelector('[onclick*="posts"]'));
        document.getElementById('postSearch').value = postId;
        renderPosts();
    };

    // Send Notification Helper
    window.sendSystemNotify = async (uid, msg) => {
        await addDoc(collection(db, "notifications"), {
            userId: uid,
            message: msg,
            timestamp: serverTimestamp(),
            read: false
        });
    };

</script>
</body>
</html>
