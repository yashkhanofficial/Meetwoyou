<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou | Master Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0b0f1a; --card: #161b2c; --text: #ffffff; --dim: #94a3b8; --danger: #ff4d4d; --input: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .navbar { background: var(--card); padding: 15px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-card h3 { margin: 0; font-size: 28px; color: var(--primary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: var(--card); color: var(--dim); cursor: pointer; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .user-info img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        input { background: var(--input); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-up { background: var(--primary); color: white; }
        .btn-del { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <h2 style="margin:0; font-size: 18px;"><i class="fas fa-user-shield"></i> Master Admin</h2>
        <button onclick="location.href='dashboard.html'" style="background:#2d3748; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Dashboard</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="u-count">0</h3><p style="margin:5px 0 0; font-size:12px;">Users</p></div>
        <div class="stat-card"><h3 id="p-count">0</h3><p style="margin:5px 0 0; font-size:12px;">Posts</p></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-u" onclick="window.showTab('users')">Users</button>
        <button class="tab-btn" id="btn-p" onclick="window.showTab('posts')">Posts</button>
    </div>

    <div id="sec-users" class="grid"></div>
    <div id="sec-posts" class="grid" style="display:none;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Number Format
    const formatK = (n) => {
        if (n >= 1000) return (n/1000).toFixed(1) + "K";
        return n;
    };

    // Tab Switch
    window.showTab = (t) => {
        document.getElementById('sec-users').style.display = t === 'users' ? 'grid' : 'none';
        document.getElementById('sec-posts').style.display = t === 'posts' ? 'grid' : 'none';
        document.getElementById('btn-u').classList.toggle('active', t === 'users');
        document.getElementById('btn-p').classList.toggle('active', t === 'posts');
    };

    // Functions
    window.doBoostU = async (id) => {
        const v = document.getElementById(`f-${id}`).value;
        if(!v) return;
        await updateDoc(doc(db, "users", id), { followers: "boost:" + formatK(v) });
        Swal.fire({title: "Updated", icon: "success", toast: true, position: 'top-end', timer: 2000, showConfirmButton: false});
    };

    window.doBoostP = async (id) => {
        const v = document.getElementById(`l-${id}`).value;
        if(!v) return;
        await updateDoc(doc(db, "posts", id), { likes: "boost:" + formatK(v) });
        Swal.fire({title: "Updated", icon: "success", toast: true, position: 'top-end', timer: 2000, showConfirmButton: false});
    };

    window.delU = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "users", id)); };
    window.delP = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "posts", id)); };

    // Real-time Listeners
    onSnapshot(collection(db, "users"), (snap) => {
        document.getElementById('u-count').innerText = snap.size;
        const area = document.getElementById('sec-users'); area.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="user-info">
                    <img src="${u.photoURL || 'https://via.placeholder.com/50'}">
                    <b>${u.displayName || 'No Name'}</b>
                </div>
                <input type="number" id="f-${d.id}" placeholder="Followers count">
                <div class="btn-group">
                    <button class="btn btn-up" onclick="window.doBoostU('${d.id}')">Boost</button>
                    <button class="btn btn-del" onclick="window.delU('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>`;
            area.appendChild(div);
        });
    });

    onSnapshot(collection(db, "posts"), (snap) => {
        document.getElementById('p-count').innerText = snap.size;
        const area = document.getElementById('sec-posts'); area.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div style="margin-bottom:10px;"><b style="color:var(--primary)">@${p.authorName}</b></div>
                <p style="font-size:12px; color:var(--dim); height:30px; overflow:hidden;">${p.text || '[Image]'}</p>
                <input type="number" id="l-${d.id}" placeholder="Likes count">
                <div class="btn-group">
                    <button class="btn btn-up" onclick="window.doBoostP('${d.id}')">Boost</button>
                    <button class="btn btn-del" onclick="window.delP('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>`;
            area.appendChild(div);
        });
    });
</script>
</body>
</html>
