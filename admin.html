<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Admin Master Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #94a3b8; }
        .stat-card p { margin: 8px 0; font-size: 22px; font-weight: bold; }

        /* Global V Switch Style */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { background: #334155; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); }
        .badge-v { color: #0ea5e9; margin-left: 5px; }
        
        .controls { display: flex; gap: 6px; margin-top: 12px; }
        .btn { border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; flex: 1; }
        .btn-v { background: #0ea5e9; color: white; }
        .btn-del { background: var(--danger); color: white; }

        .input-group { margin-top: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 13px;}
        input[type="number"] { background: #0f172a; border: 1px solid #475569; color: white; padding: 4px; width: 70px; border-radius: 4px; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 180px; object-fit: cover; }
    </style>
</head>
<body>

<div class="header">
    <h2>Admin Authority</h2>
    <button class="tab-btn" onclick="location.href='dashboard.html'" style="background:var(--danger)">Exit</button>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>USERS</h3>
        <p id="total-users-count">0</p>
    </div>
    <div class="stat-card">
        <h3>ONLINE</h3>
        <p id="online-count" style="color: var(--success);">0</p>
    </div>
    <div class="stat-card">
        <h3>GLOBAL V-BADGE</h3>
        <label class="switch">
            <input type="checkbox" id="global-v-switch">
            <span class="slider"></span>
        </label>
        <span id="v-status-text" style="font-size: 11px; margin-left: 5px;">OFF</span>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" id="btn-u" onclick="showTab('users')">Users</button>
    <button class="tab-btn" id="btn-p" onclick="showTab('posts')">Posts</button>
</div>

<div id="users-section"><div class="grid" id="user-list"></div></div>
<div id="posts-section" style="display:none;"><div class="grid" id="post-list"></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Formatting Logic (60K, 1.2M)
    window.formatNum = (num) => {
        if (!num || isNaN(num)) return "0";
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user || user.email !== "admin@meetwoyou.com") {
            window.location.href = "index.html";
        } else {
            // Load Global Config
            const vRef = doc(db, "settings", "global_config");
            const vSnap = await getDoc(vRef);
            if (vSnap.exists()) {
                const isEnabled = vSnap.data().vBadgeVisible;
                document.getElementById('global-v-switch').checked = isEnabled;
                document.getElementById('v-status-text').innerText = isEnabled ? "ON" : "OFF";
            }

            // Global V Switch Listener
            document.getElementById('global-v-switch').onchange = async (e) => {
                await setDoc(vRef, { vBadgeVisible: e.target.checked }, { merge: true });
                document.getElementById('v-status-text').innerText = e.target.checked ? "ON" : "OFF";
            };

            // Online Counter
            onSnapshot(collection(db, "status"), (s) => document.getElementById('online-count').innerText = s.size);

            loadData();
        }
    });

    function loadData() {
        // Users
        onSnapshot(collection(db, "users"), (snap) => {
            document.getElementById('total-users-count').innerText = snap.size;
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                // Check multiple fields for follower count
                const count = u.followerCount || (Array.isArray(u.followers) ? u.followers.length : (u.followers || 0));
                
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `
                    <div class="user-info">
                        <img src="${u.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                        <div>
                            <b>${u.displayName} ${u.isVerified ? '<i class="fas fa-check-circle badge-v"></i>' : ''}</b><br>
                            <small style="color:#94a3b8">${u.email}</small>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn btn-v" onclick="window.toggleV('${d.id}', ${u.isVerified})">${u.isVerified ? 'Remove V' : 'Give V'}</button>
                        <button class="btn btn-del" onclick="window.delUser('${d.id}')">Delete</button>
                    </div>
                    <div class="input-group">
                        <span>Followers: <b>${window.formatNum(count)}</b></span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" id="in-f-${d.id}" placeholder="Set">
                            <button class="btn btn-v" style="padding:4px 8px;" onclick="window.setFollowers('${d.id}')">Set</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        // Posts
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('post-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const lCount = p.likeCount || (Array.isArray(p.likes) ? p.likes.length : (p.likes || 0));
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `
                    <div style="font-size:13px;"><b>${p.authorName}</b></div>
                    <div style="font-size:12px; margin:8px 0; background:#0f172a; padding:8px; border-radius:5px;">${p.text || ''}</div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="input-group">
                        <span>Likes: <b>${window.formatNum(lCount)}</b></span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" id="in-l-${d.id}" placeholder="Set">
                            <button class="btn btn-v" style="padding:4px 8px;" onclick="window.setLikes('${d.id}')">Set</button>
                        </div>
                    </div>
                    <button class="btn btn-del" style="width:100%; margin-top:10px;" onclick="window.delPost('${d.id}')">Remove Post</button>
                `;
                list.appendChild(div);
            });
        });
    }

    // Exporting functions to window for onclick access
    window.setFollowers = async (id) => {
        const val = parseInt(document.getElementById(`in-f-${id}`).value);
        if(!isNaN(val)) {
            await updateDoc(doc(db, "users", id), { followerCount: val, followers: val }); 
            Swal.fire("Done", "Followers set to " + val, "success");
        }
    };

    window.setLikes = async (id) => {
        const val = parseInt(document.getElementById(`in-l-${id}`).value);
        if(!isNaN(val)) {
            await updateDoc(doc(db, "posts", id), { likeCount: val, likes: val });
            Swal.fire("Done", "Likes set to " + val, "success");
        }
    };

    window.toggleV = async (id, s) => await updateDoc(doc(db, "users", id), { isVerified: !s });
    window.delUser = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "users", id)); };
    window.delPost = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "posts", id)); };

    window.showTab = (t) => {
        document.getElementById('users-section').style.display = t === 'users' ? 'block' : 'none';
        document.getElementById('posts-section').style.display = t === 'posts' ? 'block' : 'none';
        document.getElementById('btn-u').classList.toggle('active', t === 'users');
        document.getElementById('btn-p').classList.toggle('active', t === 'posts');
    };
</script>
</body>
</html>
