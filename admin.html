<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Meetwoyou</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #05070a; --card: #11141d; --text: #ffffff; --dim: #94a3b8; --danger: #ff4d4d; --input: #1b202b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        .header { background: var(--card); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-box h2 { margin: 0; color: var(--primary); font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .u-info img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        input { background: var(--input); border: 1px solid #2d3748; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-up { background: var(--primary); color: white; margin-bottom: 5px; }
        .btn-del { background: rgba(255,77,77,0.1); color: var(--danger); font-size: 12px; }
        /* Debug Console Style */
        #debug-log { background: #000; color: #0f0; font-family: monospace; padding: 10px; font-size: 10px; border-radius: 5px; margin-bottom: 10px; max-height: 100px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="debug-log">System Initializing...</div>

    <div class="header">
        <h3 style="margin:0">Meetwoyou Admin</h3>
        <button onclick="location.href='dashboard.html'" style="background:#2d3748; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Dashboard</button>
    </div>

    <div class="stats">
        <div class="stat-box"><h2 id="u-total">0</h2><small>Users</small></div>
        <div class="stat-box"><h2 id="p-total">0</h2><small>Posts</small></div>
    </div>

    <div id="user-list" class="grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const log = (msg) => { 
        const d = document.getElementById('debug-log');
        d.style.display = 'block';
        d.innerHTML += `<br>> ${msg}`;
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        log("Firebase Connected.");

        // Functions
        window.boostU = async (id) => {
            const val = document.getElementById(`in-${id}`).value;
            if(!val) return;
            await updateDoc(doc(db, "users", id), { followers: "boost:" + val + "K" });
            Swal.fire({title: 'Success!', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false});
        };

        window.delU = async (id) => {
            if(confirm("Delete User?")) await deleteDoc(doc(db, "users", id));
        };

        // Real-time listener with Error Catching
        onSnapshot(collection(db, "users"), (snap) => {
            log(`Data Received: ${snap.size} users found.`);
            document.getElementById('u-total').innerText = snap.size;
            const area = document.getElementById('user-list');
            area.innerHTML = "";

            if(snap.empty) {
                area.innerHTML = "<p style='text-align:center; width:100%'>No users found in Database.</p>";
            }

            snap.forEach(d => {
                const u = d.data();
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="u-info">
                        <img src="${u.photoURL || 'https://via.placeholder.com/50'}">
                        <b>${u.displayName || 'No Name'}</b>
                    </div>
                    <input type="number" id="in-${d.id}" placeholder="Followers (e.g. 10)">
                    <button class="btn btn-up" onclick="window.boostU('${d.id}')">Boost Followers</button>
                    <button class="btn btn-del" onclick="window.delU('${d.id}')">Delete User</button>
                `;
                area.appendChild(card);
            });
        }, (err) => {
            log(`CRITICAL ERROR: ${err.message}`);
            console.error(err);
        });

    } catch (e) {
        log(`Init Error: ${e.message}`);
    }
</script>
</body>
</html>
