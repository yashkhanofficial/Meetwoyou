<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            console.log("User Logged In:", user.uid);
            
            // --- প্রোফাইল ডাটা সিঙ্ক ---
            const profileRef = doc(db, "users", user.uid);
            onSnapshot(profileRef, (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    if(document.getElementById('view-name')) document.getElementById('view-name').innerText = d.fullName || "User";
                    if(document.getElementById('view-username')) document.getElementById('view-username').innerText = d.username || "agent";
                    if(document.getElementById('view-avatar')) document.getElementById('view-avatar').src = d.profilePicUrl || "https://via.placeholder.com/150";
                } else {
                    // প্রোফাইল না থাকলে ডিফল্ট তৈরি
                    setDoc(profileRef, { fullName: user.displayName || "Agent", username: "user_"+user.uid.slice(0,4) }, {merge: true});
                }
            });

            // --- নিউজফিড লোড (ইনডেক্স এরর চেকসহ) ---
            const feedContainer = document.getElementById('feed-container');
            if (feedContainer) {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                onSnapshot(q, (snapshot) => {
                    feedContainer.innerHTML = "";
                    snapshot.forEach(postDoc => {
                        const post = postDoc.data();
                        feedContainer.innerHTML += `
                            <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-white/5 mb-4">
                                <div class="flex items-center gap-3 mb-3">
                                    <img src="${post.userPic}" class="w-10 h-10 rounded-xl">
                                    <h4 class="text-white font-bold">${post.userName}</h4>
                                </div>
                                <p class="text-gray-300 mb-3">${post.caption}</p>
                                ${post.postImg ? `<img src="${post.postImg}" class="w-full rounded-2xl">` : ''}
                            </div>`;
                    });
                }, (error) => {
                    console.error("Feed Error:", error);
                    feedContainer.innerHTML = `<div class="p-4 bg-red-500/10 text-red-400 rounded-xl text-xs">
                        Error: ${error.message} <br>
                        <b>পরামর্শ:</b> আপনার ব্রাউজারের 'Inspect > Console' এ যান এবং Firebase থেকে আসা লিঙ্কে ক্লিক করে Index তৈরি করুন।
                    </div>`;
                });
            }
        }
    });

    // --- পোস্ট করার ফাংশন ---
    window.createNewPost = async () => {
        const caption = document.getElementById('post-caption').value;
        const user = auth.currentUser;
        if(!user || !caption) return alert("Caption is required!");

        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            const uData = userSnap.data();

            await addDoc(collection(db, "posts"), {
                userId: user.uid,
                userName: uData?.fullName || user.displayName || "User",
                userPic: uData?.profilePicUrl || "https://via.placeholder.com/50",
                caption: caption,
                createdAt: serverTimestamp()
            });
            document.getElementById('post-caption').value = "";
            alert("Post Success!");
        } catch (e) {
            alert("Post failed: " + e.message);
        }
    };
</script>
