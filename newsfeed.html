<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Ultimate Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #a855f7; --bg: #09090b; --card: #18181b; --text: #fafafa; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* Layout */
        .header { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .section { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Post Card & Feed */
        .post-card { background: var(--card); border-radius: 20px; padding: 15px; margin-top: 15px; border: 1px solid var(--border); }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; object-fit: cover; max-height: 400px; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .user-info img { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); }

        /* Inputs */
        textarea, input { width: 100%; padding: 12px; background: #27272a; border: 1px solid var(--border); color: white; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:active { scale: 0.95; }

        /* Chat System */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; line-height: 1.4; }
        .msg.sent { background: var(--primary); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .msg.received { background: #27272a; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #71717a; font-size: 18px; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="font-weight: 900; letter-spacing: -1px; color: var(--primary);">Meetwoyou</h2>
    <i class="fas fa-power-off" onclick="logout()" style="color:#ef4444; cursor:pointer;"></i>
</div>

<div id="home-sec" class="section active">
    <div class="post-card" style="background: linear-gradient(145deg, #18181b, #09090b);">
        <textarea id="post-text" placeholder="Share your thoughts, Yash..."></textarea>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label for="post-file" style="cursor:pointer; background: #27272a; padding: 10px; border-radius: 10px; border: 1px solid var(--border);">
                <i class="fas fa-image text-purple-400"></i> Photo
            </label>
            <input type="file" id="post-file" accept="image/*" style="display:none">
            <button class="btn-main" onclick="uploadPost()">Post Status</button>
        </div>
    </div>
    <div id="feed-area"></div>
</div>

<div id="search-sec" class="section">
    <input type="text" id="user-search" placeholder="Search friends..." oninput="filterUsers()">
    <div id="all-users-list"></div>
</div>

<div id="profile-sec" class="section">
    <div style="background:var(--card); padding:25px; border-radius:25px; border: 1px solid var(--border);">
        <div style="position:relative; width:110px; height:110px; margin:0 auto 20px;">
            <img id="p-img" src="https://via.placeholder.com/110" style="width:100%; height:100%; border-radius:30px; object-fit:cover; border: 2px solid var(--primary);">
            <label for="p-upload" style="position:absolute; bottom:-5px; right:-5px; background:var(--primary); width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-camera" style="font-size:12px;"></i></label>
            <input type="file" id="p-upload" style="display:none">
        </div>
        <input type="text" id="p-name" placeholder="Full Name">
        <textarea id="p-bio" placeholder="Bio"></textarea>
        <input type="text" id="p-edu" placeholder="Education">
        <button class="btn-main" onclick="updateProfileData()">Save Changes</button>
    </div>
</div>

<div id="chat-screen">
    <div class="header" style="position:static;">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-chevron-left" onclick="closeChat()"></i>
            <img id="cw-img" src="" style="width:35px; height:35px; border-radius:10px;">
            <b id="cw-name">User</b>
        </div>
    </div>
    <div class="chat-msgs" id="chat-box"></div>
    <div style="padding:15px; background:var(--card); display:flex; gap:10px; border-top: 1px solid var(--border);">
        <input type="text" id="m-input" placeholder="Message..." style="margin:0;">
        <button onclick="sendMsg()" style="background:var(--primary); border:none; padding:10px 18px; border-radius:12px; color:white;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-th-large"></i><span>Feed</span></div>
    <div class="nav-item" onclick="showSec('search', this)"><i class="fas fa-search"></i><span>Discover</span></div>
    <div class="nav-item" onclick="showSec('profile', this)"><i class="fas fa-user-circle"></i><span>Profile</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CLOUD_NAME = "dpgawb5sl";
    const UPLOAD_PRESET = "Meetwoyou";

    let chatUID = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            loadProfileData(user);
            loadUsers();
            loadPosts();
        } else {
            window.location.href = "index.html";
        }
    });

    // Profile Logic
    async function loadProfileData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        document.getElementById('p-name').value = user.displayName || "";
        document.getElementById('p-img').src = user.photoURL || "https://via.placeholder.com/100";
        if(snap.exists()){
            const d = snap.data();
            document.getElementById('p-bio').value = d.bio || "";
            document.getElementById('p-edu').value = d.education || "";
        }
    }

    window.updateProfileData = async () => {
        const user = auth.currentUser;
        const btn = event.target;
        btn.innerText = "Updating...";
        
        let photoUrl = user.photoURL;
        const file = document.getElementById('p-upload').files[0];
        
        if(file){
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json();
            photoUrl = data.secure_url;
        }

        const profileData = {
            displayName: document.getElementById('p-name').value,
            bio: document.getElementById('p-bio').value,
            education: document.getElementById('p-edu').value,
            photoURL: photoUrl
        };

        await setDoc(doc(db, "users", user.uid), profileData, {merge:true});
        await updateProfile(user, {displayName: profileData.displayName, photoURL: photoUrl});
        Swal.fire('Success', 'Profile Updated!', 'success').then(() => location.reload());
    };

    // Feed & Posting
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        if(!text && !file) return;

        const btn = event.target;
        btn.innerText = "Uploading...";
        
        let imgUrl = "";
        if(file){
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:formData});
            const data = await res.json();
            imgUrl = data.secure_url;
        }

        await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid,
            name: auth.currentUser.displayName || "Agent",
            photo: auth.currentUser.photoURL || "",
            text: text,
            img: imgUrl,
            timestamp: serverTimestamp()
        });
        
        document.getElementById('post-text').value = "";
        document.getElementById('post-file').value = "";
        btn.innerText = "Post Status";
    };

    function loadPosts() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            snap.forEach(pDoc => {
                const p = pDoc.data();
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div class="user-info">
                        <img src="${p.photo || 'https://via.placeholder.com/40'}">
                        <div><b>${p.name}</b><br><small style="color:#71717a; font-size:10px;">Just now</small></div>
                    </div>
                    <p style="font-size:14px; color:#d1d1d6;">${p.text}</p>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                `;
                area.appendChild(card);
            });
        });
    }

    // Navigation & Helpers
    window.showSec = (id, el) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    };

    window.logout = () => signOut(auth);
</script>
</body>
</html>
