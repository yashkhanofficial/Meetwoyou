<div class="max-w-2xl mx-auto space-y-6 pb-24">
    <div id="story-container" class="flex gap-4 overflow-x-auto py-4 scrollbar-hide">
        <div class="flex-shrink-0 w-20 h-28 border-2 border-dashed border-purple-500/30 rounded-2xl flex items-center justify-center cursor-pointer" onclick="document.getElementById('story-in').click()">
            <i class="fas fa-plus text-purple-500"></i>
            <input type="file" id="story-in" class="hidden" onchange="uploadStory(this)">
        </div>
        <div id="story-list" class="flex gap-4"></div>
    </div>

    <div class="bg-slate-900/40 p-5 rounded-[2.5rem] border border-white/5">
        <div class="flex gap-4">
            <img id="my-avatar" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-2xl object-cover">
            <textarea id="post-text" placeholder="Share something, Yash..." class="w-full bg-transparent border-none outline-none text-white text-sm resize-none py-2"></textarea>
        </div>
        <div class="flex justify-between mt-4 pt-4 border-t border-white/5">
            <button onclick="document.getElementById('post-file').click()" class="text-gray-400 text-sm"><i class="fas fa-image"></i> Photo</button>
            <input type="file" id="post-file" class="hidden">
            <button id="post-submit" onclick="handlePost()" class="bg-purple-600 px-6 py-2 rounded-xl text-white font-bold text-sm">Post</button>
        </div>
    </div>

    <div id="feed-display" class="space-y-6">
        <div class="text-center py-10 text-gray-500">Checking for posts...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        // ১. ইউজারের ডাটা লোড করা (প্রোফাইল পিকচারের জন্য)
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if(userSnap.exists()) {
            document.getElementById('my-avatar').src = userSnap.data().profilePicUrl || user.photoURL;
        }

        // ২. নিউজ ফিড লোড করা (Error Handling সহ)
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('feed-display');
            container.innerHTML = "";
            
            if(snapshot.empty) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500">No posts yet. Be the first!</div>`;
            }

            snapshot.forEach(pDoc => {
                const p = pDoc.data();
                container.innerHTML += `
                <div class="bg-slate-900/40 rounded-[2.5rem] border border-white/5 overflow-hidden">
                    <div class="p-5 flex items-center gap-3">
                        <img src="${p.userPic}" class="w-10 h-10 rounded-xl object-cover">
                        <h4 class="text-white font-bold text-sm">${p.userName}</h4>
                    </div>
                    <div class="px-5 pb-4 text-gray-300 text-sm">${p.caption}</div>
                    ${p.postImg ? `<img src="${p.postImg}" class="w-full">` : ''}
                </div>`;
            });
        }, (err) => {
            console.error(err);
            document.getElementById('feed-display').innerHTML = `
                <div class="p-5 bg-red-500/10 text-red-400 rounded-2xl text-xs">
                    <b>Firebase Error:</b> ${err.message}<br>
                    <a href="#" class="underline mt-2 block">Click here to fix Index</a>
                </div>`;
        });
    });

    // ৩. নতুন পোস্ট করার ফাংশন
    window.handlePost = async () => {
        const text = document.getElementById('post-text').value;
        const fileIn = document.getElementById('post-file');
        const user = auth.currentUser;
        if(!text && !fileIn.files[0]) return;

        const btn = document.getElementById('post-submit');
        btn.innerText = "...";
        btn.disabled = true;

        try {
            let imgUrl = "";
            if(fileIn.files[0]) {
                const formData = new FormData();
                formData.append('file', fileIn.files[0]);
                formData.append('upload_preset', 'Meetwoyou');
                const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', {method:'POST', body:formData});
                const d = await res.json();
                imgUrl = d.secure_url;
            }

            const uSnap = await getDoc(doc(db, "users", user.uid));
            const uData = uSnap.data();

            await addDoc(collection(db, "posts"), {
                userId: user.uid,
                userName: uData?.fullName || user.displayName || "User",
                userPic: uData?.profilePicUrl || "https://via.placeholder.com/50",
                caption: text,
                postImg: imgUrl,
                createdAt: serverTimestamp()
            });

            document.getElementById('post-text').value = "";
            fileIn.value = "";
            alert("Post Uploaded!");
        } catch (e) { alert(e.message); }
        finally { btn.innerText = "Post"; btn.disabled = false; }
    };
</script>
