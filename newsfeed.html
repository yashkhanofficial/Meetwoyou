<div class="max-w-2xl mx-auto p-4 space-y-6">
    <div class="bg-slate-900/40 p-5 rounded-[2.5rem] border border-white/5">
        <div class="flex gap-4">
            <img id="user-pfp" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-2xl object-cover">
            <textarea id="post-input" placeholder="What's on your mind?" class="w-full bg-transparent border-none outline-none text-white resize-none py-2"></textarea>
        </div>
        
        <div id="img-preview-con" class="hidden mt-3 relative">
            <img id="img-preview" class="w-full h-48 object-cover rounded-2xl border border-white/10">
            <button onclick="clearPreview()" class="absolute top-2 right-2 bg-black/50 p-1 rounded-full text-white"><i class="fas fa-times"></i></button>
        </div>

        <div class="flex justify-between items-center mt-4 pt-4 border-t border-white/5">
            <button onclick="document.getElementById('file-in').click()" class="text-gray-400 hover:text-purple-400 transition">
                <i class="fas fa-image mr-2"></i> Photo
            </button>
            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="previewImage(this)">
            <button id="submit-post" onclick="postToFeed()" class="bg-purple-600 px-6 py-2 rounded-xl text-white font-bold shadow-lg shadow-purple-600/20 active:scale-95 transition">Post</button>
        </div>
    </div>

    <div id="news-feed" class="space-y-6">
        <div class="text-center text-gray-500 py-10 animate-pulse">Loading Feed...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, serverTimestamp, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
        authDomain: "meetwoyou-436a2.firebaseapp.com",
        projectId: "meetwoyou-436a2",
        storageBucket: "meetwoyou-436a2.firebasestorage.app",
        messagingSenderId: "612788132077",
        appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- ১. ইমেজ প্রিভিউ লজিক ---
    window.previewImage = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('img-preview-con').classList.remove('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.clearPreview = () => {
        document.getElementById('file-in').value = "";
        document.getElementById('img-preview-con').classList.add('hidden');
    };

    // --- ২. ক্লাউডিনারি আপলোড এবং ফায়ারবেস পোস্ট ---
    window.postToFeed = async () => {
        const text = document.getElementById('post-input').value;
        const file = document.getElementById('file-in').files[0];
        const user = auth.currentUser;

        if(!user || (!text && !file)) return;

        const btn = document.getElementById('submit-post');
        btn.innerText = "Uploading...";
        btn.disabled = true;

        try {
            let imgUrl = "";
            // Cloudinary Upload
            if(file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'Meetwoyou'); // Unsigned preset
                const res = await fetch('https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload', { method: 'POST', body: formData });
                const cloudData = await res.json();
                imgUrl = cloudData.secure_url;
            }

            // Get User Info from Firestore
            const uSnap = await getDoc(doc(db, "users", user.uid));
            const uData = uSnap.data();

            // Save Post to Firestore
            await addDoc(collection(db, "posts"), {
                userId: user.uid,
                userName: uData?.fullName || user.displayName || "Agent",
                userPic: uData?.profilePicUrl || user.photoURL || "https://via.placeholder.com/50",
                caption: text,
                postImg: imgUrl,
                likes: [],
                createdAt: serverTimestamp()
            });

            // Reset UI
            document.getElementById('post-input').value = "";
            clearPreview();
            alert("Post shared successfully!");

        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "Post";
            btn.disabled = false;
        }
    };

    // --- ৩. নিউজ ফিড রিয়েল-টাইম লোড ---
    onAuthStateChanged(auth, (user)
