<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // আপনার Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
      authDomain: "meetwoyou-436a2.firebaseapp.com",
      projectId: "meetwoyou-436a2",
      storageBucket: "meetwoyou-436a2.firebasestorage.app",
      messagingSenderId: "612788132077",
      appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ১. পোস্ট করার ফাংশন (Fix করা হয়েছে)
    window.uploadPost = async () => {
        const text = document.getElementById('post-text').value;
        const file = document.getElementById('post-file').files[0];
        const user = auth.currentUser;

        if (!user) {
            Swal.fire('Error', 'You must be logged in!', 'error');
            return;
        }
        if (!text && !file) return;

        const btn = document.querySelector('.btn-main');
        btn.innerText = "Posting...";
        btn.disabled = true;

        try {
            let imgUrl = "";
            // Cloudinary তে ছবি আপলোড
            if (file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'Meetwoyou'); 
                const res = await fetch(`https://api.cloudinary.com/v1_1/dpgawb5sl/image/upload`, {method:'POST', body:formData});
                const data = await res.json();
                imgUrl = data.secure_url;
            }

            // Firestore এ পোস্ট সেভ করা
            await addDoc(collection(db, "posts"), {
                uid: user.uid,
                name: user.displayName || "Yash Khan",
                photo: user.photoURL || "https://via.placeholder.com/50",
                text: text,
                img: imgUrl,
                timestamp: serverTimestamp() // এটি খুব গুরুত্বপূর্ণ
            });

            document.getElementById('post-text').value = "";
            document.getElementById('post-file').value = "";
            Swal.fire('Success', 'Post Published!', 'success');

        } catch (error) {
            console.error("Post error:", error);
            // যদি Index না থাকে তবে এখানে মেসেজ আসবে
            Swal.fire('Error', 'Post failed! ' + error.message, 'error');
        } finally {
            btn.innerText = "Post Status";
            btn.disabled = false;
        }
    };

    // ২. নিউজ ফিড লোড করার লজিক
    function loadPosts() {
        // 'timestamp' অনুযায়ী সাজানো হচ্ছে
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snap) => {
            const area = document.getElementById('feed-area');
            area.innerHTML = "";
            
            if (snap.empty) {
                area.innerHTML = "<p style='text-align:center; color:gray;'>No posts available yet.</p>";
            }

            snap.forEach(pDoc => {
                const p = pDoc.data();
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.photo}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${p.name}</b>
                    </div>
                    <p>${p.text}</p>
                    ${p.img ? `<img src="${p.img}" style="width:100%; border-radius:10px;">` : ''}
                `;
                area.appendChild(card);
            });
        }, (err) => {
            console.log("Feed Error:", err);
            // যদি নিউজফিড না আসে, তবে কনসোলে ক্লিক করে Index তৈরি করতে হবে।
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) { loadPosts(); }
    });
</script>
